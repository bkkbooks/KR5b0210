front:
  text: 太上黃籙齋儀卷之十七
  hash: sha256:02b144450cb9e495d9120805f37e86f84ce65b277bf82495f843f2ef76fc79e9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0210_HFL_017-001a, image: hfl/0271/0271-124.png}
body:
  text: 唐廣成先生杜光庭集特勑為臣下遷拔中分行道入戶各禮師存念如法衛靈丹靈朱火炎霞激風赤輪剛運天光八衝迸威包羅交變萬方流金豁落羣魔滅蹤辟姦破妖明耀元功金符召制躡雲䇿龍謡歌慶會散花太空神化冥運四極安隆伏御帝前罔有不恭鳴法鼓二十四通無上三天玄元始三氣太上道君召出臣身中三五功曹左右官使者侍香金童傳言玉女五帝直符直日香官各三十二人出出者嚴裝闢啓玄壇天帝神君當召此間土地里域真官正神急上關啓臣今奉為入意以今朝元行道願得玉清道氣靈寶妙光下降流入臣等身中即使玄壇清淨內外成真天無氛穢地絶妖塵琳琅振響十方肅清萬魔不干真誠上徹令臣所啓速達徑御太上無極大道至真玉皇上帝御前各稱法位上清玄都弟子臣某等同誠上啓虛無自然元始天尊無極大道太上大道君髙上大道金闕玄元天皇大帝太上老君昊天玉皇上帝十方巳得道大聖衆自然至真靈寶天尊隨機赴感救苦天尊至真諸君丈人三十六天帝君玉虛上帝玉帝太帝東華南極西靈北真玄都玉京金闕七寶玄臺紫微上宮靈寶至真明皇道君三十六部尊經玄中大法師三界應感一切真靈臣等伏聞至道開光先天立化圓方異稟幽顯分途設繩非許善之科懸懲沮升聞之典衆靈主宰列職司明巨細無遺錙銖畢舉蓋欲使三界之內庶品之中力善修心除非輟惡垂於經訓示以懴祈明載格言古今遵奉臣等叨依妙化獲備玄司志惟佐國立功度人濟物況奉詞旨敢不上聞讀詞皇帝祇仰玄慈欽承道典軫懷冥漠思降禎休考明真遷拔之科按黃籙懴陳之品俾安靈識爰降絲綸領信幣以豐嚴錫香花而蠲潔臣等式遵玄旨敷列皇壇四界八方法天象地貢詞誠於三境用祈謝於諸天冀罄丹心以資鴻福以今中分行道請法衆等運茲𥘉捻上香願此香煙騰空徑上供養無上至真道寶臣等歸身歸命首體投地仰依太上三尊願以是功德上資社稷尊靈比乾儀而共永宗祧先聖齊道化以常寧耀景十華升真長樂垂休大寶流福宏基邁周漢之隆昌超夏商而延逺今故燒香歸依師尊大聖衆至真之德得道之後升入無形和興道合真以今中分行道詩法衆等運茲二捻上香願此香煙騰空徑上供飬無上至真經寶臣等歸身歸命首體投地仰依太上三尊願以是功德歸流皇帝伏覬日華騰景益廣睿明辰極飛光彌崇聖壽道德超於義皥仁聖冠於勛華萬國宅心九圍隨化后妃嬪御欽贊堯慈太子諸王昭敷舜澤公卿臣佐文武職僚各運忠貞永扶昌祚今故燒香歸依師尊大聖衆至真之德得道之後升入無形和與道合真以今中分行道請法衆等運茲三捻上香願此香煙騰空徑上供養無上至真師寶臣等歸身歸命首體投地仰依太上三尊願以是功德歸流某官即時冥界三清衆聖開日闕以流光八景髙尊敞雲軒而布澤沐浴神識灌錬形魂蕩滌罪瑕和平𡨚債先亡後裔同沐熏修今故燒香歸依師尊大聖衆至真之德得道之後廾入無形和與道合真禮方懺悔三啓螢鬱家國盛濟濟經道興天人同其願縹眇入大乘因心立福田靡糜法輪升七祖生天堂我身白日騰三禮臣等至心稽首禮太上無極大道臣等至心稽首禮三十六部尊經臣等至心稽首禮玄中大法師重稱法位上清玄都弟子臣某謹重伸上啓太上無極大道元始天尊太上大道君太上老君至真自然靈寶天尊隨機赴感救苦天尊三十六部尊經玄中大法師天師君上相上宰四司五帝三界官屬一切尊靈臣等伏聞萬聖延慈九天垂澤憫三塗之謫役哀六趣之漂淪一失生津永乖賢域綿綿長夜萬劫無期是以遊觀八門天尊啓濟生之品軫傷三界道君宣度死之科欲使共陟福庭同超欲海真經妙旨匡國化人皇帝軫念亡靈顯頒綸詔按三清之格開九奏之壇油燭香花質心衆聖紋繒法信騰欵諸天燒香然燈轉經行道洗心滌慮拜手祈真所期八景神光下照幽隂之府九龍符命徑臨積夜之庭拔度魂儀升離泉曲赦除某官前生今世無量劫來積過深尤前𡨚往債或巳身所犯或祖世貽殃罪目多端不可憶識或違忤天地負越神明侵害於人損傷於物殁受報對動歷歲年非仗玄功無由解釋因今大齋功德懴拔之緣萬罪千愆咸乞除蕩即使神魂清靜罪惱銷平離苦生夭參真悟道至于九玄七世往逝幽靈共沐勝功俱登福路垂祥介祐利及見存上願二象清寧三光融朗風雲叶序妖惡沉零帝祚無疆聖躬萬壽三農蕃稔覩分𡵨合頴之苖四海梯航有天獸竒香之貢后妃蠙御太子諸王匡翊紫宸保寧皇極公卿臣佐文武忠良敷贊九重輯和八表干戈韜戢億兆樂康洎乎水陸龍神飛沉庶類齋功所被惠澤所覃海外寰中齊臻壽域上明天尊大慈之澤下副臣等懺謝之誠謹啓以聞發願一顧大道淡泊虛無安間空寂澄清自居廣開法門教導頑夫皆蒙惠澤精苦是修預以同學普得升虛與天相保長存無憂二願諸天結氣澄清高虛廣覆保真固靈氣候調節四運和平國安民豐普天間寧廣濟一切惠逮有生保劫長存億劫不傾三願土地覆載無窮安平不陷海淪不崩保鎮家國兆民興從養生安死惠周十方禾稼滋植營運日豐咸得厚載萬類皆從四願日月二景髙明無有薄蝕𧇊盈安清光照諸天洞消暗冥保固劫運世祚和平普加潤澤惠灑衆生五願星辰與日齊光轉燭照耀朗映十方各安其位經緯直行保鎮家國無有災傷四海寧一普天興昌六願四時隨節推遷景氣和調無有災患疫毒消滅普天安平五榖豐熟國富民歡七願浮雲結氣聚煙飛空髙澄蔭覆玄玄隱則無為散則彌天神仙同居結友衆真惠流一切興國愛民普濟羣生人同劫年八願風雨流灑無窮普加施泄受其發揚萬物滋生國儲民豐九願五嶽各安其方巍巍包藏長為仙宫安鎮國祚保天無終護度一切莫不仰宗十願江海蕩蕩太極舍容恢廓無細不植淵奧柔惠潤加蠕息天人獲慶年同劫石十一願帝王國土日昌四鎮安睦兵革不揚天人歌唱吉日來翔敷教濟濟威化洋洋兆民稱慶長樂未央十二願蝖飛蠢動巳生未生咸蒙安全普得生成皆見元氣受陽之形草木果林經冬不零一切濟度靡不鮮榮和與道合真復爐香官使者左右龍虎君侍香諸靈官當今臣朝元之所自然生金液丹碧芝英百靈衆真交會在此香火爐前令臣學道得道求仙得仙齋主受福幽顯沾恩十方仙童玉女侍衛蘭煙傳臣向來所啓速達徑御太上無極大道至真玉皇上帝御前出戶太上黃籙齋儀卷之十七
