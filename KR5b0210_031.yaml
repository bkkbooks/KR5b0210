front:
  text: 太上黃籙齊儀卷之三十一歸七
  hash: sha256:26797dbc68a3e4860c110a86a389d1c2b1e1db8f227d84258faa16406de9918f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0210_HFL_031-001a, image: hfl/0273/0273-092.png}
body:
  text: 唐廣成先生杜旡庭刪懴禳疾病落景行道入戶各禮師存念如法衛靈神光朗耀瑞氣匝旋箕斗澄輝芝字宴然玉眸金真寶壇純乾變夜作晝回子午前太華流彩丹鳳飛轅息魔滅姦髙步祥煙天真並集齊到帝前鳴法鼓二十四通無上三天玄元始三氣太上君召出臣身中三五功曹左右官使者侍香金童傳言玉女五帝直符直日香官各三十二人出出者嚴裝關啓玄壇天帝神君當召此間土地里域真官正神臣今奉為入意以今願得玉清道氣靈寶妙光下降流入等身中即使玄壇清淨內外成真天無氛穢地絶妖塵琳琅振響十方肅清萬魔不干真誠上徹令臣所啓之言速達徑御太上無極大道無形無名虛無自然金闕玉陛下各稱法位具位臣某等謹同誠上啓虛無自然元始天尊無極大道太上玉晨大道君太上老君昊天玉皇上帝十方巳得道大聖衆至真諸君丈人三十六天帝君玉虛上帝玉帝大帝東華南極西靈北真玄都玉京金闕七寶玄臺紫微上宫靈寶至真明皇道君三十六部尊經玄中大法師三界官屬一切真靈臣等伏聞混成構象真一凝光天地資之以權輿隂陽運之以生化盛衰倚伏善惡糾紛日月有虧昃之期寒暑有推遷之數惟兹大道統貫幽明延福垂休廣濟羣有臣等早探真訣獲眄靈圖三洞琅函有祈禳之品九天金劄傳拯護之文四萬劫而敷弘五億天之宗奉制伏妖惡徴召魔靈佐國立功度人救物有所祈向敢不上聞讀詞依按詞言實惟䖍切弟子某以災纒未息疾厄未平歸命諸天披心大道請修齊直延降威靈輒運丹誠共希玄祐以今晚朝行道請法衆等運兹初捻上香願此香煙騰空徑上供養無上至真道寶臣等歸身歸命首體投地仰依太上三尊願以是功德歸流皇帝九廟尊儀駕景三清流祥萬國鴻基克固鳳曆永昌太子諸王允扶大業后妃百辟匡贊睿圖車䡃大同梯航畢集今故燒香自歸依師尊大聖衆至真之德得道之後升入無為和與道合真以今晚朝行道請法衆等運兹二捻上香願此香煙騰空徑上供養無上至真經寶臣等歸身歸命首體投地仰依太上三尊願以是功德歸流齊主某家九祖七玄幽儀滯爽超辭地壤升翥天衢息注訟於冥關流福祥於後胤九幽地獄咸覩慈光六趣羣生同躋善域今故燒香自歸依師尊大聖衆至真之德得道之後升入無為和與道合真以今晚朝行道請法衆等運兹三捻上香願此香煙騰空徑上供養無上至真師寶臣等歸身歸命首體投地仰依太上三尊願以是功德歸流弟子某身𡨚債和平災殃消解凶衰冰泮疾厄雲收南斗延生東宫注祿洎諸眷屬普及人天同享善功咸臻道域今故燒香自歸依師尊大聖衆至真之德得道之後升入無為和與道合真禮方懴悔步虛旋繞旋步雲綱上天風颯爾吹飄裾凌斗柄秉拂揖參旗獅子㗸丹綬麒麟導翠輜飛行周八極幾見發春枝緑鬒巍丹幘青霞絡羽衣晨趨陽德館夜造月華扉搏弄周天火韜淋起陸機玉房留不住却向九霄飛昔在延恩殿中霄降九皇六真分左右黃霧繞軒廓廣內尊神御仙兵護道場孝孫今繼志咫尺對靈光三禮臣等至心稽首禮太上無極大道臣等至心稽首禮三十六部尊經臣等至心稽首禮玄中大法師重稱法位具位臣某等謹重伸上啓太上無極大道元始天尊太上大道君太上老君十方無極大道道德衆聖天尊至真大帝天帝三十六部尊經玄中大法師上相上宰四司五帝三界官屬一切真靈臣等參佩寶文夙慙靈澤竊披玄奧志在敷陽思立轉功廣被羣品弟子某以災凶在運疾厄所纏列欵表心䖍誠禱福請崇齊直關奏真靈是敢遵按典儀轉經行道首謝弟子某前生今世宿罪深尤或違天地覆載之仁或負日月照臨之德犯二氣五行之性傷三光六紀之和前𡨚來除後罪重結故傷誤殺恣意任心不識因緣罔知禁忌六情所起三業所為干犯幽明違越經訓成兹報對搆此烖危又恐犯觸龍神興工土木侵傷地理違犯天時又恐宿曜所臨年運所犯九宫刑剋八卦衝妨否塞既深憂危是切因今修齊行道懴謝過愆燒香誦經祈天請命災殃罪咎咸乞懴除即使太一延生三元却死玉童授藥五帝降符六府調和百關宣暢夀延祿永禍滅福生然乞九祖生天六親蒙祐飛沈遂性動植安全上願帝業鴟圖天長地久武功克偃文德允修日並睿明川浮聖澤連珠合璧重覩於玄穹八卦九疇再彰於清洛三農有叙九穀無愆水旱不生疪癘不作干戈永戢風雨以時下及幽途遍該含識隂陽臣佐山川職寮弘道安人誅邪祐正俱升福岸齊契道階上明天尊弘慈之施下副臣等䖍奉之誠謹啓以聞發願一願乾坤明素二願氣象清玄三願聖人萬壽四願化洽八埏五願天垂甘露六願地發祥煙七願四時應節八願萬物生全九願家多孝悌十願國富才賢十一願醮官獲福十二願學道成仙復爐香官使者左右龍虎君侍香諸靈官當令臣行香之所自然生金液丹碧芝英百靈衆真交㑹在此香火爐前令臣學道得道求仙得仙齊主受福存殁沾恩令臣所啓之言速達徑御太上無極大道無形無名虛無自然金闕玉陛下出戶太上黃籙齊儀卷之三十一
