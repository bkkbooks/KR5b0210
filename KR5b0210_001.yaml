front:
  text: 太上黃籙齊儀卷之一賔一
  hash: sha256:a08729370180c58caf7a96a05e4561d052f749566d7ae2d6b8cc3f7e5853de40
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0210_HFL_001-001a, image: hfl/0270/0270-004.png}
body:
  text: 唐廣成先生杜光庭集第一日清旦行道儀舊儀令齊主每日投詞如告齊之法既初建齊時巳投詞祈告若每日重疊即於禮為繁今止一度餘日並停衆官列位幡節香案肅整於玄師前立定唱道場衆等人各運心歸命三寶一切念華夏讃引至地戶華夏讃出玉匱明真經今但用十八虛聲耳啓堂頌勤行奉齊戒誦經制六情故得乘空飛耀景上玉清精心奉經教吐納鍊五神功德冠諸天轉輪上成仙入戶呪至地戶之左法師密呪曰四明功曹通真使者傳言玉童侍靖玉女為我通達道室正神上元生氣入我身中華夏讃引入壇升天門上十方香東方為始至御案三上香上香密呪玉華散景各禮師存念如法法師臨目存見太上三尊乘空下降左右龍虎千乘萬騎三界尊靈羣真侍衛羅列在座乃為弟子奏陳齊意次思經師侍太上之右心拜三過願師得仙道我身升度次思籍師次思度師願念如初夜法次思青雲之氣匝滿齊堂青龍獅子備守前後仙童玉女天仙地仙飛仙日月星宿五帝兵馬九億萬騎監齊直事三界官屬羅列左右次思青氣從師肝中出如雲之升青龍獅子在青氣中天仙地仙飛仙五方五帝兵馬匝覆齊主家大小之身又思五臟五嶽五帝如初夜法衛靈呪金真緑霞煥映三天飛雲丹霄諸天控軿晨輝啓旦隂翳俱㳙九微震空五星回旋萬仙應感自然妙玄杳冥散景分形億千蒙昧光曜瑞降壇乾生死蒙恩灌鍊金泉魔王恐懼合景三田鳴法鼓二十四通發爐無上三天玄元始三氣太上老君召出臣等身中三五功曹左右官使者侍香金童傳言玉女五帝直符直日香官使者各三十六人出當召此間土地里域真官正神速出關啓臣今正爾燒香奉為某官某乙為國為家修建無上黃籙大齊若干日夜願得太上十方正真生氣降流入臣等身中所啓速達上御至真無極大道玉皇上帝御前人各三禮衆官長跪法師鳴法鼓二十四通出吏兵上啓謹出臣等身中五體真官功曹吏出無上三天執法開化隂陽功曹度道消災散禍解厄君吏各十二人出臣等身中治職君吏某治建節監功大將軍前部效功後部效殺驛庭令驛庭丞四部監功謁者臣等身中仙靈直使正一功曹左右官使者隂陽神決吏科車赤符吏剛風騎置驛馬上章吏官各二人出出者嚴裝顯服冠帶垂纓整其威儀直使功曹戴通天之冠衣皂紈單衣正一功曹冠朱陽之幘絳章單衣治病功曹冠九德之冠五色綬命單衣腰帶虎符齊執玉版直使功曹住立四方正一功曹住立中央治病功曹營衛臣等身中左官使者建節在前右官使者持幢在後陽神決吏立左隂神決吏立右上部功曹住立上方中部功曹住立臣等身中促氣功曹催促十方上部使者逺望上天中部使者逺瞻八方都官使者匝繞臣等身郎吏虎賁察姦鈎騎都官僕射天丁力士天騶甲卒收氣食氣吏收神食神吏收鬼食鬼吏收邪食邪吏收精食精吏收毒食毒吏誅符破廟吏科車赤符吏剛風騎置驛馬上章吏飛龍騎吏等屯住臣前後左右功曹使者嚴裝事竟羅列鹵簿關啓靈寶官屬領仙監齊君吏天師所布二十四治三十六靖廬七十二福地三百六十名山崑崙等上宫三萬六千神日月星宿璇璣北辰天地三界官屬君將史兵道上二玄三元四始四面方位風氣注氣甲子諸官君將吏考召君東九夷胡老君南八蠻越老君西六戎氐老君北五狄羌老君中央三秦傖老君五嶽四瀆丘沼君諸廟神所在髙山山林溪谷山林孟長十二溪女根源本始土地之主社稷將吏一時嚴裝與臣等身中功曹使者飛龍騎吏上啓太上無極大道太上大道君太上老君太上丈人無上玄老十方無極大道道德衆聖天尊至真太帝天帝天師君靈寶監齊大法師諸官君臣等生長浮俗耽染囂塵三業縈牽六情飄浪叨逢至化得遇真師開三清衆妙之門演八景長生之旨澄清欲海拯擢愛河佩奉龍文秉修神籙弘道贊法佐國度人救物立功齊戒為本今有某官某乙上惟邦國旁及幽明請福祈恩歸心十極請修無上黃籙大齊伏聞三洞寶經靈仙品格無上妙法黃籙寶壇通聖降真法天象地保安家國君臣蒙扶祐之恩濟拔存亡生死荷護持之力開九龍符命則地獄清間勑五帝威神則天關朗晏功髙萬法澤普羣生是敢依按玄科齎持法信香花油燭紋綵金龍效信十方盟心三界臣等奉承聖教忝職玄司凡有所祈理冝關奏今謹洗心靜念沐浴清虛建修黃籙大齊懴謝於三光之下若干日夜歸命至真為某拔度存亡離苦升樂和𡨚釋對解厄消災謹上請三洞天仙兵馬飛仙兵馬地仙兵馬真人兵馬神人兵馬日月星宿兵馬九宫五帝兵馬三河四海兵馬各九億萬騎監齊直事三十二人侍香金童三十二人散花玉女三十二人五帝直符傳言奏事飛龍騎吏等各三十二人一合來下主為某乙監臨齊所上安國祚保祐羣生拔度億曽萬祖幽魂苦爽斷絶惡對身入先明永出三途超離五苦歸命十方無極世界巳得道大聖衆至真諸君丈人乞解厄除災延生保命過度三災八難衆惡之中保國寧家普及含識須行道事訖有功勤者謁言仙宫功曹使者飛龍騎吏分别關奏以時上達列啓事竟各還臣等身中復於宫室須召又到一如故事畢叩齒三通液三過出太極敷齊威儀經各稱法位衆官密稱巳法位也上清玄都大洞三景弟子無上三洞法師奉行黃籙大齊法師某嶽先生某帝真人臣某謹同誠上啓虛無自然元始天尊無極大道太上大道君太上老君髙上玉皇十方巳得道大聖衆至真諸君丈人三十二天帝君玉虛上帝玉帝大帝東華南極西靈北真玄都玉京金闕七寶玄臺紫微上宮靈寶至真明皇道君三十六部尊經玄中大法師三界官屬一切具靈臣等億劫良因生值大化玄真啓拔得處玄門三師盟授三寶真經法應度人九萬九千位登至真而功微德簿未能自仙乘愆蹈過荏苒塵寰但受法之初盟告三界約當度人濟物立功為先凡所歸依理冝關奏今奉詞旨敢不上聞讀詞案如詞言實惟䖍懇齊主以宿承福慶擢品人倫為國為家思崇福祉仰慮億曽萬祖十世神儀處世之時過尤增積輪回長夜解拔無由欲報洪恩昊天罔極伏聞虛無大道覆育羣生無上法王諸天大聖垂慈救之澤啓黃籙之科懴謝十天披心八極丹誠歸向萬罪蠲消謹依玄科奉齎金龍紋繒本命之信香花油燭表信效誠請拔存亡以祈玄祐臣等謹為澄神靜念滌慮𡨋心依黃籙簡文靈仙科典超度存殁敷建靈壇四界八極法天象地立齊行道燒香然燈披明真玉匱之文破幽夜泉扄之苦拔除罪網拯濟迷津以今清旦行道初捻上香供養至真無上道寶歸身歸神歸命大道臣等首體投地歸命太上三尊以是功德奉福齊主某家億曽萬祖一切靈儀解脫三途超離六趣度十方世界苦惱之根出入門幽曠塗炭之境託影玉城遊神紫闕寶林彌覆功德熏修早入慧源克成仙道今故燒香自皈依師尊大聖衆至真之德得道之後升入無形與道合真二捻上香供養至真無上經寶歸身歸神歸命大道臣等首體投地歸命太上三尊以是功德奉福宗祧先聖社稷尊靈鳳曆悠長龍圖永固皇帝聖躬納祐國祚延洪化被華夷功髙軒燧皇后坤儀並著母德遐宣太子諸王承乾繼聖公卿臣佐中外職寮潤色帝猷恢弘大業億兆臣庶各保物冝惟孝安家惟忠報國周天分地擊壤安歌祅孽不興榖稼時稔九圍共四海同文學道門人隱居林澤宣道贊法勇猛精勤得一冲真通玄合道今故燒香自歸依師尊大聖衆至真之德得道之後升入無形與道合真三捻上香供養至真無上師寶歸身歸神歸命大道臣等首體投地歸命太上三尊以是功德歸流奉福齊主某巳身親姻各使神安體豫罪滅災消憂患不侵夢寤真正轉其報質遂等金姿延其促齡方成久視少私寡欲行合自然貴而不驕富而知足六親長幼九族宗姻永保利貞同居勝善運心同義咸享福緣水陸飛沉有情含識九幽五道六趣三途離苦生天和𡨚釋對得度三災萬禍刑厄之中福業普興善功昭著今故燒香自歸依師尊大聖衆至真之德得道之後升入無形與道合真禮方隨方懴悔二十方或都懴五假儀出下卷各思九色圓象咽液命魔密呪法師立鬼門之上都講立天門之上法師存日月及項後九色圓光映照內外如存神圖訣畢叩齒三通密呪曰黃中䇿氣斬祅宗察制强精斷邪翁太上有命太上房急召北帝詣玉宫受承威令宣魔王五帝蓊鬱與命衝祕藏玉文方就隆三天運明六天運終賢者哉此呪密念不得令巳耳聞違之有咎責愼之愼之步虛旋繞旋行躡雲綱乘虛步玄紀吟詠帝一尊百關自調理俯命八海童仰携髙仙子諸天散香花蕭然靈風起宿願定命根故致標髙擬歡樂太上前萬劫猶未始又嵯峨玄都山十方宗皇一岧岧天寶臺光明焰流日煒燁玉林華蒨璨耀朱實常念餐元精鍊液固形質金光散紫微窈窕大乘逸又仰存太上華景秀丹田左顧提鬱儀右盻携結璘六度觀梵行道德隨日新宿命積福應聞經若至親天挺超世才樂誦希微篇冲虛太和氣吐納流霞津胎息靜百關寥寥究三便泥丸洞明鏡遂成金華仙魔王敬受事故能朝諸天皆從齊戒起纍功結宿緣飛行凌太虛提携髙上人三啓樂法以為妻愛經如珠王持戒制六情念道遣所欲淡泊正氣停蕭然神靜默天魔並敬護世世享大福三禮臣等志心稽首禮太上無極大道臣等志心稽首禮三十六部尊經臣等志心稽首禮玄中大法師重稱法位具位某謹同誠上啓太上無極大道元始天尊太上大道君太上老君十方無極大道道德衆聖天尊至真太帝天帝三十六部尊經玄中大法師上相上宰四司五帝三界官屬一切真靈臣等陶質二儀植因萬劫叨承道化未悟至真徒以偑奉玄經宗修祕於功未加於動植過已積於丘林常懼運終受責幽夜而告盟之日以弘濟為先宣道度人佐國行化冀伸微效以副元慈今齊主皈命上真䖍誠大道上惟國祚爰及存亡報君親煦育之恩念幽夜輪回之苦齎持信誓崇建道場謝巳往之愆瑕所將來之福祉翹勤懇欵敢不上聞是用率勵法徒按依科格施壇列纂法地象天𤁋懇上玄冥心至聖伏冀虛無大道寥廓髙尊憫鑒丹誠滂流玄澤勑四司五帝三界威靈垂變化之功拂煙雲而降祉播昭彰之力隨祈懴以齊臨開重泉積夜之庭釋幽獄窮魂之苦出離隂府超翥天衢悟法聞經參玄證道齊主某家九親眷屬過往見存三業罪消六塵障滅天羅地網不為三命之災暗曜明星永息五行之厄神真祐護福壽增延上冀國祚無疆帝圖永鎮聖躬萬壽比山嶽以巍峩睿澤滂流配滄溟而浩蕩萬方柔順八極昭融三光循於元天百榖滋豐於率土境無烽燧俗有謳歌天下太平羣生遂性洎諸幽顯普及沉潜齊陟真階俱升福岸上明天尊廣濟之澤下副臣等歸命之誠謹啓以聞發念一念天地交泰二念日月貞明三念隂陽順序四念國土安寧五念帝王景祚六念宰輔忠貞七念萬姓安樂八念百穀豐盈九念幽途離苦十念大道興行復爐香官使者左右龍虎君侍香諸靈官當令臣行道之所自然生金液丹碧芝英百靈衆真交㑹在此香火爐前十方仙童玉女侍衛香煙傳奏臣向來所啓徑達至真無極大道玉皇上帝御前禮三拜出堂頌夙世恩德報道心超然發身飛升仙都七祖咸解脫出戶呪法師於地戶叩齒三通呪曰出隂入陽萬神開張關啓事畢請閉皇房侍靖玉女明備神宮畢便出戶右几先出回師監齊紏過朝儀事畢衆官普揖太上黃籙齊儀卷之一
