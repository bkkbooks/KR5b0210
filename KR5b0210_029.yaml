front:
  text: 太上黃籙齊儀卷之二十九歸五
  hash: sha256:26b06c4710ce226dc03b3cfb6566f82b50d67aef0ac87c631ce2a6981cd298f5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0210_HFL_029-001a, image: hfl/0273/0273-056.png}
body:
  text: 唐廣成先生杜光庭刪懴禳疾病清旦行道入戶各禮師存念如法衛靈金真緑霞煥映三天飛雲丹霄諸天控軿晨輝啓旦隂翳俱蠲九微震空五星回旋萬仙應感自然妙玄杳冥散景分形億千寶珠光耀瑞降壇乾生死蒙惠灌鍊金泉魔王恐懼合景三田鳴法鼓二十四通無上三天玄元始三氣太上道君召出臣身中三五功曹左右官使者侍香金童傳言玉女五帝直符直日香官各三十二人出出者嚴裝關啓玄壇天帝神君當召此間土地里域真官正神臣今奉為入意願得玉清道氣靈寶妙光下降流入臣等身中令臣所啓之言速達徑御太上無極大道無形無名虛無自然金闕玉陛下各稱法位具位臣某等謹同誠上啓虛無自然元始天尊無極大道太上大道君太上老君昊天玉皇上帝十方巳得道大聖衆至真諸君丈人三十六天帝君玉虛上帝玉帝大帝東華南極西靈北真玄都玉京金闕七寶玄臺紫微上宫靈寶至真明皇道君三十六部尊經玄中大法師三界官屬一切真靈臣等伏聞氣象運行隂陽顯晦倚伏有興衰之數虧盈為禍福之端況在塵寰寧離陶鑄惟三尊演教垂濟生度死之科萬聖延慈著救物拯危之品廣敷神化大庇羣生臣等獲履法門早參慈訓所冝救災拔難祈福歸五二生民行教立功以彰玄奧況奉詞㫖敢不上聞讀詞按如詞言誠情迫切宜申弘護俾達䖍祈齊主某以染跡六塵陶形四大水火有盛衰之異暗明分舒慘之殊或爽節宣遽成疾厄形神奔悸性命懸危惟叩真靈庶蒙解拔臣等謹依科格敷列壇場稽首祈恩仰天請命以今早朝行道請法衆等運兹初捻上香願此香煙騰空徑上供飬無上至真道寶臣等歸身歸命首體投地仰依太上三尊願以是功德歸流帝王國主社稷尊靈鳳紀龍圖配乾坤而永固皇風睿德與日月以長懸明燭萬方仁周八表儲皇妃后中外臣寮克贊雍熙共康寰海八極之內君臣吏民巨福所覃普天昭泰今故燒香自歸依師尊大聖衆至真之德得道之後升入無形和與道合真以今早朝行道請法衆等運兹二捻上香願此香煙騰空徑上供養無上至真經寶臣等歸身歸命首體投地仰依太上三尊願以是功德歸流齊主某家九世七玄億曽萬祖親緣眷屬往逝神儀伏承黃籙之玄功上朱陵之仙界陽光瑩質流火鍊形黑簡落名青宫著籍逍遙真境永祛延注之殃利祐見存克享安貞之福今故燒香自歸依師尊大聖衆至真之德得道之後升入無形和與道合真以今早朝行道請法衆等運兹三捻上香願此香煙騰空徑上供養無上至真師寶臣等歸身歸命首體投地仰依太上三尊願以是功德歸流齊主某身災纒弭息厄運清銷疾瘵痊平𡨚仇和釋南昌司命開生籙以延年北府帝君削黑書而落死魂神澄正萬氣長存眷屬親緣同沾景福飛沈異質蠢動殊形咸沐玄休共臻貞吉今故燒香自歸依師尊大聖衆至真之德得道之後升入無形和與道合真禮方懴悔各思九色圓象咽液命魔密呪三啓頌樂法以為妻愛經如珠玉持戒制六情念道遣所欲淡泊正氣停蕭然神靜默天魔並敬護世世受大福鬱鬱家國盛濟濟經道興天人同其願縹眇入大乘因心立福田靡靡法輪升七祖生天堂我身白日騰大道洞玄虛有念無不契鍊質入仙真遂成金剛體超度三界難地獄五苦解悉歸大上經靜念稽首禮三禮臣等至心稽首禮太上無極大道臣等至心稽首禮三十六部尊經臣等至心稽首禮玄中大法師重稱法位具位臣某等謹同誠上啓太上無極大道元始天尊太上大道君太上老君十方無極大道道德衆聖三十六部尊經玄中大法師三界官屬一切真靈臣等獲奉玄科仰承慈訓濟時佐國弘道安人而跡混市朝功輕塵露常增愓懼不敢遑寧但法在敷揚義先拯救今齊主某以災𨇠所迫疾厄所侵風燭是憂性命斯切今披心請命稽首法門臣等輒為依按明科修齊行道謄詞列欵懴謝存亡恐慮某九世以來宿殃流注前生往代𡨚結所成或立志運心有違隂騭或舉情屬念不合神明往咎前愆隂罪陽過因緣積沓搆此災危又恐三命五行九宫八卦天文宿曜行運逰年災殺所臨星辰所照或命祿薄弱運氣衰微或故殺誤傷新𡨚住債及五瘟百毒之氣凶邪鬼注之徒外中肌膚內侵臟腑成兹危疾未獲痊除特乞太上垂恩三光赦罪解銷𡨚對和釋災凶前世今生無邊罪目因今祈懴咸乞赦除使真于流行靈津宣潤百痾蠲蕩六府和平祿祚增豐年算延永舉家享福內外沾榮上願社稷安寧帝王萬壽風雨調順歲稔時康有識舍生並登壽域上明天尊大慈之澤下副臣等祈懴之誠謹啓以聞發念一念為道四大合德齊主七世父母免脫憂苦上升天堂衣食自然二念帝王國主道化興隆庠序濟濟皇教恢弘威儀翼翼普天所瞻民稱太平四夷賔伏妖惡自滅賢人日生三念法師功德大䢖教化明達俱獲飛仙四念同志學人早得仙道更相開度五念九親和睦好尚仁義貴道賤財行為物範六念損己布施道士及饑寒者天下人民各得其所七念蠕動跂行一切衆生咸蒙成就八念赦貰前生今世罪對立功𥙷過九念家國隆盛宗廟有人世生賢才十念尊受師經不敢中怠平等一心廣度一切剋獲上仙白日登天拜見太上永成真人雲車羽駕和與道合真復爐香官使者左右龍虎君侍香諸靈官當今臣行香之所自然生金液丹碧芝英百靈衆真交㑹在此香火爐前令臣學道得道求仙得仙齊主受福幽顯沾恩十方仙童玉女侍衛蘭煙傳臣向來所啓之言速達徑御太上無極大道無形無名虛無自然金闕玉陛下出戶太上黃籙齊儀卷之二十九
