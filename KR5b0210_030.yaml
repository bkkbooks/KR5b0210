front:
  text: 太上黄籙齋儀卷之三十歸六
  hash: sha256:12a2c7d66ddadf1f0500e9162f3b809427b350ab38a0020205f6a9ff096091d5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0210_HFL_030-001a, image: hfl/0273/0273-072.png}
body:
  text: 唐廣成先生杜光庭刪懴禳疾病中分行道入戸各禮師存念如法衞靈謡歌空洞帝君守壇五帝校録受符三官備衞四門束魔去姦流鈴擲火除穢焚殘身佩金書錬液芝顔玄虚素合心動三關騎獅跨鶴控虬乘鸞衆星守舎千魔不干道炁長存萬仙委安鳴法鼓二十四通無上三天玄元始三炁太上道君召出臣身中三五功曹左右官使者侍香金童傳言玉女五帝直符直日香官各三十二人岀出者嚴装關啟玄壇天帝神君當召此間土地里域眞官正神臣今奉爲入意以令願得玉清道炁靈寳妙光下降流入臣等身中即使玄壇清淨内外成眞天無氛穢地絶妖塵琳琅振響十方肅清萬魔不千眞誠上徹令臣所啓之言速達徑御太上無極大道無形無名虚無自然金闕玉陛下各稱法位具位臣某等謹同誠上啓虚無自然元始天尊無極大道太上玉晨大道君太上老君昊夫玉皇上帝十方巳得道大聖衆至眞諸君丈人三十六天帝君玉虚上帝玉帝大帝東華南極西靈北眞玄都玉京金闕七寳玄臺紫微上宫靈寳至眞明皇道君三十六部尊經玄中大法師三界應感一切眞靈臣等伏聞自然妙本弘大化於帝先至極元尊播玄功於物表雖隂陽升降劫暦始終澹爾常存巍乎燭運所以三千景域咸服於神休五億天關同臻於道化至若吉凶逓代禍福推遷乘聖力以皆祛沐靈休而可滌濟危拯物佐國化人萬古攸遵應靈無爽況抱詞列欵請命希恩凢有所祈理冝關奏旣承詞旨敢不上聞讀詞按如詞誠言深祈扣弟子某以隂陽搆疾寒暑貽災稽首披心䖍希祐護臣等竊惟天尊愍濟常善救人揚法舸而度迷津懸寳珠而納羣品宣科演敎捍厄扶危是用滌慮洗心修齋行道願回聖力以蕩災蒙以今午朝行道請法衆等運兹初捻上香願此香煙騰空徑上供養無上至眞道寳臣等歸身歸命首體投地仰依太上三尊願以是功德歸流社稷尊靈宗祧先聖騰神八景融化九清凝觀太空貽休大業皇帝體堯立極嗣禹承圖朗金鏡於紫宸運璿衡於碧落壽星増耀福嶽彌崇后妃賛化於六宫臣佐匡寧於萬㝢光敷有道洽無爲今故燒香自歸依師尊大聖衆至眞之德得道之後升入無爲和與道合眞以今午朝行道請法衆等運兹二捻上香願此香煙騰空徑上供飬無上至眞經寳臣等歸身歸命首體投地仰依太上三尊願以是功德歸流弟子某家九世七玄億曽萬袓辭太冥之府離長夜之庭罪網蠲鑰福祥臻萃泊乎泉扃異趣飛動殊倫禎貺所資盡蒙開度今故燒香自歸依師尊大聖衆至眞之德得道之後升入無爲和與道合眞以今午朝行道請法衆等運兹三捻上香願此香煙騰空徑上供養無上至眞師寳臣等歸身歸命首體投地仰依太上三尊願以是功德歸流弟子某身蕩滌災纒銷平厄運宿𡨚往倩乘祈懴以咸除積釁深瑕沐熏修而克淨妖凶弭息年禄増延今故燒香自歸依師尊大聖衆至眞之德得道之後升入無爲和與道合眞禮方懴悔各思九色圓象嚥液命魔宻呪歩虚旋遶始青黎元蓋金香結珠煙飛晨總翹轡稽首玉帝前帝心浩以舒鍚吾太靈篇是謂不滅道萬天秉吾權吾行空洞中下仙昧其淵一炁化之元邈在兩儀先寳埒馳金馬眞香噴玉蓮飛空按龍轡梵響導芝軿綿永長春劫翺翔無色天初眞難曉諭以此戒中仙髙眞明道德垂世五千言解釋慚涼薄殫誠測妙元霓旌嚴敎典羽唱徹雲軿瑞鶴儀空際祥風拂暑煩穹窿兹響應寳祚億斯年三禮臣等至心稽首禮太上無極大道臣等至心稽首禮三十六部尊經臣等至心稽首禮玄中大法師重稱法位具位臣某等謹重伸上啓太上無極大道元始天尊太上大道君太上老君三十六部尊經玄中大法師上相上宰四司五帝正一左右二眞人南嶽上眞紫虚元君三界官屬一切眞靈臣等伏聞天元立極地紀標樞乘妙道以分形定兩儀而設象含弘無際覆燾莫窮而九六推移有升淪之變衰榮代謝有歷劫之期況彼人倫寧無降替弟子某寄身俗網染跡塵寰氣象所拘吉凶所繫遂纒疾厄彌切憂危竊恐徃世此生宿瑕未滌舊𡨚積釁債訟未除或故殺誤傷爲殃爲咎或星辰本命爲惡爲災形命凢微懴祈無所是用披心大道稽首玄科崇設壇場仰申悔謝臣等按天師品格啓正一文儀依紫虚元君懴災之法奉爲某上請天昌君黃衣兵士十萬人収弟子某家中外殃𦍙十二刑殺之氣又請南宫天明君北星六機君収五瘟百毒百疾之氣又請封離君赤素君爲弟子除心腹淋露之疾又請天官五衡君地官五衡君九河北海君王法君九集君大官陽秩君南上君須吏君石仙君収除内外邪祟爲病之者又請蓋夭大將軍上元士君収捕衆考精邪却禍來福又請制地君四胡君主除行年本命之災斷考注之氣又請運氣解厄君無上髙倉君無上天君平天君解除死喪刑害五墓之鬼又請靈素天精君赤天食氣君収神上明君爲弟子某斷除惡夢惡鬼沉疾注連之氣使災咎寧息疾患痊平二十四部天宫吏兵應時降臨誅邪滅惡収伏凶殃眞氣潜資克獲安泰夢寤眞正壽筭遐延九祖生天六親蒙福龍神守衞居止安寧上願帝道昭融天元朗晏干戈永息風雨以時榖䅭豐登幽明和泰旁該庶品普及幽扄共沐玄恩同臻福界上明天尊弘慈之澤下副臣等祈懴之誠謹啓以聞發願一願大道淡泊虚無安閑空寂澄清自居廣開法門敎導頑夫皆蒙惠澤精苦是修預以同學普得升虚與天相保長存無憂二願諸天結氣澄清髙虚廣覆保真固靈氣候調節四運和平國安民豐普天咸寧廣濟一切惠逮有生保天長存億劫不傾三願土地覆載無窮安平不陷海淪不崩保鎭家國兆民興從養生安死惠周十方禾稼滋植營運日豐咸得厚載萬類皆從四願日月二景髙明無有勃蝕𧇊盈安清光照諸天洞消晴冥保固劫運世祚和平普加潤澤惠灑衆生五願星辰與日齊光轉燭照耀朗映十方各安其位經緯直行保鎮家國無有災傷四海寜一普天興昌六願四時隨節推遷景炁和調無有災患疫毒消滅普夫安平五榖豐熟國富民歡七願浮雲結炁聚煙飛空髙澄䕃覆玄玄隱則無爲散則彌天神仙同居結友衆眞惠流一切興國愛民普濟羣生人同劫年八願風雨流灑無窮普加施泄受其發揚萬物滋生國儲民豐九願五嶽各安其方巍巍包藏長爲仙宫安鎭國祚保天無終護度一切莫不仰宗十願江海蕩蕩無極含容恢廓無細不植淵奥柔惠潤加蠕息天人獲慶年同劫石十一願帝王國土日昌四鎭安睦兵革不揚天人歌唱吉應來翔敷敎濟濟威化洋洋兆庶稱慶長樂未央十二願蝖飛蠢動巳生未生咸蒙安全普得生成皆見元炁受陽之形草木果林經冬不零一切濟度靡不鮮榮和與道合眞復爐香官使者左右龍虎君侍香諸靈官當令臣行香之所自然生金液丹碧芝英百靈衆眞交㑹在此香火爐前令臣學道得道求仙得仙齋主受福存殁沾恩十方仙童玉女接侍蘭煙令臣所啓之言速達徑御太上無極大道無形無名虚無自然金闕玉陛下出戸太上黃籙齋儀巻之三十
