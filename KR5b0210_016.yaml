front:
  text: 太上黄籙齋儀卷之十六十七十八同卷賔十二
  hash: sha256:fccf45e8f169e8179192dcb01e2ff7b583805a6f5f5bb70f52451160041f7ca7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0210_HFL_016-001a, image: hfl/0271/0271-108.png}
body:
  text: 唐廣成先生杜光庭集特勑爲臣下遷拔清旦行道入戸各禮師存念如法衛靈青陽虚映曜曰回靈神虎辟邪飛天流鈴摧奸滅試萬魔束形九微回道八威攝精千眞校録三元蕩清左嘯中黄右䇿六丁七轉八合周旋天經聖化巍巍三道順行慶雲流布合景黃庭鳴法鼔二十四通无上三天玄元始三炁太上道君召出臣身中三五功曹左右官使者侍香金重傳言散花玉女五帝直符直日香官各三十二人出出者嚴裝關啓玄壇天帝神君當召此間土地里域眞官正神急上關啓臣今奉爲入意以今清旦行道願得玉清道炁靈寳妙光下降流入臣等身中即使玄壇清淨内外成具天無氛穢地絶妖塵琳琅振響十方肅清萬魔不干眞誠上徹令臣所啓速達俓御太上无極大道至眞玉皇上帝御前各稱法位上清玄都弟子臣某等同誠上啓虚无自然元始天尊无極大道太上大道君髙上大道金闕玄元天皇大帝太上老君昊天玉皇上帝十方巳得道大聖衆至眞諸君丈人十方自然靈寳天尊隨機赴感救苦天尊三十六天帝君玉虚上帝玉帝太帝東華南極西靈北眞玄都玉京金闕七寳玄臺紫微上宫靈寳至眞明皇道君三十六部尊經玄中大法師三界應感一切眞靈臣等伏聞至道延慈玄功濟物敷揚景化拯䕶幽明所以飛天神人禀玉匱明眞之訓上智童子請瑶壇三籙之科宣布法音開度羣品仁周家國惠洽古今皇帝軫念勲賢憫傷冥淇某官緬痛泉扄冥懷幽壤某等𧆛修勝福敷列壇場冀迴至聖之慈以拯冥關之苦況奉詞㫖敢不上聞讀詞按如詞言理宜關奏臣等謹依九清妙㫖三籙簡文法天地之儀陳懴祈之禮上通三境下極九幽燒香然燈轉經行道銀缸散彩冀開長夜之光仙唱流音佇降自天之福以今清旦行道請法衆等運茲初捻上香願此香煙騰空徑上供飬无上至眞道寳臣等歸身歸命首體投地仰依太上三尊願以是功德歸流社稷尊靈宗祧列聖超登眞品遊宴福庭保祐陽圖遐延祚曆乾坤共永海嶽常寧今故燒香自歸依師尊大聖衆至眞之德得道之後昇入无形和與道合眞以今清旦行道請法衆等運茲二捻上香願此香煙騰空徑上供養无上至眞經寳臣等歸身歸命首體投地仰依太上三尊願以是功德歸流皇帝伏冀玄濤碧海比聖壽以無涯羣嶽下洲與皇圖而共固后妃嬪御常洽楨休太子諸王彌新福祚文臣武列中外職寮齊忠貞恊賛之心啓仁壽雍熈之化天元澄朗地紀晏寧榖稼常登干戈求戢旁周萬宇普及羣生道力所覃昇沉俱泰今故燒香歸依師尊大聖衆至眞之德得道之後昇入无形和與道合眞以今清旦行道請法衆等運茲三捻上香願此香煙騰空徑上供養无上至眞師寳臣等歸身歸命首體投地仰依太上三尊願以是功德歸流某官即時冥界伏冀齋功上逹聖力下通開玉匱之琅函勅九龍之符命超遷靈識徑上南宫經流火之庭錬除滓穢入明霞之殿佩服陽華擢品福鄉斷消鬼録九玄七祖受化生天五族六親延祥納祐𡨚仇洗滌債訟和平六趣三塗皆霑巨福今故燒香歸依師尊大聖衆至眞之德得道之後昇人无形和與道合眞禮方懴悔三啓樂法以爲妻愛經如珠玉持戒制六情念道遺所欲淡泊正炁停蕭然神靜黙天魔並敬護世世受大福三禮臣等至心稽首禮太上无極大道臣等至心稽首禮三十六部尊經臣等至心稽首禮玄中大法師重稱法位上清玄都弟子臣某箸謹重誠上啓太上无極大道元始天尊太上大道君太上老君十方自然靈寳天尊隨機赴感救苦天尊三十六部尊經玄中大法師天師君上相上宰四司五帝三界内外應感尊靈臣等伏聞二炁陶甄五行生化隂陽倚伏善惡推遷居世網之中處化機之内六情擾動三業縈牽淪溺漂沉古今難息自非生資道炁天挺仙才登福輦而碎禍車造雲衢而超地府悠悠浮世孰免輪迴某官生世巳來至于累劫積行所犯罪目貫盈武臣或訓旅統戎誅兇伐叛芟夷之際玉石難分佐時雖繫於立功專殺深虞於獲戾又宴犒之用須有庖燔懲善之科須行刑憲故傷誤殺必有愆違或兵士經行寨壘營造侵殘丘墓犯觸龍神掘鑿岡原損汚泉澗蹂踐福地穢觸靈蹤或往債未原或前𡨚未解或當官理務輕重任心生有罪瑕殁有報對冥冥幽嶽懴贖無由文官或理務之時任心肆意詳刑讞嶽罔顧哀矜執法侍綱不思原宥與奪沮勸或爽於重輕徵督賦輸或傷於苛急人嗟物怨結固罪條或往債前𡨚或違天負地曽無懴謝積在冥曹身殁巳來報對斯至拔贖無由皇帝言念前功悼傷泉路考紫陽之格披懴拔之科嚴啓華壇仰祈鴻澤伏冀諸天衆聖太上三尊迴罔極之恩降大慈之澤詔下三官九府五帝四司太山酆都三十六獄和𡨚釋對削落罪書承大宥之文出重隂之域南宫受化福路上生九世七玄同霑景祐洎乎三塗六趣異品殊倫動植飛沉咸昇福岸三光表瑞四序均和聖壽遐長國祚隆永干戈殄戢疫毒銷亡百穀常豐普天昭泰上明天尊大慈之澤下副臣等歸命之誠謹啓以聞發念一念爲道四大合德齋主七世父母免脫憂苦上昇天堂衣食自然二念帝王國主道化興隆庠序濟濟皇敎恢弘威儀翼翼普天所瞻民稱太平四夷賔伏妖惡自滅賢聖日生三念法師功德大建敎化明逹俱獲飛仙四念同志學人早得仙道更相開度五念九親和睦好尚仁義貴道賤財行爲物範六念損巳布施道士及飢寒者天下人民各得其所七念蠕動蚑行一切衆生咸蒙成就八念赦貨前生今世罪對立功𥙷過九念家門隆盛宗廟有人世生賢才十念尊受經師不敢中怠平等一心廣度一切剋獲上仙白日登天拜見太上未成眞人雲車羽駕和與道合眞復爐杳官使者左右龍虎君侍香諸靈官當令臣朝元之所自然生金液丹碧芝英百靈衆眞交㑹在此香火爐前令臣學道得道學仙得仙齋主受福幽顯沾恩十方仙童玉女侍衛蘭煙傳臣向來所啓速違徑御太上无極大道至眞玉皇上帝御前出戸太上黃籙齋儀卷之十
