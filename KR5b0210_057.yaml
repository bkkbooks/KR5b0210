front:
  text: 太上黃籙齋儀卷之五十七嗚九
  hash: sha256:c5b186c7d2ccea332e1f5b6569207a7cd1b49d687eb77b649444241cc363b68e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0210_HFL_057-001a, image: hfl/0277/0277-120.png}
body:
  text: 唐廣成先生杜光庭刪八天眞文黄籙齋拯救幽靈遷拔飛爽開度長夜昇濟窮泉固其大㫖也然祛災致福謝罪希恩人天普修家國兼利功無不被矣所鎭靈寳五老赤書眞文詳其所爲祇通四種一則求仙愛道自東方九炁下二十四字二則禳制星辰自歳星輔肝下三十二字三則摧伏鬼魔自東山神呪下三十二字四則蠲消水害自下制東河下三十二字五篇之用於斯畢矣西京清都觀張萬福天師儀軌云諸天隱語八㑹玉文元始天尊於香林園中爲上智童子所說下拔五苦遍極九幽於遷神儀中刋石行用今則黄籙齋壇冝用此文凶吉合儀銓量允當庶夫永劫可以流通呪祝焚燒與眞文同耳具有成法共弘之焉天復元年辛酉十月五日癸未天姥峯羽衣杜光庭賔聖序凡眞文並用青紙朱書八天隱字及中天玊文以鎭齋壇五方宿啓夜讀文訖以金龍鎭之散壇夜讀文訖弟子捧文於香煙之上法師呪畢隨表函焚之一如靈寳眞文儀制東方玉文亶樓阿薈無惒觀音須筵明首法攬菩曇稼那阿奕怱訶流吟華都曲麗鮮菩育臻荅落大梵散煙慶雲飛灑玉都明魔上門無行上首廻蹠流玄阿陀龍羅四象吁貟南方玉文南閻洞浮玉眸詵詵梵形落空九靈吹前澤𠗂菩臺緑羅大千眇莾九醜韶遥延邅雲上九都飛生自騫那育郁馥魔羅法輪霐持無鏡攬姿運容馥朗廓奕神纓自宫西方玉文刀利禪猷婆泥咎通宛藪滌色太眇之堂流羅梵萌景蔚蕭嵎易邈無寂宛首少都阿繿郁竺華莫延由九開自辯阿羅品首無量扶蓋浮羅合神玉誕長桑栢空度仙北方玉文玃無自育九日導乾坤毋東覆形攝上玄陀羅育邈眇氣合雲飛天大醜總監上天沙陀劫量龍漢瑛鮮碧落浮黎空歌保珍惡奕無品洞妙自眞元梵恢漢幽寂度人中方玉文黄中總氣綂攝無窮鎭星吐輝流鍊神宫次弟子捧文香煙上法師叩齒十二通呪曰無上至眞大聖髙尊布化運氣三十二天八㑹九光自然成文安鎭天地保制劫年元始符命普告三元下勑九地上關諸天中告海嶽名山大川今日上告萬神咸聞弟子修齋行道拔度幽魂三官九署削滅罪根永度三塗五苦之源世世受福記名丹篇神生天堂鍊化自然生死開度億劫常存九天告命風火驛傳再禮太上黄籙齋儀卷之五十七
