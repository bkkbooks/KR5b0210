front:
  text: 太上黃籙齊儀卷之五十七嗚九
  hash: sha256:cd2d045460bffd8d5c957a687e20595990fc37c9fe920e0a788664d8affb6f22
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0210_HFL_057-001a, image: hfl/0277/0277-120.png}
body:
  text: 唐廣成先生杜光庭刪八天真文黃籙齊拯救幽靈遷拔飛爽開度長夜升濟窮泉固其大㫖也然祛災致福謝罪希恩人天普修家國兼利功無不被矣所鎮靈寶五老赤書真文詳其所為祇通四種一則求仙愛道自東方九氣下二十四字二則禳制星辰自歲星輔肝下三十二字三則摧伏鬼魔自東山神呪下三十二字四則蠲消水害自下制東河下三十二字五篇之用於斯畢矣西京清都觀張萬福天師儀軌云諸天隱語八㑹玉文元始天尊於香林園中為上智童子所說下拔五苦遍極九幽於遷神儀中刋石行用今則黃籙齊壇冝用此文凶吉合儀銓量允當庶夫永劫可以流通呪祝焚燒與真文同耳具有成法共弘之焉天復元年辛酉十月五日癸未天姥峯羽衣杜光庭賔聖序凡真文並用青紙朱書八天隱字及中天玊文以鎮齊壇五方宿啓夜讀文訖以金龍鎮之散壇夜讀文訖弟子捧文於香煙之上法師呪畢隨表函焚之一如靈寶真文儀制東方玉文亶樓阿薈無惒觀音須筵明首法攬菩曇稼那阿奕匆訶流吟華都曲麗鮮菩育臻答落大梵散煙慶雲飛灑玉都明魔上門無行上首回跖流玄阿陀龍羅四象吁貟南方玉文南閻洞浮玉眸詵詵梵形落空九靈吹前澤𠗂菩臺緑羅大千眇莾九醜韶遙延邅雲上九都飛生自騫那育郁馥魔羅法輪霐持無鏡攬姿運容馥朗廓奕神纓自宫西方玉文刀利禪猷婆泥咎通宛藪滌色太眇之堂流羅梵萌景蔚蕭嵎易邈無寂宛首少都阿繿郁竺華莫延由九開自辨阿羅品首無量扶蓋浮羅合神玉誕長桑柏空度仙北方玉文玃無自育九日導乾坤毋東覆形攝上玄陀羅育邈眇氣合雲飛天大醜總監上天沙陀劫量龍漢瑛鮮碧落浮黎空歌保珍惡奕無品洞妙自真元梵恢漢幽寂度人中方玉文黃中總氣統攝無窮鎮星吐輝流鍊神宫次弟子捧文香煙上法師叩齒十二通呪曰無上至真大聖髙尊布化運氣三十二天八㑹九光自然成文安鎮天地保制劫年元始符命普告三元下勑九地上關諸天中告海嶽名山大川今日上告萬神咸聞弟子修齊行道拔度幽魂三官九署削滅罪根永度三塗五苦之源世世受福記名丹篇神生天堂鍊化自然生死開度億劫常存九天告命風火驛傳再禮太上黃籙齊儀卷之五十七
