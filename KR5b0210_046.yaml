front:
  text: 太上黃籙齋儀卷之四十六王十二
  hash: sha256:1b39033db0e7ee1bc6c6c9634b19c7aa6a265d28f2ccb8318eb8ffb98ce031d8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0210_HFL_046-001a, image: hfl/0275/0275-082.png}
body:
  text: 唐廣成先生社光庭集荷恩感瑞五假懴方升壇之時或盛寒盛暑及風雨之變恐失禮容宜用此懴以從簡易先都唱十方總懴臣等至心皈命十方無極太上靈寶天尊巳得道大聖衆至真諸君丈人十鄉神仙諸靈官三禮各虔誠懴謝懴悔臣等伏聞變化無方至道表隨機之應精誠有感靈真垂赴念之功妙矣重玄潛回景貺宜申昭謝以答垂休今皇帝以大道延慈真仙鑒祐虔申齋潔仰報玄恩奉修元上黃籙道場三日三夜謹齋香花法信油燭紋繒皈命十方無極太上靈寶天尊十極天君十鄉神仙諸靈官伏冀萬聖傾光三尊降鑒介休祥於宗廟致延壽於皇圖地廣禹封祚隆周卜皇帝道光軒燧德邁羲融與曜魄以齊尊共蓬壷而等壽后妃嬪御光贊宸居太子諸王輔寧大紫華夷昭泰億兆歡康景緯循常風雨調順干戈不作稼穡蕃登洎乎水陸飛沉三塗六趣俱臻壽域咸樂雍熙得道之後升入無形和與道合真三光臣等至心皈命日月星宫至真大聖三光神仙諸靈官三禮各虔誠懴謝臣等伏聞二象分華三光垂曜日宫月域司暝晦而有常五緯六府統照臨而不紊是彰罪福以御人天今皇帝以大道垂休神功感應思崇齋福上答真靈至心皈命日月星宫至真大聖三光神仙諸靈官伏覬大宥宣恩無私表貺納禎祥於帝闕隆祚曆於皇基超邁姬周延洪炎漢皇帝廓升平之景化闢堯禹之宏圖壽等五山德侔三古六宮百揆常弘協贊之功八極九圍俱洽安貞之福得道之後升入無形和與道合真五嶽臣等至心皈命五嶽真君名山洞府得道神仙諸靈官三禮各虔誠懴謝臣等伏聞九土斯分五山作鎮捧乾樞而上列髙拱星辰𡑅坤軸以低臨旁羅川瀆爰司善惡以統死生今皇帝以大道垂休神功應感思弘齋福上答真靈至心皈命五嶽真君名山洞府得道神仙諸靈官伏冀玄鑒遐通洪休廣被宗祧先聖承景貺以登真社稷尊靈洽殊祥於永祚皇帝明均兩曜壽等崇山超玄古以無為統萬方而咸化后妃嬪主太子諸王題丹籙之仙名享清都之壽紀普天有識率土含生遍及幽明同臻福果得道之後升入無形和與道合真水府臣等至心皈命扶桑大帝暘谷神王三河四海九江水帝十二河源水府神仙諸靈官三禮各虔誠懴謝臣等伏聞三能既著流巽海以無涯七善攸彰習坎宮而斯廣包吞萬𣲖涵蕩九天以統生靈以司罪福今皇帝凝神三境屬想九清大道垂休神功感應思弘齋福以答真靈至心皈命扶桑大帝暘谷神王三河四海九江水帝十二何源水府神仙諸靈官伏冀廣闢殊禎洪流景祐宗祧社稷與八海以常寧聖壽皇圖比十山而共固六宫妃后百辟庶寮克茂忠貞長承福祚青宫朱邸內屏外藩俱弘道德之風永洽升平之化得道之後升入無形和與道合真經寶臣等至心皈命無上三十六部尊經真文寶符三禮各虔誠懴謝臣等伏聞億劫之前至真弘化沖淡示無言之本希夷成不宰之功洎乎二象肇胎殊途是啓八會之文既立六體之用爭馳玉笈琅函寶祕九清之上龜書龍篆宣行萬宇之中統制人天司明幽顯今皇帝惟天縱聖握紀披元荷大道之垂休感神功之昭著思崇齋福上答玄恩至心皈命至真無上三十六部尊經真文寶符伏冀皇帝壽齊衡華明並曦舒超連陸之神功冠堯湯之睿德后妃嬪主太子諸王協輔昌期延洪寶運公卿臣佐夷夏生靈同登仁壽之庭共樂升平之化三塗九夜動植飛況俱沐玄功咸升道域得道之後升入無形和與道合真太上黃籙齋儀卷之四十六
