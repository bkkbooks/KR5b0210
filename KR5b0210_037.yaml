front:
  text: 太上黃籙齋儀卷之三十七王三
  hash: sha256:70a9afed16db96487c41ccf9ee1009b1c4cfca5fb56b34140c886023e0c200d8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0210_HFL_037-001a, image: hfl/0274/0274-038.png}
body:
  text: 唐廣成先生杜光庭集遷拔清旦行道入戶各禮師存念如法衛靈青陽虛映曜日回靈神虎辟邪飛天流鈴摧姦滅試萬魔束形九微回道八威攝精千真校録三元蕩清左嘯中黃右䇿六丁七轉八合周旋天經聖化巍巍三道順行慶雲流布合景黃庭鳴法鼓二十四通無上玄元太上道君召出臣身中三五功曹左右官使者侍香金童傳言散花玉女五帝直符直日香官各三十二人出出者嚴裝關啓玄壇天帝神君當召此間土地里域真官正神以今奉為入意修齋道謝過祈恩願得玉清道氣靈寶妙光下降流入臣等身中即使紫清鬱勃玉闕開明五帝輔根萬神攝真體圓珠眏乘景驂宸金光煥赫御氣上清令臣所啓速達徑御太上無極大道無形無名虛無自然金闕玉陛下各稱法位具位臣某與臨壇官衆等謹同誠上啓虛無自然元始天尊無極大道太上大道君太上老君無上玄老十方尋聲救苦天尊巳得道大聖衆至真諸君丈人三十六天帝君玉虛上帝玉帝大帝東華南極西靈北真玄都玉京金闕七寶玄臺紫微上宫靈寶至真明皇道君三十六部尊經玄中大法師三界官屬一切真靈臣等伏聞大道垂文元尊演教濟生度死佐國安人普及幽明同臻覆祐臣以夙承玄訓獲被職司宜廣慈風以拯羣品況奉詞旨敢不上聞讀詞按如詞言理宜開濟以弟子某誠深修奉志切懴陳願開肆赦之期以拔幽牢之苦紋繒法信騰款諸天油燭香花質心三界冀因精感上逹真靈以今清旦行道請法衆等運茲初捻上香願此香煙騰空徑上供養無上至真道寶臣等歸身歸命首體投地仰依太上三尊願以是功德歸流社稷尊靈宗祧先聖融神太漠蔭芝蓋以端居觀妙上清躡蓮臺而縱步延祥鳯曆流福鴻圖皇帝澤廣滄溟壽均衡霍走梯航於萬宇匝慈惠於羣生良輔正臣共匡景運文功武德旁布寰區父母師資林棲谷隱紀功瓊簡證品仙階今故燒香歸依師尊大聖衆至真之德得道之後升入無形和與道合真以仐清旦行道請法衆等運茲二捻上香願此香煙騰空徑上供養無上至真經寶臣等歸身歸命首體投地仰依太上三尊願以是功德歸齋齊主某家九祖七玄及亡靈神識解幽纏於地簡息罪咎於隂宫釋考對於三塗和𡨚仇於六趣超離地獄升入福堂聽法聞經參真證道九幽長夜咸覩光明蠢動飛況咸均巨福仐故燒香歸依師尊大聖衆至真之德得道之後升入無形和與道合真以今清旦行道請法衆等運兹三捻上香願此香煙騰空徑上供養無上至真師寶臣等歸身歸命首體投地仰依太上三尊願以是功德歸流齋主某家永息災凶長臻福壽禎祥允萃眷屬攸宜普及羣生同登壽域今故燒香歸依師尊大聖衆至真之德得道之後升入無形和與道合真禮方懴悔各思九色圓象咽液命魔密呪步虛旋繞太極分髙厚輕清上屬天人能修至道身乃作真仙行溢三千數時丁四萬年丹臺開寶笈金口為流傳大梵三天主虛皇五老尊尚難窺徼妙豈復入名言寶座臨金殿霞冠照玉軒萬真朝帝所飛舄躡雲根濛濛如細霧冉冉曳銖衣妙逐祥煙上輕隨綵鳯飛幾陪瑶室宴忽指洞天歸佇立扶桑岸髙奔日帝暉三禮臣等至心稽首禮太上無極大道臣等至心稽首禮三十六部尊經臣等至心稽首禮玄中大法師重稱法位具位臣某等謹重誠上啓太上無極大道元始天尊太上大道君太上老君十方無極大道道德衆聖天尊至真太帝天帝天師君上相上宰四司五帝三十六部尊經玄中大法師三界官屬一切尊靈臣等獲履法門參修祕妙琅函寶笈真訣靈科得以遵行敷弘神化伏尋玄旨依按經圖行教立功救物為本所以玉晨大聖元始天尊垂萬行之津梁開八門之拯度重泉逝魄幽夜窮魂霑惠露以清涼燭慈光而超濟動逾億劫咸保安全齋主某憂切亡魂志希遷拔恐其稟生之後及無始以來六欲十纏恣行罪咎六情三業纍劫過尤不悟正真罔知禁忌乘非履惡日積月深犯天地神明觸隂陽曹府名書地簡魂閉幽牢不覩光明無由濟拔是以束身歸命懴謝愆瑕敷列壇場遵依科式紋繒法信油燭香花質懇致心仰期通感伏惟至真髙聖十極尊靈開罔極之恩降大慈之澤勑下十方世界飛天神人依三籙簡文告下九龍符命於太山酆都三十六獄及五嶽地司開赦魂神解銷惡對出重冥之域入福善之庭陶以太和沐以靈澤洗滌罪惡灌錬形魂浴丹霍之宫經洞陽之府去離憂惱觀聽法音克證道階利安見在舉家享福眷屬康寧遍及幽明旁周動植同歡妙樂咸契無為聖力所覃普天全濟上明天尊大慈之澤下副臣等懴謝之誠謹啓以聞發念一念為道四大合德齋主七世父母免墮憂苦上升天堂衣食自然二念帝王國主道化興隆庠序濟濟皇教恢弘威儀翼翼普天所瞻民稱太平四夷賓伏妖惡自滅聖賢自生三念法師功德大建教化明達俱獲飛仙四念同志學人早得仙道更相開度五念九親和睦好尚仁義貴道賤財行為物範六念損巳布施道士及飢寒者天下人民各得其所七念蠕動跂行一切衆生咸蒙成就八念赦貸前生今世罪對立功補過九念家門隆盛宗廟有人世生賢才十念尊受經師不敢中怠平等一心廣度剋獲上仙白日登天拜見太上永成真人雲車羽駕和與道合真復爐香官使者左右龍虎君侍香諸靈官當令臣朝元之所自然生金液丹碧芝英百靈衆真交會在此洞案爐前令臣體耀金輝斬伐胞根七玄拔擢百關備仙解除死籍宴坐泥丸東華紀字䇿景虛玄十方仙童玉女接侍香煙傳臣向來所啓之言速達徑御太上無極大道無形無名虛無自然金闕玉陛下出戶太上黃籙齋儀卷之三十七
