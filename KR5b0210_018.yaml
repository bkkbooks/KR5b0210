front:
  text: 太上黃籙齋儀卷之十八
  hash: sha256:17047c3403385e818c189f7497992ed07019234987eedf0a8da15d797aa0c4f4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0210_HFL_018-001a, image: hfl/0271/0271-142.png}
body:
  text: 唐廣成先生杜光庭集特勑為臣下遷拔落景行道入戶各禮師存念如法衛靈五星髙曜瑞氣飛浮元始集神天地交周玉符寶節嘯命微幽擲火揚威姦山無留萬魔振伏紛葩却消摧怪伐惡道氣同流神光照夜隂翳俱收萬仙降格扇景乘飈羣生咸遂惠遍神州鳴法鼓二十四通無上三天玄元始三氣太上老君召出臣身中三五功曹左右官使者侍香金童傳言玉女玉帝直符直日香官各三十二人出出者嚴裝關啓玄壇天帝神君當召此間上地里域真官正神急上關啓臣今奉為入意以今晚朝行道願得玉清道氣靈寶妙光下降流入臣等身中即使玄壇清淨內外成真天無氛穢地絶妖塵琳琅振響十方肅清萬魔不千真誠上徹今臣所啓速達徑御太上無極大道至真玉皇上帝御前各稱法位上清玄都弟子臣某等謹同誠上啓虛無自然元始天尊無極大道太上大道君髙上大道金闕玄元天皇大帝太上老君昊天玉皇上帝十方巳得道大聖衆至真自然靈寶天尊隨機赴感救苦天尊至真諸君丈人三十六天帝君玉虛上帝玉帝太帝東華南極西靈北真玄都玉京金闕七寶玄臺紫微上宫靈寶至真明皇道君三十六部尊經玄中大法師五老上帝三元君天地水三官考校罪福應感真靈臣等伏聞善惡無形惟人所兆報應無爽猶響隨聲今古循環吉凶攸繫所以北宫主死南昌領生天地神明詮功紀過洪纎備舉毫末無遺得不惕勵競懷仰遵玄戒由是至真大道無上法王寶經垂告謝之儀金簡有懴祈之旨一心首悔萬罪蠲銷皇帝悼念亡靈眷傷幽夜思弘勝福以拯泉關式降綸言恭修齋直今奉詞旨敢不上聞讀詞按如詞言義深遷拔臣等按紫陽玉笈黃籙蕳文法地象天敷壇列纂儼十華之位陳四極之儀備法信紋繒香花油燭轉經行道懴謝諸天冀真聖之回光普幽明而介福以今落景行道請法衆等運茲初捻上香願此香煙騰空徑上供養無上至真道寶臣等歸身歸命首體投地仰依太上三尊願以是功德歸流宗祧先聖社稷尊靈騰景王清垂祥寶胤鸞𩥵遊宴升汗漫以無為鳯曆延洪與乾坤而不極天元昭朗地紀寧間萬國會同羣生遂性今故燒香歸依師尊大聖衆至真之德得道之後升入無形和與道合真以今落景行道請法衆等運茲二捻上香願比香煙騰空徑上供養無上至真經寶臣等歸身歸命首體投地仰依太上三尊願以是功德歸流皇帝伏冀皇明逺矚睿渥遐覃坐玄扈以凝神重觀寶籙俯洪河而展采再揖珍圖地廣宏基山齊聖壽后妃嬪御協贊彤廷太子諸王昭宣鴻化文武卿佐內屏外藩福祉益新徽華克茂三邊靜謐永無關戍之勞八極歡康常有梯航之貢干戈戢息疫毒銷亡水旱無侵龍神侻豫凶妖不作稼穡有年一切含生俱享元吉今故燒香歸依師尊大聖衆至真之德得道之後升入無形和與道合真以今落景行道請法衆等運茲三捻上香願此香煙騰空徑上供養無上至真師寶臣等皈身皈命首體投地仰依太上三尊願以是功德歸流某官即時冥界伏冀丹誠上達玄澤下臨三境元尊放神光而照燭諸天上聖流惠渥以資薰九泉開昏晦之衢六趣息輪回之苦魂神錬沐𡨚債和平罪惱俱銷福祥臻萃洎乎三塗冥識七世幽靈共沐勝功咸登道果人故燒香歸依師尊大聖衆至真之德得道之後升入無形和與道合真禮方懴悔三啓大道洞玄虛有念無不契錬質入仙真遂成金剛體超度三界難地獄五苦解悉歸太上經靜念稽首禮三禮臣等至心稽首禮太上無極大道臣等至心稽首禮三十六部尊經臣等至心稽首禮玄中大法師重稱法位上清玄都弟子臣某等謹同誠上啓太上無極大道元始天尊太上大道君太上老君至真自然靈寶天尊隨機赴感救苦天尊三十六部尊經玄中大法師天師君上相上宰五老上帝三元君天地水三官三界應感一切尊靈臣等伏聞大聖開圖元皇撫運天關化育地紀裁成惟人最靈首出羣品隂陽遷貿性識波流處身有善惡之殊動靜繫吉凶之目罪福以之升降生死以之區分所以元始天尊諸天大聖垂慈救之旨開採護之門命五帝四司垂機接引三元衆聖應化主張天地水官示考校之理隂陽曹吏宣報對之儀欲使盡契福階俱超罪網而昏迷難悟滯濁難祛蹈過垂愆莫紀其極某官爰從積世以洎生前無數劫來轉輪生化或六情所搆三業所為罪目多端不可記憶或興師統衆征討四方或秉法持綱紏繩於物或懲姦剪暴用鉞申威或撫弱遏強行賞示罰或興工土木犯觸龍神或犒士宴賔宰殺物命或釣潛弋宿馳騁畋遊或詳舉刑章情有曲直或愛憎喜怒肆意任心人有悲嗟鬼有𡨚債未曽祈首積在幽冥三官有罪考之名五帝有報對之目冥冥夜府祈向何由皇帝軫念幽靈願言遷拔按依科格嚴設壇場神燈散彩於九冥香炷飄芬於三界普諸天而懴罪遍十極以祈恩伏冀上聖髙尊慈光憫照三官五帝巨澤滂流賜罔極之恩弘大慈之施無邊之罪咸賜蕩除即使四極甄明十仙汲引出重隂之府詣流火之庭澡瑩形魂沐浴神爽升居長樂飛翥上宫證道參真永離幽夜其有前𡨚往債隨念和平積罪餘殃應時銷釋子孫享福玄祖超升動植飛沉泉扄苦趣齋功所及並洽休禎上願日月貞明乾坤安鎮星辰有瑞風雨無愆大業隆昌聖躬萬壽天枝帝葉廕八極以常榮文德武功包九圍而並化干戈自戢榖稼彌豐域外區中盡登仁壽上明天尊大慈之澤下副臣等歸命之誠謹啓以聞發願一願大道流行普天懷德二願一切有生咸皆悟道三願九夜悲魂一時解脫四願孤爽無依咸得受生五願天下太平五榖豐熟六願臣忠子孝君仁父慈七願四海通同六親和釋八願潛胞處卵咸得生成九願積疾新痾旋即痊愈十願孤露衆生豐衣足食復爐香官使者左右龍虎君侍香諸靈官當令臣朝元之所自然生金液丹碧芝英百靈衆真交會在此香火洞案爐前令臣學道得道求仙得仙齋主受福幽顯沾恩十方仙童玉女侍衛蘭煙傳臣向來所啓速達徑御太上無極大道至真玉皇上帝御前出戶太上黃籙齋儀卷之十八
