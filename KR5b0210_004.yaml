front:
  text: 太上黃籙齊儀卷之四賔四
  hash: sha256:58dc332f1d117079cc69f45fc271e7a7f9c4512ac525fccfe2b6227df4e6a1b9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0210_HFL_004-001a, image: hfl/0270/0270-062.png}
body:
  text: 唐廣成先生杜光庭集第二日清旦行道入戶各禮師存念如法五星虛映煥景神庭包羅無象合氣羣靈潜形杳默周遊五經揚威耀日役使甲丁却妖除禍滌穢消氛萬魔恐怖龍虎飛奔紫雲交覆萬氣齊并鳴法鼓二十四通無上三天玄元始三氣太上老君召出臣等身中三五功曹左右官使者侍香金童傳言玉女五帝直符直日香官各三十六人出當召某處土地里域真官正神速出關奏臣今正爾燒香奉為某乙為國為家修置無上盟真黃籙大齊若干日夜以今升壇行道願得太上十方正真生氣降流臣等身中所啓速達徑御至真無極大道玉皇上帝御前各稱法位上清玄都弟子臣某等謹同誠上啓虛無自然元始天尊無極大道太上大道君大聖祖髙上大道金闕玄元天皇大帝太上老君髙上玉皇十方巳得道大聖衆至真諸君丈人三十六天帝君玉虛上帝玉帝太帝東華南極西靈北真玄都玉京金闕七寶玄臺紫微上宫靈寶至真明皇道君三十六部尊經玄中大法師太平下教二十四真人東嶽上卿司命真君西極總真王君名山洞府得道神仙三界應感一切真靈臣等積生運㑹萬劫津梁獲遇至真叨聞大道佩九天之祕簡列品上清奉三洞之寶經刻名東極未能洗心虛白隱迹巖巒順俗和光沉浮陸海上違真訓旁犯明科尚以受法之辰告盟三界約當濟物佐國立功凡有所陳理冝關奏今奉詞旨敢具上聞讀詞按如詞言義深修奉仰惟國家爰洎君親將酬莫大之恩是託重玄之教按明真品格修黃籙典章鎮龍綵於玄壇散香花於紫府臣等遵依經旨整肅法流潔念澄神奉修齊直以今清旦行道運兹𥘉捻上香歸身歸神歸命太上三尊願以是功德上資宗桃列聖社稷尊靈證品九清垂休萬國皇帝光延鳯曆克固龍圖布正朔於九圍混車書於八極外藩內屏德化昭融百揆庶寮微華顯著三光朗晏二象和寧谷隱巖棲師尊父母六通早備萬行速圓今故燒香歸依師尊大聖衆至真之德得道之後升入無形與道合真以今清旦行道運兹二捻上香歸身歸神歸命大道臣等首體投地歸命太上尊經願以是功德奉福某家九玄七祖億劫神儀釋罪黑書升神丹霍三仙保度超離幽夜之庭五帝證明徑入清凉之境今故燒香歸依師尊大聖衆至真之德得道之後升入無形與道合真以今清旦行道運兹三捻上香歸身歸神歸命大道臣等首體投地歸命太上三尊願以是功德歸流某家六姻眷屬九族親緣福樹長春德星永矅神尊俯鑒消歷劫之罪因聖力旁資解無邊之尼運靈丹密祐至道潜符遍及羣生洎諸六趣幽泉離苦長夜開光蠢動飛沉普霑鴻福今故燒香歸依師尊大聖衆至真之德得道之後升入無形與道合真禮方懴悔步虛俯仰存太上華景秀丹田左顧提鬱保右盻携結璘六度冠梵行道德隨日所宿命積福應聞經若至親天挺超世才樂誦希微篇冲虛太和氣吐納流霞精胎息靜百關寥寥究三篇泥九洞明景遂成金華仙魔王敬受事故能朝諸天皆從齊戒起纍功結宿緣飛行凌太虛提携髙上人三啓三禮臣等至心稽首禮太上無極大道臣等至心稽首禮三十六部尊經臣等至心稽首禮玄中大法師重稱法位上清玄都弟子臣某等謹重誠上啓太上無極大道元始天尊太上大道君太上老君三十六部尊經玄中大法師十方三界名山洞府一切真靈臣聞大道先天至真寥邈權輿造化陶鑄隂陽凝神則冥寂冲虛應用則牢籠廣大三官五帝九府四司奉玄化以生成禀神科而者校吉凶罪福纎芥無遺齊主某以凝氣初天積因浩劫承自然之運荷造化之功仰慮九世七玄億曽萬祖陶形既久積過亦深洎子巳身親姻眷屬上從無始下及茲辰所結過尤無邊無量存亡負犯生死愆違宿對苦根未蒙除蕩今依飛天神人說罪福緣對拔度品文備金龍紋繒香花法信澡心錬行崇設道場懴謝玄真拔贖罪咎伏冀天尊慈祐大聖垂光勑勒地司開度魂爽出長夜之府離九幽之中冠帶天儀毁絶鬼録超升幽界沐浴靈津得上天堂逍遙之境斷絶殃注福利見存某家內外親緣同霑景祐災凶殄息善瑞常臻大道降靈諸天垂祐百邪不起衆惡靡加國祚延洪帝圖廣大聖躬納貺四海宅心天度朗清神風靜默五兵偃戢萬姓樂康榖稼有年寰瀛無事飛沉遂性幽夜光明遍及十方遐周三界普天全濟一切蒙恩上明天尊大聖之澤下副臣等歸命之誠謹啓以聞發念一念為道四大合德齊主七世父母免墮憂苦上升天堂衣食自然二念帝至國主道化興隆庠序濟濟皇教恢弘威儀翼翼普天所瞻民稱太平四夷賔伏妖惡自滅聖賢日生三念法師功德大建教化明達俱獲飛仙四念同志學人早得仙道更相開度五念九親和睦好尚仁義貴道賤財行萬物範六念損己布施道士及飢寒者天下人民各得其所七念蠕動跂行一切衆生咸蒙成就八念赦貸前生今世罪對立功補過九念家國隆盛宗廟有人世生賢才十念尊受經師不敢中怠平等一心廣度剋獲上仙白日登天拜見太上永成真人雲車羽駕和與道合真復爐香官使者左右龍虎君侍香諸靈官當令臣行道之所自然生金液丹碧芝英百靈衆真交㑹在此香火洞案爐前令臣學道得道求仙得仙十方仙童玉女侍衛香煙傳奏臣向來所啓徑達至真無極大道三清上聖玉皇上帝御前出戶太上黃籙齊儀卷之四
