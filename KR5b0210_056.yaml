front:
  text: 太上黃籙齊儀卷之五十六鳴八
  hash: sha256:5a91f58f9ddd6c260e78479e02a364787bc80a43b6aa800fea7c1997a4bf2035
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0210_HFL_056-001a, image: hfl/0277/0277-094.png}
body:
  text: 唐廣成先生杜光庭刪禮燈夫禮燈之法出金籙簡文凡修齊行道以燒香然燈最為急務香者傳心達信上感真靈燈者破暗燭幽下開夜所以科云燒香然燈上照諸天福堂下照長夜地獄苦魂滯魄乘此光明方得解脫既然燈須各有所法象春九夏三秋七冬五四季十二皆隨五行本數設之然有諸天諸地八卦九幽諸燈之位隨金籙文中方位羅列燒香禮呪即福德立降災咎自消或以啓齊之夜或三日七日之中如法然燈落景行道畢出壇至地戶以讃詠憧節庠序雅步導引衆官弟子等旋繞燈下依位呪之每呪畢衆官弟子皆禮禮復以空洞聲引歸玄師前散如常儀明燈頌太上散十方華燈通精誠諸天悉輝耀諸地皆朗明我身亦光徹五藏生華榮炎景照太無遐想通玉京右頌開東嵩嶽河中同華皆長聲吟之落景升壇以引法師於燈下禮燈時以此頌先引旋繞燈一周只於地戶列班禮呪亦合其儀矣衆官於地戶列班定法師言曰太極太虛真人曰隂陽構象天地分形晝夜既殊昏明有異所以清浮表質諸天為仙聖之都濁厚流形諸地為鬼神之府九天之上隂氣都消九地之下陽光永隔是則冥冥之界無復光明當晝景之時猶如重霧及昏暝之後更甚隂霾長夜罪魂無由開朗衆生或無善業宿有罪根殁世巳來沉淪地獄受諸惡報幽閉酆都不覩三光動經億劫我天尊大慈悲愍弘濟多門垂然燈之文以續明照夜靈光所及罪惱皆除更乘懴拔之緣便遂往生之願若有善男子善女人發無上道心依按科格來詣齊所齎備香油為國主帝王君臣父子三塗九夜若幽若明依法然燈照燭內外上映諸天之上福堂之中下照九地之下地獄之內使苦魂超度幽爽開光九祖生天三塗罷對福沾一切功德無窮當知此人積劫善緣必得成道今有某官某乙修建黃籙靈寶齊依按簡文然燈供飬當願帝王享福三景著明七祖生天三塗朗晏見世神明敬祐真聖護持福祚巍巍永登仙果弟子再拜上元金籙簡文真仙品曰然燈威儀於道戶上然二燈以照齊主住宅為弟子銷災度厄安宅鎮神弟子於燈下三禮法師呪曰正一陽光熖上朱煙開光童子一十二人洞照天下及臣等身百邪摧落却鬼萬千光明朗徹通真達靈升入無形與道自然上元金籙簡文真仙品曰然燈威儀於本命上然三燈以照三魂為弟子制邪度厄拘守三魂弟子於燈下三禮陽光洞明三魂自生總録萬神長附我形日中齊景永保無傾上元金籙簡文真仙品曰然燈威儀於行年上然七燈以照七魄為弟子安神却禍制魄除邪弟子於燈下三禮明燈攝光遊精不飛七魄安守萬神總歸月中齊景長處光輝上元金籙簡文真仙品曰然燈威儀於太歲上然一燈以照太歲之辰為弟子除一年災害福慶來臻弟子於燈下三禮太陽流暉光焰四方洞照我身七圍九重內朗外明洞達太空上元金籙簡文真仙品曰然燈威儀於大墓上然三燈以照齊主代世丘陵墓為弟子拔度先世亡魂托生淨域斷絶注訟解復連之災弟子於燈下三禮宮羽辰肖丑角未徵戍向墓位禮太隂冥冥萬劫無期陽光洞煥下照杇骸魂受光明鍊景反胎得生淨境歡樂熙熙上元金籙簡文真仙品曰然燈威儀於小基上然五燈以照齊主近代丘陵基拔度神爽得生天堂利祐見在福祚興昌弟子於燈下三禮宫羽戍角丑商未徵展向墓位禮長夜幽冥萬劫無開景潜太隂七魄蕩飛朱靈童子太陽洞輝照明魂魄神爽同歸上元金籙簡文真仙品曰然燈威儀壇堂前然七燈以照七祖父母幽魂苦爽得生天堂弟子於燈下三禮天迥地轉代謝相推九幽無光七祖不窺太陽開度死魂應歸明燈續夜杇骸生輝上元金籙簡文真仙品曰然燈威儀於中庭然九幽之燈以照九幽長夜之府拔度九幽之中弟子先亡魂爽覩見光明弟子於燈下三禮九幽冥冥萬劫無光長夜閉魂元始未通華燈續明下照土皇開度七祖上生天宫洞照內外世為仙王上元金籙簡文真仙品曰然燈威儀於夾門然二燈以照宫宅為弟子驅邪捕惡保護闔門弟子於燈下三禮陽光開明朱煙爓暉太炎童子備守玄扉洞照宫宅四窗八開驅鬼捕邪萬精斬摧三界敬護代代不衰衆真交㑹日月同輝上元金籙簡文真仙品曰然燈威儀於地戶上然二十四燈以照二十四生氣為弟子延生益氣增福安神注上生名削除死籍弟子於燈下三禮向地戶禮三部八景合成我身二十四氣以成我神明燈自然上聞太玄身度水火與氣自然八景齊并願得神仙上元金籙簡文真仙品曰然燈威儀於八方然八燈以照八卦為弟子照明八達開窗九官八神密衛八方開通弟子於燈下三禮向王禮三景煥明八卦開窗天氣靜閉太隂隱光華燈照明萬願皆從身入光明永享無窮上元金籙簡文真仙品曰然燈威儀於四面中央然九燈以照九宫為弟子度九宫災厄上九宫仙名弟子於燈下三禮九五分立天地開張玄光潜伏太隂不陽明我華燈上照九宮玄夜開朗我願吉昌上元金籙簡文真仙品曰然燈威儀於十方然十燈以照十方為弟子照明十極招真降靈解釋災厄名書十天弟子於燈下三禮向天門禮天開地閉玄隂不明爓上朱煙為我通冥十方尊神玄鑒我形魂魄洞輝自然光精上元金籙簡文真仙品曰然燈威儀於四面然二十八燈以照二十八宿為弟子削除死籙益上生名北斗落死南斗延年弟子於燈下三禮向東南禮明星大煥光流十門玄精下映九幽北營我然華燈乘光上聞願得青蓋照我形魂上元金籙簡文真仙品曰然燈威儀於天門上然三十六燈以照三十六天為弟子開度七祖父母升入天堂弟子於燈下三禮向天門禮龍漢蕩蕩三氣乘玄梵行眇眇彌羅大千悠悠長魂仰望綿綿今日明燈我願成仙與我七祖同升諸天上元金籙簡文真仙品曰然燈威儀於五方然五燈以照五嶽為弟子上名仙籙保鎮身形弟子於燈下三禮五嶽靈山安鎮五方五帝尊神神仙之宗今日然燈上照天王記我命籍度入仙宫七祖解脫同升太空上元金籙簡文真仙品曰然燈威儀功德至重上照諸天下照諸地八方九夜並見光明見此燈者皆罪滅福生然燈之士其福甚深九祖父母上生天堂去離憂苦永出九幽逍遙上元仙宫之中見在安泰子孫興昌門戶清肅萬災不千存亡開度生死荷恩功德無量所向從心於家於國咸享利貞九夜二塗並登真道普念無上尊次小學仙讃引至玄師前散如常儀眀旦滅燈上元金籙簡文真仙品曰然燈威儀然燈之官勤為用意令燈光明徹竟夕不得中滅半暗半明令人獲罪冝愼之焉上元金籙簡文真仙品曰然燈威儀明旦滅燈法師呪曰玄隂閉光長燈續明太陽巳朗八幽開清燈還太隂光附景生日月二置與我合并呪畢便滅燈止凡修黃籙齊當依真文玉訣四時然燈外別然金籙諸燈依法拜呪訖或三日之內併行之或拜呪一夕皆獲福利幽顯沾恩矣或不因齊壇特然此燈依法拜呪功亦等耳崇善之士其弘之焉或於齊內然九幽燈别行禮呪之儀或不因齊特為存亡然九幽燈亦可特行禮呪之法其儀軌附之於後九幽神燈禮呪上元金籙簡文真仙品曰然燈威儀為帝王國主上銷天災正天分度下安兆庶濟拔存亡當然九幽神燈上照九天福堂下照九幽地獄人天蒙惠生死荷恩九真妙戒金籙度命妙經云天地八方有九幽地獄考謫罪魂皆由生死之時造諸罪業身淪之後淪滯三塗受報終天無由解脫冥冥長夜不覩光明若非大聖垂慈善緣開度長居黑暗億劫難原所以天尊懸科著然燈之品繼明西日照景窮泉流光所臨窮魂息苦神輝所燭幽爽停酸然燈之功獲福無量或為遷拔亡者或為解厄除災當備香油詣諸靈觀歸心拜手䖍仰真靈燒香然燈禮願供養精誠丹苦福力所覃亡者生天見存蒙福報應之說備存業報金籙九幽靈寶諸經聊述其由此不繁載夫然九幽燈者當市清淨香油不得用非義之財及濁雜葷穢之物或以諸香宿漬於油中取其燈焰芳潔散流香氣上感諸天下蠲腥雜燈光朗徹銷暗繼明即大獲功德九幽之燈當於靈壇廣殿衆聖之前分為九樹依九位陳列樹别九盞或一樹九層層别九巵九九之數法天象地下開九夜上達九玄濟存拔亡最為聖福或力不及者止辨九巵不必備用此儀止焚香告真精誠冥祝功德通感亦一揆也或隨位備漿水粥時果各九分或八十一列於九位之前尤為精妙次焚香存神叩齒二十四通啓白具位臣某謹啓里域真官日直使者虛空監察應感靈司今謹有某乙為某事於某處然九幽神燈祈恩致福當乞上關三景下白九幽祈告感通功德成就所啓所願咸乞如言弟子再拜弟子某乙然九幽神燈上照中天福堂之內朗徹光景輝映萬方中照中宫境域神州妖惡潜消災凶殄息下照中央普掠之獄破諸幽暗開諸光明劒樹韜鋒刀山息刃窮魂罷考罪魄停酸離苦生天逍遙快樂弟子再拜弟子某乙然九幽神燈上照東方無極諸天福堂之內陽光煥赫映徹東方中照震宫卯位青帝之方清蕩災凶掃除氛翳下照東方風雷地獄破諸幽暗開諸光明所有飛戈飄㦸震雷霹靂停威息苦赦罪魂克果生天逍遙快樂弟子再拜弟子某乙然九幽神燈上照南方無極諸天福堂之內陽華洞煥徹照無窮中照午位九宫赤帝之野消平災異掃滅氛邪下照南方火翳地獄破諸幽暗開諸光明所有火城火山考對之者吞火食炭一切窮魂克獲清涼逍遙快樂弟子再拜弟子某乙然九幽神燈上照西方無極諸天福堂之內神光煥耀洞映太空中照酉位兊宫白帝之境掃除氛穢蕩滌災凶下照西方金剛地獄破諸幽暗開諸光明所有鐵杖金鎚考對之者窮魂罷苦積罪蒙原早得生天逍遙快樂弟子再拜弟子某乙然九幽神燈上照北方無極諸天福堂之內祥光照灼徹照無邉中照坎位一宫黑帝之野蕩除邪穢洗滌凶災下照北方溟泠地獄破諸幽暗開諸光明所有毒汁氷池考對之苦寒㦸霜刃楚毒罪魂並得生天逍遙快樂弟子再拜弟子某乙然九幽神燈上照東北方無極諸天福堂之內靈光洞朗照映虛空中照艮卦八宫丑寅之野廓清災沴摧蕩凶邪下照東北方鑊湯地獄破諸幽暗開諸光明一切幽魂承兹福利鐵義煮漬息苦停酸早獲生天逍遙快樂弟子再拜弟子某乙然九幽神燈上照東南方無極諸天福堂之內光華普照煥耀無涯中照巽卦四宫辰巳之野蠲消邪惡摧滅災凶下照東南方銅柱地獄破諸幽暗開諸光明一切罪魂免其燋爛罪根除蕩內外清涼盡獲生天逍遙快樂弟子再拜弟子某乙然九幽神燈上照西南方無極諸天福堂之內靈光洞朗照映虛空中照坤位井參之野廓清災沴摧蕩凶邪下照西南方屠割地獄破諸幽暗開諸光明一切罪魂免其鋩鋒利刃之苦早獲生天逍遙快樂弟子再拜弟子某乙然九幽神燈上照西北方無極諸天福堂之內光華普照煥耀無涯中照乾宫奎壁之野蠲消邪惡摧滅凶災下照西北方火車地獄破諸幽暗開諸光明一切罪魂乘兹福利火車罷扇塗炭消憂早獲生天逍遙快樂弟子再拜太上黃籙齊儀卷之五十六
