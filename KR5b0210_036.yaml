front:
  text: 太上黃籙齋儀卷之三十六王二
  hash: sha256:f594de0226319bf7ee8d71372e061d75fa09b7542bc1538a9fbe71df0443439e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0210_HFL_036-001a, image: hfl/0274/0274-022.png}
body:
  text: 唐廣成先生杜光庭集普度幽魂遷拔落景行道入戶各禮師存念如法衛靈五星髙曜瑞氣飛浮元始集神天地交周玉符寶節嘯命微幽擲火揚威姦凶無留萬魔振伏紛葩却消摧怪伐惡道氣同流神光照夜隂翳俱收萬仙降格扇景乘飈羣生咸遂惠遍神州鳴法鼓二十四通無上玄元太上道君召出臣身中三五功曹左右官使者侍香金童傳言玉女五帝直符直日香官各三十二人出出者嚴裝關啓玄壇天帝神君當召此間土地里域真官正神急上關啓臣今奉為入意以今朝元行道願得玉清道氣靈寶妙光下降流入臣等身中即使玄壇清淨內外成真天無氛穢地絶妖塵琳琅振響十方肅清萬魔不干真誠上徹令臣所啓速達徑御太上無極大道至真玉皇上帝御前各稱法位上清玄都某嶽先生臣等同誠上啓虛無自然元始天尊無極大道太上王晨道君太上老君無上玄老十方巳得道大聖衆至真諸君丈人三十六天帝君玉虛上帝玉帝大帝東華南極西靈北真玄都玉京金闕七寶玄臺紫微上宫靈寶至真明皇道君三十六部尊經玄中大法師三界官屬一切真靈臣等宿植良緣遭遇玄化生成羣有濟拔幽沉叨奉師資佩三清之祕籙參承玄旨諷三洞之真經品列仙階名升玉簡未能陶神瑩骨絶迹沖襟空依衆妙之門多犯明真之律向以受法之日申盟五帝告誓三官濟度天人弘贊家國凡有禱請理合申陳今奉懇誠固難遏絶所承詞旨敢不上聞讀詞按如詞懇理濟幽明伏念齋主某以歷功功深諸天善勝仰自然之道化奉無極之元尊匡國致君愛親事長弘救拔之深旨憫沉滯之幽魂惻隱興懷隳傷寫志遵憑聖教以報大恩披黃籙典章啓玄壇階級崇嚴鎮綵恭獻香花告三官五帝之靈朝金闕玉房之聖臣等依經修奉稟戒精嚴滌慮凝神洗心注念以今落景行道請法衆等運茲初捻上香願此香煙騰空徑上供養無上至真道寶臣等歸身歸命首體投地仰依太上三尊願以是功德上資皇家宗社九廟威靈德契無為功宣有截皇帝龍圖永固鳯曆彌昌混一車書和同海嶽兆民攸賴百度惟貞德化昭宣奕葉繁茂萬方寧謐九曜髙明遁迹修真師宗父母咸遊八極早翥三清今故燒香歸依師尊大聖衆至真之德得道之後升入無形和與道合真以今落景行道請法衆等運兹二捻上香願此香煙騰空徑上供養無上至真經寶臣等歸身歸命首體投地仰依太上三尊願以是功德奉福齋官九玄七祖往逝神儀判除奪紀之名增益記功之簡升真仙境流慶子孫長居得一之貞揚名後世永懋持三之寶服訓前修今故燒香歸依師尊大聖衆至真之德得道之後升入無形和與道合真以今落景行道請法衆等運茲三捻上香願此香煙騰空徑上供養無上至真師寶臣等歸身歸命首體投地仰依太上三尊願以是功德恩流庶品福被萬民咸遂生成各均利濟爰及蓬飄旅魄浪泛遊魂罹八難之深殃脫九幽之極苦未除黑簿莫記丹書咸願慈尊降垂靈貺命天官而總録勑地府以全收皆赴壇筵盡霑救度永離惡趣俱植善根託蔭人天受生快樂今故燒香歸依師尊大聖衆至真之德得道之後升入無形和與道合真懴悔三啓大道洞玄虛有念無不契鍊質入仙真遂成金剛體超度三界難地獄五苦解悉歸太上經靜念稽首禮三禮臣等至心稽首禮太上無極大道臣等至心稽首禮三十六部尊經臣等至心稽首禮玄中大法師重稱法位上清玄都某嶽先生臣等重啓太上無極大道元始天尊太上玉晨道君太上老君十方至真大聖太一天尊太帝天帝三十六部尊經玄中大法師三界應感一切真靈臣等獲以凡微參奉大道三師盟授三寶真經供養尊禮以求所願荷恩崇重喜懼交襟臣等受法之日約當宣揚正化開度幽明凡有所陳理宜關奏以齋官弟子某任居分閫位重鈞衡佐道立功弘善贊法竊覩近年之內封域之中俗值凶荒人罹災沴雖時無旱勞而氣有愆調貧病札瘥飢羸歉厄悠悠生聚坐被中傷惴惴黎元多成困斃以致形骸未保性命不全老幼嬰痾死亡桄藉且人之處世頃刻一生電逝風馳固難長保所殁之者其例甚多或有事主忘軀報君盡節死於陳敵不顧生全或經販求財死於貪利或干名殉祿殁於求榮或稟性頑凶行心險詐恩不及物惠不及人僻差居懷𥚹躁成性偶有疾苦無人供承一旦嬰痾遂至困劇或飢寒逼迫內外侵傷殍死路歧無人收拾或豬拖狗拽或鼠喫蟲餐生困路途死填溝壑或風吹日曬或兩洗霜侵莫覩肌膚空殘骸骨或手足不具或頭腳都無零落尸形甚可悲念今則併令捃拾共為埋豈别女男不分老小免今暴露咸得蓋藏況以大教之中慈悲為本務先掩蔽理切傷嗟又先聖運心儒宗制禮起封種柏猶防地媪之侵欺掩骼埋胔免起生人之嗟嘆蓋欲使生者和泰殁者安全豈時數之使然亦正理之所致內懷憂痛外切愍傷是以詣某處備玄門齋醮仰申懴謝上聞於三十六天廣遍歸依普告於十方世界伏冀至真衆聖元始髙尊勑三官五帝之司告六趣九幽之內盡加渥澤咸使安貞赦生前殁後之愆釋考貴憂勞之苦沐浴天澤洗滌幽隂錬度形魂出離罪惱生者必蒙其濟祐死者咸契於往生齋主某特為瘞藏共為塋冢各安其所並保其宜速遂往生勿為留滯然願四時和傷六氣均調物泰人安時寧俗阜至於茫茫之夜府常垂懴拔之緣杳杳之天堂果叶安貞之願上明天尊大慈之澤下副臣等歸命之誠謹啓以聞發願一願大道流行普天懷德二願一切有生咸皆悟道三願九夜幽魂一時解脫四願孤爽無依咸得受生五願天下太平五榖豐登六願臣忠子孝君仁父慈七願四海通同𡨚親和釋八願潛胞處卵咸得生成九願積疾新痾旋即痊愈十願孤露衆生豐衣足食復爐香官使者左右龍虎君侍香諸靈官當今臣朝元之所自然生金液丹碧芝英百靈衆真交會在此香火洞案爐前今臣學道得道求仙得仙齋主獲福幽顯沾恩十方仙童玉女侍衛蘭煙傳臣向來所啓速逹徑御太上無極大道至真玉皇上帝御前出戶太上黃籙齋儀卷之三十六
