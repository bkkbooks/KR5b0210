front:
  text: 太上黃籙齊儀卷之七賔七
  hash: sha256:1d4b4b64e212d3bd2e1c8ecbf4c3fcfc61806c6038eecbb28440b496c00b17e5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0210_HFL_007-001a, image: hfl/0270/0270-112.png}
body:
  text: 唐廣成先生杜光庭集第三日清旦行道入戶各禮師存念如法衛靈天書敷羅下盻太微元化生成靈煙九回八景六周聖運所持左賔赤方右啓帝扉東華南府灌錬辟非回輪日曜轉盻月暉今日大慶萬道同歸玄壇正氣保天無衰普告三界驛龍風馳鳴法鼓二十四通無上三天玄元始三氣太上老君召出臣等身中三五功曹左右官使者左右捧香驛龍騎吏侍香金童傳言玉女五帝直符直日香官各三十六人出當召此間土地里域真官正神速出嚴裝關啓臣今正爾燒香奉為某官某乙為國為家奉修無上黃籙大齊若干日夜以今第三日清旦登壇焚香行道願得太上十方正真生氣降流臣等身中所啓速達徑御至真無極大道玉皇上帝御前各稱法位上清玄都弟子臣等謹同誠上啓虛無自然元始天尊無極大道太上大道君大聖祖髙上大道金闕混元天皇大帝太上老君髙上玉皇十方巳得道大聖衆至真諸君丈人三十六天帝君玉虛上帝玉帝太帝東華南極西靈北真玄都玉京金闕七寶玄臺紫微上宫靈寶至真明皇道君三十六部尊經玄中大法師東嶽上卿司命真君西極總真王君太平下教二十四真人五嶽靈宫名山洞府得道神仙三界真靈臣等伏聞太漠混融至真澄寂元尊撫化大道御天崇不宰之玄功啓長生之祕揵理出隨迎之表教垂億劫之先普度羣生大弘神化臣等夙資福運生禀靜基獲佩靈章遵承妙旨立功行教佐國為先凡有所祈理冝陳奏今奉詞旨敢具上聞讀詞按如詞言誠深修奉恭為家國普及存亡稽首玄虛冥心丹切所冝汲引俾達誠祈是敢依按玄科建修黃籙法下元之品格披上聖之簡文鍊沐形神精修齊直以今清旦行道請法衆等運兹初捻上香願此香煙騰空徑上供養無上至真道寶臣等歸身歸命首體投地仰依太上三尊願以是功德上資宗廟尊靈證品太虛棲真玄極皇帝紫宸繼聖丹扆朝元揖羣后於華胥納萬方於仁壽皇后昭宣四德保乂六宫山河維帝子之城磐石固宗臣之國公侯卿輔中外職寮百度惟貞羣生蒙慶今故燒香歸依師尊大聖衆至真之德得道之後升入無形和與道合真以今清旦行道請法衆等運茲二捻上香願此香煙騰空徑上供養無上至真經寶臣等歸身歸命首體投地仰依太上尊經願以是功德歸流某家九世幽儀六親滯識北宫釋魄南府鍊神濯形流火之池列品飛香之殿往生淨域託化瓊都今故燒香歸依師尊大聖衆至真之德得道之後升入無形和與道合真以今清旦行道請法衆等運茲三捻上香願此香煙騰空徑上供養無上至真師寶臣等歸身歸命首體投地仰依太上三尊願以是功德奉福家國眷屬親姻咸資景貺沐靈津而養壽漱瓊醴以安神萬善同臻百靈共衛旁該品彚普及四生聖澤所霑並登真道今故燒香歸依師尊大聖衆至真之德得道之後升入無形和與道合真禮方懴悔步虛頭腦禮金闕携手遨玉京騫樹圓景園煥爛七寶林天獸三百名獅子巨萬尋飛龍躑躅吟神鳯應節鳴靈風扇竒華清香散人襟自無髙仙才焉能耽此心三啓三禮臣等至心稽首禮太上無極大道臣等至心稽首禮三十六部尊經臣等至心稽首禮玄中大法師重稱法位上清玄都弟子臣某等謹重誠上啓太上無極大道元始天尊太上大道君太上老君十方無極大道道德衆聖天尊至真太帝天尊三十六部尊經玄中大法師上相上宰四司五帝三界應感一切真靈臣聞有物混成先天地而垂迹周行不殆並日月以騰光鼓六氣於虛無扇八風於寥廓生成品物含孕生靈惟古及今安家濟國某丕承道化夙荷玄功思報君親莫先齊直仰慮億曽往識見在親緣結咎釁於三官積愆瑕於九地未蒙原赦猶滯幽扄依按典儀精崇齊福伏冀真仙廣萃靈澤遐覃勑五帝四司三官九府威光下燭開度神儀至于過去見存三業諸罪承茲福祐咸乞蕩除上願宗廟尊靈升神碧落聖躬和暢帝道昭明書軌混同華夷寧謐邊烽不警封堠無虞百榖阜成三光朗晏外藩內屏良輔元勳克贊雍熙永光聖運然後九幽泉曲六趣三塗蠢動飛沉咸登道域上明天尊弘慈之澤下副臣等歸命之誠謹啓以聞發念一念為道四大合德齊主七世父母免墮憂苦上升天堂衣食自然二念帝王國主道化興隆庠序濟濟皇教恢弘威儀翼翼普天所瞻民稱太平四夷賔伏妖惡自滅聖賢日生三念法師功德大建教化明達俱獲飛仙四念同志學人早得仙道更相開度五念九親和睦好尚仁義貴道賤財行為物範六念損已布施道士及飢寒者天下人民各得其所七念蠕動蚑行一切衆生咸蒙成就八念赦貸前生今世罪對立功補過九念家國隆盛宗廟有人世生賢才十念尊受經師不敢中怠平等一心廣度剋獲上仙白日登天拜見太上永成真人雲車羽駕和與道合真復爐香官使者左右龍虎君侍香諸靈官當令臣行道之所自然生金液丹碧芝英百靈衆真交㑹在此香火爐前伏願存亡受福家國霑恩十方仙童玉女侍衛香煙傳奏臣向來所啓徑達至真無極大道玉皇上帝御前出戶太上黃籙齊儀卷之七
