front:
  text: 太上黃籙齋儀卷之二十七
  hash: sha256:e4f8e8a3d8e93ff0eda386c26a8e5cfe535c7d50a7bc762fe37e4bc40f4bf3af
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0210_HFL_027-001a, image: hfl/0273/0273-022.png}
body:
  text: 唐廣成先生杜光庭刪消災中分行道入戶各禮師存念如法衛靈黃中䇿氣斬馘妖蹤遏絶邪源制斷魔蹤太上符命召制神功萬靈斯格却禍除凶王氣三輪洞運真風紫戶舍瓊大度無終左命青腰右攝芝童逍遙飈景總御九空玄壇應機乘氣虛沖萬真普降濟度無窮鳴法鼓二十四通無上玄元太上道君召出臣身中三五功曹左右官使者侍香金童傳言散花玉女五帝直符直日香官各三十二人出出者嚴裝關啓玄壇天帝神君當召此間土地里域真官正神以今奉為入意願得玉清道氣靈寶妙光下降流入臣等身中即使紫清鬱勃玉闕開明五老輔根萬帝攝真體圓珠映乘景驂宸金光煥赫御氣上清令臣所啓速達徑御太上無極大道無形無名虛無自然金闕玉陛下各稱法位具位臣某等謹同誠上啓虛無自然元始天尊無極大道太上大道君太上老君髙上玉皇十方巳得道大聖衆至真諸君丈人三十六天帝君玉虛上帝玉帝大帝東華南極西靈北真玄都玉京金闕七寶玄臺紫微上宫靈寶至真明皇道君三十六部尊經玄中大法師三界官屬一切真靈臣等伏聞道運宣行元皇垂化真靈表貺天地效祥正二氣於上玄息三災於下土故得和寧品物孚祐生靈漙家國以安寧總幽冥而利濟臣等夙承玄澤被沐洪休參佩寶文披閲真格遵太上弘慈之旨廣天尊解度之科思立微功用匡大化度人救物拯厄扶危佐國為時冀效誠節凡有詞欵敢不上聞讀詞按如詞言誠深修奉願祈聖澤以解災凶是敢齎備香花管持法信質心三界歸命諸天臣等輒按玄科奉修齋直洗心靜念然燈燒香法河圖禳謝之儀依太一懴祈之典馳誠金闕注想玉京冀獲感通克蒙昭祐以今午朝行道請法衆等運兹初捻上香願此香煙騰空徑上供養無上至真道寶臣等歸身歸命首體投地仰依太上三尊願以是功德歸流國祚帝圖宗祧列聖運超三五道冠羲農御紫極以遊神宴朱陵而蛻影上登真品下福睿圖皇帝壽等八溟光宣二景堯雲廣覆舜日增華六宫盡柔順之規百辟運忠貞之節萬方清泰四海乂寧今故燒香自歸依師尊大聖衆至真之德得道之後升入無形和與道合真以今午朝行道請法衆等運兹二捻上香願此香煙騰空徑上供養無上至真經寶臣等歸身歸命首體投地仰依太上三尊願以是功德歸流齋主某家億劫親緣積生春屬九玄滯爽七祖神儀朝上聖於諸天落幽纒於長夜永除罪簡克證仙階今故燒香自歸依師尊大聖衆至真之德得道之後升入無形和與道合真以今午朝行道請法衆等運兹三捻上香願此香煙騰空徑上供養無上至真師寶臣等歸身歸命首體投地仰依太上三尊願以是功德歸流某家過咎蠲銷災凶殄息存亡開泰眷屬安寧洎乎地府寒鄉咸蒙濟拔三塗九夜並覩光明俗洽乂康境無災沴山栖谷隱證道登真今故燒香自歸依師尊大聖衆至真之德得道之後升入無形和與道合真禮方懴悔各思九色圓象咽液命魔密呪步虛旋繞旋步雲綱上天風颯爾吹飄𥚑淩斗柄秉拂揖參旗獅子㗸丹綬麒麟導翠輜飛行周八極幾見發春枝緑鬒巍丹幘青霞絡羽衣晨趨陽德館夜造月華扉摶弄周天火韜潛起陸機玉房留不住却向九霄飛昔在延恩殿中霄降九皇六真分左右黃霧繞軒廊廣內尊神御仙兵護道場孝孫今繼志咫尺對靈光三禮臣等至心稽首禮太上無極大道臣等至心稽首禮三十六部尊經臣等至心稽首禮玄中大法師重稱法位具位臣某等謹重伸上啓太上無極大道元始天尊太上大道君太上老君十方無極大道道德衆聖天尊至真大帝天帝三十六部尊經玄中大法師上相上宰四司五帝三界官屬一切尊靈臣等伏聞太上開圖萬靈受福至真演貺羣品舒榮正宿度於天經靜凶𦍙於地紀神風寧晏幽顯昭蘇某以憂切災衰虔希懴滌齎香花法信鎮綵紋繒質信效心祈天請命臣等奉依科法營設壇場燒香然燈照燭三界上照諸天無極之境長樂福堂之中下照九地極冥之鄉地獄重隂之內拔度億世罪考幽靈欲使纍劫𡨚尤普蒙解釋九玄注逮咸得清銷然後上解星辰日月暗矅之災下除分野九宫刑妨之厄千災萬咎重過深尤因今懴祈咸乞除蕩上願帝王萬壽祚曆永昌比天地以安貞並山河而悠久后妃內職德茂坤儀太子諸王功扶聖業文武卿佐中外職察百揆允修九功咸敘天清地國泰人和日月重光雲霞五色兵鋒偃戢榖稼滋盈河出九疇山呼萬歲弟子某九玄開度舉族安寧弘忠孝以傳家體仁和而繼業洎諸含識普及幽冥各遂物冝咸得其所臣等功圓六度道證三便谷隱寒棲克成真果上明天尊大慈之澤下副臣等虔奉之誠謹啓以聞發願一願大道淡泊虛無安間空寂澄清自居廣開法門教導頑夫皆蒙惠澤精苦是修預以同學普得升虛與天相保長存無憂二願諸天結氣澄清髙虛廣覆保真固靈氣候調節四運和平國安民豐普天間寧廣濟一切惠逮有生保天長存億劫不傾三願土地覆載無窮安平不陷海淪不崩保鎮家國兆民興從養生安死惠周十方禾稼滋植營運日豐咸得厚載萬類皆從四願日月二景髙明無有勃蝕𧇊盈安清光照諸天洞消暗冥保固劫運世祚和平普加潤澤惠灑衆生五願星辰與日齊光轉燭照耀朗映十方各安其位經緯直行保鎮家國無有災傷四海寧一普天興昌六願四時隨節推遷景氣和調無有災患疫毒消滅普天平安五榖豐熟國富民歡七願浮雲結氣聚煙飛空髙澄蔭覆玄玄隱則無為散則彌天神仙同居結友衆真惠流一切興國愛民普濟羣生人同劫年八願風雨流灑無窮普加施泄受其發揚萬物滋生國儲民豐九願五嶽各安其方巍巍包藏長為仙宫安鎮國祚保天無終護度一切莫不仰宗十願江海蕩蕩無極含容恢廓無細不植淵奧柔惠潤加蠕息天人獲慶年同劫石十一願帝王國土日昌四鎮安睦兵革不揚天人歌唱吉應來翔敷教濟濟威化洋洋兆庶稱慶長樂未央十二願蝖飛蠢動巳生未生咸蒙安全普得生成皆見元氣受陽之形草木果林經冬不零一切濟度靡不鮮榮和與道合真復爐香官使者左右龍虎君侍香諸靈官當令臣行香之所自然生金液丹碧芝英百靈衆真交會在此香火爐前令臣學道得道求仙得仙齋主受福幽顯沾恩十方仙童玉女接侍蘭煙傳臣向來所啓之言速達徑御太上無極大道無形無名虛無自然金闕玊陛下出戶太上黃籙齋儀卷之二十七
