front:
  text: 太上黃籙齋儀卷之三賔三
  hash: sha256:d69a2dd3fe10947d39c108767efb6771cea6810fd9dc906d91147e070df72867
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0210_HFL_003-001a, image: hfl/0270/0270-048.png}
body:
  text: 唐廣成先生杜光庭集第一日落景行道入戶各禮師存念如法衛靈神光朗耀瑞氣匝旋箕斗澄輝芝宇晏然玉眸金真寶壇純乾變夜作晝回子午前太華流彩丹鳯飛圓息魔滅姦髙步祥煙天真並集齊到帝前鳴法鼓二十四通無上三天玄元始三氣太上老君召出臣等身中三五功曹左右官使者侍香金童傳言玉女五帝直符直日香官各三十六人出當召此間土地里域真官正神速出關啓臣今正爾燒香奉為某官某乙為國為家奉修無上黃籙大齋若干日夜以今第一日落景登壇燒香行道願得太上十方正真生氣降流臣等身中令臣所啓之誠速達徑御至真無極大道昊天玉皇上帝御前各稱法位上清玄都弟子臣某等同誠上啓虛無自然元始天尊無極大道太上大道君太上老君髙上玉皇十方巳得道大聖衆至真諸君丈人三十六天帝君玉虛上帝玉帝大帝東華南極西靈北真玄都玉京金闕七寶玄臺紫微上宫靈寶至真明皇道君玄中大法師東嶽上卿司命真君西極總真王君太平下教二十四真人名山洞府得道神仙三界應感一切真靈臣等幸以宿因躬逢道化師資開度得入法門佩服經圖遵修戒籙未能凝神林谷養志煙霞荏苒光隂棲遲朝市竊尋經旨以濟物為先凡有歸心理冝關奏況奉詞旨敢不上聞讀詞按如詞言情理丹切歸心十極稽首諸天希設齋壇以崇福祉臣等謹相携率依按科儀啓修道場延格真聖奉為修設黃籙妙齋各運丹心上祈玄祐以今落景行道運兹初捻上香歸身歸神歸命大道臣等首體投地歸命太上三尊願以是功德上資宗廟先靈今朝皇帝瑶圖地久寶祚天長日月齊明山河等壽儲宫妃后乃聖乃神百辟庶僚允文允武兵戈永息祅惡不興四海乂寧萬方入貢今故燒香歸依師尊大聖衆至真之德得道之後升入無形與道合真以今落景行道運兹二捻上香歸身歸神歸命大道臣等首體投地歸命太上尊經願以是功德歸流齋主某家七祖幽靈九玄滯識生神上境鍊魄南宮荷陽靈變質之功得隂景留形之妙神津灌沐道氣資熏利祐見存逍遙自在今故燒香歸依師尊大聖衆至真之德得道之後升入無形與道合真以今落景行道運兹三捻上香歸身歸神歸命大道臣等首體投地歸命太上三師願以是功德歸流普天有識率土含靈同沐熏修咸得其所齋主某家巳身眷屬災衰不撓過咎自消祿算增延福祥臻集今故燒香歸依師尊大聖衆至真之德得道之後升入無形與道合真禮方懴悔步虛嵯峨玄都山十方宗皇一迢迢天寶臺光明耀流日煒燁玉林花蒨燦耀珠實常念餐元精鍊液固形質金光散紫微窈窕大乘逸三啓三禮臣等至心稽首禮太上無極大道臣等至心稽首禮三十六部尊經臣等至心稽首禮玄中大法師重稱法位上清玄都弟子臣某重伸上啓太上無極大道元始天尊太上大道君太上老君無上玄老十方無極大道道德衆聖天尊至真大帝天帝三十六部尊經玄中大法師四司五帝天真地靈名山洞府得道神仙隨機赴感一切真靈臣等纍劫良緣遭逢福會攫形中土稟質太和三洞宣行真經下化參奉玄奧佩受靈章而修錬未專善功未著志弘神化佐國立功濟物度人用副玄旨齋主某歸心至道拜首靈堙唯以丹誠冀通三界齎持法信崇啓道埸臣等輒率法流共相奬勵澡身清境注想玄虛依按明科轉經行道虔恭懇欵冀獲感通伏願三境衆尊回光照映十方大聖齊駕光臨俯察丹誠曲流景貺勑四司五帝九府三官天地衆真證明功德先冀聖朝宗廟社稷尊靈保祐丕圖遐延祚曆萬方向化八表會同風兩以時干戈戢息次乞齋主某家九玄七世超度朱陵內外宗親列名丹簡災殃霧廓福善雲臻壽祿增新凶衰殄息門無天橫家有禎祥子孫承忠孝之風中外享義安之福旁該庶類下及三塗俱賴玄休咸升福岸臣等功成六度行備三乘證道登真廣濟羣品天司地府幽職隂僚共楊清靜之風永佐無為之教上明天尊廣濟之澤下副臣等歸命之誠謹啓以聞發願一願大道流行普天懷德二願一切有生咸皆悟道三願九夜悲魂一時解脫四願孤魂無依咸得受生五願天下太平五穀豐熟六願臣忠子考君仁父慈七願四海通同𡨚親和釋八願潛胞處卵咸得生成九願積疾新痾旋即痊愈十願孤露衆生豐衣足食復爐香官使者左右龍虎君侍香諸靈官當令臣行道之所自然生金液丹碧芝英百靈衆真交會在此香火爐前令臣舉家受福存殁霑恩十方仙童玉女侍衛香煙傳奏臣向來所啓徑達至真無極大道玉皇上帝御前出戶太上黃籙齋儀卷之三
