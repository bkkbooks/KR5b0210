front:
  text: 太上黄籙齋儀卷之四十王六
  hash: sha256:e3a8d47073fe5de20a25fa710655568aad4d41996fbe20840b9c2372e357043d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0210_HFL_040-001a, image: hfl/0274/0274-088.png}
body:
  text: 唐廣成先生杜光庭集解考三時行道投詞禁壇宿啓一如靈寳法衆官列位於玄師前立定唱道華夏讃引至地户入戸旋行上五方香從東爲始上御案香上香宻呪上本位香各禮師存念如法衛靈晨精朗曜紫煙御空星壇煥映變化雲宫日魂月魄離坎翼中金眞嘯命神虎辟酆吉日行事八威鼓從玉華羅敷徘徊飛虹天光下盻道炁豐隆含靈普濟流慶無窮鳴法鼓二十四通无上玄元太上道君召出臣身中三五功曹左右官使者侍香金童傳言玉女五帝直符直日香官各三十二人出出者嚴装關啓此間上地里域眞官正神急上關啓臣今奉爲入意願得靈寳自然生神妙炁下降流入臣等身中今臣所啓之言速達徑御太上无極大道虚无自然金闕玉陛下各稱法位具位臣某謹同誠上啓虚无自然元始天尊无極大道太上大道君太上老君昊天玉皇上帝十方巳得道大聖衆至眞諸君丈人三十六天帝君玉虚上帝玉帝大帝東華南極西靈北眞玄都玉京金闕七寳玄臺紫微上宮靈寳至眞明皇道君三十六部尊經玄中大法師三界官屬一切眞靈臣等伏聞大化旣分萬靈禀質隂陽昇降以定其死生賞罰幽明以彰其罪福古今無爽巨細必均至道宣慈救之科靈寳有懴祈之典式憑齋薦以拯幽昏臣獲備職司得披玄奥凡有陳露敢不上聞讀詞按如詞言志深修奉仰慮億曽萬祖内外親縁爰及亡靈前生累劫有難原之罪莫大之愆無量無邊結固不解或在十方世界五嶽九幽及水府地司隂宫夜境窮魂苦魄執閉重泉水火風刀晝夜考掠形神毀悴痛毒難勝注引子孫殃流後胤冥冥長夜解脫無由輙按經科願希遷拔精修齋直懴解乞恩恪注丹誠上祈玄鑒以今某分行道請法衆等運茲初捻上香願此香煙騰空徑上供養无上至眞道寳臣等歸身歸命首體投地仰依太上三尊願以是功德歸流某家三十六世九祖七玄爰及亡靈一切幽爽願神光下照息幽暗於九冥道力普沾罷考對於諸獄𡨚仇銷釋罪咎蠲除浴魂神於流火池中託生化於南昌宫内天衣掛體惠露澄心永絶惡縁長登福界今故燒香歸依師尊大聖衆至眞之德得道之後昇入无爲和與道合眞以今某分行道請法衆等運茲二捻上香願此香煙騰空徑上供養无上至眞經寳臣等歸身歸命首體投地仰依太上三尊願以是功德歸流國家九廟尊儀宗祧先聖凝神絳闕垂貺鴻圖皇帝德契三無仁敷九有寰瀛昭泰風雨均調十年逺邁於宗周弘化克光於大漢干戈不作夷夏乂康今故燒香歸依師尊大聖衆至眞之德得道之後昇入无爲和與道合眞以今某分行道請法衆等運茲三捻上香願此香煙騰空徑上供養无上至眞師寳臣等歸身歸命首體投地仰依太上三尊願以是功德奉福某家永享福祥咸臻貞吉災消未兆罪滅無涯九族六親共成玄祐洎乎飛沉動植含識有情地獄幽塗四生六趣道風遐扇聖澤普沾同悟無爲盡昇諸品今故燒香歸依師尊大聖衆至眞之德得道之後昇入无爲和與道合眞禮方東方臣等至心歸命東方无極大道太上老君太上丈人元始天尊東鄉神仙諸靈官三禮各虔誠懴謝懴悔已後倣此臣等今故燒香奉爲某乙修建靈寳解考妙齋轉經行道懴悔億曽萬祖及三十六世巳來爰及亡靈若亡若存無邊之罪或行違正道諂佞無端嫉妬賢能濁亂神道酷虐無度殺戮任心負誓違盟魘蠱謀議殃罪結固積若丘山賁重考深未蒙原解魂神執繫在木官東嶽刑擣獄中銅柱鐵床金鎚之考晝夜痛毒食息無寧注訟生人求乞赦拔冥冥長夜解釋無由以今行道結齋祈恩懴滌伏冀大慈開宥道力垂光告下東府之中擣官門下解存亡殃考遷拔魂神受福天堂生神上境幽明咸泰仰荷玄恩得道之後昇入无爲和與道合眞南方臣等至心歸命南方元極大道太上老君太上丈人元始天尊南鄉神仙諸靈官三禮各虔誠懴謝臣等今故燒香奉爲某乙修建靈寳解考妙齋轉經行道懴悔億曽萬祖及三十六世九祖七玄下及亡靈若存若亡無邊之罪或任心楚毒殺害無辜結誓違盟魘害於物邪滛放蕩凌暴貞良違背善階興造罪業冒犯天地日月一切神明考重殃深未蒙原赦魂神執繫在火官南嶽刑擣獄中爐炭焚燒刑殘之苦晝夜考掠痛毒難勝殃注子孫流逮無巳冥冥長夜解拔無由以今懴謝洗心修齋行道伏冀三尊鑒祐大聖垂慈告下南宫火官刑擣門下赦其積罪開放幽魂出霍山地獄之中生洞陽朱宫之内子孫蒙福永荷靈恩得道之後昇入无爲和與道合眞西方臣等至心歸命西方无極大道太上老君太上丈人元始天尊西鄉神仙諸靈官三禮各虔誠懴謝臣等今故燒香奉爲某乙修建靈寳解考妙齋轉經行道懴悔億曽萬祖及三十六世巳來爰及亡靈若亡若存無邊之罪或行乖慈育不惠不仁不忠不孝毀傷良善犯冒神明違越五常恣行諸惡魘禱呪詛造作無端考重殃深未蒙原赦魂神執繫在金官華山刑擣獄中劒樹刀山風雷之苦晝夜考掠痛毒備嬰注訟子孫殃流見在冥冥長夜解拔無由以今懴謝乞恩修齋行道伏乞大慈哀育萬聖迴光告下西府之中擣官門下解拔幽苦原赦魂神託廕神庭往生淨域見存安泰永荷玄恩得道之後昇入无爲和與道合眞北方臣等至心歸命北方无極大道太上老君太上丈人元始天尊北方神仙諸靈官三禮各虔誠懴謝臣等今故燒香奉爲某乙修建靈寳解考妙齋轉經行道懴悔億曽萬祖三十六代巳來下及亡靈若存若亡無邊之罪或上違天道下犯地司穢瀆三光輕凌四大怨恚風雨牽引鬼神魘蠱於人殘害於物魂神執對在水官鎭山刑擣獄中寒冰夜庭𣲙河之苦肌肉凍裂痛毒難勝引逮生人求乞救拔冥冥長夜解釋無由以今行道修齋虔誠懴謝伏冀天尊大聖降罔極之恩告下北府之中考官門下赦其罪咎遷拔苦魂出長夜寒庭離三塗五苦上生淨域利祐見存族屬安寧存亡開泰蒙如所願仰荷玄恩得道之後昇入无爲和與道合眞東北方臣等至心歸命東北方无極大道太上老君太上丈人元始天尊東北鄉神仙諸靈官二禮各虔誠懴謝臣等今故燒香奉爲某乙修建靈寳解考妙齋轉經行道懴悔億曽萬祖及三十六代巳來下及亡靈若存若亡無邊之罪或爲子不孝爲臣不忠爲父不慈爲君不道妬賢嫉善背正崇邪口是心非自欺形影五逆徧造衆惡備行枉害無辜傷殺非理從生入死怨徹上天呪詛神明魘禱巫蠱殃深罪重繫在土官下元刑擣獄中考掠萬般形魂毀瘁冥冥長夜解拔無由因今懴罪乞恩立齋行道伏冀十天降宥二聖開恩告下土府之中考官門下解釋罪對原赦魂神離執閉之鄉出重檻之苦浴神丹霍騰景朱陵注訟永除子孫寧泰存亡同福仰荷玄恩得道之後昇入无爲和與道合眞東南方臣等至心歸命東南方无極大道太上老君太上丈人元始天尊東南鄉神仙諸靈官二禮各虔誠懴謝臣等今故燒香奉爲某乙修建靈寳解考妙齋轉經行道懴悔億曽萬祖及三十六代巳來下及亡靈若存若亡無邊之罪或潜爲强暴肆意凌人輕侮孤窮憎嫌老病彰人之惡掩人善功瀆亂親踈抑伏孤弱圖謀非道訕謗聖賢破人成功嫉人勝巳傷殺非理縱横任心引天地日月星辰以爲質證罪深責重魂繫地府考官獄中水火風刀晝夜考掠更相注逮解拔無由以今懴謝宿愆修齋行道伏冀十方上聖五帝髙尊告下東南方刑擣獄中考官門下拔贖幽魄盥沐形魂積罪蠲消宿殃除蕩生神福路利祐見存禍滅九隂災沉四境幽明同福永荷玄恩得道之後昇入无爲和與道合眞西南方臣等至心歸命西南方无極大道太上老君太上丈人元始天尊西南鄉神仙諸靈官三禮各虔誠懴謝臣等今故燒香奉爲某乙修建靈寳解考妙齋轉經行道懴悔億曽萬祖及三十六代巳來下及亡靈若存若亡無邊之罪或綺言無實矯詐非眞欺誑賢愚凌侮眞聖附强抑弱貪瀆無猒或爭利競財互相殘害或圖榮嗜色侵虐貞賢結誓立盟牽神引鬼因成殃對積在幽冥魂繫地府之中考官門下緘閉重陷不覩光明考掠備嬰終天無解以今修齋行道謝罪乞恩伏冀上聖上眞大慈大宥神光下照隂闇開明告下西南方刑擣獄中考官門下幽魂開度淨域上生福善遐沾存亡俱泰蒙如所啓仰荷玄恩得道之後昇入无爲和與道合眞西北方臣等至心歸命西北方无極大道太上老君太上丈人元始天尊西北鄉神仙諸靈官三禮各虔誠懴謝臣等今故燒香奉爲某乙修建靈寳解考妙齋轉經行道懴悔億曽萬祖及三十六代巳來下及亡靈若存若亡無邊之罪深殃重考累劫未原六趣三塗受諸報對魂神執繫在地官刑擣獄中痛毒難堪延殃後嗣更相流注億劫無窮以今懴罪立齋乞蒙哀宥伏冀衆尊上聖普降慈光解赦窮魂出離幽苦告下西北方刑擣獄中考官門下深愆洗蕩積釁銷平𡨚對和寧存亡開度蒙如所啓仰荷玄恩得道之後昇入无爲和與道合眞上方臣等至心歸命上方无極大道太上老君太上丈人元始天尊上方神仙諸靈官三禮各虔誠懴謝臣等今故燒香奉爲某乙修建靈寳解考妙齋轉經行道懴悔億曽萬祖及三十六代巳來下及亡靈若存若亡無邊之罪或上犯眞道穢慢三光裸露神明呵忿雷雨欺罔眞聖不懼幽明九府結形三官舉考魂神執繫在三塗九幽刑擣獄中流曳寒庭幽閉長夜冥冥億劫不覩光明流注子孫引逮存殁更相拘礙洗滌無由以今行道立齋披心懴謝伏冀三尊大聖諸天衆眞三光列宿四司五帝同垂巨澤普降洪恩告下上方地獄之中考官門下赦除積罪拔度苦魂昇入福堂聞經悟道存亡俱泰注訟永消一切有情同登福岸蒙如所啓仰荷玄恩得道之後昇入无為和與道合眞下方臣等至心歸命下方无極大道太上老君太上丈人元始天尊下鄉神仙諸靈官三禮各虔誠懴謝臣等今故燒香奉爲某乙修建靈寳解考妙齋轉經行道懴悔億曽萬祖及三十六代巳來下及亡靈若存若亡無邊之罪或妄爲師道刻截土地丘陵岡原王脙毀傷墳廟禁遏神祇塞絶水源斷山湮谷破城隍社稷犯侯伯土官不懼神明恣行罪咎魂神執繫在下方世界九幽地獄之中汲長夜之河以灌四瀆負山運石謫役萬端痛苦備嬰終天無解上延前世下及子孫報對未原殃重考責以今立齋行道懴拔罪根伏冀上聖衆尊開慈救之澤告下九地五嶽四瀆山川泰山岱宗鄷都地府下方世界刑擣獄中考官門下赦除積生累劫無量罪因遷拔窮魂岀離幽苦逍遥眞境安處福庭㣧嗣繁昌存亡同福蒙如所啓仰荷洪恩得道之後昇入无爲和與道合眞十方臣等至心歸命十方巳得道犬聖衆至眞諸君丈人十鄉神仙諸靈官三禮各虔誠懴謝臣衆等歸身歸神歸命今故燒香行道奉爲某乙修建太上靈寳解考妙齋懴悔三十六代以來億曽萬祖下及亡靈若存若亡無邊之罪或上犯諸天大聖大道衆尊三光五行虚空聖衆風雲雷雨一切神明或下犯五嶽諸山三十六地丘陵水府地下職司或干冒聖賢違悖仁義犯古今靈跡乖四大五常動結罪因率成殃對十惡備造五逆徧爲生無善功死有惡對沉淪五苦流曵三塗謫役窮魂未蒙原赦以今修齋行道懴拔罪根伏冀太上三尊開大慈之澤降九龍符命告下諸方世界考官地獄之中出長夜之魂沐浴朱陵之庭冠帶洞陽之府生神福岸流貺子孫吉祐來臻存亡安泰蒙如所啓仰荷玄恩得道之後昇入无爲和與道合眞各思九色圓象咽液命魔宻呪歩虚旋遶太極分髙厚輕清上屬天人能修至道身乃作眞仙行溢三十數時丁四萬年丹臺開寳笈金口爲流傳大梵三天主虚皇五老尊尚難窺徼妙豈復入名言寳座臨金殿霞冠照玉軒萬眞朝帝所飛舄躡雲根華夏吟哦逺人聲自抑揚冲虚歸道德曲折合宫商殿閣沉檀散樓臺月露凉王六十二至誠何以祝多稼求豊穰三禮臣等至心稽首禮太上无極大道臣等至心稽首禮三十六部尊經臣等至心稽首禮玄中大法師重稱法位具位臣某謹重誠上啓太上无極大道元始天尊太上道君太上老君臣等獲以凡微承奉科戒遵行聖旨職在救人濟拔存亡普令安泰凡有陳告敢不上聞今有某官齋信奉詞披誠露懇請修齋直謝罪乞恩臣依典按儀考尋玄式竊聞先人爲善則福及子孫爲惡則殃流後世罪福報對如影隨形非備懺祈無由洗滌某家九玄七祖後逝先亡無數劫來恐犯諸罪目或犯三元所禁百八十條或犯玉匱罪源一十四品六情所搆三業所爲十惡衆非積在隂府或目耽五色不識正眞耳滯五聲不聞至理口貪五味食噉傷生身處五纏染欲傷性或上違天道犯日月星辰下犯地㝠及山川丘廟中悖人事虧仁義之和爲子爲臣不忠不孝爲君爲父不道不慈口是心非妬賢嫉善侵害人物凌侮孤貧離親合踈崇邪背正剥刻財利侵奪功名竭澤焚林釣潜弋宿飛鷹走狗烹殺無邊或九族相殘六親相暴言無義讓行必侵欺或爲職爲官食財爲志誷上虐下以取威名楚撻無辜誅殺非罪或誓盟况詛牽引神祇或土木興功毁傷墳廟任心肆意罪結禍深魂繫三塗幽閉長夜千痛萬考億劫難原杳杳天堂法橋路斷冥冥地獄出離無由遂使釁注生人災纏後嗣所爲躓滯動過凶衰因今瀝懇披心歸依懴謝冥祈三寳稽首諸天伏冀大聖垂慈普賜哀宥勑四司五帝三界威神告下地府九幽考官僚屬原赦億曽萬祖一切魂靈釋罪除愆和𡨚解咎開重牢幽獄放赦苦魂劒樹摧鋒刀山偃刃寒鄉㝠夜盡覩光明瑩質南丹昇神碧落逍遥八景叅乗十天擣官等遷秩太眞飛行金闕某家災殃殄息善貺來臻登壽福之階享安貞之報洎乎四生六趣有識有情同賴勲修並昇道岸三光玄曜六氣均和帝祚遐長天下咸泰上明天尊大慈之澤下副臣等懴謝之誠謹啓以聞發願一願乾坤明素二願氣象清玄三願聖人萬壽四願化洽八埏五願天垂甘露六願地發祥煙七願四時應節八願萬物生全九願家多孝悌十願國富才賢十一願醮官獲福十二願學道成仙復爐香官使者左右龍虎君侍香諸靈官當令臣行香之所自然生金液丹碧芝英百靈衆眞交㑹在此香火爐前令臣學道得道求仙得仙齋主受福存殁沾恩令臣所啓之言速達徑御太上无極大道虚无自然金闕玉陛下言功口章具位臣某等稽首上啓太上无極大道元始天尊太上大道君太上老君三十六部尊經玄中大法師靈寳官屬一切眞靈臣等獲奉正眞叅修祕妙思弘齋福以濟生靈臣以某月某日爲某官以某事奉修靈寳解考大齋懴謝存亡解銷𡨚考燒香然燈照耀諸天誦誺靈音行道禮懴解億曽萬祖囚謫罪魂乞免離十苦八難轉入信根若干日若干夜行道轉經今功圓事竟謹遷立齋所請兵馬騎乗及靈寳官屬監齋衛眞諸吏監臨衛護有功勤者謁言眞宫進品上仙加爵帝秩令臣等功圓行滿騰景九天日月同暉三寳齊耀惟蒙上聖鑒映丹心臣等或進止犯科不合儀式未悟之罪一乞原除五體眞官隨功遷賞受秩事訖與臣等同昇謹啓以聞伏須告報臣等誠惶誠恐稽首再禮以聞臣姓某屬某郡縣某觀太清玄元无上三天无極大道太上老君太上丈人天帝君九老仙都君九炁丈人百千萬重道炁千二百官君太清玉陛下某年太歳某月某朔某日某於某處拜上法事畢散送三師等如靈寳儀若一中行道不須宿啓如一日兩夜或日數稍多即依靈寳科文啓齋署職宣禁說戒言功後還戒復職事事如法不得率爾而行
