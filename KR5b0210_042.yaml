front:
  text: 太上黄籙齋儀卷之四十二王八
  hash: sha256:178914727aebc07d587486e3b63439dbe66421de422928e837047af95d541aca
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0210_HFL_042-001a, image: hfl/0275/0275-004.png}
body:
  text: 唐廣成先生杜光庭集士庶消災二十方懴悔先禮方次懴悔東方臣等伏聞玄化區分超於震域冠五行之首爲四序之先興帝道而庶物發生播仁德而群方咸遂今謹有黄籙大齋主某恩酬造化願謝過愆率勵精誠按依科式謹齎青紋之繒一㱼金龍一枚皈命東方无極太上靈寳天尊九炁天君東鄉神仙諸靈官竊以恍惚之敎妙用難量寂寥之方變通叵測朗初陽而臨八極流灝氣而被九垓下察精虔之心上沾亭毒之惠伏願齋主某家九玄七世名上紫文見在宗親功題青籙長逢聖運永樂堯天有識含生俱蒙玄祐得道之後昇入无形和與道合眞南方臣等伏聞離德重明眞精煥耀佐二儀以運化騰三炁而生成闢氛翳於髙空蕩昏冥於遐域齋主某思酬玄造虔罄丹誠敷列壇場按依科式謹齎絳紋之繒一段金龍一枚皈命南方无極太上靈寳天尊三炁天君南鄉神仙諸靈官竊以大化無私玄恩普洽凝至眞於象外流要妙於寰中俯鑒禱祈曲流慈恕伏願齋主某家九玄滯識列字丹文見在親姻題名紫籙得道之後昇入无形和與道合眞西方臣等伏聞兊澤潜流金天乗運恱兹萬物叶覆載之心應彼四時導生成之化群材受職於剛斷庶𩔖取則於義方齋主某荷天地之恩願申崇報思過愆之積志切懴除敷列壇場按依科式謹齎素紋之繒一段金龍一枚皈命西方无極太上靈寳天尊七炁天君西鄉神仙諸靈官竊以玄化多方有求必應至公惟一無感不通凡所䖍祈實希昭祐伏願齋主某家九玄神識遷上朱陵見在宗親記名玄圃得道之後昇入无形和與道合眞北方臣等伏聞啓至隂而兆運習盛德於坎宫萬物得以歸林群方資而靜息齋主某思酬玄化載竭丹誠敷列壇場按依科式謹齎玄紋之繒一段金龍一枚皈命北方无極太上靈寳天尊五炁天君北鄉神仙諸靈官恩沾品物緫御神明德被萬生普加幽顯凡所祈向克獲感通伏願赦齋主某家往世靈儀逍遥道境見在眷屬福禄攸宜一切有情普沾眞祐得道之後昇入无形和與道合眞東北方臣等㐲聞造化循環始終艮域生成品類混合神明動靜隨時變通應感齋主某思酬照育願謝愆尤敷列壇場仰遵科式謹齎黄紋之繒一段金龍一枚皈命東北方无極太上靈寳天尊梵炁天君東北鄉神仙諸靈官竊以至精獨立爲化物之祖宗眞一周行演度人之法則凡所皈向必獲照臨伏願齋主某家先逺魂神上登清境見存姻屬長處福庭蠢動含生克蒙安泰得道之後昇入无形和與道合眞東南方臣等伏聞大化無私周流八域布巽齊之令對乾健之方制度所以及人風敎因而被物齋主某思酬玄化載竭丹誠敷列壇場按依科式謹齎黄紋之繒一段金龍一枚皈命東南方无極太上靈寳天尊梵炁天君東南鄉神仙諸靈官竊以谷神之體赴響應而不窮籥之心隨運動而無竭伏願齋主某家七玄滯爽昇入朱宫九族宗禋永沾鴻福得道之後昇入无形和與道合眞西南方臣等伏聞黄中啓運博厚分形動植所以資生品𩔖因而區别長川浩邈難窺四極之涯大野蒼茫莫盡八荒之際今謹有黄籙大齋主某思酬覆育願謝愆尤爰備熏修按依科式謹齎黄絞之繒一段金龍一枚皈命西南方无極太上靈寳天尊梵炁天君西南鄉神仙諸靈官竊以髙眞上聖妙用無方羽駕雲軿出無入有惠加動息恩溥沉潜伏願齋主先世神儀超昇淨域見存姻眷福祐暗滋几百生靈克蒙玄祐得道之後昇入无形和與道合眞西北方臣等伏聞乾象尊崇始生群化保剛健之體合太和之方四德周流人神正其性命六龍飛伏隂陽得以變通今謹有黄籙大齋主某荷覆載之恩感陶甄之賜伏慮前生今丗旋積過愆勵志焚修冀蒙洗滌謹齎黄紋之繒一段金龍一枚皈命西北方无極太上靈寳天尊梵炁天君西北鄉神仙諸靈官竊以至眞寂寞靡不照臨玄道杳㝠皆垂鑒祐伏願齋主某家宗㮒滯爽鍊質上宫眷屬親縁咸蒙貞吉得道之後昇入无形和與道合眞上方臣等伏聞太虚寥邈玄象穹崇下列二十八天上包三十五分星辰得以環照日月麗而流暉旣鼓之以雷霆又灑之以雲雨冠大羅而廣覆極空洞以髙臨今謹有黄籙大齋主某荷含育之恩思崇報之禮謹齎碧紋之繒一段金龍一枚皈命上方无極太上靈寳天尊三十六天帝君玄都玉京紫微金闕三清三界梵炁天君上鄉神仙諸靈官竊以琳宫瓊闕祕妙難窮上聖髙眞變通無迹精誠一啓渥澤遐敷伏願齋主某家九世魂儀昇離幽府六親族屬安處福鄉庶𩔖有生普垂隂祐得道之後昇入无形和與道合眞下方臣等伏聞沉凝搆象下極重隂四溟何足擬其深九澤焉能並其奥今謹有黄籙大齋主某思酬覆載爰備熏修敷列黄壇按依玄式謹齎黄纹之繒一段金龍一枚皈命下方无極太上靈寳天尊九壘土皇四司五帝下鄉神仙諸靈官竊以一炁昇淪髙卑定位二儀剖判神化施行陶冶之用有方感應之私無迹伏願齋主某家九玄神識位上朱宫居世姻親名題丹籙得道之後昇入无形和與道合眞日宫臣等伏聞太陽韞德照燭無私入虞谷以潜暉出咸池而吐曜飛騰八虚之外煥爛六合之中或蒼蒼於秋容乍遲遲於春色齋主某荷無私之照思崇報之誠至心皈命日宫皇君明皇眞人丹霞玉女日宫神仙諸靈官伏以眞靈髙潔人道卑微仰蒙鑒燭之恩豈無塵瀆之過乞垂赦免從此自新身得光明與太陽同景得道之後昇入无形和與道合眞月宫臣等伏聞太隂垂象盈缺有常旋迴太虚照臨宇宙環暉乍分於二八之夜璧彩將滿於三五之時慿此晦明定其律度今謹有黄籙大齋主某荷無私之鑒思崇報之誠至心皈命月宫皇君素皇眞人散暉玉女月宫神仙諸靈官伏以眞靈髙潔人道卑微仰蒙照燭之恩豈無塵瀆之過乞垂赦免許以自新身得光明與太隂同景得道之後昇入无形和與道合眞星宫臣等伏聞隂陽分照爰次星躔一十二宫仰制度於中斗二十八宿定樞機於北辰至乃玉兎騰暉金烏戢曜共熒煌於穹蓋各燦爛於圓羅動植因以區分生靈得而禀受今謹有黄籙大齋主某荷照臨之賜申崇報之誠凡所興居寜無塵犯至心皈命諸天星宿璇璣北辰周天三百六十五度星君星中眞人神仙諸靈官乞蒙赦免從此自新身得光明與星宫同景得道之後昇入无形和與道合眞東嶽臣等伏聞青春爲四時之首木德表五行之先嵯峨對角亢之方穹崇等齊魯之分今謹有黄籙大齋主某至心皈命東嶽泰山青帝眞君神仙諸靈官切慮塵穢上犯眞靈乞從首謝賜蒙福祐得道之後昇入无形和與道合眞南嶽臣等伏聞火德盛於南方衡嶽標其雄鎭上當井鬼旁注湘沅絶壑積嵐靄萬重連峯横瑞雲千里今謹有黄籙大齋主某至心皈命南嶽衡山赤帝眞君神仙諸靈官切慮塵穢上犯眞靈乞從首謝賜蒙福祐得道之後昇入无形和與道合眞西嶽臣等伏聞西方秋景盛德惟金太華穹崇削成萬仭叢蓮倚空在翠嵐之頂仙掌捧日於白雲之中今謹有黄籙大齋主某至心皈命西嶽華山白帝眞君神仙諸靈官切慮塵穢上犯眞靈乞從首謝賜蒙福祐得道之後昇入無形和與道合眞北嶽臣等伏聞位膺水德乃鎭北方臨虚危之邦橫幽薊之野千崖競聳吐雲雨於空濛萬壑爭馳藏煙景而葱蒨今謹有黄籙大齋主某至心皈命北嶽恒山黒帝眞君神仙諸靈官切慮塵穢上犯眞靈許從首謝賜蒙福祐得道之後昇入无形和與道合眞中嶽臣等伏聞五行之尊寔惟土德上當辰極下鎭雄都向背而雲壑千層峭拔而煙岑萬丈今謹有黄籙大齋主某至心皈命中嶽嵩山黄帝眞君神仙諸靈官切慮所犯上觸眞靈乞從首謝賜蒙福祐得道之後昇入无形和與道合眞水府臣等伏聞大川騰注天漢飛流馳不測之波瀾益無涯之浩漫鯤鯨得以游泳龜龍因以伏藏鼓潮濤而順隂陽起煙雲而佐天地下潤之功逾廣上善之德攸歸今謹有黄籙大齋主某至心皈命水府扶桑大帝暘谷神王三河四海九江水帝十二河源水府神仙諸靈官切慮塵穢上祀眞靈乞從赦免賜垂福祐得道之後昇入无形和與道合眞經寳臣等伏聞道運宣行大聖垂迹金書玉字鳳篆龍章寳籙靈圖神方祕訣修之則易凡心而登聖道行之則棄塵穢而躡雲衢科法嚴明非賢不授今謹有黄籙齋主某至心皈命无上至尊三十六部尊經眞文寳符諸天祕藏十方正法侍衛經典一切靈司恐前代今生犯違正道無邊之罪咸乞蕩除萬聖垂祥千眞介福存亡俱泰禄壽増延九夜三塗同沾玄貺得道之後昇入无形和與道合眞太上黄籙齋儀卷之四十二
