front:
  text: 太上黃籙齊儀卷之五賔五
  hash: sha256:4cbee25af8078e5fbf5ae1532b53c977cb28deff11c2bf809bef3cf8fead65f9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0210_HFL_005-001a, image: hfl/0270/0270-078.png}
body:
  text: 唐廣成先生杜光庭集第二日中分行道入戶各禮師存念如法衛靈黃中䇿氣斬馘妖宗遏絶邪源制斷魔蹤太上符命召制神功萬靈斯格却禍除凶王氣三輪洞運真風紫戶舍瓊大度無終左命青腰右攝芝童逍遙飈景總御九空玄壇應機乘氣虛冲萬真普降濟度無窮鳴法鼓二十四通無上三夭玄元始三氣太上老君召出臣等身中三五功曹左右官使者左右捧香驛龍騎吏侍香金童傳言玉女五帝直符直日香官各三十六人出當召此間土地里域真官正神速出嚴裝關啓臣今正爾燒香奉為某官某乙為國為家奉修無上黃籙大齊若干日夜以今第二日中分登壇朝真行道願得太上十方正真生氣降流臣等身中所啓速達上御至真無極大道玉皇上帝御前各稱法位上清玄都弟子臣某等謹同誠上啓虛無自然元始天尊無極大道太上大道君太上老君髙上玉皇十方巳得道大聖衆至真諸君丈人三十六天帝君玉虛上帝玉帝大帝東華南極西靈北真玄都玉京金闕七寶玄臺紫微上宫靈寶至真明皇道君三十六部尊經玄中大法師西極總真王君東卿司命太元真人太平下教二十四真人五嶽靈宫名山洞府得道神仙三界應感一切真靈臣等運偶福期善資昔㑹三尊布無為之化四明開廣濟之門得以凡姿依宗妙法披九光之寶牒盻三洞之瓊篇內度庸虛諒非所任唯憑齊戒冀立微功佐國度人庸副玄旨凡有所向敢不上聞讀詞按如詞言歸誠玄極為國為家請福祈恩弟子某自惟禀質三靈陶神四大愛河溺性欲海馳誠幻境易迷福山難搆積尤纍過歲月茲深伏聞黃籙妙齊玄都祕格上拔億曽萬祖惡對罪根下拯九夜三塗窮魂幽爽解消殃結開度天人福惠所覃永安家國是敢肅䖍誠懇齎備香花鎮信紋繒金龍燈燭建齊行道祈降上真普為存亡歸心請命以今中分行道請法衆等運茲初捻上香願此香煙騰空徑上供養無上至真道寶臣等歸身歸命首體投地仰依太上三尊願以是功德上資社稷尊靈宗桃先聖融神三境髙步九天幽贊洪基保安大業皇帝壽齊兩曜化洽三元車八紘提封萬國儲宫藩邸匡佐帝圖良輔元勳保乂王室瑞雲昭布法雨舍滋四友三師山棲同志並登真果咸契仙階今故燒香歸依師尊大聖衆至真之德得道之後升入無形與道合真以今中分行道運兹二捻上香歸身歸神歸命大道臣等首體投地歸命太上尊經願以是功德奉福某家九祖幽儀七玄神識洪暉下照出昏暗之泉扄玄澤旁霑釋焦勞之罪綱三官削録五道生神聞正法於紫微朝至真於碧落佩靈書祕籙超夜府寒庭六趣三塗同臻福界本故燒香歸依師尊大聖衆至真之德得道之後升入無形與道合真以今中分行道運兹王捻上香歸身歸神歸命大道臣等首體投地歸命太上三尊願以是功德歸流某家九姻六族內外親緣體洽元和神融妙道金貞玉瑩增福祉而益光鏡朗塵清延壽涯而彌逺災隨霧廓善與雲臻動植飛沉寰中象外俱霑巨福咸沐玄功今故燒香歸依師尊大聖衆至真之德得道之後升入無形與道合真禮方懴悔步虛控轡適十方旋憩玄景阿仰觀劫仞臺俯盻紫雲羅逍遙太上京相與坐蓮華積學為真人恬然榮衛和永享無期壽萬椿奚足多三啓三禮臣等至心稽首禮太上無極大道臣等至心稽首禮三十六部尊經臣等至心稽首禮玄中大法師重稱法位上清玄都弟子臣等謹同誠上啓太上無極大道元始天尊太上大道君太上老君十方無極大道道德衆聖天尊至真大帝天帝三十六部尊經玄中大法師上相上宰四司五帝太平下教二十四真人西極總真五君五嶽靈宮名山洞府三界應感一切真靈臣等伏聞元皇立教至道垂文碧字遐宣拯四迷於六趣丹書弘闡錫繁祉於九幽生死蒙恩昏明咸泰某上惟九玄十世纍劫親緣爰洎君親至于家國思崇景貺大啓洪禋歸命玄壇投誠紫府請修齊直以達誠祈臣等依按品文遵行戒式纂列星辰之位上法圓穹壇開日月之門旁依真格香花燈燭證信達誠龍璧紋繒表心展禮冥思注想冀獲感通所祈無上法王放慈光而下照玄都大聖垂惠澤以遐臨勑飛天神王告盟三界開寒庭之府解釋幽魂纍世神儀並蒙薦拔沐浴神液超度南宫觀聽法音化生仙境上冀聖君萬壽帝業無疆廓八海之波濤皆為帝澤亘九圍之川嶽盡作王畿車軌畢同星躔咸順八風和暢五榖豐登兵革不興烽煙永戢人無疵疫俗有禎祥某家眷屬宗親並霑洪福三塗九夜動植沉潜咸資妙道之慈齊契自然之果上明天尊大慈之施下副臣等丹禱之誠謹啓以聞發願一願大道淡泊虛無安間空寂澄清自居廣開法門教導頑夫皆蒙惠澤精苦是修預以同學普得升虛與天相保長存無憂二願諸天結氣澄清髙虛廣覆保真固靈氣候調節四運和平國安民豐普天間寧廣濟一切惠達有生保天長存億劫不傾三願土地覆載無窮安平不陷海淪不崩保鎮家國兆民興從養生安死惠周十方禾稼滋植營運日豐咸得厚載萬類皆從四願日月二景髙明無有薄蝕虧盈安清光照諸天洞消暗冥保固劫運世祚和平普加潤澤惠灑衆生五願星辰與日齊光轉燭照耀朗映十方各安其位經緯直行保鎮家國無有災傷四海寧一普天興昌六願四時隨節推遷景氣和調無有災患疫毒消滅普天安平五榖豐熟國富民歡七願浮雲結氣衆煙飛空髙澄䕃覆玄玄隱則無為散則彌天神仙同居結友衆真惠流一切興國愛民普濟羣生人同劫年八願風雨流灑無窮普加施泄受其發揚萬物滋生國儲民豐九願五嶽各安其方巍巍包藏長為仙宫安鎮國祚保天無終護度一切莫不仰宗十願江海蕩蕩無極舍容恢廓無細不植淵奧柔惠潤加蠕息天人獲慶年同劫石十一願帝王國土日昌四鎮安睦兵革不揚天人歌唱吉應來翔敷教濟濟威化洋洋兆庶稱慶長樂未央十二願蝖飛蠢動巳生未生咸蒙安全普得生成皆見元氣受陽之形草木果林經冬不零一切濟度靡不鮮榮和與道合真復爐香官使者左右龍虎君侍香諸靈官當令臣行道升壇之所自然生金液丹碧芝英百靈衆真交會在此香火洞案爐前願修齊弟子某存亡受福幽顯霑恩十方仙童玉女侍衛香煙傳臣向來所啓徑達至真無極大道玉皇上帝御前出戶太上黃籙齊儀卷之五
