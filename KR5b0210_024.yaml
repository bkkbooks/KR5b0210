front:
  text: 太上黄籙齋儀卷之二十四
  hash: sha256:dcaaa75b61f0ae89a4764655f84d680fee78d745d9e45764e1e728609b00579f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0210_HFL_024-001a, image: hfl/0272/0272-088.png}
body:
  text: 唐廣成先生杜光庭刪安宅落景行道入戸各禮師存念如法衞靈五星髙耀瑞氣飛浮元始集神天地交周玉符寳節嘯命微幽擲火揚威奸凶無留萬魔振伏紛葩却消摧怪伐惡道炁同流神光照夜隂翳俱収萬仙降格扇景乗飈群生咸遂惠遍神州鳴法鼓二十四通無上三天玄元始三炁太上道君召出臣身中三五功曹左右官使者侍香金童傳言玉女五帝直符直日香官各三十二人出出者嚴裝關啓玄壇天帝神君當召此間土地里域眞官正神急上關啓臣今奉爲入意願得玉清道炁靈寳妙光下降流入臣等身中即使玄壇清靜内外成眞天無氛穢地絶妖塵琳琅振響十方肅清萬魔不干眞誠上徹令臣所啓速達徑御太上無極大道金闕玉陛下各稱法位具位臣某等謹同誠上啓虚無自然元始天尊無極大道太上大道君大聖祖髙上大道金闕玄元天皇大帝大上老君髙上玉皇十方巳得道大聖衆至眞諸君丈人三十六天帝君玉虚上帝玉帝大帝東華南極西靈北眞玄都玉京金闕七寳玄臺紫微上宫靈寳至眞明皇道君三十六部尊經玄中大法師土府太皇九地五帝中黃戊巳應感眞靈臣等伏聞太上垂文元皇設敎陶融萬有亭毒群方三洞玉書降九清而演妙諸天大聖弘至道以度人以佐國爲先慈救爲本凡有詞欵敢不上聞讀詞臣等依按詞誠理冝開奏齋主某以居宅之所併有繕修慮違忤神明犯干禁忌䖍申懴滌以贖愆瑕是敢遵按典儀精崇壇墠開玄都玉笈依黃籙簡文法地象天修齋行道以今晚朝行道請法衆等運兹初捻上香願此香煙騰空徑上供餋無上至眞道寳臣等歸身歸命首體投地仰依太上三尊願以是功德歸流宗廟先靈列聖昭穆皇帝昇聞上境安鎭鴻圖均兩矅而燭萬方齊三光而育群品儲官妃后光賛休明文武職寮輔成睿化今故燒香歸依師尊大聖衆至眞之德得道之後升入無形和與道合眞以今晚朝行道請法衆等運兹二捻上香願此香煙騰空徑上供養無上至眞經寳臣等歸身歸命首體投地仰依太上三尊願以是功德歸流齋主某家九世幽靈遊神碧落六親眷屬列品仙都洎乎宅宇之中龍神將吏鎭安其位清蕩妖凶克叶乂寧永符貞吉今故燒香自歸依師尊大聖衆至眞之德得道之後升入無形和與道合眞以今晚朝行道請法衆等運兹三捻上香願此香煙騰空徑上供餋無上至眞師寳臣等歸身歸命首體投地仰依太上三尊願以是功德歸流普天率土合識有生普及幽明均沾福祐齋主某家凶災殄息禄筭延長允承道德之風俱契眞仙之果今故燒香自歸依師尊大聖衆至眞之德得道之後升入無形和與道合眞禮方懴悔歩虚旋遶頭䐉禮金闕擕首遨玉京騫樹圓景園煥爛七寳林天獸三百名師子巨萬㝷飛龍躑躅吟神鳳應節鳴靈風扇竒華清香散人襟自無髙仙才焉能耽此心嚴我九龍駕乘虚以逍遥八天如指掌六合何足遼衆眞誦洞玄太上唱清謡香花隨風散玉音成紫霄五苦一時迸八難順經寥妙哉靈寳囿興此大法橋天眞帝一宫藹藹冠耀靈流煥法輪綱旋空入無形虚皇撫雲璈衆眞誦洞經髙仙凛手讃彌劫保利貞三禮臣等至心稽首禮太上無極大道臣等至心稽首禮三十六部尊經臣等至心稽首禮玄中大法師重稱法位具位臣某等謹重伸上啓太上無極大道元始天尊太上大道君太上老君十方無極大道道德衆聖天尊至眞大帝天帝三十六部尊經玄中大法師九土玉皇太始五帝中黄戊巳十二眞君三界應感一切眞靈臣等獲奉至眞叅修祕妙功莫加於動植化未洽於生靈毎思佐國化人弘道賛法奉揚玄奥廣濟人天齋主某以營葺所居興工動役或摙林運石驚觸龍神或增下損髙犯違禁忌或所居之地有古跡靈墟或穿鑿之方有荒祠敗壘或汙瀆仙境或侵逼名蹤或失五姓之冝或乖二宅之利因其繕飾遂構災凶䖍設壇場遍申祈懴臣等按天師格品依正一法文上請救敗君等一十二部天官將吏兵士驅除故氣清蕩氛邪却地中土木之精及遊尸厲鬼解土公侵食之害銷五方禁忌之災一切凶妖悉今除蕩使禎祥霧集禍害氷銷伏願太上衆尊垂慈鑒映降流眞氣覆祐其方勑勒正神鎭安其位常扶貞吉永保康冝上願帝道隆昌皇風逺扇三邊有泰八海無波疫毒不侵星辰合度洎乎泉扄夜府長覩光明蠢𩔖有生無失其所齋主其家七玄幽爽證品生天子孫傳忠孝之規逺近享又安之福龍神宻衞動靜如寧普沐玄功並昇眞界上明天尊慈宥之澤下副臣等懴謝之誠謹啓以聞發願一願乾坤明素二願氣象清玄三願聖人萬壽四願化洽八埏五願天垂甘露六願地發祥煙七願四時應候八願萬物生全九願家多孝悌十願國富才賢十一願齋功廣被十二願善瑞日臻和與道合眞復爐香官使者左右龍虎君侍香諸靈官當令臣行香之所自然生金液丹碧芝英百靈衆眞交㑹在此香火爐前令臣學道得道求仙得仙齋主受福幽顯沾恩十方仙童玉女接侍蘭煙令臣所啓之言速達徑御太上無極大道金闕玉陛下岀戸太上黃籙齋儀卷之二十四
