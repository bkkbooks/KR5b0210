front:
  text: 太上黃籙齊儀卷之二十二二十三二十四同卷歸二
  hash: sha256:a28f5b323825c00ea7928490cea8fd0ff756e63e3277cb26a870e1a3069eb43f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0210_HFL_022-001a, image: hfl/0272/0272-054.png}
body:
  text: 唐廣成先生杜光庭刪安宅清旦行道入戶各禮師存念如法衛靈青陽虛映耀日回靈神虎辟邪飛天流鈴摧姦滅試萬魔束形九微回道八威攝精千真校録三元蕩清左嘯中黃右䇿六丁七轉八合周旋天經聖化巍巍三道順行慶雲流布合景黃庭鳴法鼓二十四通無上三天玄元始三氣太上老君召出臣身中三五功曹左右官使者侍香金童傳言玉女五帝直符直日香官各三十二人出出者嚴裝關啓玄壇天帝神君當召此間土地里域真官正神急上關啓臣今奉為入意願得玉清道氣靈寶妙光下降流入臣等身中即使玄壇清淨內外成真天無氛穢地絶妖塵琳琅振響十方肅清萬魔不干真誠上徹令臣所啓速達徑御太上無極大道虛無自然金闕玉陛下各稱法位具位臣某等謹同誠上啓虛無自然元始天尊無極大道太上大道君太上老君昊天玉皇上帝十方已得道大聖衆至真諸君丈人三十六天帝君玉虛上帝玉帝大帝東華南極西靈北真玄都玉京金闕七寶玄臺紫微上宫靈寶至真明皇道君三十六部尊經玄中大法師太始五帝九土玉皇隂陽應感一切真靈臣等伏聞天尊孕化大道垂功二氣裁形萬靈資始圓清上結懸日月以列星辰方濁下凝布山川而融海瀆由是百神受職以定方隅五帝司分各安其位至乃清都紫闕百雉九重郡邑城池人倫宅宇皆有法象以配乾坤爰資安鎮之功用叶乂寧之福臣等職當行教位國立功凡有所祈理冝關奏況奉詞旨敢不上聞讀詞按如詞言情誠丹切冀因精感上達真靈臣等率勵法流按依科式敷壇列纂法地象天鎮龍綵於十方貢詞誠於三境以今早朝行道請法衆等運兹初捻上香願此香煙騰空徑上供養無上至真道寶臣等歸身歸命首體投地仰依太上三尊願以是功德歸流皇帝伏冀五山鎮地永比鴻圖八海浮天長齊鳳曆祚超周漢聖越羲農妃后皇儲克光睿德諸王公主允契休符混車軌於九圍集梯航於萬㝢今故燒香自歸依師尊大聖衆至真之德得道之後升入無形和與道合真以今早朝行道請法衆等運兹二捻上香願此香煙騰空徑上供飬無上至真經寶臣等歸身歸命首體投地仰依太上三尊願以是功德歸流齊主家九世七玄俱超夜府六親五族並證仙階宅宇安寧龍神鎮守凶災殄息妖惡不興今故燒香自歸依師尊大聖衆至真之德得道之後升入無形和與道合真以今早朝行道請法衆等運兹三捻上香願此香煙騰空徑上供養無上至真師寶臣等歸身歸命首體投地仰依太上三尊願以是功德歸流天地之內有識含生咸沐道風盡登真果齊主某災祛未兆福降無涯俱承妙道之功永證長生之品今故燒香自歸依師尊大聖衆至真之德得道之後升入無形和與道合真禮方懴悔各思九色圓象咽液命魔密呪步虛旋繞稽首禮太上燒香歸虛無流明隨我回法輪亦三周玄願四大興靈慶及王侯七祖生天堂煌煌耀景敷嘯歌冠太漠天樂適我娛齊馨無上德下仙不與儔妙想明玄覺詵詵乘虛遊旋行躡雲綱乘虛步玄紀吟詠帝一尊百關自調理俯命八海童仰擕髙仙子諸天散香華蕭然靈風起宿願定命根故致標髙擬歡樂太上前萬劫猶未始嵯峨玄都山十方宗皇一岧岧天寶臺光明熖流日煒燁玉林華蒨璨耀朱實常念餐元精錬液固形質金光散紫微窈窕大乘逸三禮臣等至心稽首禮太上無極大道臣等至心稽首禮三十六部尊經臣等至心稽首禮玄中大法師重稱法位具位臣某等謹重伸上啓太上無極大道元始天尊太上大道君十方無極大道天尊至真大帝天帝三十六部尊經玄中大法師天師君上相上宰四司五帝天地應感一切真靈臣等竊聞道化未分乃混元之首體玄仰不宰任真一以無為洎乎二象分靈三才設位清濁配乾坤之質晦明彰晝夜之殊隂陽衆神各司其職於是構兹棟宇代彼層巢既取法於天關遂主張於隂𨽥所以乾天兊澤各有統臨離火巽風互明衰盛順之則必符貞吉違之則自取悔尤推古及今率由斯道齊主某爰因卜築恐有犯違神道難明常情靡測既畢工於土木將展禮於香燈懴罪希恩祛災謝過大弘齊薦上達至真是用敷列法壇按遵科典蘭燈散彩下照九幽香穗凝煙上通三境轉經行道普為懴祈或犯忤靈祇侵傷地府或殘害物命汚瀆靈蹤或觸動龍神違諸禁忌或因力役致有怨咨或以遷移不選方所積成釁咎因結災纒或在九宫八卦之中或在十干十二支之內或犯隂陽刑殺七十二神下繫地司上言天府憑今懴謝並乞蕩除使齊福普覃善功遐被降九龍符命宣告諸天運三寶滅神勑勒三界拯兹夜府開諸光明安帝業於九重播玄休於萬國五兵偃戢百穀豐登齊主某家存殁乂康族屬昭泰子孫忠孝祚胤繁昌落罪簡於隂曹列仙名於真境隂陽職秩內外神靈護法安人濟人利物共揚道化助正却邪遐及幽明同臻妙道上明天尊廣濟之澤下副臣等歸命之誠謹啓以聞發念一念為道四大合德齊主七世父母免墮憂苦上升天堂衣食自然二念帝王國主道化興隆庠序濟濟皇教恢弘威儀翼翼普天所瞻民稱太平六夷賔伏妖惡自滅賢聖日生三念法師功德大建教化明達俱獲飛仙四念同志學人早得仙道更相開度五念九親和睦好尚仁義貴道賤財行為物範六念損巳布施道士及饑寒者天下人民各得其所七念蠕動跂行一切衆生咸蒙成就八念赦貸前生今世罪對立功補過九念家國隆盛宗廟有人世生賢才十念尊受師經不敢中怠平等一心廣度一切剋獲上仙曰日登天拜見太上永成真人雲車羽駕和與道合真復爐香官使者左右龍虎君侍香諸靈官當令臣行香之所自然生金液丹碧芝英百靈衆真交㑹在此香火爐前令臣學道得道求仙得仙齊主受福幽顯沾恩十方仙童玉女侍衛蘭煙傳臣所啓之言速違徑御太上無極大道無形無名虛無自然金闕玉陛下出戶太上黃籙齊儀卷之二十二
