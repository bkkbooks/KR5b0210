front:
  text: 太上黃籙齊儀卷之三十九王五
  hash: sha256:6e724a6418c1525f739e47f4ebfdff281b11d7e18ab94b8ebf454bcbd33d2928
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0210_HFL_039-001a, image: hfl/0274/0274-072.png}
body:
  text: 唐廣成先生杜光庭集遷拔落景行道入戶各禮師存念如法衛靈五星髙曜瑞氣飛浮元始集神天地交周玉符寶節嘯命微幽擲火揚威姦凶無留萬魔振伏紛葩却消摧怪伐惡道氣周流神光照夜隂翳俱收萬神降格扇景乘飈群生咸遂惠遍神州鳴法鼓二十四通無上三天玄元始三氣太上道君召出臣身中三五功曹左右官使者侍香金童傳言散花玉女五帝直符直日香官各三十二人出出者嚴裝關啓玄壇天帝神君當召此間土地里域真官正神以今落景燒香行道入意願得玉清道氣靈寶妙光下降流入臣等身中令臣所啓速達徑御太上無極大道虛無自然金闕玉陛下各稱法位具位臣某謹同誠上啓虛無自然元始天尊無極大道太上大道君太上老君無上玄老十方巳得道大聖衆至真諸君丈人三十六天帝君玉虛上帝玉帝大帝東華南極西靈北真玄都玉京金闕七寶玄臺紫微上宫靈寶至真明皇道君三十六部尊經玄中大法師三界官屬一切真靈臣等獲以福階遭逢道運金書演教玉簡開圖佩服靈文遵承妙訓竊惟虛皇立極太上懸科惠及幽明恩沾生死北酆夜府神光垂照燭之慈南霍仙庭真格示超升之品粵自億劫以及茲辰靈澤灑其塵勞法舟濟其淪溺拯生度死佐國利人妙楗玄樞人天蒙祐臣等思弘祕賾遷護存亡凡有所祈理宜關奏況奉詞旨敢不上聞讀詞按如詞言事形廣濟齋主某誠深修奉志切追崇拯幽夜之庭痛窮泉之苦虔誠齋薦冀獲感通臣等按靈寶尊經明真上品啓琅函玉匱拯幽夜沉淪依飛天神人説罪福緑對拔度科典開設壇場繒燭香花質心效信列詞騰欵關告諸天所期福被隂冥惠覃家國以今落景行道請法衆等運茲初捻上香願此香煙騰空徑上供養無上至真道寶臣等歸身歸命首體投地仰依太上三尊願以是功德歸流宗廟先靈超神三境帝王國主比德二儀鳯曆延洪龍圖遐永天元朗晏地紀安寧風雨順時生靈康泰今故燒香歸依師尊大聖衆至真之德得道之後升入無形和與道合真以今落景行道謮法衆等運茲二捻上香願此香煙騰空徑上供養無上至真經寶臣等歸身歸命首體投地仰依太上三尊願以是功德歸流齋主某九世七玄億曽萬祖先亡後逝一切魂靈六趣幽沉三塗苦爽並願釋愆地簡削罪隂曹鍊魄洞陽生神丹霍冰泉夜府永無報對之勞地獄冥關盡化清涼之境𡨚仇和釋債訟消平利祐見存克蒙貞吉今故燒香歸依師尊大聖衆至真之德得道之後升入無形和與道合真以今落景行道請法衆等運茲三捻上香願此香煙騰空徑上供養無上至真師寶臣等歸身歸命首體投地仰依太上三尊願以是功德歸流率土有生普天含識俱承廕祐各遂安寧洎乎六道輪回九隂拘執神輝普照離苦生天聖力遐沾聞經悟道齋主某家六姻五族內外親緣恆福所資災纏弭息齋功所及罪咎蠲消壽祿增延禎祥臻萃含靈蠢動一切衆生共荷鴻休咸登道域今故燒香歸依師尊大聖衆至真之德得道之後升入無形和與道合真禮方懴悔三啓頌樂法以為妻愛經如珠玉持戒制六情念道遣所欲淡泊正氣停蕭然神靜默天魔並敬護世世受大福鬱鬱家國盛濟濟經道興天人同其願縹眇入大乘因心立福田靡靡法輪升七祖生天堂我身白日騰大道洞玄虛有念無不契錬質入仙真遂成金剛體超度三界難地獄五苦解悉歸太上經靜念稽首禮三禮臣等至心稽首禮太上元極大道臣等至心稽首禮三十六部尊經臣等至心稽首禮玄中大法師重稱法位具位臣某等重伸上啓太上無極大道元始王尊太上大道君太上老君十方無極大道道德衆聖天尊至真大帝天帝天師君上相上宰四司五帝三十六部尊經玄中大法師三界應感一切真靈臣等獲以凡微參奉大法三乘演化至道開光龍篆鳯書天章玉訣咸蒙稟受克遂遵行未能匿景幽林棲神世表以希髙舉謝絶塵寰而與俗沉浮混同常品愆非旋積修奉不專徒以弘贊教儀敷揚妙訓度人濟物佐國立功冀罄丹誠仰助玄化普令一切咸入法門開度存亡拯護幽顯今齋主某謄詞列欵齎信效心依按典儀奉修齋直露懇三光之下投誠萬聖之前然九幽神燈照三塗罪苦破彼昏暗開諸光明行道轉經虔誠懴悔仰慮亡靈神識無數劫來捨身受身循環報質或生天上咸誕人間或處中華或居異域或貴或賤或富或貧或不悟善因或不逢正法或執信邪妄輕毀正真咸妬嫉賢明誹謗良善或邪行曲徑冒利貪財絶人種親離人恩愛傷殘物命淫祀殺生危人自安害他利巳十惡三業興造罪根肆意任情繁奢無度或釣川弋宿焚林竭山刑法非宜殺傷乖理或為臣下忠穢慢三光呵忿雷雨不敬天地不畏神明積行所為罪條無量或前𡨚未解宿債未原往報未祛深殃未懴身殁之後流曵三官痛毒備嬰魂神幽閉在窮泉之下地獄之中一沉永夜生道斷絶動經億劫開度無由或受幽囚或充考掠負山運石摙汲溟波走電驅雷辛勤無息冥冥受報望返何期自非大道開恩天尊愍護負斯痛惱懴拔無階以今一念至誠洗心歸向無邊之苦並乞赦除伏冀歷劫種親億曽魂爽垂茲勝福咸得生天墳冡安全注訟寧息九泉罷考幽夜光明六道四生含靈抱識俱登福岸齊契正真上願道化興行二儀貞靜三光朗曜帝業遐昌文軌大同烽煙罷戢干戈疫毒水火旱蝗無撓黎元無侵境域俗臻富壽化洽和平齋主某家眷屬六親常承玄祐千災殄息萬善資熏所啓所祈克蒙御達所首所謝皆獲感通上明天尊慈施之澤下副臣等懴謝之誠謹啓以聞發願一願大道流行普天懷德二願一切有生咸皆悟道三願九夜悲魂一時解説四願孤魂無依咸得受生五願天下太平五榖豐熟六願臣忠子孝君仁父慈十願四海通同𡨚親和釋八願潛胞處卵咸得生成九願積疾新痾旋即痊愈十願孤露衆生豐衣足食復爐香官使者左右龍虎君侍香諸靈官當令臣行道之所自然生金液丹碧芝英百靈衆真交會在此洞案爐前令臣學道得道求仙得仙十方仙童玉女接侍香煙傳臣向來所啓之言速達徑御太上無極大道金闕玉陛下出戶太上黃籙齋儀卷之三十九
