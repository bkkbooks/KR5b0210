front:
  text: 太上黃籙齋儀卷之四十九鳴一
  hash: sha256:2288086649b777743a297b9fe48a07b4272b6c2a09ddb3992b4baf3a9c20185b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0210_HFL_049-001a, image: hfl/0276/0276-004.png}
body:
  text: 唐廣成先生杜光庭剛言功拜表修齋日數既畢或用其日子時或明日清旦衆官相率列位於玄師前立班訖唱道入戶各禮師存念如法衛靈五星列照煥明五方水星却災木德致昌熒𤉨消禍太白辟兵鎮星四據家國利亨刋名玉簡録字帝房乘颷扇景飛騰太空出入冥無遊宴十方五雲覆蓋招神攝風役使萬靈上衛仙翁鳴法鼓二十四通無上三天玄元始三氣太上道君召出臣身中三五功曹左右官使者侍香金童傳言玉女五帝直符直日香官各三十二人出出者嚴裝關啓玄壇天帝神君當召此間土地里域真官正神急上關啓臣今奉為入意以今正爾燒香願得玉清道氣靈寶妙光下降流入臣等身中即使玄壇清淨內外成真天無氛穢地絶妖塵琳琅振響十方肅清萬魔不干真誠上徹令臣所啓速達徑御太上無極大道至真玉皇上帝御前各稱法位上清玄都大洞三景弟子奉行黃籙大齋言功拜表設醮投龍還宫法事臣某等今故燒香願以是功德上為宗廟先靈今朝皇帝文武官屬卿輔庶寮及弟子某九世七玄見存眷屬臣等三師九祖天下之人一切衆生幽途暗爽歸身歸神歸命十方無極太上靈寶天尊乞原赦前代今生生死重罪免離三惡之道十苦八難九厄之中身得道真飛行虛空白日升天侍衛道君逍遙無上金闕七寶自然宫殿永與道合所啓玄感上御至真無極道前禮十方懴悔三啓頌樂法以為妻愛經如珠玉持戒制六情念道遣所欲淡泊正氣停蕭然神靜默天魔並敬護世世受大福鬱鬱家國盛濟濟經道興天人同其願縹眇天大乘因心立福田靡靡法輪升七祖生天堂我身白日騰大道洞玄虛有念無不契鍊質入仙真遂成金剛體超度三界難地獄五苦解悉歸太上經靜念稽首禮三禮至心稽首禮太上無極大道至心稽首禮三十六部尊經至心稽首禮玄中大法師旋行收真文從東南西北中方各於本方案上炷香熏真文衆官齊聲宣真文畢令弟子執真文於香上熏之法師叩齒十二通呪曰元始上天三光髙明回景照耀四方朗清運度所衝激陽流星五分錯越三統失寧五斗總辰七宿明靈真君大魁厥諱玉精夫人皇妃字曰育嬰總御玄關回轉諸天今有某災玄告不祥請以真文赤書上呈散髮謝愆披露丹誠乞垂玄鑒回復天經氣不橫越災不橫生焚燒靈文散煙玉庭上景監度普告萬靈氣清三關災滅九冥隂陽調和國土太平請以金龍風火驛傳此呪出赤書王訣若三元八即常修黃籙及遷拔等即書歲星輔肝等文當用此呪如或禳制鬼疫即書東山神呪文别有呪或禳百六洪災即書下制東河文如學士修身即書東方九氣等若有星宿失度及九曜為災即依此呪矣玉訣云凡有祈禳不先叩齒而呪者為外魔所千關啓無感矣又云若災星在東露文九日金龍鎮之西七南三北五中十二日皆隨大道氣數也災星東方謂在角尤七宿也他可知焉畢以此真文隨表焚之散煙青煙之中也呪畢衆官再拜一一倣此矣重稱法位上清玄都弟子臣某等謹重上啓太上無極大道元始天尊太上大道君太上老君無上玄老十方靈寶天尊巳得道大聖衆至真諸君丈人三十六部尊經玄中大法師天師君上相上宰四司五帝東嶽上卿司命真君西極總真王君太平下教二十四真人五嶽靈宫名山洞府三界應感一切尊靈臣等宿以道緣躬逢正化天尊演法三洞宣行寶訣靈圖濟家康國獲參真妙許以稟修而先在立功普及幽顯冝弘聖教廣度天人凡有投誠不容寢絶今奉詞旨敢不上聞讀詞臣等依按詞誠輒相攜率考靈仙典格披黃籙簡文奉為某於某州縣宫觀設玄科之式法象二儀某所齎燈燭香花金龍繒綵本命之信證質丹誠以某日子時啓齋為首燒香行道懴謝玄真然燈續明照耀三界下通九地上及諸天濟存拔亡普為家國若干日夜行道轉經以某日亥時功成事立蓮燈息焰玉磬收音仙馭返於上玄法流分於下界金龍騰景上奏齋功聖澤宣慈開度幽爽酬功行賞遍及靈司臣等身中所佩內外真官三洞兵吏及星宿九宫五帝五嶽四瀆三河四海共馬騎乘侍香金童散花玉女五帝直符傳言奏事飛龍騎吏等並有功勞今當别拜黃繒朱表言功舉遷臣等學法未備俯仰之格進止犯科不合儀式恐為四司所糾五帝所執千愆萬過乞蒙赦貸哀原未悟不見罪罰臣等建齋之始奉請智慧上品十戒法事既竟謁還天宫臣所修齋功成事竟重明功德拜黃繒朱表一通在臣玉案之上請省表文表文以黃無素五尺朱界朱書每行二十四字生字不在下死字不在上第一行盡書法位至頓首字上言獨占一行太上無極大道君第三行表後以間去臣姓三行聖號去臣姓三行年月去聖號三行一如章法不得塗攺注乙誕責尤重愼之讀表取表於香上熏之即讀法位起再拜訖復長跪和聲正氣讀至弟子名皆今再拜至臣誠惶誠恐處起再拜又至年月日某處拜上又再拜都畢展於玉案上正對御前以龍頭書刀鎮聖號之左朱筆鎮右訖却長跪三捻香叩齒三通遣表勑曰謹遣臣等身中五體真官官一小吏十二書佐重勑功曹使者飛龍騎吏嚴裝顯服冠帶垂纓磨硯點筆簪劒理録為臣及時操黃素朱表上詣天曹隨表進對若有謬誤文字脫漏言詞倒錯不相次比者傳言書佐習事小吏操龍頭書刀長毛利筆隨誤正定無今上官典者有所遣却閉氣升章徑上三天無極大道太上御前愼勿稽停左君歷關右吏次啓諸官君歷第以次分别當令臣所請者下所召者到所理者愈所誅者滅所宣者通所遷者達所願者應所求者得若有下官故氣邀截臣表文不使上達者收付所在近獄依律定罪以明天憲臣等伏待玄恩報應法師於案後臨目向天門曲躬存令身中吏兵及三元將軍功曹騎乘羅列前後身乘羽車龍馭在紫氣中冉冉而升上詣三天門下先謁三天法師入玄都宫門之左呈表訖巳捧函徑入三天門齎章呈章等從事一十二人伺候上省覽畢即出三天門御羽車與騎乘而回所經歷天宫道路次第一如三五天拜章訣此不具載次內官叩齒十二通呪曰臣奏表事訖向所出身中功曽使者三五真官並還臣身中從衆妙門而入在左還左在右還右直使功曹主領撿押還復本位無令錯互須召又到一如故事叩齒三通液三通存三五上章官吏各復身中再拜卷表於詞文之前內函中封印訖并真文通於香案上洞案捧之監齋押之幢節前引弟子隨之至天門之上焚之法師於本位向天門存真官捧真文表等隨青煙朱焰上升天門焚詞頌衆生多障難大道甚矜憐救度留科戒咸令懴罪緣愆辜編地府釁結巳聞天發露祈真祐精誠仰聖賢虔恭禮三寶願當奏延年焚詞歸上界奏名玉帝前三捻上香執山簡文叩齒九通讀之香熏三過乃讀今謹有某州縣鄉里大道弟子某官姓名年若干歲命屬某帝名係某嶽謹為國為家存亡眷屬及某事隨意言之於某州縣宫觀住宅修建黃籙大齋若干日夜行道事訖投簡靈山願神願仙長生度世飛行上清五嶽真人至神至靈乞削罪籍上名九天請詣靈山金龍驛傳國號某年某太歲某月某朔某日三洞法師臣某於某靈山洞府告文讀訖衆官再拜次令弟子執簡於香煙上法師叩齒九通呪曰玄上開明元始監真上帝五老赤書丹文天地本始總領三光攝氣召會催促舉仙髙上符命晉告十方日月星宿五嶽靈山天上地下冥靈大神監生主籙南上三門關領玉簡勒名丹篇制落罪目上補帝臣某乙歸慿至道建齋立功拔贖九祖一切苦魂行道事竟謹詣靈山請投玉簡乞削罪名皆蒙解脫無有究親去離三惡魂升九天生死開度億劫常存今日上告萬真咸聞請以龍簡關盟真官乞如所告金龍驛傳衆官再拜時衆官隨聲言之金龍驛傳四字簡并呪皆三度言之簡用榔木作之長一尺二寸廣二寸四分厚二分朱界作五行四行簡文一行年月朱書謹細不得楷攺塗注每簡用一龍負之長三寸六分天子上金公侯次金士庶銀鍍金可也呪畢山水二簡青紙封之絲纒龍印以九老仙都之印土簡黃紙青線古法用壁在投龍儀中題簡封處法謹上詣某處府山云某山洞府水云某處泉水水府土云某處靈壇土府三洞法師臣某告文封讀水簡文今謹有某州縣鄉里某官某乙年號歲奉為家國普及存亡請福祈恩增延祿壽於某處奉修無上黃籙大齋若干日夜行道事訖投簡水府願神願仙三元同存九府水帝十二河源江海淮濟冥靈大神乞削罪録上名九天請詣水府金龍驛傳國號某年太歲某某月朔某日某三洞法師臣某於某處靈泉水府告文次令弟子執簡於香煙上法師叩齒十二通呪曰元始玉老上帝髙尊十方至真太華靈仙赤文告命無幽不聞上御九天請下玉文日月三星北斗七元中告五嶽四方靈山丁告河海十二泉源九江水帝冥靈大神今日上告萬願開陳弟子建齋行道普為存亡請贖七祖宿對罪根謹投玉簡乞得上聞記名水府過去升天生死開度萬靈咸聞請以龍簡告盟水帝賜如所陳金龍驛傅衆官再禮呪訖封題如前法讀土簡文今謹有某州縣鄉里某官某乙奉為家國普及存亡請福祈恩增延祿壽於某處奉修無上黃籙大齋若干日夜行道事訖投簡靈壇中黃九地戊巳黃神土府五帝乞削罪名請詣中宫勒簡太玄金鈕白信金龍驛傳國號某年太歲某月某日某三洞法師臣某於某處靈壇土府告文次今弟子執簡於香煙上法師叩齒十二通呪曰天地開張萬氣分靈三元同符十方朗清五老上帝主死領生丹書赤文元始上精普告天下九地皇靈今日上告萬仙定生弟子建齋行道普為存亡我願我仙請投玉名土府太皇勒除罪名奏簡上宫刋簿華清身得飛騰天地同靈九祖種親腐骸更榮魂升南宫受化仙庭今日告命萬神咸聽請以金鈕白簡表明至誠請如所告金龍驛傳衆官再拜次吟投龍頌祈真登紫府告命詣靈壇玉女謡梵響金童奏香煙書名通九地列字上三天永享無期壽剋成髙上仙衆官再拜黃素朱表樣右用細熟黃絹六尺取其半幅朱界朱書每行二十四字第一行名術密書取至頓首字恰盡上言兩字獨占第二行太上無極大道在第三行自此每行二十四字生字不在下死字鬼字及人名不得在上一如章格具位奉行黃籙大齋法事某嶽先生某帝真人臣某稽首頓首上言太上無極大道至真自然金闕下臣等自以下愚謬參天法功無塵露釁積丘山俯仰慙惶形黃罔冥臣頓首頓首臣等實謂凡微幸藉道福叨逢妙化欣荷無任既忝玄司職主救度雖稟性庸瞽誓罄丹誠追尋慈風服膺妙訓見義思勇日夜在心所值因緣敢不啓奏今有某州縣鄉里大道弟子某官某乙年若干歲本命某某月某日生稽首列詞具言伏聞無上正法黃籙大齋解除生死先身今身身口意罪上資帝祚下及羣生保國寧人禳災却害增延祿壽解厄銷災拔度九玄七祖一切幽爽濟度存殁惠滭普加謹齎十方金龍鎮信本命紋繒香花油燭供養之具證質丹誠奉辭以聞因臣等行道懴悔首謝宿世衆愆斷絶殃咎濟度存亡言辭丹倒理在可中謹率同法道士某等若干人謹依下元黃籙簡文靈仙科品於某州縣某觀玄壇之上設玄科之式法天象地以某所齎金龍繒綵施鎮十方祈天請地救拔存亡共相罄勵洗心靜念塗炭稽顙歸命至真以祈所願若干日若干夜若干時禮懴若干時轉經以某月某日平旦為始立齋行道訖某日夜亥時合若干時祈請功成事畢謹即言功解壇投龍於山水丹書擲扎以奏言於靈壇伏地拜黃素朱表一通上聞九天伏惟太上無極大道元始天尊太上大道君太上老君太上丈人無上玄老十方自然靈寶天等巳得道大聖衆至真諸君丈人太帝天帝天師君玄中大法師曲映所奏垂愍丹心如蒙上御乞勑典者宣告十方五老上帝五嶽真仙三官九府十界真靈拔度某家九玄七祖有緣無緣𡨚親平等一切幽爽並令開度得出長夜九幽之中升入南宫冠帶枯骨反骸生華輪轉漏盡化生福門所在土地榮衛尸形須神反舊與景冥合弟子其家前世今生一切罪咎並乞除蕩和釋𡨚對度厄除災延生保命存亡開泰眷屬安寧上願七曜圓明二儀永固隂陽調和九榖歲捻國富人歡天下太平六合清淨帝祚延長疫毒消殄善瑞日表克保元吉永銜道恩謹遣修齋所請天仙兵馬真人兵馬神人兵馬地仙兵馬日月兵馬星宿兵馬九宫五帝兵馬三河四海兵馬五嶽四瀆兵馬各九億萬騎監齋直事侍香金童散花玉女五帝直符傳言奏事飛龍騎吏臣等身中所佩內外真仙靈寶官屬守宫將軍此間土地里域真官三界神祇諸係監臨衛護宣通召命榮衛齋事有功勤者一切裝嚴隨臣等今表上詣玄都例受功賞謁言真官進品上仙加爵帝秩隨品署職髙下等級皆令崇遷一如太真之儀臣等學法未備俯仰違格進止犯科不合儀式恐四司所糾五帝所執千愆萬罪乞蒙赦宥哀原未悟不見罪罰臣等身中五體真官受功事訖各還宫府使臣等學道得道求仙得仙永為真人同三光朗曜與五氣長存恩惟太上衆尊分别哀憐謹因真官飛仙直使正一功曹左右官使者隂陽神決吏科車赤符吏剛風騎置驛馬上章吏飛龍騎吏天仙騎吏飛仙騎吏各二十四人出操臣謹為某官某乙建黃籙大齋露請事訖解壇遷職復諸天位重明功德拜黃素朱表一通上詣太上上上曹伏須告報臣某等誠惶誠恐死罪死罪稽首再禮以聞臣姓某屬某州某縣某宫觀太上無形無名虛無自然至真大道無上元尊金闕七寶玉陛下國號年號太歲某某月某朔某日某天門開時於某宫觀玄壇中拜上凡寫表不得挑抹塗攺儳字添注損汚等唯須精心且人間奏表尚須謹楷精細奏於天廷者乎發願復爐香官使者左右龍虎君侍香諸靈官當令臣行道之所自然生金液丹碧芝英百靈衆真交會在此香火御前令修齋弟子存亡受福家國霑恩十方仙童玉女侍衛香煙傳奏臣向來所啓速達至真無極大道三清上聖玉皇上帝御前出戶太上黃籙齋儀卷之四十九
