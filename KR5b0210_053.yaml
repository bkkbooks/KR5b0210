front:
  text: 太上黃籙齊儀卷之五十三鳴五
  hash: sha256:a9efe42a79f1160d14a02c1a51a9ea482ec7dd77b70d0523d1ad712b43b73d52
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0210_HFL_053-001a, image: hfl/0276/0276-128.png}
body:
  text: 唐廣成先生杜光庭剛讃導經科皆云齊官之內以道德尊髙者為法師明練法度為都講也又都講職詞云先鳴法鼓次引朋衆風則儀敬憑讃說此即讃唱導引皆都講之務也吳中江表荆楚之間皆以都講執磬讃導行禮夫先鳴法鼓者鍾磬之謂也欲令羣官整肅儀制森然須先擊磬齊衆而後讃唱升壇亦都講之職也但以近年或都講年德稍髙不欲一一勞止即於衆官之內差一人執磬唱禮蓋事出一時元非古制詳其職簡頗謂曠官更有後學生情妄為臆斷於六職之外置一人持磬殊無經據訛謬益深又髙功法師職在敷奏進止俯仰居衆之先或昏耄不任自可求退豈容假手翻類冗員今蜀地髙功止於發爐復爐兩稱名位其他宣讀皆委他人雖云先唱後隨何異龍吟鱉應此蓋不懼冥譴自掇罪尤人事尚且未容天道如何通感後之法主深可戒焉無蹈利於目前更增罪於身後監齊秉執科憲繩糾愆違務在無私共引典法若有𧇊犯務須授簡告之受罰之人亦須甘心伏罪所冀外能合禮以全濟濟之儀內不欺心免抱忡忡之恨不得使彈糾之際彼此喧然秉法者進退有詞負罪者譸張拒命不惟犯千玄聖又且取笑衆人其次侍經整飭壇場主張法席經科几案供養供須施列敷張皆須檢校况舊法於齊堂之內置兩髙座三時講讀故簡文云三時講唱是也又幟簡云衛獅子之兩座罰簡云聽經倚據不執版又云請問敗句此皆明行道既畢法師衆官三時講誦矣近代相承秖於壇場之內三時行道三時轉經久無講唱之事亦無兩座之設然轉經之時衆官既坐一人行淨水侍香行香侍經行經轉讀既了侍經收經安置本座及整拂壇席嚴待供養無使外人凌冒輒踐法壇此乃侍經職務也不得虛參職任倨傲不恭使几案縱橫壇場汚雜薦獻之物使僮僕入壇輕冒神真凌犯禁戒且禁壇之後尚不許通行而僕使庖夫容易出入例多此事切冝禁之苟獲未除皆侍經獲其殃責也侍香所職具在簡詞之中近者因循多不勤恪豈獨香煙中絶往往火滅灰寒兼有髙功尚未升壇中擅添香炷此例違失率皆有之省閲科儀亦冝戒愼侍燈惟在勤勵興廢合儀徹曙續明即為稱職近有不經之士淺識之人不使侍經整飭壇筵别置直壇之號六職之外頗有冗名明鑒法師所冝共棄無履僞跡取誚後賢又按金籙古儀及黃籙舊法宿啓之夜及言功之時皆先作自然朝然後行齊事故啓齊儀云衆官相率先行自然朝至三禮後即告齊署職說戒宣科明旦晨曉依法行道此法自張天師陸先生冦天師張清都相傳至今頗歷年代皆以齊法出於靈寶自然朝為齊之祖宗故先行自然朝示不忘本也近有庸愚道士不達古賢之情先於玄師之前補署六職宣科授簡然後升壇仍云簡寂先生齊法謬誤飾非謗說詞理紛然寡識無知一至於此尚有其黨相倣行之不唯獲亂法之愆實亦受謗賢之罪達教君子冝共斥之舊法之中有相傳錯誤者唯啓齊言功之時自然朝內合禮靈寶天尊而相傳禮玉寶皇上等號此稍失自然朝之本㫖恐是年代綿逺書寫舛訛今於此儀中巳為攺正非敢臆度惟理所歸時彥後賢共𢎞之矣齊壇讃唱儀軌啓齊夜衆官列位於玄中法師前差一人讀職狀訖又一人引齊主禮玄師再拜又三捻香又禮再拜捧詞函自述齊意訖又執函禮拜訖回身長跪授詞函於髙功接函訖齊主禮髙功再拜退復本位次髙功即執詞函於玄師前三上香禮三拜訖捧函正立上啓告齊都訖次唱三歸依次都講唱一切念次華夏引至三官前上香次至三師前上香次請齊官立次引至地戶禁壇次入戶呪至天門上十方香次至本位次都講唱各禮師存念如法次唱鳴法鼓二十四通次各稱法位次唱至心歸命北方無極太上靈寶天尊十方同次唱歸命懴悔次三業次三啓次唱禮至心稽首太上無極大道至心稽首三十六部尊經至心稽首玄中大法師次唱重稱法位次大謝啓次智慧三首訖次唱衆等人各首體投地回心禮十方方各一拜北方為始東北方東方東南方南方西南方西方西北方北方上方下方十禮足起立次唱云衆官平坐說戒威儀次說戒次奉戒頌一首畢唱奉戒三禮次署職都講唱云署一人為髙功大法師其職也道德內充威儀外備俯仰法式人天所瞻法師禮拜長跪受簡訖次衆官受職次宣科禁次十二願次復爐次學仙次出戶呪次空洞次至玄師前都講唱曰向來禮懴功德云云次唱監齊考過監齊彈糾有無訖次唱啓齊事畢衆官復位第一日清旦於玄師前立定都講唱曰道場衆等人各運心歸命三寶一切念次入壇次唱各禮師存念如法次衛靈呪次鳴法鼓二十四通次發爐次唱重鳴法鼓二十四通閲吏兵行事法師鳴法鼓出官餘八時不用此次唱各稱法位次三上香訖次衆官左行壇西立面東唱衆等至心歸命東方無極太上靈寶天尊九氣天君東鄉神仙諸靈官三禮各䖍誠懴悔次跪讀方懴次面南唱衆等至心歸命南方無極太上靈寶天尊三氣天君南鄉神仙諸靈官三禮次面西唱衆等至心歸命西方無極太上靈寶天尊七氣天君西鄉神仙諸靈官三禮次面北唱衆等至心歸命北方無極太上靈寶天尊五氣天君北鄉神仙諸靈官三禮次西南立面東北唱衆等至心歸命東北方無極太上靈寶天尊梵氣天君東北鄉神仙諸靈官三禮次西北立面東南唱衆等至心歸命東南方無極太上靈寶天尊梵氣天君東南鄉神仙諸靈官三禮次東北立面西南唱衆等至心歸命西南方無極太上靈寶天尊梵氣天君西南鄉神仙諸靈官三禮次東南立面西北唱衆等至心歸命西北方無極太上靈寶天尊梵氣天君西北鄉神仙諸靈官三禮次依前東南立面西北唱衆等至心歸命上方無極太上靈寶天尊三十六天帝君玉京玄都紫微上宫諸真人神仙玉女無極世界上鄉神仙諸靈官三禮次於西北立面東南唱衆等至心歸命下方無極太上靈寶天尊九壘土皇四司五帝十二仙君九宫真人神仙玉女無極世界下鄉神仙諸靈官三禮次於西南立面東北唱衆等至心歸命日宫真人大聖日中皇君明皇真人圓光童子丹霞玉女日宫神仙諸靈官三禮次於東北立面西南唱衆等至心歸命月宫至真大聖月中皇君素皇真人散輝玉女月宫神仙諸靈官三禮次正南立面北唱衆等至心歸命諸天星宿璇璣北辰九宫三台二十八宿周天三百六十五度星中大神星中真人星宫神仙諸靈官三禮次正西立面東唱衆等至心歸命東嶽泰山青帝真君飛仙真人名山洞府得道神仙諸靈官三禮次北立面南唱衆等至心歸命南嶽衡山赤帝真君飛仙真人名山洞府得道神仙諸靈官三禮次東立面西唱衆等至心歸命西嶽華山白帝真君飛仙真人名山洞府得道神仙諸靈官三禮次南立面北唱衆等至心歸命北嶽常山黑帝真君飛仙真人名山洞府得道神仙諸靈官三禮次東北面西南唱衆等至心歸命中嶽嵩山黃帝真君飛仙真人名山洞府得道神仙諸靈官三禮次正南立面北唱衆等至心歸命扶桑大帝暘谷神王三河四海九江水帝十二河源水府神仙諸靈官三禮次依前正南立面北唱衆等至心歸命至真無上三十六部尊經真文寶符自然天書至極靈文三禮每唱禮畢並舉各䖍誠懴悔并宣方懴次左行法師住鬼門面西立都講住天門面東立唱曰各思九色圓象咽液命魔密呪次法師存神次唱步虛旋繞次吟詠步虛洞章十首古法次回行三周至十首法或以二啓續之近代不用次師歸本位捻香都講唱曰至心稽首太上無極大道至心稽首三十六部尊經至心稽首玄中大法師次重稱法位次長跪大謝畢起立唱十念一念天地交泰二念日月貞明三念隂陽順序四念國土安寧五念帝王景柞六念宰輔盡誠七念百姓安樂八念五穀豐盈九念幽途離苦十念大道興行次復爐次學仙次空洞次出戶呪次玄師前立作回向讃次唱監齊糾過次彈糾次唱法事畢衆官復位次揖謝訖散歸齊堂如常儀三時行道每日三時皆依此次第唯第一日發爐之後有重跪出官及每日清旦禮師後有衛靈呪耳餘皆同此如或將升壇值風雨及警急大暑極迅雷暴雨烈風晦暝之事乃止次三上香衆官於本位端立部講唱曰衆等至心歸命十方無極太上靈寶天尊十極天君三光五嶽三河四海三十六部尊經一切神仙諸靈官三禮次各䖍誠懴悔懴訖便存思步虛或依歷唱諸方方各一禮如常朝次第便用都懴亦得或恐有所迫及升壇失時即可作都懴亦候三上香畢依在本位靣向壇中一人面北對三寶宣懴都講唱讃曰衆等至心歸命十方無極太上靈寶天尊十極天君十鄉神仙諸靈官三禮次各䖍誠懴悔衆等至心歸命日月星宫至真大聖三光神仙諸靈官三禮衆等至心歸命五嶽真君名山洞府得道神仙諸靈官三禮衆等至心歸命三河四海九江水帝十二河源水府神仙諸靈官三禮衆等至心歸命太上三尊十方大聖三十六部尊經真文寶符三禮次唱各䖍誠懴悔懴畢即命魔步虛一如上法每日行道訖各還齊堂消息良久即升壇轉經衆官於玄師前立定都講唱曰道場衆等人各運心歸命三寶一切念衆官揖玄師次唱無上諸功德名號隨意念次華夏引升壇次入戶呪升天門上香至本位立定次唱三歸依三首訖都講唱道場衆等執簡當心平坐如法衆官坐定又唱讃詠如法次作宿命讃訖行香行經讃畢次又唱靜念如法次法師存念次念功德名號畢次又唱請轉法輪次衆官轉經候終一卷都講擊磬侍經收經次吟送經讃畢又吟解座讃又畢次歎經功德次一人歎經或依古歎或有新文任時所用次吟閒經譛三首次旋行吟七真譛或七首八首五首三首一首訖次學仙出壇次出戶呪次於玄師前作回向讃畢唱曰法事畢衆官復位次散歸齊堂如常儀三日五日七日之中或行禮燈法事候落景行道出壇之時衆官於地戶列班定法師或法職一人執科宣說拜呪一如文儀至畢即學仙讃引至玄師前舊法巡於燈下呪今慮繁併只於地戶望壇中三尊太上遙拜呪之亦甚允當齊法既意即於明日丑時或其日亥後衆官於玄師前列班定都講次唱曰道場衆等人各運心歸命三寶一切念次念功德讃引入戶升壇上十方香御案本位並訖次唱各禮師存念如法次衛靈次唱鳴法鼓二十四通次發爐次唱各稱法位次上香次唱至心歸命東方無極太上靈寶天尊十方同次歸命懴悔次三業懴次三啓至心稽首太上無極大道至心稽首三十六部尊經至心稽首玄中大法師次旋行次收五真文東方南方西方北方中方並宣文了次呪真文次唱重稱法位次上香長跪次拜表次露表次遣表次存神起再禮次封表次引表於天門焚之次內官次都講唱十二願次法師復爐次知磬舉出堂頌衆和引出壇次法師一拜次引至靜默堂序立次法師上香啓白次知磬舉向來頌衆和之次知磬云朝修事畢衆官普揖次設醮散如常儀太上黃籙齊儀卷之五十三
