front:
  text: 太上黃籙齊儀卷之六賔六
  hash: sha256:f6612dbefe958d9daf0c5ab5f6adf4df6f8ea6bf63bed6169491eebc19b304a8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0210_HFL_006-001a, image: hfl/0270/0270-096.png}
body:
  text: 唐廣成先生杜光庭集第二日落景行道入戶各禮師存念如法衛靈金真空降神虎檢營玉帝披霞諸天命靈九晨回駕萬魔束形九微迸煙神威攝精流金擲火百惡消并神輝耀夜洞杳長春聖道蕩蕩十方肅清保制劫運元亨利貞鳴法鼓二十四通無上三天玄元始三氣太上老君召出臣等身中三五功曹左右官使者左右捧香驛龍騎吏侍香金童傳言玉女五帝直符直日香官各三十六人出當召此間土地里域真官正神速出關啓臣今正爾燒香奉為某官某乙為國為家修奉無上黃籙大齊若干日夜以今第二日落景升壇焚香行道願得太上十方正真生氣降流臣等身中所啓速達上御至真無極大道玉皇上帝御前各稱法位上清玄都弟子臣某等謹同誠上啓虛無自然元始天尊無極大道太上大道君大聖祖髙上大道金闕玄元天皇大帝太上老君無上玄老十方巳得道大聖衆至真諸君丈人三十六天帝君玉虛上帝玉帝大帝東華南極西靈北真玄都玉京金闕七寶玄臺紫微上宫靈寶至真明皇道君玄中大法師東嶽上卿司命真君西極總真王君太平下教二十四真人三十六部尊經五嶽真官靈山洞府三界應感一切玄司臣等夙禀真乘生逢道化赤書御運玄教弘敷叨荷師資授傳祕籙未能棲神名嶽注念中虛結友上真以祈超度而玄科有約佐國為先演法濟人立功為本凡有披告敢不上聞讀詞依按詞言實惟丹懇上資家國普及存亡崇啓皇壇仰祈玄貺臣等謹為依紫陽玉笈黃籙寶文罪福因緣拔度科品以紋繒法信龍璧香花效懇質心奉修齊直伏冀十方大聖太上衆尊俯降威光曲回睿鑒廣垂福祉下遂精誠以今落景行道諸法衆等運茲初捻上香願此香煙騰空徑上供養無上至真道寶臣等歸身歸命首體投地仰依太上三尊願以是功德歸資宗廟社稷尊靈騰景太清遊神紫闕皇帝儀璘並照覆載齊尊化被無垠仁周有截后妃內職善治六宫太子諸王祚延萬葉庶寮卿佐四友三師俱入無為盡登真果今故燒香歸依師尊大聖衆至真之德得道之後升入無形和與道合真以今落景行道請法衆等運茲二捻上香願此香烟騰空徑上供養無上至真經寶臣等歸身歸命首體投地仰依太上尊經願以是功德奉福某家九玄七祖往逝神儀洗纍劫之罪尤受書三洞銷積生之報對離苦九幽錬質南宫升神上境今故燒香歸依師尊大聖衆至真之德得道之後升入無形和與道合真以今落景行道請法衆等運茲三捻上香願此香煙騰空徑上供養無上至真師寶臣等歸身歸命首體投地仰依太上三尊願以是功德奉福某家六姻五族中外親緣福善惟新災凶自息谷神襲妙至道垂休動息運心並蒙元吉然後三塗六趣含識有生苦海澄波愛爐戢焰真風廣扇惠雨普霑盡證道階克登真果今故燒香歸依師尊大聖衆至真之德得道之後升入無形和與道合真禮方懴悔步虛大道師玄寂升仙友無英公子度靈符太一捧洞章舍利耀金姿龍駕倐來迎天尊盻雲輿飄飄乘虛翔香花若飛雪氛靄茂玄梁三啓三禮臣等至心稽首禮太上無極大道臣等至心稽首禮三十六部尊經臣等至心稽首禮玄中大法師重稱法位上清玄都弟子臣某等謹重誠上啓太上無極大道元始天尊太上大道君太上老君無上玄老十方無極大道道德衆聖天尊至真大帝天帝三十六部尊經玄中大法師上相上宰四司五帝名山洞府得道神仙三界應感一切尊靈臣等伏聞金闕慈尊玉京大聖先混茫而布化後億劫以迎真開九萬之法門梯航品彚啓三乘之奧旨汲引昏迷臣等屬想真筌披心寶笈思弘聖旨以福羣生弟子某仰慮九祖幽靈六親滯識爰從曩劫以洎今生放恣六情縱行三業違五常妙訓積四大深尤罪結黑書神拘隂府風刀水火考對前非寒冰夜庭留連惡趣動經億劫不覩光明杳杳窮泉備受諸苦非憑大聖開度無由昔天尊大慈憫濟羣品八門演法八苦由是蠲消九色垂光九幽以之開泰輒緣斯旨敢罄丹誠注懇皇壇冥祈玄澤燒香行道懴罪乞恩伏冀聖鑒下臨神耀遍燭並蒙洗滌咸覩光華萬罪清夷沐浴朱陵之苑五神受錬逍遙丹霍之天福利見存俱蒙貞吉某宿殃除蕩善業興昌智慧周圓身心清淨丹臺刻録碧簡增年一切親緣齊霑法廕上願瑶圖帝業邁三五以居尊金闕聖皇傳億千而流貺邊烽罷焰荒徼歸仁百榖滋豐三光朗曜卿雲瑞露匝天地以效祥澤馬器車出山川而表慶然及羣生品物隂府冥關蠢動殊形飛沉異趣下通九壘上極萬天俱荷大慈同升極樂上明天尊廣覆之澤下契臣等䖍奉之誠謹啓以聞發願一願大道流行普天懷德二願一切有生咸皆悟道三願九夜悲魂一時解脫四願孤魂無依咸得受生五願天下太平五榖豐熟六願臣忠子孝君仁父慈士願四海通同𡨚親和釋八願潜胞處卵咸得生成九願積疾新痾旋即痊愈十願孤露衆生豐衣足食復爐香官使者左右龍虎君侍香諸靈官當令臣行道升壇之所自然生金液丹碧芝英百靈衆真交㑹在此香火爐前弟子某存亡受福家國蒙恩十方仙童玉女侍衛香煙傳奏臣向來所啓徑達至真無極大道玉皇上帝御前出戶太上黃籙齊儀卷之六
