front:
  text: 太上黃籙齋儀卷之三十三歸九
  hash: sha256:480d60fbfe1f95e91c24ffec845f2bdc3dc8dbda3c29be8060ac8d55b38367c9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0210_HFL_033-001a, image: hfl/0273/0273-126.png}
body:
  text: 唐廣成先生杜光庭刪三元中分行道入戶各禮師存念如法衛靈謡歌空洞帝君存壇五帝校録受符三官備衛四門東魔去姦流鈴擲火除穢焚殘身佩金書鍊液芝顔玄虛素合心動三關騎獅跨鶴控龍乘鸞萬星守舍千魔不干道氣長存萬仙委安鳴法鼓二十四通無上玄元太上道君召出臣身中三五功曹左右官使者侍香金童傳言散花玉女五帝直符直日香官各三十二人出出者嚴裝關啓玄壇天帝神君當召此間土地里域真官正神以今奉為入意願得玉清道氣靈寶妙光下降流入臣等身中令臣所啓之言速達徑御太上無極大道無形無名虛無自然金闕玉陛下各稱法位具位臣某等謹同誠上啓虛無自然元始天尊無極大道太上大道君大聖祖髙上大道金闕玄元天皇大帝太上老君太上丈人無上玄老十方巳得道大聖衆至真諸君丈人三十六天帝君玉虛上帝玊帝大帝東華南極西靈北真玄都玉京金闕七寶玄臺紫微上宫靈寶至真明皇道君玄中大法師三界官屬一切真靈臣等宿以鴻因克承玄化負荷大法參佩寶文誠冝抗迹雲林栖神淡漠振衣下俗追友上真而大聖垂科元皇布教先當助國宣化濟物安人弘道立功廣被羣品凡有祈告敢不上聞讀詞按如詞言理冝關奏齋主某上惟宗廟下及羣生希立善功廣弘嘉福況屬某元令節齋戒良辰玉皇臨御於上方萬聖校功於三境死生同福毫末無遺是思禱祝之儀以罄人臣之懇齎持法信崇設壇場臣等依按典儀凝神滌慮馳心絳闕拜手清都所期羽蓋雲軒依稀降鑒髙真上聖髣佛照臨溥海嶽以垂休匝幽明而孚祐以今午朝行道請法衆等運兹初捻上香願此香煙騰空徑上供養無上至真道寶臣等歸身歸命首體投地仰依太上三尊願以是功德上資社稷尊靈宗祧昭穆登真碧落垂貺皇圖皇帝德洽羲農功侔軒燧壽山益峻聖日增明車軌混同兵戈戢息星辰合度風雨順時太子諸王承乾繼聖后妃公主百辟庶寮福祉日新徽華克茂然後文懷逺俗武定艱危海外寰中同躋壽域今故燒香自歸依師尊大聖衆至真之德得道之後升入無形和與道合真以今午朝行道請法衆等運兹二捻上香願此香煙騰空徑上供養無上至真經寶臣等歸身歸命首體投地仰依太上三尊願以是功德歸流泉曲寒庭酆都長夜隂宫地府一切幽靈次及齋主家九世七玄億曽萬祖出重冥之境登太極之庭落北府之罪書遊神淨域上南宫之生籙證品仙階今故燒香自歸依師尊大聖衆至真之德得道之後升入無形和與道合真以今午朝行道請法衆等運兹三捻上香願此香煙騰空徑上供養無上至真師寶臣等歸身歸命首體投地仰依太上三尊願以是功德歸流天地之內道化之中咸沐玄功俱承真祐齋主某災殃殄息過咎蠲銷三界真靈潛增福祚九丹祕妙永駐年齡內外齊安存亡並泰今故燒香自歸依師尊大聖衆至真之德得道之後升入無形和與道合真禮方懴悔各思九色圓象咽液命魔密呪步虛旋繞俯仰存太上華景秀丹田左顧提鬱儀右盻携結璘六度冠𣑽行道德隨日新宿命積福應聞經若至親天挺超世才樂誦希微篇沖虛太和氣吐納流霞精胎息靜百關寥寥究三便泥丸洞明景遂成金華仙魔王敬受事故能朝諸天皆從齋戒起纍功結宿緣飛行凌太虛提携髙上人控轡適十方旋玄景阿仰觀劫仞臺俯盻紫雲羅逍遙太上京相與坐蓮華積學為真人恬然榮衛和未享無期壽萬椿奚足多大道師玄寂升仙友無英公子度靈符太一捧洞章舍利耀金姿龍駕倐來迎天尊盻雲輿飄飄乘虛翔香花若飛雪氛靄茂玄梁三禮臣等至心稽首禮太上無極大道臣等至心稽首禮三十六部尊經臣等至心稽首禮玄中大法師重稱法位具位臣某等謹重伸上啓太上無極大道元始天尊太上大道君太上老君無上玄老至真無極大道道德衆聖天尊至真大帝天帝三十六部尊經玄中大法師三師君上相上宰四司五帝三界官屬一切真靈臣等自惟幽賤被沐玄風擢品道階列名真教覩三洞五文之奧披龍編鳳簡之書未能晦迹韜名窮林絶壑以期升舉永奉靈規而受法之初與三官有約義先濟物輔國化時行教立功用罄誠節今齋主某詞情懇禱為國為民龍綵效心香花質信請崇齋法以報君親況三元為大宥之辰存亡受福三景著大明之日幽顯開光玄都上宫紫微金闕萬天朝宴衆聖回軒釋過舉功允當嘉節除災介福仰祝昌期臣等依按典章虔修齋直建壇行道法地象天燒香然燈照燭幽夜飄靈煙而上御佇真聖以遐臨願達精誠冀延景貺伏願三清上聖八極髙尊俯借威光下康國步鎮安社稷清肅寰區皇帝兩曜齊明五山等壽濬鴻源而不極負丹扆以無為八海九圍干戈自息三邊六合鋒鏑不驚與三五以比崇越羲融而縱聖箕風畢雨調和而百榖有年舜日堯雲輝煥而萬方無事太子叶明離之象諸王齊磐石之貞六宫之內則允修百揆之忠規克著梯山航海率奉睿謨異域殊封咸臻道化封疆靜肅逺近樂康疫毒不興災妖自殄然後九幽長夜之府三途六趣之鄉九祖三師並蒙開度齋主某積生過咎隨懴滌以清消衆厄千災賴真靈而洗蕩維新祿算永享利貞內外宗親俱獲元吉飛沉遂性蠢動安全天地之間物無失所上明天尊弘慈之澤下副臣等歸命之誠謹啓以聞發願一願大道淡泊虛無安間空寂澄清自居廣開法門教導頑夫皆蒙惠澤精苦自修預以同學普得升虛與天相保長存無憂二願諸天結氣澄清髙虛廣覆保真固靈氣候調節四運和平國安民豐普天間寧廣濟一切惠達有生保天長存億劫不傾三願土地覆載無窮安平不陷海淪不崩保鎮家國兆民興從養生安死惠周十方禾稼滋植營運日豐咸得厚載萬物皆從四願日月二景髙明無有勃蝕𧇊盈安清光照諸天洞消暗冥保固劫運世祚和平普加潤澤惠灑衆生五願星辰與日月齊光轉燭照夜朗映十方各安其位經緯直行保鎮家國無有災傷四海寧一普天興昌六願四時隨節推遷景氣和調無有災患疫毒消滅普天安平五穀豐熟國富民歡七願浮雲結氣聚煙飛空髙澄蔭覆玄玄隱則無為散則彌天神仙同居結友衆真惠流一切興國愛民普濟羣生人同劫年八願風雨流灑無窮普加施泄受其發揚萬物滋生國儲民豐九願五嶽各安其方巍巍包藏長為仙宫安鎮國祚保天無終護度一切莫不仰宗十願江海蕩蕩無極含容恢廓無細不植淵奧柔惠潤加蠕息天人獲慶年同劫石十一願帝王國土日昌四鎮安睦兵革不揚天人歌唱吉應來翔敷教濟濟威化揚揚兆庶稱慶長樂未央十二願蝖飛蠢動巳生未生咸蒙安全普得生成皆見元氣受陽之形草木果林經冬不零一切濟度靡不鮮榮和與道合真復爐香官使者左右龍虎君侍香諸靈官當令臣行香之所自然生金液丹碧芝英百靈衆真交會在此洞桉爐前令臣學道得道求仙得仙十方仙童玉女接侍香煙傳臣向來所啓之言速達徑御太上無極大道無形無名虛無自然金闕玉陛下出戶太上黃籙齋儀卷之三十三
