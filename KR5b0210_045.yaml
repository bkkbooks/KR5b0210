front:
  text: 太上黃籙齋儀卷之四十五王十一
  hash: sha256:2f53d540af38b5c5605aa64a4a832f6466803eb21b6c2aacef135a6f9d03d61f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0210_HFL_045-001a, image: hfl/0275/0275-062.png}
body:
  text: 唐廣成光生杜光庭集安宅方懴都懴臣等今故燒香歸身歸神歸命奉為某乙修齋行道仰謝十方無極太上靈寶天尊巳得道大聖衆至真諸君丈人日月星宿三界諸天五嶽水府三寶威神天上天下十極尊靈下及中黃九土戊已黃神土府五帝六甲五行九宫八卦隂陽正神太歲刑德一切神明仰慮居宅修造之所犯觸靈司或侵傷地理穢塞泉源明違禁忌幽忤龍神積成罪目解謝無由以今修齋行道懴悔祈恩伏冀天尊流貺靈寶開光百神介福五帝垂休解除所犯賜以自新災衰蕩滌罪咎銷平眷屬俱泰祿壽延長龍神安鎮動霑榮得道之後升入無形和與道合真東方臣等今故燒香歸身歸神歸命奉為某乙修齋行道仰謝東方無極太上靈寶天尊巳得道大聖衆至真諸君丈人青帝九氣天君青龍東斗角亢氐房心尾箕七星君甲乙寅卯木德震神少陽之氣九夷老君勾芒太皥春王正神帝車帝輅帝舍歲星木官仰慮居宅修造之所違忤神明負越禁忌延致非常今故燒香行道修齋立功伏願解除所犯賜以安貞銷中央土氣一切災凶罪咎蠲平災衰靜息存亡俱泰福壽維新龍神鎮守眷屬霑榮得道之後升入無形和與道合真南方臣等今故燒香歸身歸神歸命奉為某乙仰謝南方無極太上靈寶天尊巳得道大聖衆至真諸君丈人赤帝三氣天君朱雀南斗井鬼柳星張翼軫七星君丙丁巳午火德離神太陽之氣八蠻老君祝融炎帝熒惑夏神帝車帝輅帝舍螣蛇九紫隂陽正神仰慮居宅修造之所犯觸神明負違禁忌延致災衰今故燒香行道修齋立功伏願解除所犯賜以福祥銷西方金氣一切災凶罪目蠲平千災靜息存亡俱泰福善咸臻龍神安鎮眷屬平和得道之後升入無形和與道合真西方臣等今故燒香歸身歸神歸命奉為某乙修齋行道仰謝西方無極太上靈寶天尊已得道大聖衆至真諸君丈人白帝七氣天君白獸西斗奎婁胃昴畢觜參七星君庚辛申酉金德兊神少隂之氣六戎老君蓐收少昊太白秋神帝車帝輅帝舍咸池刑殺隂陽衆神仰慮居宅修造之所犯觸神明負違禁忌侵忤威靈今故燒香行道修齋立功伏願解除所犯賜以福祥銷東方木氣一切災凶罪咎蠲乎災衰靜息動植俱泰福善咸臻龍神安鎮眷屬康寧得道之後升入無形和與道合真北方臣等今故燒香歸身歸神歸命奉為某乙修齋行道仰謝北方無極太上靈寶天尊巳得道大聖衆至真諸君丈人黑帝五氣天君玄武北斗斗牛女虛危室璧七星君壬癸亥子水德坎神帝車帝輅帝舍太隂之氣玄囂辰星太星太一刑殺五狄老君玄冥顓頊冬神水官北方無極隂陽正神仰慮居宅修造之所犯觸神明負越禁忌擾動龍神今故燒香行道修齋立功至心皈命謝過祈恩伏願銷南方火氣一切災凶罪咎除蕩災厄銷平舉族開泰福善咸臻龍神鎮守眷屬安寧得道之後升入無形和與道合真東北方臣等今故燒香歸身歸神歸命奉為某乙修齋行道仰謝東北方無極太上靈寶天尊已得道大聖衆至真諸君丈人梵氣天君艮宫土府太隂之神魁罡四殺八白神君仰慮居宅修造之所犯觸神明負越禁忌擾動龍神今故燒香行道謝過祈恩伏覬罪咎銷解福善咸臻存俱泰眷屬康寧龍神安鎮壽祿增延得道之後升入無形和與道合真東南方臣等今故燒香歸身歸神歸命奉為某乙修齋行道仰謝東南方無極太上靈寶天尊巳得道大聖衆至真諸君丈人梵氣天君風宫地戶招搖巽神三刑四殺六辛神君仰慮居宅修造之所犯觸神明負違禁忌擾動龍神今故燒香行道謝過希恩伏冀罪咎銷解福善咸臻存亡開泰眷屬安寧龍神鎮守壽祿增延得道之後升入無形和與道合真西南方臣等今故燒香歸身歸神歸命奉為某乙修齋行道仰謝西南方無極太上靈寶天尊巳得道大聖衆至真諸君丈人梵氣天君人門月域攝提坤神四維四極乙癸神君仰慮居宅修造之所犯觸神明負違禁忌擾動龍神今故燒香行道謝過希恩伏覬罪咎銷解福善咸臻存亡開泰眷屬安寧龍神鎮守壽祿增延得道之後升入無形和與道合真西北方臣等今故燒香歸身歸神歸命奉為某乙修齋行道仰謝西北方無極太上靈寶天尊巳得道大聖衆至真諸君丈人梵氣天君青龍司命天門之神六宫乾位壬甲神君仰慮居宅修造之所犯觸神明負違禁忌擾動龍神今故燒香行道謝過希恩伏覬災凶殄息罪咎銷平存亡開泰眷屬安寧龍神鎮守壽祿增延得道之後升入無形和與道合真上方臣等今故燒香歸身歸神歸命奉為某乙修齋行道仰謝上方無極太上靈寶天尊巳得道大聖衆至真諸君文人無極無上梵氣天君三清三境上聖髙尊日月星宿八風五行風雨雷電隂陽正神下謝乾儀天道日遊月行八龍九虎太一十精飛旗八殺北斗七星天上天下一切真靈仰慮居宅修造之所犯觸神明負違禁忌擾動龍神虧背天道穢慢三光過咎增積延致災凶今故燒香行道謝過希恩伏冀天光下燭萬罪銷平存亡同福眷屬霑榮龍神鎮守壽祿增延災衰解散動植咸寧得道之後升入無形和與道合真下方臣等今故燒香歸身歸神歸命奉為某乙修齋行道懴謝下方無極太上靈寶天尊巳得道大聖衆至真諸君丈人無極世界神仙正真髙皇土府九宫真人四司五帝十二仙君靈洞川澤嶽瀆尊神下謝隂陽所運八卦九宫五行二宅后土至真地下侯伯四正諸神八部禁忌守宅將軍五土官屬五土子孫將軍太歲豹尾黃幡奏書博士刑德衆神七十二位內外神靈下及洞冥九壘風澤神鄉隂景五帝五土太皇中黃戊已一切神明竊慮居宅修造之所犯觸神明侵傷地脈掘鑿泉源違越禁忌擾動龍神或五行刑剋四殺侵凌怪夢紛亂居止不寧今故燒香行道謝罪希恩伏冀罪瑕除蕩𡨚債和平存亡開泰眷屬咸安龍神復位壽祿增延三塗蒙福動植霑榮得道之後升入無形和與道合真三光如修靈寶止懴十方如修黃籙加三光等懴臣等今故燒香歸身歸神歸命奉為某乙修齋行道仰謝日月星宫至真大聖三光神仙諸靈官仰慮居宅修造之所犯觸神明負違禁忌穢慢三光不順星辰日月行運之期結成過咎延致災衰今故燒香行道謝過希恩伏冀靈光下燭萬罪消平存亡開泰眷屬安寧龍神復位福祚增延幽關昭朗動植舒榮得道之後升入無形和與道合真五嶽臣等今故燒香歸身歸神歸命奉為某乙修齋行道仰謝五嶽真君名山洞府得道神仙諸靈官仰慮居宅修造之所犯觸神明負違天禁地忌在五帝五嶽之司結成過咎未獲原除今故燒香行道謝過希恩伏冀一懴罪滅萬善咸臻犯觸之罪並賜銷平存亡開泰眷屬安寧災衰除蕩壽祿增延龍神鎮守動植霑榮得道之後升入無形和與道合真水府臣等今故燒香歸身歸神歸命奉為某乙修齋行道仰謝扶桑大帝暘谷神王三河四海九江水帝十二河源水府神仙諸靈官仰慮居宅修造之所犯觸神明侵傷水脈閉塞泉源違上善之性虧下潤之功輕忤真聖穢觸江河結成罪咎在水府之中歷代纏綿永蒙解釋今故燒香行道謝罪希恩伏冀尊靈鑒祐蕩滌罪瑕觸犯之目並賜銷平存亡開泰眷屬安寧災衰超度壽祿增延龍神復位動植霑榮得道之後升入無形和與道合真經寶臣等今故燒香歸身歸神歸命奉為某乙修齋行道仰謝至真無上三十六部尊經真文寶符三洞正法十方祕藏侍衛經典一切靈司仰慮居宅修造之所犯觸真靈黷穢靈蹤侵傷福地或三寶遺迹經教所行有衛法靈司侍真官屬在所居之地非常俗所知因有犯違結成罪咎在三寶之府未獲原除今故燒香行道謝過希恩伏冀萬聖開光髙尊鑒宥觸犯之罪咸賜蕩除福善來臻壽祿增益存亡開泰眷屬安寧動植蒙恩龍神復位旁資六趣遐及三塗聖澤所覃幽明全濟得道之後升入無形和與道合真太上黃籙齋儀卷之四十五
