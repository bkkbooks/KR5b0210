front:
  text: 太上黃籙齊儀卷之十一
  hash: sha256:7d644edbcfe200544b481e34ffd992bf7f3e1f86e5183f73c189724d4b377f47
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0210_HFL_011-001a, image: hfl/0271/0271-022.png}
body:
  text: 唐廣成先生杜光庭集太子降誕中分行道入戶各禮師存念如法衛靈丹靈朱火炎霞激風赤輪剛運天光八衝迸威包羅交變萬方流金豁落羣魔滅蹤辟奸破妖明耀元功金符召制躡雲策龍謡歌慶㑹散花太空神化冥運四極安隆伏御帝前罔有不恭鳴法鼓二十四通無上玄元太上道君召出臣等身中三五功曹左右官使者侍香金童傳言散花玉女五帝直符直日香官各三十二人出出者嚴裝關啓玄壇天帝神君當召此間土地里域真官正神以今奉為入意祈恩玉闕進拜丹書願得玉清道氣靈寶妙光下降流入臣等身中即使紫精鬱勃玉闕開明五老輔根萬帝攝真體圓珠映乘景驂宸金光煥赫御氣上清今臣所啓速達徑御太上無極大道無形無名虛無自然金闕玉陛下各稱法位上清玄都大洞三景弟子無上三洞法師奉行黃籙大齊降誕法事某嶽先生某帝真人臣某等同誠上啓虛無自然元始天尊無極大道太上大道君髙上大道金闕玄元天皇大帝太上老君昊天玉皇上帝十方巳得道大聖衆至真諸君文人三十六天帝君玉虛上帝玉帝太帝東華南極西靈北真玄都玉京金闕七寶玄臺紫微上宫靈寶至真明皇道君三十六部尊經玄中大法師南上好生君文昌主仙君延壽領籍韓君文人太平下教二十四真人度仙保命三界尊靈臣等伏聞二氣混融三靈化育資神功於妙本分道用於帝先天地得以生成日月因而照燭萬殊森列統之者帝王九域施張尊之者元后法天定位繼聖承基四海所瞻羣方攸仰臣等誠深奉國志切祈真敢因誕睿之辰䖍備焚修之㑹況奉詞旨敢不上聞皇帝青詞謹當宣奏讀詞按如詞言誠深修奉是用齊心玄極注想清都披九天靈寶之科按五老長生之品轉經行道然燈燒香共罄精誠䖍希景祐以今中分行道請法衆等運茲初捻上香願此香煙騰空徑上供養無上至真道寶臣等歸身歸命首體投地仰依太上三尊願以是功德歸流社稷尊靈宗祧先聖神超紫極瑞集鴻圖皇帝功格軒融仁包舜禹壽齊北極福廣東溟妃后諸王奉睿謨而康六合賢臣良輔宣帝澤而育羣生文德武功昭彰萬國今故燒香自歸依師尊大聖衆至真之德得道之後升入無形和與道合真以今中分行道請法衆等運茲二捻上香願此香煙騰空徑上供養無上至真經寶臣等歸身歸命首體投地仰依太上三尊願以是功德歸流皇太子伏冀瓊宫大帝金闕元尊鳯書錫延壽之符龍帙署長生之品追髙真於緱嶺接仙袂於嵩丘永贊睿圖克寧邦本今故燒香自歸依師尊大聖衆至真之德得道之後升入無形和與道合真以今中分行道請法衆等運茲三捻上香願此香煙騰空徑上供養無上至真師寶臣等歸身歸命首體投地仰依太上三尊願以是功德歸流三界十方諸天諸地真仙主宰川嶽職司伏冀上正三光下康品物調八風而煦育叙六氣以裁成匡俗濟人拯幽寧國兵鋒罷戢霜戈無禦敵之勞榖稼滋盈丹甑有流光之瑞道風遐布惠澤無涯今故燒香自歸依師尊大聖衆至真之德得道之後升入無形和與道合真禮方懴悔三啓三禮鬱鬱家國盛濟齊經道興天人同其願縹眇入大乘因心立福田靡靡法輪升七祖生天堂我身白日騰臣等至心稽首禮太上無極大道臣等至心稽首禮三十六部尊經臣等至心稽首禮玄中大法師重稱法位具位臣某等謹重上啓太上無極大道元始天尊太上大道君太上老君十方無極大道道德衆聖三十六部尊經玄中大法師天師君上相上宰四司五帝主仙領籍長生衆尊三界應感一切真靈臣等宿以鴻因獲參玄化披三洞三清之奧覩生天生地之宗淡寂無名混茫獨運以妙無而分妙有得之者天地齊靈因修真而契至真成之者希夷永騖由是金編玉笈祕在天闕貽福度人降於塵世保寧國祚匡輔帝王廣大難窮古今攸禀臣等誠惟奉主志切為時屬青宫誕秀之期依丹簡祈真之法翹勤星漢瞻禱穹旻香炷鳯煙經吟龍篆拜手稽首冀萬聖以潜通惟精惟䖍俟諸天之鑒映滂流景貺安鎮寶圖社稷尊靈騰神日闕宗祧列聖駕景琳宫皇帝羲暭齊華農黃繼蠋峻鼇峯而等福廓鵬海以增年妃后諸王輔寧大寶文階武列翼亮洪基皇太子睿德欽明英風振肅比周儲之孝敬逾漢二之謙恭壽永嵩衡扶前星於億載祿深溟渤廣少海於千齡二象昭融三光貞正薰風入律和氣調時農功有積於京坁民俗咸登於仁壽三徒九夜動植飛沉同均浩蕩之恩俱契正真之果上明天尊大慈之化下副臣等歸命之誠謹啓以聞發願一願大道淡泊虛無安間空寂澄清自居廣開法門教導頑夫皆蒙惠澤精苦自修預以同學普得升虛與天相保長存無憂二願諸天結氣澄清髙虛廣覆保真固靈氣候調節四運和平國安民豐普天間寧廣濟一切惠達有生保天長存億劫不傾三願土地覆載無窮安平不陷海淪不崩保鎮家國兆民興從養生安死惠周十方禾稼滋植營運日豐咸得厚載萬類皆從四願日月二景髙明無有薄蝕虧盈安靜光照諸天洞消暗冥保固劫運世祚和平普加潤澤惠灑衆生五願星辰與日齊光轉燭照耀朗映十方各安其位經緯直行保鎮家國無有災傷四海寧一普天興昌六願四時隨時推遷景氣和調無有災患疫毒消滅普天安平五榖豐熟國富民歡七願浮雲結氣聚煙飛空髙澄䕃覆玄玄隱則無為散則彌天神仙同居結友衆真惠流一切興國愛民普齊羣生人同劫年八願風雨流灑無窮普加施泄受其發揚萬物滋生國儲民豐九願五嶽各安其方巍巍包藏長為仙宫安鎮國祚保天無終護度一切莫不仰宗十願江海蕩蕩無窮舍容恢廓無細不植淵奧柔惠潤加蠕息天人獲慶年同劫石十一願帝王國土日昌四鎮安睦兵革不揚天人歌唱吉應來翔敷教濟濟威化揚揚兆庶稱慶長樂未央十二願蝖飛蠢動巳生未生咸蒙安全普得生成皆見元氣受陽之形草木果林經冬不零一切濟度靡不鮮榮和與道合真復爐香官使者左右龍虎君侍香諸靈官當今臣上章之所自然生金液丹碧芝英百靈衆真交㑹在此洞案爐前今臣體耀金輝斬伐胞根七玄拔擢百關備仙解除死籍宴坐泥丸東華紀字䇿景虛玄十方仙童玉女接侍香煙傳臣向來所啓之言速達徑御太上無極大道無形無名虛無自然金闕玉陛下出戶太上黃籙齊儀卷之十一
