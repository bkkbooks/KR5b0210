front:
  text: 太上黃籙齊儀卷之二十
  hash: sha256:9bb3834f0153c4b9d8e24cfea8f135a6ff51200c8e67fc85e9b4f7310c76c0c9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0210_HFL_020-001a, image: hfl/0272/0272-020.png}
body:
  text: 唐廣成先生杜先庭剛人臣為國消災中分行道入户各禮師存念如法衛靈丹靈朱火炎霞激風赤輪剛運天光八衝迸威包羅交變萬方流金豁落羣魔滅蹤辟姦破妖明耀元功金符召制躡雲乘龍謡歌慶㑹散花太空神化冥運四極安隆伏御帝前罔有不恭鳴法鼓二十四通無上三天玄元始三氣太上道君召出臣身中三五功曹左右官使者侍香金童傳言玉女五帝直符直日香官各三十二人出出者嚴裝關啓玄壇天帝神君當召此間土地里域真官正神急上關啓臣今奉為入意以令行道之時願得玉清道氣靈寶妙光下降流入臣等身中即使玄壇清淨內外成真天無氛穢地絶妖塵琳琅振響十方肅清萬魔不干真誠上徹令臣所啓速達徑御太上無極大道至真玉皇上帝御前各稱法位上清玄都弟子臣某等同誠上啓虛無自然元始天尊無極大道太上大道君髙上大道金闕玄元天皇大帝太上老君昊天玉皇上帝十方巳得道大聖衆至真諸君丈人三十六天帝君玉虛上帝玉帝大帝東華南極西靈北真玄都玉京金闕七寶玄臺紫微上宫靈寶至真明皇道君三十六部尊經玄中大法師三界官屬一切真靈臣等伏聞太漠未形真精獨運恢道化而裁成品物顯神功而區别三才以定髙卑以興邦國君為元首統制幽明代隂陽亭育之權司億兆慘舒之柄順天體道大庇寰區其或運履晦蒙物罹迍否一夫不獲庶類貽憂某官某乙誠切匡時志深禱福將祈嘉祐資奉聖朝臣等職在敷弘所宜關奏况承詞㫖敢不上聞讀詞按如詞言義深弘救是用按遵玄式嚴啓皇壇備通真降聖之儀考三籙九清之格香花效懇信幣達誠瀝丹悃於人寰佇玄休於天府以今中分行道請法衆等運兹初捻上香願此香煙騰空徑上供飬無上至真道寶臣等歸身歸命首體投地仰依太上三尊願以是功德歸流社稷尊靈宗祧先聖升神三境飛步十華貽巨貺而福宏圖介殊禎而昌寶曆火鼠氷蠶之野正朔無遺雞林兒樹之鄉謳歌並洽超周年世邁禹封疆今故燒香歸依師尊大聖衆至真之德得道之後升入無形和與道合真以今中分行道請法衆等運兹二捻上香願此香煙騰空徑上供飬無上至真經寶臣等歸身歸命首體投地仰依太上三尊願以是功德上祝皇帝伏覬福流玄極惠洽紫宸八海澄波廣同睿渥十山聳翠髙等聖年調玉燭於四時布瓊枝於萬葉后妃嬪御太子諸王啓迪洪休共扶皇極文階武秩良輔元勳宣七德而靜九圍奉三無而康四海五兵韜戢百穀豐登瑞牒祥符盈編溢冊普天率土俱契雍熙今故燒香歸依師尊大聖衆至真之德得道之後保天長存和與道合真以今中分行道請法衆等運兹三捻上香願此香煙騰空徑上供養無上至真師寶臣等歸身歸命首體投地仰依太上三師願以是功德歸流混茫之內道域之中上極三清下窮九壘隂陽主宰天地職司弘天尊拯護之慈宣衆聖包容之德滌除氛沴蕩滅災凶潜福帝圖永安國祚致太平之化開仁壽之庭某官某乙克廣福祥彌新壽祿惟深渥澤長贊聖明今故燒香歸依師尊大聖衆至真之德得道之後升入無形和與道合真禮方懴悔三啓頌鬱鬱家國盛濟濟經道興天人同其願縹眇入大乘因心立福田靡靡法輪升七祖生天堂我身白日騰三禮臣等至心稽首禮太上無極大道臣等至心稽首禮三十六部尊經臣等至心稽首禮玄中大法師重稱法位上清玄都弟子臣某謹重伸上啓太上無極大道元始天尊太上大道君太上老君至真無上三十六部尊經玄中大法師上相上宰四司五帝三界官屬一切真靈臣等獲以宿因躬逢道運玉書金劄降自天關龜冊虎符行於世域師資付授得以禀修而身逺雲泉跡迷塵海功未匡於邦國道未及於飛升惟勵丹襟冀酬玄造況立功行教佐國為先凡有誠祈敢忘遵副某官某乙以時逢災否憂國疚懷䖍備信儀精修齊直按太極九清之㫖依金明三洞之文燒香然燈轉經行道𥨸惟無為大教以昭感為先不測神功以精誠為本鏧精誠於下土必昭感於上玄伏惟太上三尊十方衆聖諸天諸地應感真靈開大宥之恩降無涯之澤釋除宗祧先聖爰及皇躬積過深尤無邊愆咎使神源澄靜道惠融明地紀天元息災祥之數八宏萬國扇和樂之風二象安寧三光朗徹兵鋒偃戢疫毒銷沈鷙暴摧亡龍神輯睦天兵騎乘誅剪奸妖孽黨凶徒應時殄戮風雨調順稼穡蕃滋動植殊形飛潜異禀三塗苦爽六趣幽關承懴請之緣遂逍遙之志勿為疵癘常保安貞八溟無逆浪之虞萬𣲖順朝宗之勢普兼顯晦共覩升平一切生靈咸臻道化上明天尊廣濟之澤下副臣衆等歸命之誠謹啓以聞發願一願大道淡泊虛無安間空寂澄清自居廣開法門教導頑夫皆蒙惠澤精苦是修預以同學普得升虛與天相保長存無憂二願諸天結氣澄清髙虛廣覆保真固靈氣候調節四運和平國安民豐普天間寧廣濟一切惠逮有生保天長存億劫不傾三願土地覆載無窮安平不陷海淪不崩保鎮家國兆民興從養生安死惠周十方禾稼滋植營運日豐咸得厚載萬類皆從四願日月二景髙明無有勃蝕𧇊盈安清光照諸天洞消暗冥保固劫運世祚和平普加潤惠澤灑衆生五願星辰與日月齊光轉燭照耀映朗十方各安其位經緯直行保鎮家國無有災傷四海寧一普天興昌六願四時隨節推遷景氣和調無有災患疫毒消滅普天安平五榖豐熟國富民歡七願浮雲結氣聚煙飛空髙澄䕃覆玄玄隱則無為散則彌天神仙同居結友衆真惠流一切興國愛民普濟羣生人同劫年八願風雨流灑無窮普加施泄受其發揚萬物滋生國儲民豐九願五嶽各安其方巍巍包藏長為仙宫安鎮國祚保天無終護度一切莫不仰宗十願江海蕩蕩無極含容恢廓無細不植淵奧柔惠潤加蠕息天人獲慶年同劫石十一願帝王國主日昌四鎮安睦兵革不揚天人歌唱吉應來翔敷教濟濟威化洋洋兆庶稱慶長樂未央十二願蝖飛蠢動巳生未生咸蒙安全普得生成皆見元氣受陽之形草木果林經冬不零一切濟度靡不鮮榮和與道合真復爐香官使者左右龍虎君侍香諸靈官當令臣朝元之所自然生金液丹碧芝英百靈衆真交㑹在此香火爐前令臣學道得道求仙得仙國家受慶幽顯沾恩十方仙童玉女侍衛蘭煙傳臣向來所啓速達徑御太上無極大道至真玉皇上帝御前出戶太上黃籙齊儀卷之二十
