front:
  text: 太上黃籙齋儀卷之四十七王十三
  hash: sha256:a9ccd96217167d1f8452bc0cbe81718385ce591abf99439190030285898dff7d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0210_HFL_047-001a, image: hfl/0275/0275-092.png}
body:
  text: 唐廣成先生杜光庭集人臣為國五假懴悔十方臣等至心皈命十方無極太上靈寶天尊巳得道大聖衆至真諸君丈人十鄉神仙諸靈官三禮各虔誠懴悔臣等伏聞十極諸天三千道域環拱太虛之內包羅三界之庭運妙化於上玄灑靈恩於下土洪惟景福孚祐邦家今謹有奉修黃籙大齋某官上為皇帝按依玄格敷列皇壇請福希恩修齋行道謹齎香花龍綵質信效心皈命十方元極太上靈寶天尊巳得道大聖衆至真諸君丈人十鄉神仙諸靈官今故立齋燒香然燈朗耀諸天願以是功德歸流社稷尊靈宗祧先聖九光鶴蓋登三境以逍遙八羽龍軒遊十天而放曠洪流巨福密祐聖圖皇帝體道凝旒儀乾布化御飛龍而撫物嶽固宏基執大象以承天山齊聖壽后犯嬪主柔贊帝謨太子諸王孝扶宸極公卿文武中外職寮暢和平道德之風成禮樂雍熙之理時調玉燭歲稔瓊儲百揆有倫五兵常戢龍神警衛疫毒銷沉四靈效瑞以來儀七正循常而合度洎諸幽顯普及飛潛咸承撫御之仁並契華胥之俗得道之後升入無形和與道合真三光臣等至心皈命日月星宫至真大聖三光神仙諸靈官三禮各虔誠懴謝臣等伏聞天地分靈隂陽搆象顯日月星辰之位定昏明隱見之殊七政三宫允執死生之要文昌斗極仍司罪福之權宜罄修崇以資邦國今謹有奉修黃籙大齋某官上為皇帝齎持法信敷列壇場請福希恩修齋行道皈命日月星宫至真大聖三光神仙諸靈官今故立齋燒香然燈朗耀諸天願以是功德歸流社稷尊靈宗祧先聖霓幢羽斾超升南極之宫證道沖真遊宴上清之境潛貽巨貺孚祐皇基皇帝曜魄齊尊玄樞薦壽御帝車而布政握璿軸以調時皇后嬪妃耀貞規於女使諸王太子濬靈𣲖於星津宰輔忠貞藩垣輯睦永熙百度以泰萬方賔聲教以駿奔奉琛琦而麕至三光有序五緯無愆歲叶豐登俗臻康樂飛沉動植含識有情普及幽明同升壽域得道之後升入無形和與道合真五嶽臣等至心皈命五嶽真君飛仙真人名山洞府得道神仙諸靈官三禮各虔誠懴悔臣等伏聞混沌既闢群嶽裁形捧碧落以上征𡑅黃輿而下鎮大則長離廣野舍海外之煙霞次則衡華云亭總寰中之秀異神仙所宅邦國是依式陳焚祝之儀以廣休明之福今謹有奉修黃籙大齋某官上為皇帝齎持法信敷列壇場請福希恩修齋行道皈命五嶽真君飛仙真人名山洞府得道神仙諸靈官今故立齋燒香然燈玄耀諸天願以是功德歸流社稷尊靈宗祧先聖超七域階修之果證三天飛舉之功瑩神流火之庭御景明霞之殿永隆鴻福欽贊龍圖皇帝五嶽齊寧三山比壽明堯天之日月闢禹迹之封疆儉德邁於焚裘仁煦逾於解網后妃嬪御匡翼紫宸太子諸王敷弘景化公卿輔弼宣至道以無為億兆華夷樂太平而遂性天光澄正地紀竟間九稼惟豐五兵常戢幽扄夜府異品殊倫咸承妙道之慈盡契長生之域得道之後升入無形和與道合真水府臣等至心皈命扶桑大帝暘谷神王三河四海九江水帝十二河源水府神仙諸靈官三禮各虔誠懴謝臣等伏聞體道資靈實惟水德稟元陽而化育普及群形首一氣以生成旁周品物至有九溟八海壯浮天沃日之威片葉纎莖荷潤澤霑榮之賜玄功妙力以福邦家今謹有奉修黃籙大齋某官上為皇帝按依玄式敷啓皇壇請福希恩修齋行道皈命扶桑大帝暘谷神王三河四海九江水帝十二河源水府神仙諸靈官今故立齋燒香然燈朗耀諸天願以是功德歸流社稷尊靈宗祧先聖神遊汗漫道契希夷受祕訣於玄洲得神珠於赤水皇帝滄波注福碧海均年群方歡浩蕩之恩萬國順朝宗之派后妃嬪主敷睿渥於瓊宫太子諸王濬潢源於銀漢公卿輔弼文武職寮申沃心潤色之規廣端穆澄清之化九河薦䇿溫洛彰圖天地效祥黎元蒙福旁該庶品遐及幽津共臻道德之風常荷安貞之貺得道之後升入無形和與道合真經寶臣等至心皈命至真無上三十六部尊經真文寶符三禮各虔誠懴謝臣等伏聞無為道本虛寂真宗妙頥無言希微詎測爰啓博弘之教以宣祕奧之功於是八會靈書九芒雲篆龍回鳯舞初凝太漠之中玉劄瓊篇遂刻層臺之內三十六部之廣億千萬品之多理暢重玄義包衆妙人天宗奉邦國遵行光帝道而贊皇圖散九流而康萬宇宜虔尊奉以罄齋誠今謹有奉修黃籙大齋某官上為皇帝按依科式崇設壇場請福希恩修齋行道皈命至真無上三十六部尊經真文寶符諸天祕藏十方正法侍衛經典一切靈司今故立齋燒香然燈朗耀諸天願以是功德歸流社稷尊靈宗祧先聖參真紫極蛻景洪都垂祐本枝流祥萬葉皇帝通真契道地久天長統萬國而混車書洽大同而寧海嶽后妃嬪主享福紫庭太子諸王承休皇極忠貞勳烈常勤翊贊之謀億兆生靈克保隆平之運天元順軌覩景星瑞日之暉地紀安貞符九稼八蠶之異幽明共泰動植咸安海外寰中同臻道化得道之後升入無形和與道合真太上黃籙齋儀卷之四十七
