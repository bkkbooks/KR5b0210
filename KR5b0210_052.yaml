front:
  text: 太上黃籙齋儀卷之五十二鳴四
  hash: sha256:9951f369ddb5a418ae3bcc3671596fb776452da8e2e4f5dca749c1cb38acfc8d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0210_HFL_052-001a, image: hfl/0276/0276-094.png}
body:
  text: 唐廣成先生杜光庭刪轉經夫修黃籙靈寶諸齋每日三時行道三時轉經晝夜六時為弟子聞奏誦念以祈福祉其行道後消息移時仍别升壇轉經贊道法事一如金籙簡文登壇上座誦經威儀如或風雨不常及别有法事即行道與轉經相續可矣升壇轉經法師冠元始之冠黃裙紫褐五色雲霞之帔是各法服衆官如常服衆官於師前序立知磬唱道道場衆等人各運心歸命三寶滅一切念入戶上御案香上香密呪王華散景九氣凝煙香雲密羅徑衝九天侍香金童傳言玉女傳臣所奏上聞帝前令臣所啓咸賜如言今日告齋諸天臨軒三界五帝列言上清執籙把籍齊到帝前三歸依人各恭敬至心歸依十方道寶當願衆生起心回向一切敬禮至心歸依十方經寶當願衆生心開悟解受持轉誦至心歸依十方師寶當願衆生普上法橋無有障礙道場衆等執簡端心平坐如法衆官各依位平坐讃詠如法宿命讃侍經行水行經侍香行香宿命有信然弱喪謂之無皆欲眼前見過目即言悠大賢明道教慘戚憫頑夫依依念子苦勤勤令我憂靜念如法法師依法暝日存思出威儀自然經若轉靈寶衆經法師當思身坐青黃白三色雲氣之中左青龍右白虎前朱雀後玄武日月五星照映左右侍經仙官羅列壇內已有圓光如日之象畢咽液三過叩齒三通密呪曰寂寂至無宗虛峙劫仞阿豁落洞玄文誰測此幽遐一入大乘路孰計年劫多不生亦不滅欲生因蓮花超凌三界徒慈心解世羅真人無上德世世為仙家若轉道德衆經法師當思太上老君玄中大法師尹真人河上公真人畢叩齒三十六通咽液三十六過先心存左青龍右白虎前朱雀後玄武足下八卦龜三十六獅子伏在前頭中七星五藏生五氣羅紋覆身上三一侍經各千乘萬騎天地各有萬八千玉女玉童衛之密呪曰玄玄至道宗上德體洪元天真雖逺妙近緣泥丸君宫室皆七寶窗牖自有分清靜常正真駕景乘紫雲日月左右照升仙長年全七祖生上天世為道德門若轉度人經法師當東向叩齒三十二通上聞三十二天心拜三十二過閉目靜思身坐青黃白三色雲氣之中內外蓊冥有青龍白虎朱雀玄武獅子白鶴羅列左右日月照明洞煥室內頃生圓象光映十方如此分明密呪曰無上玄元太上道君召出臣身中三五功曹左右官使者侍香金童傳言玉女五帝直符直日香官各三十二人關啓所言今日吉慶長齋清堂修行至經無量度人臣及甲乙轉經受生願所啓上徹徑御無上三十二天元始上帝至尊几前畢引氣三十二過東向誦經若轉上清洞神諸經各依本法存思呪也念諸天尊聖號啓經讃稽首虛皇天尊前請轉寶經轉衆經送經頌大量虛玄玄也解坐讃為諸來主作善因緣如蒙開悟仰荷玄恩衆官起立歎經功德出三洞科詳夫三洞寶經萬天勝範結飛玄之氣成雲篆之章義冠無生文垂永劫故天地持之以分判日月因之以運行鬼神敬之以變通人倫奉之以開度是以詠之者則形陟絳霄聞之者則神生碧落莫不人天仰賴生死依慿為羣品之津梁作衆真之戶牖不可得而言之者其惟大乘之韞乎粵有大道弟子某乙為國為家濟拔存亡按靈寶簡文考神仙品格齎紋繒鎮信油燭香花修黃籙大齋若干日夜九時行道九時轉經爾其開函演奧即響徹三清執卷吟玄乃聲聞五億當願侍香金童結香字於天中典經玉郎進經文於簡上即使愆銷昔劫福降今辰存亡荷開泰之恩動植悅生成之德洎乎悠悠庶品蠢蠢舍生俱乘六度之舟並達三清之岸三聞經聞經巳後當願羣生萬罪並消善芽增長聞經巳後當願衆生深入法門歸依信受聞經巳後當願羣生永斷執迷常歸正道旋行禮誦七真讃或三首五首如步虛法出玉京山經法師叩齒君在金華宮如嬰兒之狀太上玄虛宗弘道尊其經俯仰巳得仙歷劫無數齡巍巍太真德寂寂因無生霄景結空構乘虛自然征日月為炳灼安和樂未央學仙絶華念念念相因積去來亂我神神躁靡不歷滅念停虛間蕭蕭入空寂請經若飢渴持志如金石保子飛玄路五靈度符籍濟我六度行故能解三羅清齋禮太素吐納養雲牙逍遙金闕內玉京為余家自然生七寶人人坐蓮花仰嚼玄都奈俯酣空洞瓜容顔曜十日奚計年劫多法鼓會天仙鳴鍾徴大魔靈風扇香華璨爛開繁襟太真撫雲璈衆仙彈靈琴雅歌三天景散慧玉華林七祖升福堂由此步玄音前世福未足斯書邈難尋信道情不盡圖飛乃反沈太上無為道弘乏在兆心學道由丹信奉師如至親挹景偶清虛孜孜隨日新衆人未得度終不度我身大願有重報玄德必信然隂惡罪至深對來若轉輪學道甚亦苦晨夜建福田種德猶植樹積簣而成山子能耽玄尚飄爾升青天修是無為道當與善結緣太上至隱書名曰智慧篇拔苦由大才超俗以德真靈姿世所竒曄若淵中蓮人行各有本皆由宿世功立德務及時發願莫不從善惡俱待對倚伏理難窮賢士奉法言道亦在兼忘解是大智慧上為太極公寶蓋連玉輿命駕御九龍金華擎洞經捧香悉仙童嘯歌徹玄都鳴玉叩瓊鍾竦身凌太清超景逸紫霄保無持法綱遊玄極逍遙萬劫猶昨夜千春如晨朝巍峩蔭雲華手攀寶林條香煙自然生玄階興扶搖靈幡順風散繁想應時消滅智弘大混無為為清謡巳上並與金籙儀同小學仙讃學仙行為急奉戒制情心夷正氣居仙聖自相尋若不信法言胡為棲山林回向讃於玄師前散如常儀太極左仙公曰真頌八篇皆太上太極真人之辭衆仙常所耽誦不宣泄於下仙祕藏金闕玉房之內冝傳至人修靈寶齋者也不可示浮華之徒愼之愼之太極真人曰侍經仙童玉女聞此禮經讃詠之音皆歡恱而祐兆身也是大經悉當用此讃而禮拜矣若冥心誦經者亦心詠之乃上仙之祕辭修真之妙音也出靈寶玄都玉京山經第三天尊曰經者吾遺教導引愚迷能發衆生無量道意意從悟起因悟成真衆聖修行皆登道果故元始以一氣生化三氣分為三天一曰始氣為清微天號玉清境天寶君所化吾以龍漢之初號無形天尊於此天中出洞真寶經十二部以教天中九聖或號萬天玄師無上法王經九萬九千九百九十九億萬歲二曰元氣為禹餘天號上清境靈寶君所化吾以延康之初號元名天尊於此天中出洞玄靈寶真經一十二部以教天中九真或號三界醫王太上真尊經八萬八千八百八十八億萬歲三曰玄氣為太赤天號太清境神寶君所化吾以赤明之初號梵形天尊亦稱觀世真人出洞神寶經一十二部以教天中九仙或號十方導師至極天尊經七萬七千七百七十七億萬歲開皇攺號吾號虛皇理元陽宫中敷揚三洞下化人間號太上道君經六萬六千六百六十六億萬歲逮至上皇吾總號元始理紫微宫中廣布經戒救度羣生三洞寶經凡三十六部亦曰三乘洞真寶經謂之大乘洞玄寶經謂之中乘洞神寶經謂之小乘結飛玄之氣自然成章玉字金書龍文鳳篆大方一丈八角垂芒教化諸天流通世界始終歷劫常轉法輪或實或權有廣有略因機取悟隨世修行雖天地運終而三洞不滅開度羣品道引人天三界十方俱受利益其受每劫之初洞真下化人懷道德共處無為悉奉正真長生得道次則洞玄下化人物漸離散朴澆淳失道叛德末則洞神下化人物轉更澆浮不奉正真年命短促自是之後人心破壞三洞不行智慧曰興人鬼交雜運度促急不滿百年念念無常死亡不絶吾重出宣行三洞布化人間隨代機緣敷弘經教或大或小順物所冝故元始本文未盡下教其三清上境四梵天中真聖修行其文具足山川洞府海嶽山宫雖有所修亦不備足謂隨方所修之經三洞不得備足也故命老子託化人間救度衆生演出科戒或夷或夏或聖或凡周遍十方悉令開度三洞妙法散在人間勸諸女男使勤修習凡夫積罪業纍沉迷與道無緣不能信奉唯從偽法諸雜邪神徒竭身心終歸地獄其信行三洞悉入福堂或白日升舉尸解遁形隱迹洞宫遊行世界長生變號永劫長存鍊氣易形轉神入道人莫能識無量無邊吾過去後魔教轉興天下同遵人民夭折兵戈水火疾病死傷國破家亡朝夕相繼竭其府庫以奉妖邪偽亂日興澆訛時扇飢寒苦惱父子流移天下愚愚永無悟矣吾念爾輩積劫沈淪説是要言以示聾瞽然三洞妙法法有二種一者真法二者化法真法者離諸虛妄永劫長存化法者文字流通隨時變滅化法之中凡有五種一者結飛玄之氣雲篆成章離合自然變見不測在三清上境常住鎮經億劫長存聖真扶護二者靈書一丈八角煥明在三界十方諸天五億隨劫升降應感流傳三者諸天宫殿樓閣臺房門戶之間書題誦詠制伏人物出入修行四者花文葉字玉箚瓊編方丈蓬萊間風玄圃乍隱乍顯隨劫存亡教習神仙伏諸魔鬼五者紙墨縑素竹木漆書散在人間流傳誦詠劫初即下劫末還升保國安人開度羣品經者元始之言教化衆生使識根元本始宿命因緣罪福報對善惡吉凶生化門戶方便所由今攺惡從善保安性命長生無為歸之於道永劫軌模保之者福降修之神仙矣出業報因緣經太上道君謂三天法師曰夭尊教戒三洞妙文天書玉字雲篆龍章雖復無邊總括條疏雖十二事部類分别隨根不同一者自然本文二者神符三者寶訣四者靈圖五者譜籙六者戒律七者威儀八者方法九者術數十者傳記十一者讃頌十二者章表自然本文天書八會鳳篆龍章是為天地萬物之本開化人神成立諸法主召九天神仙上帝校定圖籙調正璇璣攝制酆都降魔伏鬼勑命水帝召龍上雲天地劫期聖真名諱所治城臺衆真境界廣宣分别種種降差服御元精化形之法神符者雲篆之文神真之信召攝衆魔威制神鬼總元御運保命留年玉訣者天真上聖述釋天書八會之字以為正音開示大道靈圖者衆聖化迹應見無方圖寫變通令總悟解譜籙者衆聖記述仙真名諱宗本胄胤神宫位緒戒律者條制勑約防非檢過詮量罪福分别輕重威儀者具示齋戒進退楷模俯仰節度式容止方法者衆聖著述丹藥祕要神草靈芝柔金水玉修飬之道術數者明辨思神存真念道心齋坐忘遊空飛步餐吸六氣導引三光錬質化形仙度之法傳記者是諸衆聖載述學業得道成真通玄入妙修因方所證果時節讃頌者衆真大聖巧飾法言稱揚正道令總信樂發起回向生尊重心章表者師資傳授妙寶竒文登壇告盟啓誓傳度悔謝請福關告之辭此十二事總統衆法一切意趣無不備周化引三乘入一乘道三洞真經部帙品目洞真實經十二部凡二十三萬三百八十卷太一部第一妙林部第二太清部第三徹視部第四上清部第五開化部第六元陽部第七妙真部第八開山部第九十仙部第十玉林部第十一黃老部第十二洞玄寶經十二部凡八十萬四千卷靈和部第一靈寶部第二通神部第三無量部第四集仙部第五內祕部第六真志部第七集善部第八鍊精部第九生尸部第十宫圖部第十一鍊魔部第十二洞神寶經十二部凡八十四萬二千卷太真部第一至德部第二黃庭部第三鍊氣部第四道德部第五元神部第六大劫部第七內簡部第八神呪部第九三皇部第十按摩部第十一小劫部第十二右三洞三十六部共一百八十七萬六千三百八十卷歷代聖人神仙所受經老君授上三皇玄中大經老君授中三皇太素經老君授下三皇金闕祕經老君授中三皇開元經老君授後三皇攝提本經老君授伏羲元陽經三十四卷老君授神農元精經三百六十卷老君授祝融安神經老君授黃帝道德經天真皇人授黃帝三一經龍蹻經老君授顓頊微言經三十卷老君授天老天元經老君授帝嚳黃庭經五十卷老君授帝堯玄德經老君授帝舜政事離合經老君授夏禹德戒經老君授殷湯長生經四十卷老君授文王赤精經老君授武王虛無經老君授昭王八天隱文經老君授尹喜出塞經化胡經西升經元陽經道德經內解經九室經老君授南滎趎衛生經老君授宋王六甲經老君授始皇鬼林經老君授干吉太平經老君授漢張天師玉訣九千篇符圖七千章神呪四千首科律教戒一千二百卷老君授寇謙之新科一百二十卷西王毋授漢武帝上清經四十六卷王君授魏夫人上清經三十二卷三真人授葛仙翁靈寶經十六卷太極真人授抱朴子靈寶經十四卷三真人授仙人李順興上清經七卷三茅君授仙人周子良上清經四卷河上公授漢文帝道德經章句二卷自三古巳降迄于巨唐寶軸靈文或隱或見或出於史册或著在别傳至宋朝簡寂先生校讎之際述珠囊經目萬八千卷其後江表干戈秦中兵革真經祕册流散者多後周武帝立通玄觀收集衆經猶及萬卷洎隋火版蕩唐室龍興剪掃氛祅底寧寰宇至開元之歲經訣方興玄宗著瓊綱經目凡七千三百卷復有玉緯别目記傳疏論相兼九千餘卷尋值二胡猾夏正教凌遲兩京祕藏多遇焚燒上元年中所收經籙六千餘卷至大曆年申甫先生海內搜揚京師繕寫又及七千卷長慶之後咸通之間兩街所寫𦆵五千三百卷近屬巨寇凌犯大駕南巡兩都煙煤六合榛𣗥真宫道宇所在凋零玉笈琅函十無三二余屬兹艱會漂寓成都扈蹕還京淹留未幾再為搜捃備涉艱難新舊經誥僅三千卷未獲編次又屬省方所得之經尋亦亡墜重遊三蜀更欲搜揚纍祖兵鋒未就前志時大順二年辛亥八月三日庚辰成都玉局化閲省科教聊記云耳太上黃籙齋儀卷之五十二
