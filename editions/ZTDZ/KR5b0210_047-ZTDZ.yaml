front:
  text: 太上黄籙齋儀卷之四十七王十三
  hash: sha256:4b3b4944c3a79847207b2728ec7435f646906db0e4c8e557e44301c9dea84cf2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0210_SJB_047-090319a, image: sjb/09/090319a.png}
body:
  text: 唐廣成先生杜光庭集人臣爲國五叚懴悔十方臣等至心皈命十方无極太上靈寳天尊巳得道大聖衆至眞諸君丈人十鄉神仙諸靈官三禮各虔誠懴悔臣等伏聞十極諸天三千道域環拱太虚之内包羅三界之庭運妙化於上玄灑靈恩於下土洪惟景福孚祐邦家今謹有奉修黃籙大齋某官上爲皇帝按依玄格敷列皇壇請福希恩修齋行道謹齎香花龍綵質信效心皈命十方元極太上靈寳天尊巳得道大聖衆至眞諸君丈人十鄉神仙諸靈官今故立齋燒香然燈朗耀諸天願以是功德歸流社稷尊靈宗祧先聖九光鶴蓋登三境以逍遥八羽龍軒遊十天而放曠洪流巨福宻祐聖圖皇帝體道凝旒儀乾布化御飛龍而撫物嶽固宏基執大象以承天山齊聖壽后犯嬪主柔賛帝謨太子諸王孝扶宸極公卿文武中外職寮暢和平道德之風成禮樂雍熈之理時調玉燭歳稔瓊儲百揆有倫五兵常戢龍神警衛疫毒銷沉四靈效瑞以來儀七正循常而合度洎諸幽顯普及飛潜咸承撫御之仁並契華胥之俗得道之後昇入无形和與道合眞三光臣等至心皈命日月星宫至眞大聖三光神仙諸靈官三禮各虔誠懴謝臣等伏聞天地分靈隂陽搆象顯日月星辰之位定昏明隱見之殊七政三宫允執死生之要文昌斗極仍司罪福之權宜罄修崇以資邦國今謹有奉修黄籙大齋某官上爲皇帝齎持法信敷列壇場請福希恩修齋行道皈命日月星宫至眞大聖三光神仙諸靈官今故立齋燒香然燈朗耀諸天願以是功德歸流社稷尊靈宗祧先聖霓幢羽斾超昇南極之宫證道冲眞遊宴上清之境潜貽巨貺孚祐皇基皇帝曜魄齊尊玄樞薦壽御帝車而布政握璿軸以調時皇后嬪妃耀貞䂓於女使諸王太子濬靈𣲖於星津宰輔忠貞藩垣輯睦永熈百度以泰萬方賔聲敎以駿奔奉琛𤦺而麕至三光有序五緯無愆歲叶豐登俗臻康樂飛沉動植含識有情普及幽明同昇壽域得道之後昇入无形和與道合眞五嶽臣等至心皈命五嶽眞君飛仙眞人名山洞府得道神仙諸靈官三禮各虔誠懴悔臣等伏聞混沌旣闢群嶽裁形捧碧落以上征𡑅黄輿而下鎭大則長離廣野舍海外之煙霞次則衡華云亭緫寰中之秀異神仙所宅邦國是依式陳焚祝之儀以廣休明之福今謹有奉修黄籙大齋某官上爲皇帝齎持法信敷列壇場請福希恩修齋行道皈命五嶽眞君飛仙眞人名山洞府得道神仙諸靈官今故立齋燒香然燈玄耀諸天願以是功德歸流社稷尊靈宗祧先聖超七域階修之果證三天飛舉之功瑩神流火之庭御景明霞之殿永隆鴻福欽賛龍圖皇帝五嶽齊寧三山比壽明堯天之日月闢禹跡之封疆儉德邁於焚裘仁煦逾於解網后妃嬪御匡翼紫宸太子諸王敷弘景化公卿輔弼宣至道以無爲億兆華夷樂太平而遂性天光澄正地紀竟閑九稼惟豐五兵常戢幽扄夜府異品殊倫咸承妙道之慈盡契長生之域得道之後昇入无形和與道合真水府臣等至心皈命扶桑大帝暘谷神王三河四海九江水帝十二河源水府神仙諸靈官三禮各虔誠懴謝臣等伏聞體道資靈寔惟水德禀元陽而化育普及群形首一炁以生成旁周品物至有九溟八海壯浮天沃日之威片葉纎莖荷潤澤霑榮之賜玄功妙力以福邦家今謹有奉修黄籙大齋某官上爲皇帝按依玄式敷啓皇壇請福希恩修齋行道皈命扶桑大帝暘谷神王三河四海九江水帝十二河源水府神仙諸靈官今故立齋燒香然燈朗耀諸天願以是功德歸流社稷尊靈宗祧先聖神遊汗漫道契希夷受祕訣於玄洲得神珠於赤水皇帝滄波注福碧海均年群方歡浩蕩之恩萬國順朝宗之派后妃嬪主敷睿渥於瓊宫太子諸王濬潢源於銀漢公卿輔弼文武職寮申沃心潤色之䂓廣端穆澄清之化九河薦䇿温洛彰圖天地効祥黎元蒙福旁該庶品遐及幽津共臻道德之風常荷安貞之貺得道之後昇入无形和與道合眞經寳臣等至心皈命至眞无上三十六部尊經眞文寳符三禮各虔誠懴謝臣等伏聞無爲道本虚寂眞宗妙頥無言希微詎測爰啓博弘之敎以宣祕奥之功於是八㑹靈書九芒雲篆龍迴鳯舞初凝太漠之中玉劄瓊篇遂刻層臺之内三十六部之廣億千萬品之多理暢重玄義包衆妙人天宗奉邦國遵行光帝道而賛皇圖散九流而康萬宇宜虔尊奉以罄齋誠今謹有奉修黄籙大齋某官上爲皇帝按依科式崇設壇場請福希恩修齋行道皈命至眞无上三十六部尊經眞文寳符諸天祕藏十方正法侍衛經典一切靈司今故立齋燒香然燈朗耀諸天願以是功德歸流社稷尊靈宗祧先聖參眞紫極蛻景洪都垂祐本枝流祥萬葉皇帝通眞契道地久天長統萬國而混車書洽大同而寧海嶽后妃嬪主享福紫庭太子諸王承休皇極忠貞勲烈常勤翊賛之謀億兆生靈克保隆平之運天元順軌覩景星瑞日之暉地紀安貞符九稼八蠶之異幽明共泰動植咸安海外寰中同臻道化得道之後昇入无形和與道合眞太上黃籙齋儀卷之四十七
