front:
  text: 太上黃籙齋儀卷之二十五歸三
  hash: sha256:c4ca1db1f4db3e01a1a97f7a6d892d0b736cf1f43751abc737bd654ea0fb7276
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0210_SJB_025-090249c, image: sjb/09/090249c.png}
body:
  text: 唐廣成先生杜光庭刪安宅三時通用行道入戸各禮師存念如法衞靈五星列照煥明五方水星却災木德致昌熒惑消禍太白辟兵鎭星四㨿家國利亨名刋玉簡字籙帝房乘飈扇景飛騰太空出入冥無遊宴十方五雲浮蓋招神攝風役使萬靈上衞仙翁鳴法鼓二十四通無上三天玄元始三炁太上道君召出臣身中三五功曹左右官使者侍香金童傳言玉女五帝直符直日香官各三十二人出出者嚴装關啓玄壇天帝神君當召此間土地里域眞官正神急上關啓臣今奉爲入意願得玉清道氣靈寳妙光下降流入臣等身中即使玄壇清淨内外成眞天無氛穢地絶妖塵琳琅振響十方肅清萬魔不干眞誠上徹令臣所啓之言速達徑御太上無極大道無形無名虚無自然金闕玉陛下各稱法位具位臣某等同誠上啓虚無自然元始天尊無極大道太上大道君太上老君髙上玉皇十方巳得道大聖衆至眞諸君丈人三十六天帝君玉虚上帝玉帝大帝東華南極西靈北眞玄都玉京金闕七寳玄臺紫微上宫靈寳至眞明皇道君三十六部尊經玄中大法師九土玉皇四司五帝三界應感一切眞靈臣等伏聞天地權輿隂陽生化裁成萬象統御羣方咸承不宰之功共洽無爲之理洎乎大道旣隱淳化不流棟宇易巢穴之風土木興僣奢之兆由是明于禁忌幽犯神靈爰徴悔謝之儀應獲感通之妙所以三尊演敎萬聖懸科五符表禳鎭之機三寳開懴祈之訓臣獲參眞敎謬處職寮所宜佐國立功扶危濟俗凡有詞㫖敢具上聞讀詞按如詞言理冝陳奏弟子某等以所居之地慮營葺非冝思立齋功以申禳謝謹爲按依科典崇設壇場燒香然燈轉經行道冀慿關奏俾獲感通以今某分行道請法衆等運兹初捻上香願此香煙騰空徑上供養無上至眞道寳臣等歸身歸命首體投地仰依太上三尊願以是功德歸流聖朝宗廟社稷尊靈騰景九清流祥萬㝢保寧休運幽賛睿圖皇帝德廣二儀明均兩曜野無遺逸朝富忠貞后妃承康泰之風中外叶和平之化今故燒香自歸依師尊大聖衆至真之德得道之後升入無形和與逍合眞以今某分行道請法衆等運兹二捻上香願此香煙騰空徑上供養無上至眞經寳臣等歸身歸命首體投地仰依太上三尊願以是功德歸流弟子某家九世七玄億曽萬祖超離幽夜升覩光明錬質南宫生神上境洎乎三塗異趣六道殊倫同沐薰修咸登福路今故燒香自歸依師尊大聖衆至眞之德得道之後升入無形和與道合眞以今某分行道請法衆等運兹三捻土香願此香煙騰空徑上供養無上至眞師寳臣等歸身歸命首體投地仰依太上三尊願以是功德歸流齋主某家六姻五族眷屬親縁杜厄運於將來釋罪尤於旣往維新福祚増益年齡居止攸冝龍神安鎭然後飛沉動植一切含靈共荷玄休普均洪澤今故燒香自歸依師尊大聖衆至眞之德得道之後升入無形和與道合眞禮方懴悔三啓頌樂法以爲妻愛經如珠玉持戒制六情念道遣所欲淡泊正氣停蕭然神靜黙天魔並敬護世世受大福鬱鬱家國盛濟濟經道興天人同其願縹緲入大乘因心立福田靡靡法輪升七祖生天堂我身白日騰大道洞玄虚有念無不契錬質入仙眞遂成金剛體超度三界難地獄五苦解悉歸太上經靜念稽首禮三禮臣等至心稽首禮太上無極大道臣等至心稽首禮三十六部尊經臣等至心稽首禮玄中大法師重稱法位具位臣某等謹重伸上啓太上無極大道元始天尊太上大道君太上老君十方巳得道大聖衆至眞大帝天帝三十六部尊經玄中爲法師土府太皇地下五帝三天大法師正一眞人三界官屬應感眞靈伏聞玄化宣行道風遐布惠周三界恩溥羣生盟威懸佐國之科靈寳著懴祈之品凡有祈向克獲感通弟子某以跡處塵寰未參幽妙而卜築之所居止非冝竊慮忤犯眞靈違越禁忌乖八宅五行之候𧇊隂陽刑德之方旣切憂疑願申祈謝是用肅嚴壇墠精按典儀䖍備香花恭修齋直歸心十極懴罪諸天依正一法文天師具格謁請三五官屬天君吏兵禳却凶邪解銷災咎臣謹爲某上請無上髙倉君都曹正氣君素車白馬君考召君運氣解患守宅君天上咎逆君廣司君北城詔命化喻謀議君天心剌史從事平天君無上太和君収神上明君上元士君蓋天大將軍無上天君赤天倉氣君四胡君制地君天昌君五鎭大將軍主爲某家解除三丘五墓地下衆精月食土氣百病惡逆盗賊耗害刑殺凶殃之氣五瘟百病刑禱精邪四方破射五部兵獵房廟呪詛衆考諸妖之屬及五行復注之氣留停藏匿之神積世流殃行年災厄十二刑害中外彊𦍙一切凶神咸從銷解其有運材摙石動土興工犯天地正神乖隂陽眞氣侵傷土府違忤神明幽顯旣殊常情罔測因今悔謝並乞蕩除即使正氣宣行龍神安鎭災殃殄絶福善來臻居止安寧動靜和泰親縁族屬同沐利貞七祖生天三途清晏九幽罷對長夜開光𡨚債和平謀議潜息伏尸故氣滯魄幽魂俱荷福縁各蒙開泰捨邪歸正契道通眞帝祚遐長生靈昭暢普天全濟蠢動沾榮上明天尊廣濟之澤下副臣衆等懴謝之誠謹啓以聞發願一願乾坤明素二願氣象清玄三願聖人萬壽四願化洽八埏五願天垂甘露六願地發祥煙七願四時應候八願萬物生全九願家多孝悌十願國富才賢十一願齋功廣被十二願善瑞日臻復爐香官使者左右龍虎君侍香諸靈官當令臣行香之所自然生金液丹碧芝英百靈衆眞交㑹在此香火爐前令臣學道得道求仙得仙齋主受福幽顯沾恩十方仙童玉女接侍蘭煙令臣所啓之言速達徑御太上無極大道虚無自然金闕玉陛下出戸太上黄籙齋儀卷之二十五
