front:
  text: 太上黄籙齋儀卷之四十三王九
  hash: sha256:cc2108d8c7434df6981f0987d585d4e99d7bbb7209e7e270b36375ce987696b6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0210_SJB_043-090308a, image: sjb/09/090308a.png}
body:
  text: 唐廣成先生杜光庭集士庶消災五方懴儀或昇壇盛寒盛暑及風雨之變恐失禮容或致忽宜用此懴以從簡要先禮方臣等至心皈命十方无極太上靈寳天尊巳得道大聖衆至眞諸君丈人十鄉神仙諸靈官三禮各虔誠懴悔次懴悔臣等伏聞十極天尊垂拱於无何之上五老上帝開圖於太漠之中弘道德以化群方布恩慈而臨品物凡所祈啓必獲感通今謹有黄籙大齋主某官某乙恩重君親義深家國將崇福祉爰設壇場依按科儀齎持法信皈命十方无極太上靈寳天尊巳得道大聖衆至眞諸君丈人十鄉神仙諸靈官特乞垂不宰之仁播無私之澤降禎祥於宗廟延祚暦於聖躬萬國咸寜五兵自偃次乞齋主某家九玄七祖超度朱宫五族六親列名丹簡千災不作百福維新一切生靈同臻達廕得道之後昇入无形和與道合眞三光臣等至心皈命日月星宫至眞大聖三光神仙諸靈官三禮各虔誠懴臣等伏聞懸象著明照臨下土三光垂曜品物流形日帝月君旁統死生之録星宫斗極兼司罪福之文今謹有黄籙大齋主某官某至心皈命日月星宫至眞大聖三光神仙諸靈官特乞垂大有之恩布無私之德延休帝業降福聖朝增壽曆於無疆致昇平於萬宇次乞齋主某家九玄開度百福咸臻禄算維新災衰永息三塗九夜識連珠合璧之輝蠢動含靈蒙照燭生成之賜得道之後昇入无形和與道合眞五嶽臣等至心皈命五嶽眞君名山洞府得道神仙諸靈官三禮各䖍誠懴謝臣等伏聞二儀旣闢五嶽分雄下鎭坤輿上扶乾蓋名山靈洞統制鬼神隂府仙曹主張罪福今謹有黄籙大齋主某官某至心皈命五嶽眞君名山洞府得道神仙諸靈官特乞鑒映丹誠降流洪福先資國祚宻祐帝圖延鳯紀於億千齊鶴年於嵩華次及齋主某家九玄七楊滯識幽牢太山除簡對之丈仙洞得逍遥之路見存姻屬内外宗親禄壽増凶災殄息落罪書於五嶽列仙籍於九天蠢動飛沉並蒙開泰得道之後昇入无形和與道合眞水府臣等至心皈命扶桑大帝暘谷神王三河四海九江水帝十二河源水府神仙諸靈官三禮各虔誠懴謝臣等伏聞八海扶天泛十洲於物外九江控日分六合於寰中乾坤資運載之功動植荷涵濡之德潜包洞府以統生靈旣司罪福之源宜罄皈依之懇今謹有黄籙大齋主某官其至心皈命扶桑大帝暘谷神王三河四海九江水帝十二河源水府神仙諸靈官特乞開上善之仁播靈長之澤納禎祥於帝闕重輯河圖増壽紀於聖躬永安海嶽驚波不作品𩔖咸寧次乞齋主某家九祖七玄生天證道出泉曲寒庭之境造方壷圓嶠之宫見在宗親同沾景貺降流福祚洗滌災愆衆善日新群生俱泰得道之後昇入无形和與道合眞經寳臣等至心皈命太上三尊十方衆聖至眞无上三十六部尊經眞文寳符三禮各虔誠懴謝臣等伏聞天地之前混茫之首玉京金闕巳弘大道之風龍篆鳯文乆闡重玄之敎初傳天上漸降人間有長生不死之圖有利物安人之訓帝王宗之以布化至士修之以昇天爲萬法之根源實九流之宗本所宜禀奉以降休祥今謹有黄籙大齋主某官某至心皈命三十六部尊經眞文寳符特乞開大宥之恩鍚無疆之福永匡聖運幽賛鴻圖九重齊海嶽之安萬國混車書之化次乞齋主某家三師九祖列丹簡之善名見在親姻除黑書之罪目潜通祕訣宻證仙階禄壽維新災凶永息飛沉動植俱沐玄恩得道之後昇入无形和與道合眞太上黄籙齋儀卷之四十三
