front:
  text: 太上黃籙齋儀卷之二十一
  hash: sha256:504c747fb61fb85127f8252b2f06ce8db3e42e1ac1a1a785e2e4334c3655720a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0210_SJB_021-090238c, image: sjb/09/090238c.png}
body:
  text: 唐廣成先生杜光庭剛人臣爲國消災落景行道入戸各禮師存念如法衞靈五星髙耀瑞炁飛浮元始集神天地交周玉符寳節嘯命微幽擲火揚威奸凶無留萬魔振伏紛葩却消摧怪伐惡道炁同流神光照夜隂翳俱収萬仙降格扇景乗飈羣生咸遂惠遍神州鳴法鼓二十四通無上三天玄元始三炁太上道君召出臣身中三五功曹左右官使者侍香金童傳言玉女五帝直符直日香官各三十二人出出者嚴裝關啓玄壇天帝神君當召此間土地里域眞官正神急上關啓臣今奉爲入意以今燒香行道願得玉清道炁靈寳妙光下降流入臣等身中即使玄壇清淨内外成眞天無氛穢地絶妖塵琳琅掁響十方肅清萬魔不干眞誠上徹令臣所啓速達徑御太上無極大道至眞玉皇上帝御前各稱法位上清玄都弟子臣某等同誠上啓虚無自然元始天尊無極大道太上大道君髙上大道金闕玄元天皇大帝太上老君昊天玉皇上帝十方已得道大聖衆至眞諸君丈人三十六天帝君玉虚上帝玉帝大帝東華南極西靈北眞玄都玉京金闕七寳玄臺紫微上宫靈寳至眞明皇道君三十六部尊經玄中大法師三界官屬一切眞靈臣等伏聞三統肇分萬邦棊布非帝王無以撫御非道德無以鎭寧三皇體道以君臨五帝宣德而成化由是民懷朴厚俗致淳和六炁均調四時平泰其後隂陽差爽九六相乗炎黃有征伐之興堯湯有水旱之變率資盛德旁頼神功天地萬靈咸加幽賛旣逢否運冝禱眞靈用遵修奉之科庶降厖洪之福況承詞㫖敢不上聞讀詞按如詞言儀形家國某官某乙誠深匡賛翹仰尊靈齎備信儀䖍修齋直依三元品格靈寳明科燒香然燈轉經行道歷諸天而告謝周萬聖以歸依冀達上玄廣流禎貺以今晚朝行道請法衆等運兹初捻上香願此香煙騰空徑上供養無上至眞道寳臣等歸身歸命首體投地仰依太上三尊願以是功德歸流社稷尊靈宗祧先聖升神紫闕流福皇圖友五帝於瓊宫優游自適貽千祥於寳胤隆盛無窮今故燒香歸依師尊大聖衆至眞之德得道之後升入無形和與道合眞以今晚朝請法衆等運兹二捻上香願此香煙騰空徑上供養無上至眞經寳臣等歸身歸命首體投地仰依太上三尊願以是功德上祝皇帝伏冀九天寳曆増聖壽於無疆八海瓊波廣宏休於不極明逾兩曜臨照無私德並二儀含弘益大后妃嬪御柔範布於九圍太子諸王懿勣光於萬葉文武卿佐中外職僚敷暢帝猷振揚鴻化洎乎鳶郊鴈塞異域殊封常洽雍熈克臻道化今故燒香歸依師尊大聖衆至眞之德得道之後保天長存和與道合眞以今晚朝行道請法衆等運兹三捻上香願此香煙騰空徑上供養無上至眞師寳臣等歸身歸命首體投地仰依太上三尊願以是功德旁周三界普及羣方同播玄功共宣洪澤運三天之正炁蕩滌姦兇召八極之神兵殄平妖沴允昌大業克固宏基某官某乙神介休禎天資祚壽永䖍忠孝常奉聖明今故燒香歸依師尊大聖衆至眞之德得道之後升入無形和與道合眞禮方懴悔三啓頌大道洞玄虚有念無不契煉質入仙眞遂成金剛體超度三界難地獄五苦解悉歸太上經靜念稽首禮三禮臣等至心稽首禮太上無極大道臣等至心稽首禮三十六部尊經臣等至心稽首禮玄中大法師重稱法位上清玄都弟子臣某等重伸上啓太上無極大道元始天尊太上大道君太上老君至眞無上三十六部尊經玄中大法師上相上宰四司五帝三界官屬一切尊靈臣等伏聞聖主垂衣撫臨億兆承天布化體道御時必昭敬於上玄以資景祐冀和寜於下土以永昌圖故得天道潜扶神明幽賛人天交感寰海用康近以九六乘時隂陽愆爽災凶在運中外貽憂某官某乙理國志深致君誠切思弘勝福仰奉聖朝披按典儀精嚴法信馳心三境注念諸天恭啓壇場䖍修齋直臣等洗心靜念沐浴清虚燒香然燈轉經行道謄詞誠於十極祈鑒祐於三清伏惟無上法王至眞衆聖臨瓊軒而下矚流巨貺以周霑調正天元和平地紀使三光融朗五緯循常彗孛韜形景星効祉八風叶序六炁均調水旱無侵災妖殄絶山川靜謐鷙獸銷藏俗洽淳貞物無疪癘鬼魔竄跡邪孽摧亡夷狄懷朶邊封清晏姦臣賊子効節輸忠烽燧不驚干戈戢息帝圖昌盛聖壽延長朝富忠良野無遺逸六宫百辟共揚道德之風太子諸王同賛厖洪之業梯航畢集稼穡常豐某官某乙允介禎休惟新禄社洎乎幽泉寒府六趣三塗慧日流光永除昏晦神風滌穢克遂清涼蠢動飛沈俱升法界上明天尊大慈之澤下副臣衆等懴謝之誠謹啟以聞發願一願大道流行普天懷德二願一切有生咸皆悟道三願九夜幽魂一時解脫四願孤爽無依咸得受生五願天下太平五榖豐熟六願臣忠子孝君仁父慈七願四海通同𡨚親和釋八願潜胞處卯咸得生成九願積疾新痾旋即痊愈十願孤露衆生豐衣足食復爐香官使者左右龍虎君侍香諸靈官當令臣行道之所自然生金液丹碧芝英百靈衆眞交會在此香火洞案爐前令臣學道得道求仙得仙國家受慶幽顯沾恩十方仙童玉女侍衞蘭煙傳臣向來所啓速達徑御太上無極大道至眞玉皇上帝御前出戸太上黄籙齋儀卷之二十一
