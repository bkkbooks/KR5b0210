front:
  text: 太上黄籙齋儀卷之十二
  hash: sha256:1302b1a0f2c795e81d514758255a6531c5abda36bfa83b38db7ecedcaed2373e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0210_SJB_012-090213b, image: sjb/09/090213b.png}
body:
  text: 唐廣成先生杜光庭集太子降誕落景行道入戸各禮師存念如法衛靈五星髙曜瑞炁飛浮元始集神天地交周玉符寳節嘯命微幽擲火揚威奸凶無留萬魔振伏紛葩却消摧怪伐惡道炁同流神光照夜隂翳俱收萬神降格扇景乗飈羣生咸遂惠遍神州鳴法鼓二十四通无上玄元太上道君召出臣等身中三五功曹左右官使者侍香金童傳言散花玉女五帝直符直日香官各三十二人出出者嚴裝關啓玄壇天帝神君當召此間土地里域眞官正神以今奉爲入意祈恩玉闕進拜丹書願得玉清道炁靈寳妙光下降流入臣等身中即使紫精鬱勃玊闕開明五老輔根萬帝攝眞體圓珠映乗景𩥵宸金光煥赫御炁上清今臣所啓速達徑御太上无極大道無形無名虚无自然金闕玉陛下各稱法位上清玄都大洞三景弟子无上三洞法師奉行黄籙大齋降誕法事某嶽先生某帝眞人臣某等同誠上啓虚无自然元始天尊无極大道太上大道君髙上大道金闕玄元天皇大帝太上老君昊天玉皇上帝十方巳得道大聖衆至眞諸君丈人三十六天帝君玉虚上帝玉帝太帝東華南極西靈北眞玄都玉京金闕七寳玄臺紫微上宫靈寳至眞明皇道君三十六部尊經玄中大法師南上好生君文昌主仙君長生領籍司命韓君丈人太平下敎二十四眞人三界應感一切眞靈臣等伏聞太虚无象以道爲萬象之根萬象禀生以道爲通生之本由是玄黄叙列光景昭宣日闕月城髙闢九清之上至眞元聖端居八景之中孚巨澤而濟人天播神功而鎭邦國所以五篇靈奥賞五帝而廓五方三洞弘深出三清而福三界巍乎至極歷劫所尊某等夙奉玄經䂊參眞妙思憑道力上答昌期當重離耀彩之辰祈萬聖垂祥之錫況承詞旨敢不上聞皇帝青詞謹當宣奏讀詞按如詞言理宜關奏是用按重玄祕範開衆妙福庭燒香然燈轉經行道宅神恬漠抗志希微共勵精誠以希禎祐以今落景行道請法衆等運兹初捻上香願此香煙騰空徑上供養无上至眞道寳臣等歸身歸命首體投地仰依太上三尊願以是功德歸流宗社尊靈列聖昭穆八霞寳輿凌碧漢以登眞萬景颷輪輾絳霄而證道凝神紫殿垂祐皇圖超連陸以無爲邁羲融而永祚今故燒香自歸依師尊大聖衆至眞之德得道之後昇入无形和與道合眞以今落景行道請法衆等運茲二捻上香願此香煙騰空徑上供養无上至眞經寳臣等歸身歸命首體投地仰依太上三尊願以是功德歸流皇帝伏冀福澄八海擁群瑞以朝宗壽聳五山集千祥而拱極納勛華於術内吞軒昊於彀中妃后六宫匡扶睿德諸王百揆翼賛天休萬國和寧五兵韜戢三農衍溢品位舒榮今故燒香自歸依師尊大聖衆至眞之德得道之後昇入无形和與道合眞以今落景行道請法衆等運茲三捻上香願此香煙騰空徑上供養无上至眞師寳臣等歸身歸命首體投地仰依太上三尊願以是功德歸流皇太子伏冀青宫納祐皇極貽休龍樓増明兩之輝雞㦸耀重光之瑞福崇崑閬壽永椿齡孝德忠䂓光敷萬宇今故燒香自歸依師尊大聖衆至眞之德得道之後昇入无形和與道合眞禮方懴悔三啓三禮大道洞玄虚有念無不契鍊質入仙眞遂成金剛體超度三界難地獄五苦解悉歸太上經靜念稽首禮臣等至心稽首禮太上无極大道臣等至心稽首禮三十六部尊經臣等至心稽首禮玄中大法師重稱法位具位臣某等謹重上啓太上无極大道元始天尊太上大道君太上老君十方无極大道道德衆聖三十六部尊經玄中大法師天師君上相上宰四極眞王長生大聖主仙衆眞南宫領校三界尊靈臣等伏聞元洞玉曆大有金書開光至極之初汎景太无之上靈風集妙眞道融精出長生度世之篇有騰駕昇玄之要法音乍關四萬劫以方傳絳府重宣五億天而共仰故得九皇師禀歷世宗修佐國安邦垂祥致福某等希眞屬念尊道披元祈景貺於庬洪佇精誠之通感當前星誕瑞之節依上清啓福之儀然燈燒香轉經行道冥心十極馳欵諸天所祈萬聖傾光衆尊流鑒延恩紫闕貽貺皇朝社稷隆昌宗祧安鎭洪基克固綿劫常存皇帝壽越蓬壺福齊穹昊堯蓂舜曆與烏兎以無窮禹跡周封帀華夷而順化皇妃王子翼奉帝猷率土普天敷揚睿渥殊庭納欵絶域歸賔歳有豐登俗臻康樂皇太子文明温穆宣慈惠和耀忠孝於離方群方仰德茂謙恭於震域九域瞻風永賛聖功允昌大寳洎乎顯晦旁及飛沉俱躋仁壽之庭同洽雍熈之運上明天尊廣濟之澤下副臣等歸命之誠謹啓發願一願大道流行普天懷德二願一切有生咸皆悟道三願九夜悲魂一時解脫四願孤魂無依咸得受生五願天下太平五榖豐熟六願臣忠子孝君仁父慈七願四海通同𡨚親和釋八願潜胞處卵咸得生成九願積疾新痾旋即痊愈十願孤露衆生豐衣足食復爐香官使者左右龍虎君侍香諸靈官當令臣上章之所自然生金液丹碧芝英百靈衆眞交會在此洞案爐前令臣體耀金輝斬伐胞根七玄拔擢百關備仙解除死籍宴坐泥丸東華紀字䇿景虚玄十方仙童玉女接侍香煙傳臣向來所啓之言速達徑御太上无極大道無形無名虚無自然金闕玉陛下出戸太上黄籙齋儀卷之十二
