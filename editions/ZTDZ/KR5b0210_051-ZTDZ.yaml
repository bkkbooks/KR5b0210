front:
  text: 太上黃籙齋儀卷之五十一鳴三
  hash: sha256:11e1762c0d1025ca3e2a821c1814bd01e7c283b3939d26000b21f37853819d2f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0210_SJB_051-090335b, image: sjb/09/090335b.png}
body:
  text: 唐廣成先生杜光庭剛拔苦濟度方懴東方衆等至心歸命東方無極太上靈寳尋聲救苦天尊東郷神仙諸靈官三禮各䖍誠懴謝臣等伏聞一炁鴻濛二儀開闢扇玄風而鼓鑄肇紅日以照臨碧海泓澄青林蓊鬱今謹有黃籙大齋主某乙崇仁起念拯物興懷哀傷流滯之魂閉繫風雷之獄歳月徒久考對未原敬修黄籙大齋謹齎青紋繒綵歸命東方無極太上靈寳天尊九炁天君東郷神仙諸靈官伏冀靈威青帝救苦眞人拔萬壑之深殃致三清之妙樂永離衆苦載誕諸天家國安寧存亡福利得道之後昇入無形和與道合眞南方衆等至心歸命南方無極太上靈寳㝷聲救苦天尊南郷神仙諸靈官三禮各䖍誠懴謝臣等伏聞三炁應身五靈分化丹簡注上生之籙炎洲居不死之郷載日窮涯夀星爛景今有黃籙大齋主某乙歸心上聖渺覿丹丘翹勤瞻金闕之尊惻隱救火坑之苦齎絳紋之繒綵啓黃籙之靈壇瓊鳳金龍建齋行道歸命南方無極太上靈寳天尊三炁天君南郷神仙諸靈官伏覬丹天赤帝救苦眞人解累劫之殃原拔九幽之沈滯火坑息熖獄卒停酸同㑹至眞逍遥妙境得道之後昇入無形和與道合眞西方衆等至心歸命西方無極太上靈寳㝷聲救苦天尊西郷神仙諸靈官三禮各䖍誠懴謝臣等伏聞素靈眞境七炁應身瓊宫儼皓素之尊金闕啓帝靈之聖麟洲遼夐青海深沈今有黃籙大齋主某乙䖍懇靈壇歸崇妙㫖想金鎚之罪衆憫劒樹之幽徒歷劫未原長夜無捨齎素紋之繒綵竪黃籙之玄壇白獸鎭方金龍表信歸命西方無極太上靈寳天尊七炁天君西郷神仙諸靈官伏冀至聖垂慈玄元憫惻拔九泉之重罪離十苦之深殃誕慶中華記名上境得道之後昇入無形和與道合眞北方衆等至心歸命北方無極太上靈寳尋聲救苦天尊北郷神仙諸靈官三禮各䖍誠懴謝吕等伏聞太芒浩劫五炁應眞敷大化於玄天配神功於黑帝幽都渺莾氷谷峥嶸今有黄籙大齋主某乙䖍懇眞仙歸心妙域獻金龍之信齎玄紋之繒歸命北方無極太上靈寳天尊五炁天君北郷神仙諸靈官伏冀聖慈垂祐玄德流仁拔幽府之沉𡨚救寒氷之毒苦提携萬壑引致三清天上人間超登妙果得道之後昇入無形和與道合眞東北方衆等至心歸命東北方無極太上靈寳天尊梵炁天君東北郷神仙諸靈官三禮各䖍誠懴謝臣等伏聞大象丕渾凝一炁而含韞重玄化作分八索以恢張乾道流形艮山列位今有黄籙大齋主某乙融心妙境注想靈都入靜焚香鎭龍齋信歸命東北方無極太上靈寳天尊梵炁天君東北郷神仙諸靈官伏冀艮宫仙衆救苦眞人慜劒樹之電揮念刀山之霜冽九幽餓隷十苦寒魂弘濟度於沈埋普仁慈於泰逺拔從惡趣植以善根和煦兩明牢籠八極得道之後昇入無形和與道合眞東南方衆等至心歸命東南方無極太上靈寳天尊𣑽炁天君東南鄉神仙諸靈官三禮各䖍誠懴謝臣等伏聞梵炁凝精巽方立極流百川於地戸産羣品於天隅扇起玄風運行至化今有黄籙大齋主某乙憂深濟物意乃探玄列信朝眞陳詞啓聖仰尋聲救苦之力扣玄關衆妙之門歸命東南方無極太上靈寳天尊梵炁天君東南郷神仙諸靈官伏冀妙道潜通至靈克應拔一隅之諸苦拯四位之羣迷火烈停威風刀息考咸登道果各被眞風永離九幽長豐五福得道之後昇入無形和與道合眞西南方衆等至心歸命西南方無極太上靈寳天尊梵炁天君西南郷神仙諸靈官三禮各䖍誠懴謝臣等伏聞眞風散景梵炁含光列厚載於坤維顯玄功於乾德生成羣有亭育萬靈旣分罪報之司必有沉淪之趣今有黄籙大齋主某乙㝠心上境注意隂功懴罪祈恩拔苦興樂謹齎黄信敬鎭金龍歸命西南方無極太上靈寳天尊梵炁天君西南郷神仙諸靈官伏冀精懇名香徹九天之清境深仁妙道照十地之黄宫拔自鑊湯灑之甘露涵融大化恢弘濟度之私澹蕩玄風普徧生成之力得道之後昇入無形和與道合眞西北方衆等至心歸命西北方無極太上靈寳天尊梵炁天君西北郷神仙諸靈官三禮各䖍誠懴謝臣等伏聞混元本始廓玄象以傾天梵炁冲融鼓清風而立極均分寒暑主宰隂陽旣司善惡之權須作重輕之報寧無獄吏欽守金科今有黄籙大齋主某乙拜手陳詞傾心軫念歸心清妙之境垂慈救苦之門齎黄紋之繒注丹䖍之懇歸命西北方無極太上靈寳天尊梵炁天君西北郷神仙諸靈官伏冀遷拔九幽蠲除十苦扇眞風於乾極宣顥氣於北隅鬼録全空滯魂偕化歡康聖祐沐浴靈恩得道之後昇入無形和與道合眞上方衆等至心歸命上方無極太上靈寳天尊三十六天帝君玉京玄都紫微金闕三清三界梵炁天君上郷神仙諸靈官三禮各䖍誠懴謝臣等伏聞虚無妙境閳大化之玄功碧落清風扇自然之洪運眞功渺邈叡智難窮包括穹隆司張象緯今有黄籙大齋主某乙夙欽妙㫖䖍奉眞宗行道修齋祈恩首悔謹齎碧紋之繒金龍一枚歸命上方無極太上靈寳天尊三十六天帝君玉京玄都紫微金闕三清三界梵炁天君上郷神仙諸靈官伏冀元始開度至真敷弘憫十方八極之羣迷拔五嶽四溟之庶獄咸辭幽壤共照髙明覆育玄恩豐滋靈澤得道之後昇入無形和與道合眞下方衆等至心歸命下方無極太上靈寳天尊九土髙皇四司五帝十二仙君九宫眞人神仙玉女無極世界下郷神仙諸靈官三禮各䖍誠懴謝臣等伏聞方輿載物弘大信以無私厚地安貞布洪基而永固咸資道力以運神功今有黄籙大齋主某乙志感生成心憑造化仰乾坤之德荷覆載之恩謹齎黄紋之繒金龍一枚歸命下方無極太上靈寳天尊九土髙皇四司五帝十二仙君九宫眞人神仙玉女無極世界下郷神仙諸靈官伏覬九幽息考庶獄原殃弘聖造於下泉沐玄恩於上界得道之後昇入無形和與道合眞日宫衆等至心歸命日宫至眞大聖日中皇君明皇眞人丹霞玉女日宫神仙諸靈官三禮各䖍誠懴謝臣等伏聞大明敷德曜靈暉煦照之光懸象推功合璧瑞休祥之彩羲和掌職畏愛分殊惟彼上宫實司罪福今有黄籙大齋主某乙傾心救度列懇詞文憑至道之仁慈仰太陽之照燭修齋行道搥磬焚香歸命日宫至眞大聖日中皇君明皇眞人丹霞玉女日宫神仙諸靈官伏冀光延景貺德惠仁明朗下土之幽泉垂上玄之明德咸豐五福皆離十殃永沐道恩常蒙聖祐得道之後昇入無形和與道合眞月宫衆等王心歸命月宫至眞大聖月中皇君素皇眞人散暉玉女月中神仙諸靈官三禮各䖍誠懴謝臣等伏聞太隂垂象素彩流光體叶三無照臨萬有凖盈虚而順度司罪福而不差今有黄籙大齋主某乙利濟推誠憫嗟及物䖍祈妙域拯救迷徒歸命月宫至眞大聖月中皇君素皇眞人散暉玉女月中神仙諸靈官伏覬璧彩流暉金波借潤照無明之苦趣燭長夜之寒庭洗滌罪殃滋霑福禄得道之後昇入無形和與道合眞星宫衆等至心歸命北辰南極星宿璇璣三台七星二十八宿星中大神星中眞人星宫神仙諸靈官三禮各䖍誠懴謝臣等伏聞星宫分彩列玄象於九霄斗極凝暉配洪規於七曜形模帀地軌度周天進退靡差主張無爽惟兹下土實稟天曹今有黄籙大齋主某乙凝心道域䖍懇星文救苦誠專通幽願切歸命北辰南極星宿璇璣三台七星二十八宿星中大神星中眞人星宫神仙諸靈官伏冀景光垂照福曜臨暉拔幽爽於隂都享壽年於南極黒書削死丹簡上生凋落諸殃敷榮衆善得道之後昇入無形和與道合眞東嶽衆等至心歸命東嶽泰山青帝眞君飛仙眞人名山洞府得道神仙諸靈官三禮各䖍誠懴謝臣等伏聞天孫列位表東嶽以干霄日觀標名顯岱宗而鎭地羣峰朝謁列聖封崇惟彼魯瞻實司齊俗表界河海統領死生今有黄籙大齋主某乙利民興念濟物推誠修齋朝眞祈恩諸福歸命東嶽泰山青帝眞君飛仙眞人名山洞府得道神仙諸靈官伏冀大化垂仁洪慈育德拔幽途之滯魄度業報之遊魂各捨深殃俱霑臣福得道之後昇入無形和與道合眞南嶽衆等至心歸命南嶽衡山赤帝眞君飛仙眞人名山洞府得道神仙諸靈官三禮各䖍誠懴謝臣等伏聞紫蓋靈臺朱陵寳洞分翼軫而作鎭副𤄵霍以居尊鶴舞來儀鳥書遁跡今有黄籙大齋主某乙推心救度𤁋懇翹勤請福祈恩修齋行道歸命南嶽衡山赤帝眞君飛仙眞人名山洞府得道神仙諸靈官伏覬神靈朗鍳道德垂仁弘生植之大恩拔幽冥之重罪咸昇碧落共沐玄風日月貞明家國豐泰得道之後昇入無形和與道合眞西嶽衆等至心歸命西嶽華山白帝眞君飛仙眞人名山洞府得道神仙諸靈官三禮各䖍誠懴謝臣等伏聞泰華靈巖削成萬仞巨靈聖路擘出三峰神仙駕鹿以䢟遊眞侣騎龍而命召眞靈所宅罪福是司今有黄籙大齋主某乙𤁋懇上玄歸心至聖弘濟度之理推振滯之誠歸命西嶽華山白帝眞君飛仙眞人名山洞府得道神仙諸靈官伏冀上善眞凮滌塵勞於寓世至仁慈造解罪考於幽徒國泰民安災銷福降得道之後昇入無形和與道合眞北嶽衆等至心歸命北嶽恒山黒帝眞君飛仙眞人名山洞府得道神仙諸靈官三禮各䖍誠懴謝臣等伏聞列鎭崇峰聳寒郊而拱極標形厚德臨四野以横空昴畢儲精趙代䟽境實司水旱統攝幽明今有黄籙大齋主某乙歸仰眞風依慿道力𤁋禱祈之懇推赦度之誠焼香散花修齋請福歸命北嶽恒山黒帝眞君飛仙眞人名山洞府得道神仙諸靈官伏覬玄慈昭感洪慶敷融解罪考於幽都致福祥於庶品四靈叶瑞萬國咸寧得道之後昇入無形和與道合眞中嶽衆等至心歸命中嶽嵩山黄帝眞君飛仙眞人名山洞府得道神仙諸靈官三禮各䖍誠懴謝臣等伏聞三臺峻極作巨鎭以干霄二室連空亘嵩髙而拂漢嬰提鞏洛襟帶伊瀍惟彼眞靈實司罪福今有黄籙大齋主某乙冥祈妙域䖏仰眞宗思弘救拔之誠欲致覃延之福翹勤齋禱俯仰至誠歸命中嶽嵩髙山黄帝眞君飛仙眞人名山洞府得道神仙諸靈官伏冀聖造優隆拯幽沈於九苦玄休廣被布康樂於萬民品彚昭蘇倉箱羡溢得道之後昇入無形和與道合眞水府衆等至心歸命水府扶桑大帝暘谷神王三河四海九江水帝十二河源水府神仙諸靈官三禮各䖍誠懴謝臣等伏聞崑崙白色均九曲以朝宗墦清源合三江而注海浮天韞德載地成功浩渺無涯潤滋攸愽三官分理百谷歸王惟彼隂靈實司罪福今有黄籙大齋主某乙推心救度𤁋膽䖍祈願將齋戒之功普濟幽明之福齎持鎭信秉列旌幢歸命扶桑大帝晹谷神王三河四海九江水帝十二河源水府神仙諸靈官伏冀百川注福四海湛恩弘潤下之眞風散善時之玄澤罪除幽獄功記明眞九穀咸滋百靈共泰得道之後昇入無形和與道合眞經寳衆等至心歸命至眞無上三十六部尊經諸天寳藏十方正法侍衛經典一切靈司三禮各䖍誠懴謝臣等伏聞元尊演敎上聖傳宗紫金書方丈之文黄玉削通光之䇿重玄奥妙八㑹幽深爲福德之良因乃歸依之妙本羣山旨趣衆聖師資今有黄籙大齋主某乙至心歸命至眞無上三十六部尊經諸天寳藏十方正法侍衛經典一切靈司伏冀三洞眞官賛玄休於聖運九天靈貺延福瑞於賢良動植生成幽明昭感巖棲善友開祕訣以登眞末俗常流悟玄關而樂誦三塗九夜億祖七玄同沐聖功俱昇妙境得道之後昇入無形和與道合眞太上黄籙齋儀卷之五十一
