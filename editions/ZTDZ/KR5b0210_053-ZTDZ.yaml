front:
  text: 太上黄籙齋儀卷之五十三鳴五
  hash: sha256:b14191afa0dce4e3d87a89463e733fa8121ccf362fb8182b363607f7a3da2f07
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0210_SJB_053-090346c, image: sjb/09/090346c.png}
body:
  text: 唐廣成先生杜光庭剛讃導經科皆云齋官之内以道德尊髙者爲法師明練法度爲都講也又都講職詞云先鳴法鼓次引朋衆風則儀敬憑讃說此即讃唱導引皆都講之務也吳中江表荆楚之間皆以都講執磬讃導行禮夫先鳴法鼓者鍾磬之謂也欲令羣官整肅儀制森然須先擊磬齊衆而後讃唱陞壇亦都講之職也但以近年或都講年德稍髙不欲一一勞止即於衆官之内差一人執磬唱禮蓋事出一時元非古制詳其職簡頗謂曠官更有後學生情妄爲臆斷於六職之外置一人持磬殊無經據訛謬益深又髙功法師職在敷奏進止俯仰居衆之先或昏耄不任自可求退豈容假手翻𩔖冗員今蜀地髙功止於發爐復爐兩稱名位其他宣讀皆委他人雖云先唱後隨何異龍吟鼈應此蓋不懼冥譴自掇罪尤人事尚且未容天道如何通感後之法主深可戒焉無蹈利於目前更増罪於身後監齋秉執科憲繩糾愆違務在無私共引典法若有𧇊犯務須授簡告之受罰之人亦須甘心伏罪所冀外能合禮以全濟濟之儀内不欺心免抱忡忡之恨不得使彈糾之際彼此諠然秉法者進退有詞負罪者譸張拒命不惟犯千玄聖又且取笑衆人其次侍經整飭壇場主張法席經科几案供養供須施列敷張皆須檢校况舊法於齋堂之内置兩髙座三時講讀故簡文云三時講唱是也又幟簡云衞獅子之兩座罰簡云聴經倚據不執版又云請問敗句此皆明行道旣畢法師衆官三時講誦矣近代相承秖於壇場之内三時行道三時轉經久無講唱之事亦無兩座之設然轉經之時衆官旣坐一人行淨水侍香行香侍經行經轉讀旣了侍經収經安置本座及整拂壇席嚴待供養無使外人凌冐輒踐法壇此乃侍經職務也不得虛叅職任倨傲不恭使几案縱横壇場汚雜薦獻之物使僮僕入壇輕冐神眞凌犯禁戒且禁壇之後尚不許通行而僕使庖夫容易出入例多此事切冝禁之苟獲未除皆侍經獲其殃責也侍香所職具在簡詞之中近者因循多不勤恪豈獨香煙中絶往往火滅灰寒兼有髙功尚未陞壇中擅添香炷此例違失率皆有之省閲科儀亦冝戒愼侍燈惟在勤勵興廢合儀徹曙續明即爲稱職近有不經之士淺識之人不使侍經整飭壇筵别置直壇之號六職之外頗有冗名明鑒法師所冝共棄無履僞跡取誚後賢又按金籙古儀及黄籙舊法宿啓之夜及言功之時皆先作自然朝然後行齋事故啓齋儀云衆官相率先行自然朝至三禮後即告齋署職說戒宣科明旦晨曉依法行道此法自張天師陸先生冦天師張清都相傳至今頗歷年代皆以齋法出於靈寳自然朝爲齋之祖宗故先行自然朝示不忘本也近有庸愚道士不達古賢之情先於玄師之前補署六職宣科授簡然後陞壇仍云簡寂先生齋法謬誤飾非謗說詞理紛然寡識無知一至於此尚有其黨相倣行之不唯獲亂法之愆實亦受謗賢之罪達敎君子冝共斥之舊法之中有相傳錯誤者唯啓齋言功之時自然朝内合禮靈寳天尊而相傳禮玉寳皇上等號此稍失自然朝之本㫖恐是年代綿逺書寫舛訛今於此儀中巳爲攺正非敢臆度惟理所歸時彦後賢共𢎞之矣齋壇讃唱儀軌啓齋夜衆官列位於玄中法師前差一人讀職狀訖又一人引齋主禮玄師再拜又三捻香又禮再拜捧詞函自述齋意訖又執函禮拜訖回身長跪授詞函於髙功接函訖齋主禮髙功再拜退復本位次髙功即執詞函於玄師前三上香禮三拜訖捧函正立上啓告齋都訖次唱三歸依次都講唱一切念次華夏引至三官前上香次至三師前上香次請齋官立次引至地戸禁壇次入戸呪至天門上十方香次至本位次都講唱各禮師存念如法次唱鳴法鼓二十四通次各稱法位次唱至心歸命北方無極太上靈寳天尊十方同次唱歸命懴悔次三業次三啓次唱禮至心稽首太上無極大道至心稽首三十六部尊經至心稽首玄中大法師次唱重稱法位次大謝啓次智慧三首訖次唱衆等人各首體投地迴心禮十方方各一拜北方爲始東北方東方東南方南方西南方西方西北方北方上方下方十禮足起立次唱云衆官平坐說戒威儀次說戒次奉戒頌一首畢唱奉戒三禮次署職都講唱云署一人爲髙功大法師其職也道德内𠑽威儀外備俯仰法式人天所瞻法師禮拜長跪受簡訖次衆官受職次宣科禁次十二願次復爐次學仙次出戸呪次空洞次至玄師前都講唱曰向來禮懴功德云云次唱監齋考過監齋彈糾有無訖次唱啓齋事畢衆官復位第一日清旦於玄師前立定都講唱曰道場衆等人各運心歸命三寳一切念次入壇次唱各禮師存念如法次衞靈呪次鳴法鼓二十四通次發爐次唱重鳴法鼓二十四通閲吏兵行事法師鳴法鼓岀官餘八時不用此次唱各稱法位次三上香訖次衆官左行壇西立面東唱衆等至心歸命東方無極太上靈寳天尊九氣天君東郷神仙諸靈官三禮各䖍誠懴悔次跪讀方懴次面南唱衆等至心歸命南方無極太上靈寳天尊三氣天君南鄕神仙諸靈官三禮次面西唱衆等至心歸命西方無極太上靈寳天尊七氣天君西郷神仙諸靈官三禮次面北唱衆等至心歸命北方無極太上靈寳天尊五氣天君北郷神仙諸靈官三禮次西南立面東北唱衆等至心歸命東北方無極太上靈寳天尊梵氣天君東北郷神仙諸靈官三禮次西北立面東南唱衆等至心歸命東南方無極太上靈寳天尊梵氣天君東南郷神仙諸靈官三禮次東北立面西南唱衆等至心歸命西南方無極太上靈寳天尊梵氣天君西南郷神仙諸靈官三禮次東南立面西北唱衆等至心歸命西北方無極太上靈寳天尊梵氣天君西北郷神仙諸靈官三禮次依前東南立面西北唱衆等至心歸命上方無極太上靈寳天尊三十六天帝君玉京玄都紫微上宫諸眞人神仙玉女無極世界上郷神仙諸靈官三禮次於西北立面東南唱衆等至心歸命下方無極太上靈寳天尊九壘土皇四司五帝十二仙君九宫眞人神仙玉女無極世界下郷神仙諸靈官三禮次於西南立面東北唱衆等至心歸命日宫眞人大聖日中皇君明皇眞人圓光童子丹霞玉女日宫神仙諸靈官三禮次於東北立面西南唱衆等至心歸命月宫至眞大聖月中皇君素皇眞人散輝玉女月宫神仙諸靈官三禮次正南立面北唱衆等至心歸命諸天星宿璇璣北辰九宫三台二十八宿周天三百六十五度星中大神星中眞人星宫神仙諸靈官三禮次正西立面東唱衆等至心歸命東嶽泰山青帝眞君飛仙眞人名山洞府得道神仙諸靈官三禮次北立面南唱衆等至心歸命南嶽衡山赤帝眞君飛仙眞人名山洞府得道神仙諸靈官三禮次東立面西唱衆等至心歸命西嶽華山白帝眞君飛仙眞人名山洞府得道神仙諸靈官三禮次南立面北唱衆等至心歸命北嶽常山黒帝眞君飛仙眞人名山洞府得道神仙諸靈官三禮次東北面西南唱衆等至心歸命中嶽嵩山黄帝眞君飛仙眞人名山洞府得道神仙諸靈官三禮次正南立面北唱衆等至心歸命扶桑大帝暘谷神王三河四海九江水帝十二河源水府神仙諸靈官三禮次依前正南立面北唱衆等至心歸命至眞無上三十六部尊經眞文寳符自然天書至極靈文三禮毎唱禮畢並舉各䖍誠懴悔并宣方懴次左行法師住鬼門面西立都講住天門面東立唱曰各思九色圓象咽液命魔宻呪次法師存神次唱歩虚旋遶次吟詠歩虚洞章十首古法次迴行三周至十首法或以二啓續之近代不用次師歸本位捻香都講唱曰至心稽首太上無極大道至心稽首三十六部尊經至心稽首玄中大法師次重稱法位次長跪大謝畢起立唱十念一念天地交泰二念日月貞明三念隂陽順序四念國土安寧五念帝王景柞六念宰輔盡誠七念百姓安樂八念五穀豐盈九念幽途離苦十念大道興行次復爐次學仙次空洞次出戸呪次玄師前立作回向讃次唱監齋糾過次彈糾次唱法事畢衆官復位次揖謝訖散歸齋堂如常儀三時行道毎日三時皆依此次第唯第一日發爐之後有重跪出官及毎日清旦禮師後有衞靈呪耳餘皆同此如或將陞壇值風雨及警急大暑極迅雷暴雨烈風晦暝之事乃止次三上香衆官於本位端立部講唱曰衆等至心歸命十方無極太上靈寳天尊十極天君三光五嶽三河四海三十六部尊經一切神仙諸靈官三禮次各䖍誠懴悔懴訖便存思歩虚或依歷唱諸方方各一禮如常朝次第便用都懴亦得或恐有所迫及陞壇失時即可作都懴亦候三上香畢依在本位靣向壇中一人面北對三寳宣懴都講唱讃曰衆等至心歸命十方無極太上靈寳天尊十極天君十郷神仙諸靈官三禮次各䖍誠懴悔衆等至心歸命日月星宫至眞大聖三光神仙諸靈官三禮衆等至心歸命五嶽眞君名山洞府得道神仙諸靈官三禮衆等至心歸命三河四海九江水帝十二河源水府神仙諸靈官三禮衆等至心歸命太上三尊十方大聖三十六部尊經眞文寳符三禮次唱各䖍誠懴悔懴畢即命魔歩虚一如上法毎日行道訖各還齋堂消息良久即陞壇轉經衆官於玄師前立定都講唱曰道場衆等人各運心歸命三寳一切念衆官揖玄師次唱無上諸功德名號隨意念次華夏引陞壇次入戸呪陞天門上香至本位立定次唱三歸依三首訖都講唱道場衆等執簡當心平坐如法衆官坐定又唱讃詠如法次作宿命讃訖行香行經讃畢次又唱靜念如法次法師存念次念功德名號畢次又唱請轉法輪次衆官轉經候終一卷都講擊磬侍經收經次吟送經讃畢又吟解座讃又畢次歎經功德次一人歎經或依古歎或有新文任時所用次吟閒經譛三首次旋行吟七眞譛或七首八首五首三首一首訖次學仙出壇次出戸呪次於玄師前作回向讃畢唱曰法事畢衆官復位次散歸齋堂如常儀三日五日七日之中或行禮燈法事候落景行道出壇之時衆官於地戸列班定法師或法職一人執科宣說拜呪一如文儀至畢即學仙讃引至玄師前舊法巡於燈下呪今慮繁併只於地戸望壇中三尊太上遥拜呪之亦甚允當齋法旣意即於明日丑時或其日亥後衆官於玄師前列班定都講次唱曰道場衆等人各運心歸命三寳一切念次念功德讃引入戸陞壇上十方香御案本位並訖次唱各禮師存念如法次衛靈次唱鳴法鼓二十四通次發爐次唱各稱法位次上香次唱至心歸命東方無極太上靈寳天尊十方同次歸命懴悔次三業懴次三啓至心稽首太上無極大道至心稽首三十六部尊經至心稽首玄中大法師次旋行次収五眞文東方南方西方北方中方並宣文了次呪眞文次唱重稱法位次上香長跪次拜表次露表次遣表次存神起再禮次封表次引表於天門焚之次内官次都講唱十二願次法師復爐次知磬舉出堂頌衆和引出壇次法師一拜次引至靜黙堂序立次法師上香啓白次知磬舉向來頌衆和之次知磬云朝修事畢衆官普揖次設醮散如常儀太上黄籙齋儀卷之五十三
