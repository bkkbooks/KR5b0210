front:
  text: 太上黄籙齋儀卷之五十八鳴十
  hash: sha256:1c65055ee4ff38a179c6b3d1c2ba55d56d2aae0158bc71df21c464997a385e2e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0210_SJB_058-090374c, image: sjb/09/090374c.png}
body:
  text: 唐廣成先生杜光庭剛懴禳疾病方懴先禮方臣等至心歸命東方無極太上靈寳天尊九氣天君東郷神仙諸靈官三禮各䖍誠懴謝餘方倣此懴悔東方臣衆等奉爲某官某乙修齋行道歸命東方無極太上靈寳天尊大聖衆至眞諸君丈人東郷神仙諸靈官今故燒香歸命懴謝弟子某前代今生至于累劫上犯東方九炁之天木官之府青帝之宫歳星木德角亢氏房心尾箕宿青龍之神下犯句芒春王寅卯甲乙蒼龍少陽功曹之直太衝之方春分之氣雷霆之威軒轅震卦青帝衆神積罪重過上繫東方無極世界宫府之中結成災厄歷世纒綿今因懴謝咸乞蕩除上願帝王安鎭國祚興昌邦家受福天下蒙恩弟子某九幽披散七祖生天災凶銷解福祚無窮得道之後昇入無爲和與道合眞東南方臣衆等奉爲某官某乙修齋行道歸命東南方無極太上靈寳天尊大聖衆至眞諸君丈人東南郷神仙諸靈官今故燒香歸命懴謝弟子某前代今生至于累劫上犯東南方梵炁之天風官黄帝季春之神天罡之位辰巽之方螣蛇戊己招摇四宫立夏之氣社稷之靈上繫東南方無極世界宮府之中歴世結固災厄未原因今懴謝咸乞蕩除上願宗祧遐永帝祚延長存亡荷福家國沾恩弟子某七祖九玄上生天堂災凶銷解福善無窮得道之後昇入無爲和與道合眞南方臣衆等奉爲某官某乙修齋行道歸命南方無極太上靈寳天尊大聖衆至眞諸君丈人南郷神仙諸靈官今故燒香歸命懴謝弟子某前代今生至于累劫上犯南方三炁之天火官之府赤帝之宫熒𤉨火德井鬼栁星張翼軫宿朱雀之神下犯祝融夏王丙丁巳午天一太陽勝先之直太一之方夏至離卦赤帝衆尊羽蟲九紫一切正神上繫南方無極世界宫府之中結成災厄歷代未原因今懴謝咸乞蕩除上願聖躬萬夀國祚遐長幽明同福家國荷恩弟子某三塗清泰九祖生天災厄銷解禄祚無窮得道之後昇入無爲和與道合眞西南方臣衆等奉爲某官某乙修齋行道歸命西南方無極太上靈寳天尊大聖衆至眞諸君丈人西南郷神仙諸靈官今故燒香歸命懴謝弟子某前代今生至于累劫上犯西南方梵炁之天土官黄帝季夏之神小吉之位坤未之方句陳戊己后土二宫攝提之府鎭星土神立秋中斗一切尊靈上繫西南方無極世界宫府之中結成災厄解謝無因以今懴悔咸乞蕩除上願帝王受福天下太平存亡開泰家國咸安弟子某九幽釋散七祖生天災殃銷殄禄夀増延得道之後昇入無爲和與道合眞西方臣衆等奉爲某官某乙修齋行道歸命西方無極太上靈寳天尊大聖衆至眞諸君丈人西郷神仙諸靈官今故燒香歸命懴謝弟子某前代今生至于累劫上犯西方七炁之天金官之府白帝之宫太白金德奎婁胃昴畢觜參宿白獸之神下犯蓐収秋王庚辛申酉刑罰少隂傳送之直從魁之方秋分兌卦咸池七宫毛蟲之屬肅殺之司赤方隂府一切正神上繫西方無極世界宫府之中歴代不解災厄未原因今懴悔威乞蕩除上願聖圖悠久帝德遐宣存亡家國俱沐玄恩弟子某七祖超度長夜開光災厄銷解禄筭長延得道之後昇入無爲和與道合眞西北方臣衆等奉爲某官某乙修齋行道歸命西北方無極太上靈寳天尊大聖衆至眞諸君丈人西北郷神仙諸靈官今故燒香歸命懴謝弟子某前代今生至于累劫上犯西北方梵炁之天天門黄帝季秋之神河魁之位乾卦戍郷亢龍戊己青龍六宫立冬之氣白方正神上繫西北方無極世界宫府之中積罪結固災厄所纒因今懴謝咸乞蕩除上願帝王宗廟祚曆遐長家國安鎭存殁荷恩弟子某九玄七祖上生天堂災銷禍散福善日臻得道之後昇入無爲和與道合眞北方臣衆等奉爲某官某乙修齋行道歸命北方無極太上靈寳天尊大聖衆至眞諸君丈人北郷神仙諸靈官今故燒香歸命懴謝弟子某前代今生至于累劫上犯北方五炁之府黑帝之宫辰星水德斗牛女虚危室壁之宿玄武之神下犯玄冥冬王亥子壬癸冬至太隂登明之直神后之方坎卦太一甲蟲之靈北宫一白黒帝衆神上繫北方無極世界宫府之中積世結固災厄所纒因今懴悔咸乞蕩除上願帝王祚曆地久天長存亡受福家國沾恩弟子某九幽開泰七祖生天災厄銷殄夀禄延長得道之後昇入無爲和與道合眞東北方臣衆等奉爲某官某乙修齋行道歸命東北方無極太上靈寳天尊大聖衆至眞諸君丈人東北郷神仙諸靈官今故燒香歸命懴悔弟子某前代今生至于累劫上犯東北方梵炁之天戊巳黄帝季冬之神丑宫丘墓山川土官立春艮卦大吉之方太隂之域八白之官東北方世界一切正神上繫東北無極之府曹屬之中災厄結固歷世未原因今懴悔咸乞蕩除上願帝王安鎭祚曆無窮三塗靜晏九祖生天災殃銷解家國荷恩得道之後昇入無爲和與道合眞上方臣衆等奉爲某官某乙修齋行道歸命上方無極太上靈寳天尊三十六天帝君玉京玄都紫微金闕三清三界梵炁天君無極世界上郷神仙諸靈官今故燒香歸命懴謝弟子某前代今生至千累劫上犯上方天元之府太芒之郷至陽之境五億天宫九元七正三界諸天三十六天帝三十六天君眞仙上聖飛天神王風雷雲雨諸天正神無上無極一切尊靈罪結上元之境三官宫府之中歴代纒綿因成災咎以今懴悔咸乞蕩除上願帝王國祚比天長存世世不絶常爲人君四海安鎭人稱太平天地清晏家國蒙恩九玄七祖上生天堂弟子某災厄消解福善無窮得道之後昇入無爲和與道合眞下方臣衆等奉爲某官某乙修齋行道歸命下方無極太上靈寳天尊九壘土皇四司五帝十二仙君九宫眞人神仙玉女無極世界下郷神仙諸靈官今故燒香歸命懴謝弟子某前代今生至于累劫所犯九地之司重隂之境八溟九壘風澤之方土府太皇地下五帝洞冥隂府山川洞天三十六土皇名山福地岡原丘谷地府衆神罪結下方中黄戊已宫府之中歷代未原災厄結固因今懴悔咸乞蕩除上願國祚帝圖山河等固幽明蒙祐家國荷恩弟子某地獄寧閑九幽披散光明通朗七祖生天災咎清銷筭禄延未得道之後昇入無爲和與道合眞三光臣衆等奉爲某官某乙修齋行道至心歸命日月星宫至眞大聖三光神仙諸靈官今故燒香歸命懴謝弟子某前代今生至于累劫所行罪犯上觸眞靈日月星宫太隂太陽之府諸天列宿九曜尊神不敬三光輕慢天象罪結三元之境天元曹府之中歴代纒綿因成災厄以今懴謝咸乞蕩除上願景祚無窮帝圖遐永萬方昭泰文混同弟子某災厄銷平福祥臻萃三塗九夜咸覩光明得道之後昇入無爲和與道合眞五嶽臣衆等奉爲某官某乙修齋行道至心歸命五嶽眞君名山洞府得道神仙諸靈官今故燒香歸命懴謝弟子某前代今生至于累劫所行罪犯上觸眞靈嶽瀆尊神山川宫府名山靈化福食之曹及十大洞天三十六洞七十二福地三十六靖廬佐命二儲眞宫靈宅丈人使者司命髙尊積過未原結成災厄因今懴悔咸乞蕩除上願聖歷永昌帝圖安鎭生靈和泰寰海昭融弟子某罪咎蠲平災厄銷殄存亡蒙祐家國沾恩得道之後昇入無爲和與道合眞水府臣衆等奉爲某官某乙修齋行道至心歸命扶桑大帝暘谷神王三河四海九江水帝十二河源水府神仙諸靈官今故燒香歸命懴悔弟子某前代今生至于累劫所行罪犯上觸眞靈積過所鍾下元之府靈泉溟海及諸河源八澤九江水官之簡結成災咎累世𨇠綿因今懴謝咸乞蕩除上願帝業繁昌聖圖延永萬方有泰八海無波弟子某乙罪日蠲消災厄除蕩存亡蒙祐家國沾恩得道之後昇入無爲和與道合眞經寳臣衆等奉爲某官某乙修齋行道至心歸命三十六部尊經眞文寳符諸天袐藏十方正法侍衛經典一切眞靈今故燒香歸命懴謝弟子某前代今生至于累劫犯三元品目眞戒玄科輕慢尊經非毀正典運心舉念率䧟罪條結因纒綿未曽懴謝名書黒簡身履災危非仗玄功無由赦免因今祈謝咸乞蕩除上願聖祚繁昌帝德遐永萬方朗晏四海和平弟子某災咎清銷存亡安泰有生含識同沐玄恩得道之後昇入無爲和與道合眞太上黄籙齋儀卷之五十八
