front:
  text: 太上黄籙齋儀卷之五十二鳴四
  hash: sha256:1524b55f23df4672177ac41bc448ffece97359b5c2182464646d230c54bb34e5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0210_HFL_052-001a, image: hfl/0276/0276-094.png}
body:
  text: 唐廣成先生杜光庭刪轉經夫修黄籙靈寳諸齋每日三時行道三時轉經晝夜六時爲弟子聞奏誦念以祈福祉其行道後消息移時仍别陞壇轉經賛道法事一如金籙簡文登壇上座誦經威儀如或風雨不常及别有法事即行道與轉經相續可矣陞壇轉經法師冠元始之冠黄裙紫褐五色雲霞之帔是各法服衆官如常服衆官於師前序立知磬唱道道場衆等人各運心歸命三寳滅一切念入戸上御案香上香宻呪王華散景九炁凝煙香雲宻羅逕衝九天侍香金童傳言玉女傳臣所奏上聞帝前令臣所啓咸賜如言今日告齋諸天臨軒三界五帝列言上清執籙把籍齊到帝前三歸依人各恭敬至心歸依十方道寳當願衆生起心回向一切敬禮至心歸依十方經寳當願衆生心開悟解受持轉誦至心歸依十方師寳當願衆生普上法橋無有障礙道場衆等執簡端心平坐如法衆官各依位平坐讃詠如法宿命讃侍經行水行經侍香行香宿命有信然弱喪謂之無皆欲眼前見過目即言悠大賢明道敎𢡖戚憫頑夫依依念子苦勤勤令我憂靜念如法法師依法暝日存思出威儀自然經若轉靈寳衆經法師當思身坐青黄白三色雲氣之中左青龍右白虎前朱雀後玄武日月五星照映左右侍經仙官羅列壇内已有圓光如日之象畢嚥液三過叩齒三通宻呪曰寂寂至無宗虚峙劫仞阿豁落洞玄文誰測此幽遐一入大乗路孰計年劫多不生亦不滅欲生因蓮花超凌三界徒慈心解世羅眞人無上德世世爲仙家若轉道德衆經法師當思太上老君玄中大法師尹眞人河上公眞人畢叩齒三十六通嚥液三十六過先心存左青龍右白虎前朱雀後玄武足下八卦龜三十六獅子伏在前頭中七星五藏生五氣羅紋覆身上三一侍經各千乗萬騎天地各有萬八千玉女玉童衛之宻呪曰玄玄至道宗上德體洪元天眞雖逺妙近縁泥丸君宫室皆七寳窓牖自有分清靜常正眞駕景乗紫雲日月左右照昇仙長年全七祖生上天世爲道德門若轉度人經法師當東向叩齒三十二通上聞三十二天心拜三十二過閉目靜思身坐青黄白三色雲氣之中内外蓊冥有青龍白虎朱雀玄武獅子白鶴羅列左右日月照明洞煥室内頃生圓象光映十方如此分明宻呪曰無上玄元太上道君召出臣身中三五功曹左右官使者侍香金童傳言玉女五帝直符直日香官各三十二人關啓所言今日吉慶長齋清堂修行至經無量度人臣及甲乙轉經受生願所啓上徹逕御無上三十二天元始上帝至尊几前畢引氣三十二過東向誦經若轉上清洞神諸經各依本法存思呪也念諸天尊聖號啓經讃稽首虚皇天尊前請轉寳經轉衆經送經頌大量虚玄玄也解坐讃爲諸來主作善因縁如蒙開悟仰荷玄恩衆官起立歎經功德出三洞科詳夫三洞寳經萬天勝範結飛玄之氣成雲篆之章義冠無生文垂永劫故天地持之以分判日月因之以運行鬼神敬之以變通人倫奉之以開度是以詠之者則形陟絳霄聞之者則神生碧落莫不人天仰頼生死依慿爲羣品之津梁作衆眞之戸牖不可得而言之者其惟大乗之韞乎粤有大道弟子某乙爲國爲家濟拔存亡按靈寳簡文考神仙品格齎纹繒鎭信油燭香花修黄籙大齋若干日夜九時行道九時轉經爾其開凾演奥即響徹三清執卷吟玄乃聲聞五億當願侍香金童結香字於天中典經玉郎進經文於簡上即使愆銷昔劫福降今辰存亡荷開泰之恩動植悅生成之德洎乎悠悠庶品蠢蠢舍生俱乗六度之舟並達三清之岸三聞經聞經巳後當願羣生萬罪並消善芽増長聞經巳後當願衆生深入法門歸依信受聞經巳後當願羣生永斷執迷常歸正道旋行禮誦七眞讃或三首五首如歩虚法出玉京山經法師叩齒君在金華宮如嬰兒之狀太上玄虚宗弘道尊其經俯仰巳得仙歷劫無數齡巍巍太眞德寂寂因無生霄景結空構乗虚自然征日月爲炳灼安和樂未央學仙絶華念念念相因積去來亂我神神躁靡不歷滅念停虚閑蕭蕭入空寂請經若饑渴持志如金石保子飛玄路五靈度符籍濟我六度行故能解三羅清齋禮太素吐納養雲牙逍遥金闕内玉京爲余家自然生七寳人人坐蓮花仰嚼玄都柰俯酣空洞𤓰容顔曜十日奚計年劫多法鼓㑹天仙鳴鍾徴大魔靈風扇香華璨爛開繁衿太眞撫雲璈衆仙彈靈琴雅歌三天景散慧玉華林七祖升福堂由此歩玄音前世福未足斯書邈難㝷信道情不盡圖飛乃反沈太上無爲道弘乏在兆心學道由丹信奉師如至親挹景偶清虚孜孜隨日新衆人未得度終不度我身大願有重報玄德必信然隂惡罪至深對來若轉輪學道甚亦苦晨夜建福田種德猶植樹積簣而成山子能耽玄尚飄爾升青天修是無爲道當與善結縁太上至隱書名曰智慧篇拔苦由大才超俗以德眞靈姿世所竒曄若淵中蓮人行各有本皆由宿世功立德務及時發願莫不從善惡俱待對倚伏理難窮賢士奉法言道亦在兼忘解是大智慧上爲太極公寳蓋連玉輿命駕御九龍金華擎洞經捧香悉仙童嘯歌徹玄都鳴玉叩瓊鍾竦身凌太清超景逸紫霄保無持法綱遊玄極逍遥萬劫猶昨夜千春如晨朝巍峩䕃雲華手攀寳林條香烟自然生玄階興扶揺靈幡順風散繁想應時消滅智弘大混無爲爲清謡巳上並與金籙儀同小學仙讃學仙行爲急奉戒制情心夷正炁居仙聖自相㝷若不信法言胡爲棲山林回向讃於玄師前散如常儀太極左仙公曰眞頌八篇皆太上太極眞人之辭衆仙常所躭誦不宣泄於下仙祕藏金闕玉房之内冝傳至人修靈寳齋者也不可示浮華之徒愼之愼之太極眞人曰侍經仙童玉女聞此禮經讃詠之音皆懽恱而祐兆身也是大經悉當用此讃而禮拜矣若冥心誦經者亦心詠之乃上仙之祕辭修眞之妙音也岀靈寳玄都玉京山经第三天尊曰經者吾遺敎導引愚迷能發衆生無量道意意從悟起因悟成眞衆聖修行皆登道果故元始以一炁生化三炁分爲三天一曰始炁爲清微天號玉清境天寳君所化吾以龍漢之初號無形天尊於此天中出洞眞寳經十二部以敎天中九聖或號萬天玄師无上法王經九萬九千九百九十九億萬歳二曰元炁爲禹餘天號上清境靈寳君所化吾以延康之初號元名天尊於此天中出洞玄靈寳眞經一十二部以敎天中九眞或號三界醫王太上眞尊經八萬八千八百八十八億萬歳三曰玄炁爲太赤天號太清境神寳君所化吾以赤明之初號梵形天尊亦稱觀世眞人出洞神寳經一十二部以敎天中九仙或號十方導師至極天尊經七萬七千七百七十七億萬歳開皇攺號吾號虚皇理元陽宫中敷揚三洞下化人間號太上道君經六萬六千六百六十六億萬歳逮至上皇吾總號元始理紫微宫中廣布經戒救度羣生三洞寳經凡三十六部亦曰三乗洞眞寳經謂之大乗洞玄寳經謂之中乗洞神寳經謂之小乗結飛玄之炁自然成章玉字金書龍文鳳篆大方一丈八角垂芒敎化諸天流通世界始終歷劫常轉法輪或實或權有廣有略因機取悟隨世修行雖天地運終而三洞不滅開度羣品道引人天三界十方俱受利益其受每劫之初洞眞下化人懷道德共處無爲悉奉正眞長生得道次則洞玄下化人物漸離散朴澆淳失道叛德末則洞神下化人物轉更澆浮不奉正眞年命短促自是之後人心破壞三洞不行智慧曰興人鬼交雜運度促急不滿百年念念無常死亡不絶吾重出宣行三洞布化人間隨代機縁敷弘經敎或大或小順物所冝故元始本文未盡下敎其三清上境四梵天中眞聖修行其文具足山川洞府海嶽山宫雖有所修亦不備足謂隨方所修之經三洞不得備足也故命老子託化人間救度衆生演出科戒或夷或夏或聖或凢周徧十方悉令開度三洞妙法散在人間勸諸女男使勤修習凢夫積罪業累沉迷與道無縁不能信奉唯從僞法諸雜邪神徒竭身心終歸地獄其信行三洞悉入福堂或白日昇舉尸解遁形隱跡洞宫遊行世界長生變號永劫長存鍊氣易形轉神入道人莫能識無量無邊吾過去後魔敎轉興天下同遵人民夭折兵戈水火疾病死傷國破家亡朝夕相繼竭其府庫以奉妖邪僞亂日興澆訛時扇饑寒苦惱父子流移天下愚愚永無悟矣吾念爾軰積劫沈淪說是要言以示聾瞽然三洞妙法法有二種一者眞法二者化法眞法者離諸虚妄永劫長存化法者文字流通隨時變滅化法之中凢有五種一者結飛玄之炁雲篆成章離合自然變見不測在三清上境常住鎭經億劫長存聖眞扶護二者靈書一丈八角煥明在三界十方諸天五億隨劫昇降應感流傳三者諸天宫殿樓閣臺房門戸之間書題誦詠制伏人物出入修行四者花文葉字玉箚瓊編方丈蓬萊間風玄圃乍隱乍顯隨劫存亡敎習神仙伏諸魔鬼五者紙墨縑素竹木漆書散在人間流傳誦詠劫初即下劫末還昇保國安人開度羣品經者元始之言敎化衆生使識根元本始宿命因縁罪福報對善惡吉凶生化門戸方便所由今攺惡從善保安性命長生無爲歸之於道永劫軌模保之者福降修之神仙矣出業報因縁經太上道君謂三天法師曰夭尊敎戒三洞妙文天書玉字雲篆龍章雖復無邊總括條䟽雖十二事部𩔖分别隨根不同一者自然本文二者神符三者寳訣四者靈圖五者譜籙六者戒律七者威儀八者方法九者術數十者傳記十一者讃頌十二者章表自然本文天書八㑹鳳篆龍章是爲天地萬物之本開化人神成立諸法主召九天神仙上帝校定圖籙調正璇璣攝制酆都降魔伏鬼勑命水帝召龍上雲天地劫期聖眞名諱所治城臺衆眞境界廣宣分别種種降差服御元精化形之法神符者雲篆之文神眞之信召攝衆魔威制神鬼總元御運保命留年玉訣者天眞上聖述釋天書八㑹之字以爲正音開示大道靈圖者衆聖化迹應見無方圖寫變通令總悟解譜籙者衆聖記述仙眞名諱宗本胄胤神宫位緒戒律者條制勑約防非檢過詮量罪福分别輕重威儀者具示齋戒進退楷模俯仰節度式容止方法者衆聖著述丹藥祕要神草靈芝柔金水玉修飬之道術數者明辯思神存眞念道心齋坐忘遊空飛歩餐吸六氣導引三光錬質化形仙度之法傳記者是諸衆聖載述學業得道成眞通玄入妙修因方所證果時節讃頌者衆眞大聖巧飾法言稱揚正道令總信樂發起回向生尊重心章表者師資傳授妙寳竒文登壇告盟啓誓傳度悔謝請福關告之辭此十二事總統衆法一切意趣無不備周化引三乘入一乘道三洞眞經部帙品目洞眞實經十二部凢二十三萬三百八十卷太一部第一妙林部第二太清部第三徹視部第四上清部第五開化部第六元陽部第七妙眞部第八開山部第九十仙部第十玉林部第十一黄老部第十二洞玄寳經十二部凢八十萬四千卷靈和部第一靈寳部第二通神部第三無量部第四集仙部第五内祕部第六眞志部第七集善部第八鍊精部第九生尸部第十宫圖部第十一鍊魔部第十二洞神寳經十二部凢八十四萬二千卷太眞部第一至德部第二黄庭部第三鍊氣部第四道德部第五元神部第六大劫部第七内簡部第八神呪部第九三皇部第十按摩部第十一小劫部第十二右三洞三十六部共一百八十七萬六千三百八十卷歷代聖人神仙所受經老君授上三皇玄中大經老君授中三皇太素經老君授下三皇金闕祕經老君授中三皇開元經老君授後三皇攝提本經老君授伏羲元陽經三十四卷老君授神農元精經三百六十卷老君授祝融安神經老君授黄帝道德經天眞皇人授黄帝三一經龍蹻經老君授顓頊微言經三十卷老君授天老天元經老君授帝嚳黄庭經五十卷老君授帝堯玄德經老君授帝舜政事離合經老君授夏禹德戒經老君授殷湯長生經四十卷老君授文王赤精經老君授武王虚無經老君授昭王八天隱文經老君授尹喜出塞經化胡經西昇經元陽經道德經内解經九室經老君授南滎趎衛生經老君授宋王六甲經老君授始皇鬼林經老君授干吉太平經老君授漢張天師玉訣九千篇符圖七千章神呪四千首科律敎戒一千二百卷老君授㓂謙之新科一百二十卷西王毋授漢武帝上清經四十六卷王君授魏夫人上清經三十二卷三眞人授葛仙翁靈寳經十六卷太極眞人授抱朴子靈寳經十四卷三眞人授仙人李順興上清經七卷三茅君授仙人周子良上清經四卷河上公授漢文帝道德經章句二卷自三古巳降迄于巨唐寳軸靈文或隱或見或出於史冊或著在别傳至宋朝簡寂先生校讎之際述珠囊經目萬八千卷其後江表干戈秦中兵革眞經祕冊流散者多後周武帝立通玄觀収集衆經猶及萬卷洎隋火版盪唐室龍興剪掃氛祅底寧寰宇至開元之歳經訣方興玄宗著瓊綱經目凡七千三百卷復有玉緯别目記傳䟽論相兼九千餘卷㝷值二胡猾夏正敎凌遲兩京祕藏多遇焚燒上元年中所収經籙六千餘卷至大曆年申甫先生海内搜揚京師繕寫又及七千卷長慶之後咸通之間兩街所寫𦆵五千三百卷近屬巨㓂凌犯大駕南廵兩都煙煤六合榛𣗥眞宫道宇所在凋零玉笈琅函十無三二余屬兹艱會漂寓成都扈蹕還京淹留未㡬再爲搜捃備渉艱難新舊經誥僅三千卷未獲編次又屬省方所得之經㝷亦亡墜重遊三蜀更欲搜揚累祖兵鋒未就前志時大順二年辛亥八月三日庚辰成都玉局化閱省科敎聊記云耳太上黄籙齋儀卷之五十二
