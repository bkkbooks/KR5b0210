front:
  text: 太上黃籙齋儀卷之三十四歸十
  hash: sha256:601edac21235888985e0e071ee973793782e50f626388fbb4ccd4489c9ffacf0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0210_HFL_034-001a, image: hfl/0273/0273-146.png}
body:
  text: 唐廣成先生杜光庭剛三元落景行道入戸各禮師存念如法衞靈神光朗耀瑞氣帀旋箕斗澄輝芝宇晏然玉眸金眞寳壇純乾變夜作晝回子午前太華流彩丹鳳飛轅息魔㓕奸髙歩祥煙天眞普集齊到帝前鳴法鼓二十四通無上玄元太上道君召出臣身中三五功曹左右官使者侍香金童傳言散花玉女五帝直符直日香官各三十二人出出者嚴装關啓玄壇天帝神君當召此間土地里域眞官正神以今奉爲入意願得玉清道炁靈寳妙光下降流入臣等身中即使金光煥赫御炁上清令臣所啓速達徑御太上無極大道無形無名虚無自然金闕玉陛下各稱法位具位臣某等謹同誠上啓虚無自然元始天尊無極大道太上大道君大聖祖髙上大道金闕玄元天皇大帝太上老君髙上玉皇十方巳得道大聖衆至眞諸君丈人三十六天帝君玉虚上帝玉帝大帝東華南極西靈北眞玄都玉京金闕七寳玄臺紫微上宫靈寳至眞明皇道君三十六部尊經玄中大法師三界官屬一切眞靈臣等伏聞無爲妙道包萬法以居尊清靜眞宗運三元而育物大弘神化普度羣生由是天地水官司明罪福隂湯曹吏考校吉凶飛天述玉匱之文上智諸琅函之格自家刑國咸許懴祈惟顯及幽必令開濟臣等夙承玄訓獲奉明科志在立功用敷眞化凡應披告敢不上聞讀詞按如詞言志深修奉況當令節冝罄誠祈寔諸天朝宴之辰澤流羣品乃萬聖宣慈之㑹恩被十方是敢䖍扣玄關精修黃籙普存亡而懴拔遍家國以歸依共勵丹誠仰希鴻福以今晚朝行道請法衆等運兹初捻上香願此香煙騰空徑上供養無上至眞道寳臣等歸身歸命首體投地仰依太上三尊願以是功德歸流九廟尊靈列聖昭穆遊神太漠觀妙上清延景貺於孫謀集鴻休於帝業皇帝化髙三五壽越億千執大象而御天體飛龍而立極儲宫妃后匡輔睿圖良佐正臣保寧休運今故燒香自歸依師尊大聖衆至眞之德得道之後升入無形和與道合眞以今晚朝行道請法衆等運兹二捻上香願此香煙騰空徑上供養無上至眞經寳臣等歸身歸命首體投地仰依太上三尊願以是功德歸流齋主某家曠劫親縁九世神爽登眞紫府鍊景朱陵御飛廉而戴列星造天都而辭地戸祚流無極福利見存今故燒香自歸依師尊大聖衆至眞之德得道之後升入無形和與道合眞以今晚朝行道請法衆等運兹三捻上香願此香煙騰空徑上供養無上至眞師寳臣等歸身歸命首體投地仰依太上三尊願以是功德歸流齋主某家五族六親同沾景祐災纒自息罪網咸銷四海九州共沐和寧之化有情含識俱承清静之風夜府泉扄盡蒙開度飛潜蠢動並獲安全今故燒香自歸依師尊大聖衆至眞之德得道之後升入無形和與道合眞禮方懴悔歩虚旋遶頭腦禮金闕携手遨玉京騫樹圓景園煥爛七寳林夭獸三百名獅子巨萬尋飛龍躑躅吟神鳳應節鳴靈風扇竒華清香散人襟自無髙仙才焉能耽此心嚴我九龍駕乗虚以逍遥八天如指掌六合何足遼衆眞誦洞玄太上唱清謡香華隨風散玉音成紫霄五苦一時迸八難順經寥妙哉靈寳囿興此大法橋天眞帝一宫藹藹冠耀靈流煥法輪綱旋空入無形虚皇撫雲璈衆眞誦洞經髙仙凜手讃彌劫保利貞三禮臣等至心稽首禮太上無極大道臣等至心稽首禮三十六部尊經臣等至心稽首禮玄中大法師重稱法位具位臣某等謹重伸上啓太上無極大道元始天尊太上大道君太上老君十方無極大道道德衆聖天尊至眞大帝天帝三十六部尊徑玄中大法師上相上宰四司五帝三界官屬一切尊靈臣等識昧重玄獲參至妙承慈儉之訓披濟拔之科得罄丹誠仰賛鴻化竊聞瓊都金闕上聖衆尊觀苦趣於八門泛慈舟於三界護持萬𩔖拯濟羣生於是命三官以綂三元垂九光而開九夜息災蒙於家國照昏暗於幽沉聖澤無遺神功廣布今屬某元御節大宥敷恩爰備香燈式陳齋薦法天地二儀之象大啓皇壇繼星辰三景之明上祈玄貺九時蠲㓗三曰精䖍所期大帝迴光元尊降鑒現神光於七十二色凝瑞彩於三十六天隨感效祥應機表貺上扶國祚與天地以永貞仰福聖朝配日月而齊照宸枝克茂大業允昌混文軌於萬方息戈鋋於六合賢臣良輔文德武功匡翼帝圖昭宣景化野無隱逸朝有忠賢九稼滋豐五兵偃戢絶水旱㓂攘之害無饑凶瘥疫之虞萬姓乂安六氣和暢重泉地府披昏暗而覩光明幽獄窮魂解罪纒而升福岸龍神輯睦境域蘇舒瑞諜禎符曰書月至弟子某九玄滯識證果登眞五族六親延生永壽飛沉遂性動植咸冝共沐玄功盡階妙道上明天尊慈施之澤下副臣等䖍奉之誠謹啓以聞發願一願大道流行普天懷德二願一切有生咸皆悟道三願九夜悲魂一時解脫四願孤魂無依咸得受生五願天下太平五榖豐熟六願臣忠子孝君仁父慈七願四海通同𡨚親和釋八願潜胞處卵咸得生成九願積疾新痾旋即痊愈十願孤露衆生豐衣足食復爐香官使者左右龍虎君侍香諸靈官當今臣行香之所自然生金液丹碧芝英百靈衆眞交㑹在此洞案爐前今臣體耀金輝斬伐胞根七玄拔擢百關備仙解除死籍宴坐泥九東華紀字䇿景虚玄十方仙童玉女接侍香煙傳臣向來所啓之言速達徑御太上無極大道無形無名虚無自然金闕玉陛下出戸太上黃籙齋儀卷之三十四
