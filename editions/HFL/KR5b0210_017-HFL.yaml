front:
  text: 太上黄籙齋儀卷之十七
  hash: sha256:b6cc9060a373e201698ef2fe6361668edd01577a63915c3869ecab98201c1021
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0210_HFL_017-001a, image: hfl/0271/0271-124.png}
body:
  text: 唐廣成先生杜光庭集特勑爲臣下遷拔中分行道入戸各禮師存念如法衛靈丹靈朱火炎霞激風赤輪剛運天光八衝迸威包羅交變萬方流金豁落羣魔滅蹤辟姦破妖明耀元功金符召制躡雲䇿龍謡歌慶㑹散花太空神化冥運四極安隆伏御帝前罔有不恭鳴法鼓二十四通无上三天玄元始三炁太上道君召出臣身中三五功曹左右官使者侍香金童傳言玉女五帝直符直日香官各三十二人出出者嚴装闢啓玄壇天帝神君當召此間土地里域眞官正神急上關啓臣今奉爲入意以今朝元行道願得玉清道炁靈寳妙光下降流入臣等身中即使玄壇清淨内外成眞天無氛穢地絶妖塵琳琅振響十方肅清萬魔不干眞誠上徹令臣所啓速達徑御太上无極大道至眞玉皇上帝御前各稱法位上清玄都弟子臣某等同誠上啓虚无自然元始天尊无極大道太上大道君髙上大道金闕玄元天皇大帝太上老君昊天玉皇上帝十方巳得道大聖衆自然至眞靈寳天尊隨機赴感救苦天尊至眞諸君丈人三十六天帝君玉虚上帝玉帝太帝東華南極西靈北眞玄都玉京金闕七寳玄臺紫微上宮靈寳至眞明皇道君三十六部尊經玄中大法師三界應感一切眞靈臣等伏聞至道開光先天立化圓方異禀幽顯分途設繩非許善之科懸懲沮昇聞之典衆靈主宰列職司明巨細無遺錙銖畢舉蓋欲使三界之内庶品之中力善修心除非輟惡垂於經訓示以懴祈明載格言古今遵奉臣等叨依妙化獲備玄司志惟佐國立功度人濟物況奉詞㫖敢不上聞讀詞皇帝祇仰玄慈欽承道典軫懷冥漠思降禎休考明眞遷拔之科按黄籙懴陳之品俾安靈識爰降絲綸領信幣以豐嚴錫香花而蠲潔臣等式遵玄旨敷列皇壇四界八方法天象地貢詞誠於三境用祈謝於諸天冀罄丹心以資鴻福以今中分行道請法衆等運茲𥘉捻上香願此香煙騰空徑上供養无上至眞道寳臣等歸身歸命首體投地仰依太上三尊願以是功德上資社稷尊靈比乾儀而共永宗祧先聖齊道化以常寧耀景十華昇眞長樂垂休大寳流福宏基邁周漢之隆昌超夏商而延逺今故燒香歸依師尊大聖衆至眞之德得道之後昇入无形和興道合眞以今中分行道詩法衆等運茲二捻上香願此香煙騰空徑上供飬无上至眞經寳臣等歸身歸命首體投地仰依太上三尊願以是功德歸流皇帝伏覬日華騰景益廣睿明辰極飛光彌崇聖壽道德超於義皥仁聖冠於勛華萬國宅心九圍隨化后妃嬪御欽賛堯慈太子諸王昭敷舜澤公卿臣佐文武職僚各運忠貞永扶昌祚今故燒香歸依師尊大聖衆至眞之德得道之後昇入无形和與道合眞以今中分行道請法衆等運茲三捻上香願此香煙騰空徑上供養无上至眞師寳臣等歸身歸命首體投地仰依太上三尊願以是功德歸流某官即時冥界三清衆聖開日闕以流光八景髙尊敞雲軒而布澤沐浴神識灌錬形魂蕩滌罪瑕和平𡨚債先亡後裔同沐熏修今故燒香歸依師尊大聖衆至眞之德得道之後㫒入无形和與道合眞禮方懺悔三啓螢鬰家國盛濟濟經道興天人同其願縹緲入大乗因心立福田靡糜法輪昇七祖生天堂我身白日騰三禮臣等至心稽首禮太上无極大道臣等至心稽首禮三十六部尊經臣等至心稽首禮玄中大法師重稱法位上清玄都弟子臣某謹重伸上啓太上无極大道元始天尊太上大道君太上老君至眞自然靈寳天尊隨機赴感救苦天尊三十六部尊經玄中大法師天師君上相上宰四司五帝三界官屬一切尊靈臣等伏聞萬聖延慈九天垂澤憫三塗之謫役哀六趣之漂淪一失生津永乖賢域綿綿長夜萬劫無期是以遊觀八門天尊啓濟生之品軫傷三界道君宣度死之科欲使共陟福庭同超欲海眞經妙旨匡國化人皇帝軫念亡靈顯頒綸詔按三清之格開九奏之壇油燭香花質心衆聖紋繒法信騰欵諸天燒香然燈轉經行道洗心滌慮拜手祈眞所期八景神光下照幽隂之府九龍符命徑臨積夜之庭拔度魂儀昇離泉曲赦除某官前生今世無量劫來積過深尤前𡨚往債或巳身所犯或祖世貽殃罪目多端不可憶識或違忤天地負越神明侵害於人損傷於物殁受報對動歷歳年非仗玄功無由解釋因今大齋功德懴拔之縁萬罪千愆咸乞除蕩即使神魂清靜罪惱銷平離苦生夭參眞悟道至于九玄七世往逝幽靈共沐勝功俱登福路垂祥介祐利及見存上願二象清寧三光融朗風雲叶序妖惡沉零帝祚無疆聖躬萬壽三農蕃稔覩分𡵨合頴之苖四海梯航有天獸竒香之貢后妃蠙御太子諸王匡翊紫宸保寧皇極公卿臣佐文武忠良敷賛九重輯和八表干戈弢戢億兆樂康洎乎水陸龍神飛沉庶𩔖齋功所被惠澤所覃海外寰中齊臻壽域上明天尊大慈之澤下副臣等懺謝之誠謹啓以聞發願一頋大道淡泊虚无安閑空寂澄清自居廣開法門敎導頑夫皆蒙惠澤精苦是修預以同學普得昇虚與天相保長存無憂二願諸天結炁澄清高虚廣覆保眞固靈氣候調節四運和平國安民豐普天閑寧廣濟一切惠逮有生保劫長存億劫不傾三願土地覆載無窮安平不陷海淪不崩保鎭家國兆民興從養生安死惠周十方禾稼滋植營運日豐咸得厚載萬𩔖皆從四願日月二景髙明無有薄蝕𧇊盈安清光照諸天洞消暗冥保固劫運世祚和平普加潤澤惠灑衆生五願星辰與日齊光轉燭照耀朗映十方各安其位經緯直行保鎭家國無有災傷四海寧一普天興昌六願四時隨節推遷景氣和調無有災患疫毒消滅普天安平五榖豐熟國富民歡七願浮雲結炁聚煙飛空髙澄䕃覆玄玄隱則無爲散則彌天神仙同居結友衆眞惠流一切興國愛民普濟羣生人同劫年八願風雨流灑無窮普加施泄受其發揚萬物滋生國儲民豐九願五嶽各安其方巍巍包藏長爲仙宫安鎭國祚保天無終護度一切莫不仰宗十願江海蕩蕩太極舍容恢廓無細不植淵奥柔惠潤加蠕息天人獲慶年同劫石十一願帝王國土日昌四鎭安睦兵革不揚天人歌唱吉日來翔敷敎濟濟威化洋洋兆民稱慶長樂未央十二願蝖飛蠢動巳生未生咸蒙安全普得生成皆見元炁受陽之形草木果林經冬不零一切濟度靡不鮮榮和與道合眞復爐香官使者左右龍虎君侍香諸靈官當今臣朝元之所自然生金液丹碧芝英百靈衆眞交㑹在此香火爐前令臣學道得道求仙得仙齋主受福幽顯沾恩十方仙童玉女侍衛蘭煙傳臣向來所啓速達徑御太上无極大道至眞玉皇上帝御前出戸太上黄籙齋儀卷之十七
