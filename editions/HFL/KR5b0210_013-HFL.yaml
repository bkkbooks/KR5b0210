front:
  text: 太上黄籙齋儀卷之十三十四十五同卷賔十一
  hash: sha256:5a8f5cdef55a48a87564d501c710533c81dc459e2d0902e95634f8c84c67b70b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0210_HFL_013-001a, image: hfl/0271/0271-056.png}
body:
  text: 唐廣成先生杜光庭集特勑爲臣下消災清旦行道入戸各禮師存念如法衛靈青陽虚映曜日回靈神虎辟邪飛天流鈴摧奸滅試萬魔束形九微回道八威攝精千眞校録三元蕩清左嘯中黄右䇿六丁七轉八合周旋天經聖化巍巍三道順行慶雲流布合景黄庭鳴法鼓二十四通无上玄元太上道君召出臣身三五功曹左右官使者侍香金童傳言散花玉女五帝直符直日香官各三十二人出出者嚴裝關啓玄壇天帝神君當召此間土地里域眞官正神以今奉爲入意祈恩玉闕進拜丹書願得玉清道炁靈寳妙光下降流入臣等身中使紫精鬱勃玉闕開明五老輔根萬帝攝眞體圓珠映乗景𩥵宸金光煥赫御炁上清令臣所啓速達徑御太上无極大道無形無名虚无自然金闕玉陛下神霄九宸上帝御前請稱法位上清玄都大洞三景弟子无上三洞法師奉行黄籙大齋消災法事某嶽先生某帝眞人臣謹同誠上啓虚无自然元始天尊无極大道太上大道君髙上大道金闕玄元天皇大帝太上老君髙上玊皇十方巳得道大聖衆至眞諸君丈人三十六天帝君玊虚上帝玉帝大帝東華南極西靈北眞玄都玉京金闕七寳玄臺紫微上宫靈寳至眞明皇道君三十六部尊經玄中大法師三界官屬一切眞靈臣等伏聞道用無方玄慈下濟延祥致福佐國度人五符宣制御之威三洞廣護持之力除災解厄滅罪延生億劫常存古今咸仰所以龍書鳯劄河圖申宥過之文緑籍朱編太一垂懺災之品勵精誠於下土契昭感於上清惟善是從有祈必應況承詞旨敢不上聞皇帝青詞謹當宣奏讀詞按如詞言所宜關奏皇帝承天布化體道臨人懼一物之失宜欲萬方之皆泰遐開壽域以納羣生以某官災運所纏用希消解備香花而展禮質龍綵以馳心注仰玄關允祈鴻福以今清旦行道請法衆等運茲初捻上香願此香煙騰空徑上供養无上至眞道寳臣等歸身歸命首體投地仰依太上三尊願以是功德歸流宗祧列聖社稷尊靈承景貺以登眞上朝金闕演殊禎而護國下固瑶圖駕鸞鶴以逍遥比乾坤而遐永今故燒香自皈依師尊大聖衆至眞之德得道之後昇入无形和與道合眞以今清旦行道請法衆等運茲二捻上香願此香煙騰空徑上供養无上至眞經寳臣等歸身歸命首體投地仰依太上三尊願以是功德歸流皇帝伏覬八溟浩蕩與鳯暦以常存羣嶽巍峩比龍儀而克固莊椿等壽舜旦齊明皇后嬪妃播貞猷於萬宇諸王太子扶𧇖德於千齡百揆有倫庶官咸理今故燒香自歸依師尊大聖衆至眞之德得道之後昇入无形和與道合眞以今清旦行道請法衆等運茲三捻上香願此香煙騰空徑上供飬无上至眞師寳臣等歸身歸命首體投地仰依太上三尊願以是功德歸流天上天下三界十方道炁資薫萬靈昭泰玄風長育羣品安貞九幽息冥昧之悲六趣罷輪迴之苦某官神功宻祐惠力遐霑災厄怨仇隨懴祈而蕩滌延年注福承齋謝以増新九祖生天六親蒙祐懷生禀化同沐玄恩今故燒香自歸依師尊大聖衆至眞之德得道之後昇入无形和與道合眞禮方懴悔三啓樂法以爲妻愛經如珠玉持戒制六情念道遣所慾淡簿正氣停蕭然神靜黙天魔並敬護世世享大福三禮臣等至心稽首禮太上无極大道臣等至心稽首禮三十六部尊經臣等至心稽首禮玄中大法師重稱法位上清玄都大洞三景弟子无上三洞法師奉行黄籙大齋消災法事某嶽先生某帝眞人臣謹重伸上啓太上无極大道元始天尊太上大道君太上老君十方无極大道道德衆聖三十六部尊經玄中大法師天師君上相上宰上保上傅四司五帝三界官屬一切尊靈臣等伏聞清濁裁成圓方定位神功生化吹萬莫窮鼓之以玄風沐之以靈澤成之以妙用統之以聖人故能緫天下之機成天下之務配兩儀而稱大出庻物以居尊有功不宰則與日月齊華弘道無爲則與乾坤共永況復列封一致六合爲家惠養必均洪纎靡隔皇帝推誠撫御體道君臨闢仁壽之庭經華胥之化以爲某官方纏災否深軫天慈渙發德音恭修福㑹備十華之質信披三洞之典儀坐宣室以冥心望玉虚而稽首覬憑蠲潔以致感通臣等夙禀明科仰遵玄旨敷壇列纂法地象天以皇帝所齎金龍紋繒香花油燭依洞玄品格修无上妙齋騰欵十天告盟三界伏冀玉清衆聖无極髙尊俯鑒精虔大弘恩宥勑四司五帝北極南宫承四極明文奉九龍符命爲某官於天府地司之内符圖籙籍之中解釋𡨚仇和平債訟原銷罪對蕩滌愆瑕除星辰臨照之災祛年運凶妨之厄積生往世無量罪因以今懴祈咸蒙除蕩即使九玄受福舉族霑榮年算遐長禄秩増廣千災殄息萬善咸臻顯天尊拯化之恩副聖主憂勤之願然乞帝圖隆永聖壽延洪率土普天俱承道果二儀昭泰三景輝華九榖滋豐五兵韜戢龍神警衛疫毒無侵懷生息愁歎之音在野有謳歌之樂飛沉遂性動植舒榮九夜開光三塗罷對見大道無方之應契聖明有感之祈普及幽遐俱昇福岸上明天尊大慈之澤下副臣等歸命之誠謹啓以聞發念一念爲道四大合德七世父母免墮憂苦上升天堂衣食自然二念帝王國主道化興行庠序濟濟皇敎恢弘威儀翼翼普天所瞻民稱太平四夷賔伏妖惡自滅聖賢日生三念法師功德大建敎化明達俱獲飛仙四念同志學人早得仙道更相開度五念九親和睦好尚仁義貴道賤財行爲物範六念損巳布施道士及飢寒者天下人民各得其所七念蠕動跂行一切衆生咸蒙成就八念赦貸前生今世罪對立功𥙷過九念家國隆盛宗廟有人世生賢才十念尊受經師不敢中怠平等一心廣度剋獲上仙白日登天拜見太上永成眞人雲車羽駕和與道合眞復爐香官使者左右龍虎君侍香諸靈官當令臣上章之所自然生金液丹碧芝英百靈衆眞交㑹在此洞案爐前令臣體耀金輝斬伐胞根七玄拔擢百關備仙解除死籍宴坐泥九東華紀字策景虚玄十方仙童玉女接侍香煙傳臣向來所啓之言速達徑御太上无極大道無形無名虚无自然金闕玉陛下神霄九宸上帝御前出戸太上黄籙齋儀卷之十三
