front:
  text: 大上黄籙齋儀卷之五十五鳴七
  hash: sha256:e4ccc6117452870bb2eba297f5b0729b7899afb8824e365d88c0718dea28056c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0210_HFL_055-001a, image: hfl/0277/0277-056.png}
body:
  text: 唐廣成先生杜光庭刪投龍璧儀下元黄籙簡文靈仙品曰拔度罪根威儀修齋都畢依赤書玉訣丹書槿札金龍青絲纒之以關靈山五嶽昇度之信封於絶嵓之中一依具法下元黄籙簡文靈仙品曰關五帝威儀畢當以丹書玉札一枚金龍一枚青絲纒之以投三江以關水帝昇度之信一依玉訣具文下元黄籙簡文靈仙品曰關水帝畢以玉札金龍金紐九枚青絲纒之埋於壇所以告盟地官一如科云上元金籙簡文眞仙品曰拔度生死修齋威儀以金龍五枚鎭五方眞文之上事畢投之山水下元黄籙簡文靈仙品曰拔度罪根威儀當以上金作十金龍以鎮十方拔度飛魂十方方按一枚玉匱明眞科云修黄籙寳齋當以上金三兩鑄三龍龍各重一兩國家用上金公侯大臣次金士庶人銀銅塗並可副以玉簡卽王扎也提修齋所爲及國號太歲月日法師姓名投奠方所投於名山大洞靈泉龍穴及齋壇或住宅之中以告盟天地水三府使監證齋功闕者考屬地官九都曹科曰龍者乗雲氣御隂陽合則成體散則成章變化不測入地昇天故三十六天極陽之境可以驛傳信命通達玄靈者其惟龍乎龍者陽畜也夫天用莫如熊地用莫如龜人用莫如馬也是以上天以龍爲驛騎往來人間矣五金之最堅剛不渝天地所寳通靈合神故以上金鑄之取法龍形投之洞府告盟三元也洞府眞官所司寮屬告龍信簡文錄其善功以奏言於上聖感應之報猶影之隨形修尚之士不可闕也科曰簡也者告也紀也札也紀世之善告於上眞法長一尺二寸象十二辰廣二寸四分法二十四眞氣厚二分法二儀上下正方法日之方景正眞通達無所避讓國家以玉爲之玉有九德可以爲禮天地神祇之信故用王焉公侯臣庶通用槿木以其㓗白纎緻可比玉矣明尊畢之殊也科曰璧者禮天地山川之寳也以玉爲之投山川用圓璧一其色蒼徑三寸虚其中山簡爲九天之信故用蒼璧用以法天也投水簡用六出之璧其色黒徑三寸虚其中水簡爲九海水官之信故用玄璧水之色也六出水之數也投土簡用黄璧正方徑二寸虚其中土簡爲九地之信黄者土之色也方者地之形也璧與龍副於簡封之外以青絲纒之科曰投三簡之法當用金鈕九隻以副於簡三簡用二十七鈕也金鈕代㰱血青絲代割髮造盟達誠最爲重也故以青絲纒鈕璧附於簡及龍而後放之也鈕法國家用金臣庶以銀塗金銅塗金可鈕徑九分圓其外如環之形也科曰修齋畢别卜良日或齋㓗之辰醮饌法師衆官及齋主弟子或汎舟以詣水洞或梯陸以登山門各於洞府之外薙草掃灑㓗浄敷列醮席酒果餚饌當鹿脯湯茶等國家六十四分臣庶二十四分如嚴醮之儀乃盛服澡漱朝謁法事備如科式所在地司靈官監察將吏當爲予關啓洞中仙曹通達告齋之簡如此福善立感不得都無關啓直爾投於洞中不達眞靈反獲罪考矣若山水之洞稍逺師衆不可俱行難於登泛者當選壇内法職一二人與弟子齎簡以請洞所設醮關告投奠一如本儀若國家投龍五嶽諸山具有金龍科式輿此常禮繁省不同矣齋家或公私所拘不得躬詣洞府者可選精愼䖍恪信奉恭勤者一人代往行禮無可代者師爲關告之又不得藏匿簡文因循持久旣關告盟之信所在地司錄奏獲罪非細切冝愼之至洞所於門外選平地或船中或石上並須掃灑精㓗以設醮位淨席五領醮巾五條青布緋布並可酒茶湯隨盤數五果餅饌隨時所有國家六十四分臣庶二十四盤香四爐巾案四副洞府神仙位三弟子拜位寳位師關奏位日直土地監察陳設訖以香水灑壇之外以蕩氛穢禁勑如常儀師徒弟子並須澡漱嚴㓗以䖍恭爲先不得因循諠聒不恭如違考罰尤深各禮師存念如法次思三尊經寳玄師五星五土五嶽五蔵五靈經籍度三師三色雲氣當處洞府眞仙靈司監察官屬日直土地並儼然在坐羅列分明如齋法訖衞靈五靈列位煥鎭五方始皇護魂丹老衞形皓靈侍魄黒帝攝生中央黄帝統御萬眞元皇誥下幽夜開光罪銷北府名列南昌金籙定籍玉字除殃朱陵鍊質飛神太蒼三官九府無極神郷普受開度上生天堂鳴法鼓二十四通發爐無上三天玄元始三炁太上老君召出臣身中三五功曹左右官使者左右捧香驛龍騎吏侍香金童傳言玉女五帝直符直日香官各三十六人出當召此間土地山川正神速出嚴装關奏臣今正爾燒香奉爲某官某甲設黄籙寳齋功圓事畢投簡靈山願得太上十方正眞生炁入臣等身中所啓速達徑御太上無極大道崑崙五嶽靈山洞府前各稱法位具位臣某等謹奉請大羅玉清無極無上至眞大道元始天尊太上大道君太上老君三十六部尊經玄中大法師三寳衆聖一切尊靈垂慈降臨稽首再禮謹奉請某洞府眞仙洞天官屬得道眞人垂光降臨謹奉請當境主司虚空監察香官使者三洞威神里域眞官詡衞將吏山水川澤一切正神具官來降次三捻上香獻酒各稱法位長跪啓曰具位臣某謹上啓太上無極大道太上三尊十方巳得道大聖衆至眞諸君丈人東華南極西靈北眞三十六部尊經玄中大法師太極眞人玄一三眞人諸天日月星宿崑崙上宫諸神仙西靈金母五嶽眞君靈山正職潜霍儲君青城丈人廬山使者鍾山鬱絶西玄墉臺丘嶽大神三官北部六宫幽司天下地上冥靈諸神監生主録南上三門至神至靈一切羣仙臣胎誕塵濁瞽闇無知萬劫善縁依承道化奉宣慈訓佐國立功濟物度人弘道讃法若受經籙云以今某年月日詣三洞法師某嶽眞人某甲受靈寳五老眞文赤書靈篇三部八景諸天内音神仙二籙八威䇿文五帝符杖中盟眞經傳授事竟投簡靈山請以金鈕後兩過無鈕除此四字金龍驛傳黄籙投簡云奉爲某官某乙修設黄籙大齋爲國爲家普及存亡懴罪乞恩解消災咎法事都畢投簡靈山金龍驛傳乞落除罪録記名玉暦願神願仙解釋九玄七祖九族衆親先亡後化拔贖惡根免脫酆都岱宗二十四獄五嶽之府九幽之中刀山劒樹苦惱之郷魂覩光明永蒙開度輪轉受化逍遥福門安穩墳墓注訟不興舉家蒙福一切荷恩妖精殄滅善瑞日生修道叅眞永階仙品蒙如所啓仰荷玄恩臣某誠惶誠恐稽首再禮謹啓次起立捧簡文香上熏之叩齒九通次讀簡文畢用青紙封之青絲纒龍鈕璧等弟子執之香上師呪曰玄上開明元始監眞上帝五老赤書丹文天地本始總領三元攝氣召㑹催促學仙髙上符命普告十方日月星宿五嶽靈山天上地下溟泠大神監生主録南上三門關領玉簡勒名丹篇削落罪目上補帝臣歸慿至道修齋立功拔贖九祖一切若魂行道事竟謹依靈山請投玉簡乞削罪名皆蒙解脫無有𡨚親去離三惡魂昇九天生死開度億劫長存今日上告萬眞咸聞請以龍簡關盟眞官乞如所告金龍驛傳呪畢衆官再禮次投簡於洞中投龍頌三禮復爐學仙讃撤饌投水簡法各禮師存念如法衞靈鳴法鼓二十四通無上三天玄元始三炁太上老君召出臣身中三五功曹左右官使者左右捧香驛龍騎吏侍香金童傳言玉女五帝直符直日香官各三十六人出當召此間土地里域眞官正神速出嚴装關啓臣今正爾焼香投簡願得太上十方正眞生氣入臣身中令臣所啓速達徑御太上無極大道暘谷神王九江水府水帝前各三禮各稱法位降眞長跪啓白臣謹上啓太上無極大道太上三尊十方巳得道大聖衆至眞諸君丈人東華南極西靈北眞三十六部尊經玄中大法師太極眞人玄一三眞人日月五星北斗七元五嶽四方日窟常陽暘谷洞隂神君聖衆扶桑大帝九老仙都君三河四海九江淮澤三官九府十二河源九府水帝溟泠大神水府衆仙一切羣靈臣誕質下土禀識凡微宿以道因遭逢聖運靈寳垂化大法度人佐國立功奉弘慈訓受經籙云以今某年月日詣三洞法師某嶽眞人某甲受靈寳五老眞人赤書靈篇三部八景諸天内音神仙二籙八威䇿文五帝符杖中盟衆經傳授事畢投龍清泉請以金鈕後兩過無金鈕當除此四字金龍驛傳黄籙齋畢云奉爲某官某乙修設黄籙大齋爲國爲家普兼存没祈恩謝罪請福消災解釋𡨚仇増延命禄法事都畢投簡靈泉金龍驛傳乞除死籍消罪注生願神願仙賜以自新九玄七祖解拔苦根去離暘谷幽夜寒郷沐浴鍊度超昇天堂塚墓安吉殃注永泯舉家受福神炁休寧學識開朗智慧圓明揚闡正法消伏姦凶三界證度功滿行充帝王安鎭國祚興昌謹以啓聞乞如所陳臣某誠惶誠恐稽首再拜謹啓次捧簡文香上熏之叩齒三通次讀簡文畢用青紙封簡青絲纒龍鈕璧等弟子執之香上師呪曰元始五老上帝髙尊十方至眞太華靈仙赤文告命無幽不關上御九天請下玉文日月五星北斗七元中告五嶽四方靈山下告河海十二泉源九府水帝溟泠大神今日上告萬願開陳修齋行道普爲存亡請贖七祖宿對罪根謹投玉簡乞得上聞記名水府過去昇天生死開度萬靈開聞請以龍簡告盟水帝賜如所陳金龍驛傳畢衆官再禮次投簡於水府唱投龍頌三禮復爐小學仙讃散如常儀投土簡法各禮師存念如法衞靈鳴法鼓二十四通無上三天玄元始三炁太上老君召出臣身中三五功曹左右官使者左右捧香驛龍騎吏侍香金童傳言玉女五帝直符直日香官各三十六人出當召此間土地里域真官正神速出嚴装關啓臣今正爾焼香投簡願得太上十方正眞生炁入臣身中令臣所啓速達徑御太上無極大道九土皇靈地府大神前各三禮次各稱法位次向西南降眞次長跪啓白臣謹上啓太上無極大道太上三尊十方巳得道大聖衆至眞諸君丈人東華南極西靈北眞五老上帝三十六部尊經玄中大法師太極眞人玄一三眞人鄷都大帝君九府之宫泉曲主司無極世界髙皇九土皇靈季帝髙眞中皇九土戊己黄神土府五帝三界官屬土地里域眞官正神及此觀宅一切靈祇臣稟氣凡愚叨因宿運㑹遇眞法與善因縁值靈寳開光赤書宣化許以庸穢參奉正眞佐國爲時立功行敎受法籙云以某年月日奉詣三洞法師某嶽眞人佩受靈寳五老眞文赤書靈篇三部八景諸天内音神仙二籙八威䇿文五帝符杖中盟衆經傳授事畢投簡中宫請以金鈕後兩過無鈕去北四字金龍驛傳黄籙齋主奉爲某官某甲修設黄籙大齋爲國爲家普兼存没銷殃謝罪請福祈恩行道事訖投簡靈壇金龍驛傳乞削除地簡除其罪愆願度願生保濟形身九老仙都玉暦注名九祖父母億劫種親先亡後逝咸享福縁去離九幽之下八門之郷地獄之内楚掠之中殃注消釋塚宅清寧惡根斷絶上生福堂某學業圓就功行盛明生死同福永保無傾帝王受福天下和平謹以啓聞乞垂感悟臣某誠惶誠恐稽首再禮謹啓次捧簡文香上熏之叩齒十二通次讀簡文畢用黄紙封簡青絲纒龍鈕璧等弟子執於香上師祝曰天地開張萬炁分靈三元同符十方朗清五嶽上聞主死領生丹書赤文元始上經普告無上九地皇靈今日上告萬仙定生修齋行道普爲存亡我願我仙請投玉名土府太皇勒除罪刑奏告上宫判薄華清身得飛騰天地同靈九祖種親腐骸更榮魂升南宫受鍊仙庭今日告命萬神咸聽請以金鈕表明至誠請如所告金龍驛呈呪畢衆官再禮次投簡於壇中或於月建之下次吟投龍頌三禮復爐小學仙讃畢散此土簡言功之夜宣讀呪讃巳畢至明便可埋於壇中不俟别更關告今以張承光法師儀内有三簡啓奏眞位不同故再録於此若修齋壇内只以言功醮時呪告便可投也其山水二簡雖言功之時宣呪巳畢若至泂所設醮當湏依次第一一宣讀封呪然後投之庶爲周備不可以壇中告了至山直爾便投所在眞靈恐下關領善功不達所失尤多切冝詳愼也所以壇中告此山水二簡者蓋恐齋主弟子公私所檢不得躬詣洞門故於壇中對共宣告耳若齋主弟子不憚山水之逺登渉之勞自與衆官躬詣洞府者即言功之夕但拜表後告土簡一般了留山水二簡就山水法事更爲允當切在詳而行之不可執文爲滯也投三簡之時當爲所在土地焼錢一二百紙極佳矣修道之士三元八節謝罪祈眞投五帝簡法出眞文玉訣元始靈寳告五嶽靈山除罪求仙上法簡文靈寳某帝先生臣某年若干歳某月生命屬某帝名係某嶽願神願仙長生度世飛行上清五嶽眞人至神至靈乞削罪録上名九天請詣靈山金龍驛傳國號年號太歳某月朔某日某辰於此某處告行此三簡文並自具年名所屬願神願仙下文一如水府土文黄籙簡中之言封題龍璧鈕呪一如前齋法初一遍投三簡各用九鈕第二第三遍投之但用龍簡無鈕也次投畢散香出水吟頌曰元始盟映仙名巳書三官九署罪莫不除散香五帝告盟太虚請如所陳萬劫吾居三禮至心稽首禮太上無極大道至心稽首禮三十六部尊經至心稽首禮玄中大法師復爐香官使者左右龍虎君侍香諸靈官當令臣投簡之所自然生金液丹碧芝英百靈衆眞交㑹在此洞案爐前令臣學道得道求仙得仙十方仙童玉女接侍香煙傳臣向來所啓之言速達徑御太上無極大道暘谷神王九江水府水帝前各三禮小學仙讃唱如常法道言爾有志心發無上道意欲度諸天人民善男善女咸使得離三惡五道八難之中得過三惡世世與道相值當以八節甲子之日投三元玉簡除宿罪之簿言名上天祀事三過諸天三官九府更相關告上天右别萬神敬護五帝侍衞三界司迎門戸清肅天地神祇日月來朝千魔萬精不敢妄干志願堅固觸冋咸成七祖父母即得解脫三塗五苦上升天堂生死福善影響相酬三官九府書人功過其理甚明世世因縁毫分無虧若有至士爲國主帝王土地官長一切民人九祖父母長夜三塗修黄籙大齋三日三夜告盟九天投簡三元福利廣大不可勝言爾諦奉行勿爲懈怠無使魔壤爾身道士張承光曰登壇受靈寳中盟畢依自然金科投金鈕十口放龍清泉爲求仙之道重登壇受五老赤書二籙杖䇿思微定志等依明眞科文即投三龍二十七鈕以山水宅三處爲學仙之信然後以玉訣别以九龍二十七鈕以八鈕以八節日投山水宅永除罪簿言名上天又黄籙齋竟亦投龍簡只依三元簡文無别啓告立成口訣羣愚相承施用蒙昧余昔遇師陸君通神入妙言事當理無不感應禀妙在心而文無儀軌若依經本文謾書投之則山水宅神將非可誠録皆幽顯孟浪甚乖玄宗故撰此三處關啓文各指告其仙司又别出三簡立成訣今按分明當時必蒙刻書削罪記名九玄即拔家門前榮學業孳茂生死獲仙開示門人尊祕之焉光庭曰大道以一炁生化三才陶鈞萬有故分三元之曹以主張罪福即天地水三官實司於三元也人之生死壽夭罪善吉凶莫不係焉三籙簡文亦三元之典格也修齋之法當投三簡以告三元故山簡投諸天洞府奏天官上元也水簡投靈泉水府告水官下元也土簡投於壇宅告地官中元也詳簡文之中眞靈位號事理顯然近代以來只投山水二簡淮浙江表有三簡之儀行之巳久今檢㝷本末得張承光法師所述之文奏告三元頗爲的當投奠信無惑焉故可遵行以爲永式不獨受經即投三簡修齋遷拔全係三元若三簡俱行即銓舉善功皆達三官之府矣修奉之士𦍒無滯疑也太上黄籙齋儀卷之五十五
