front:
  text: 太上黄籙齋儀卷之九賔九
  hash: sha256:37b1463e0727ecdc7105b0ec3c01fdfa3e6b6965ccab6f30f0da924c1237555b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0210_HFL_009-001a, image: hfl/0270/0270-144.png}
body:
  text: 唐廣成先生杜光庭集第三日落景行道入戸各禮師存念如法衛靈玄隂七靈九炁合形魂精魄爽二景回輪飛光赫奕煥燿長春日月吐暉回合華英大梵流布奔飛火鈴魔王受事朝謁帝京含靈普濟廣惠幽冥玉文敷告萬炁騰昇鳴法鼓二十四通无上三天玄无始三炁太上老君召出臣等身中三五功曹左右官使者左右捧香驛龍騎吏侍香金童傳言玉女五帝直符直日香官各三十六人出當召此間土地里域眞官正神速出關奏臣今正爾燒香奉爲某官某乙爲國爲家奉修无上黄籙大齋若干日夜以今第三日落景陞壇朝眞行道願得太上十方正眞生炁降流臣等身中所啓速達上御至眞无極大道玉皇上帝御前各稱法位上清玄都弟子臣某等謹同誠上啓虚无自然元始天尊无極大道太上大道君聖祖髙上大道金闕玄元天皇大帝太上老君髙上玉皇十方巳得道大聖衆至眞諸君丈人三十六天帝君五虚上帝玉帝太帝東華南極西靈北眞玄都玉京金闕七寳玄臺紫微上宫靈寳至眞明皇道君三十六部尊經玄中大法師東卿司命太元眞人西極緫眞王君太平下敎二十四眞人五嶽靈宫神仙得道三界應感一切眞靈臣等伏聞玄微大道包三界以凝眞渺邈玄風冠萬法以垂化臣等幸資善貺獲奉寳經三境龍書八天鳯篆役召微命延眞降靈未能絶尚幽林自新昇度所冝宣弘妙訓敷闡法音上佐帝王普福寰海凡有所向敢不上聞讀詞按如詞言義深䖍奉上惟家國希降福祥齎信列詞披心請命罄丹誠於下土仰萬聖於上玄臣等輙率法流按依經旨澡神靜念注想希微崇設齋壇轉經行道以今落景行道請法衆等運茲初捻上香願此香煙騰空徑上供養无上至眞道寳臣等歸身歸命首體投地仰依太上三尊願以是功德上資宗廟先聖社稷尊靈宴處玄都福流皇極瑶圖遐永大寳克昌皇帝聖德宸居天長地乆壽逾蒿鎭澤廣滄溟接袂成康撫肩堯禹后妃叶六宫之慶諸王傳萬乘之榮朝野忠貞藩垣輯睦庶寮百揆匡賛洪基海外寰中俱登壽域今故燒香歸依師尊大聖衆至眞之德得道之後昇入无形和與道合眞以今落景行道請法衆等運茲二捻上香願此香煙騰空徑上供養无上至眞經寳臣等歸身歸命首體投地仰依太上三尊願以是功德歸流某家九玄七祖一切幽儀髙步蓮臺遊神仙府九龍符命落酆都罪目之書五帝監盟勒玉簡生名之品飛翔三界輪轉十華垂福傳休永光來裔今故燒香歸依師尊大聖衆至眞之德得道之後昇入无形和與道合眞以今落景行道請法衆等運茲三捻上香願此香煙騰空徑上供養无上至眞師寳臣等歸身歸命首體投地仰依太上三尊願以是功德奉福某家眷屬親縁同躋勝善崇山比福巨海齊年承忠孝之風叶温恭之美羣災弭息萬行熏修同學至人三師四友該羅有識周徧含靈俱沐玄功咸昇福岸今故燒香歸依師尊大聖衆至眞之德得道之後昇入无形和與道合眞禮方懴悔三啓三禮天眞帝一宫藹藹冠耀靈流煥法輪綱旋空入无形虚皇撫雲璬衆眞誦洞經髙仙凛手讃彌劫保利貞臣等至心稽首禮太上无極大道臣等至心稽首禮三十六部尊經臣等至心稽首禮玄中大法師重稱法位上清玄都弟子臣某等謹重誠上啓太上无極大道元始天尊太上大道君太上老君道德衆聖天尊至眞太帝天帝三十六部尊經玄中大法師玉輔上宰四極眞王三界五帝名山洞府隨機應感一切眞靈臣等宿以善縁轉輪道域欽承至道參佩玄經值元始開圖靈書演敎澤流萬品神表五方得渉玄津仰探㝠奥但以天章祕重修尚深微所冝幽阜棲身窮巖錬質而從容宇内荏苒塵寰思建善功以酬天慶濟人助國用福羣生弟子某仰慮前因逮于累劫九玄七祖一切種親三業内資六情旁構五聲伐耳萬𩔖蕩心鼻恱芳香口甘珍饍身耽華麗性溺繁奢目滯色根意迷邪境六塵六欲障清淨之法門十苦十纏隔希微之道本以茲衆罪留滯三塗咎結重隂魂拘長夜未蒙解赦猶處幽關伏聞元始天尊大慈廣濟迴光三界遊觀八門覩罪福之因縁垂拯拔之科格是敢齎持法信崇啓道場懴罪祈恩按靈仙之品目轉經行道遵上聖之簡文瀝懇皇壇注心玄極伏冀至眞大聖无上法王放五色之神光照九幽之地獄降九龍符命勑下三官濟拔罪魂出離長夜某家九玄七世超度泉扄惡對罪根無邊無量三塗流曳六趣輪迴昔報今縁並從洗滌九親眷屬同享福因累積過尤無窮愆犯克蒙銷解俱岀欲纏法未兆之災降將來之福壽延祚永禍滅殃除上願帝業恢弘皇圖悠久山齊聖壽日並睿明六氣和而百穀登玉燭調而金鏡朗儀璘昭煥海嶽晏安夷夏和平星辰順軌山川嶽瀆内外職司護國安人延休介福上明天尊大慈之施下副臣等歸命之誠謹啓以聞發願一願大道流行普天懷德二願一切有生咸皆悟道三願九夜悲魂一時解脫四願孤魂無依咸得受生五願天下太平五榖豐熟六願臣忠子孝君仁父慈七願四海通同𡨚親和釋八願潜胞處卵咸得生成九願積疾新痾旋即痊愈十願孤露衆生豐衣足食復爐香官使者左右龍虎君侍香諸靈官當令臣行道之所自然生金液丹碧芝英百靈衆眞交㑹在此香火爐前令修齋弟子存亡受福家國霑恩十方仙童玉女侍衛香煙傳奏臣向來所啓速達至眞无極大道玉皇上帝御前出戸太上黄籙齋儀卷之九
