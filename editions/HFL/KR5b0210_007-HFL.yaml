front:
  text: 太上黄籙齋儀卷之七賔七
  hash: sha256:1707989f1d31be7fa00ba9ff9655e94e7d7be64169979bf4c8ed1f50e2bfb15c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0210_HFL_007-001a, image: hfl/0270/0270-112.png}
body:
  text: 唐廣成先生杜光庭集第三日清旦行道入戸各禮師存念如法衛靈天書敷羅下盻太微元化生成靈煙九回八景六周聖運所持左賔赤方右啓帝扉東華南府灌錬辟非回輪日曜轉盻月暉今日大慶萬道同歸玄壇正炁保天無衰普告三界驛龍風馳鳴法鼓二十四通无上三天玄元始三炁太上老君召出臣等身中三五功曹左右官使者左右捧香驛龍騎吏侍香金童傳言玉女五帝直符直日香官各三十六人出當召此間土地里域眞官正神速出嚴裝關啓臣今正爾燒香奉爲某官某乙爲國爲家奉修无上黄籙大齋若干日夜以今第三日清旦登壇焚香行道願得太上十方正眞生炁降流臣等身中所啓速達徑御至眞无極大道玉皇上帝御前各稱法位上清玄都弟子臣等謹同誠上啓虚无自然元始天尊无極大道太上大道君大聖祖髙上大道金闕混元天皇大帝太上老君髙上玉皇十方巳得道大聖衆至眞諸君丈人三十六天帝君玉虚上帝玉帝太帝東華南極西靈北眞玄都玉京金闕七寳玄臺紫微上宫靈寳至眞明皇道君三十六部尊經玄中大法師東嶽上卿司命眞君西極緫眞王君太平下敎二十四眞人五嶽靈宫名山洞府得道神仙三界眞靈臣等伏聞太漠混融至眞澄寂元尊撫化大道御天崇不宰之玄功啓長生之祕揵理出隨迎之表敎垂億劫之先普度羣生大弘神化臣等夙資福運生禀靜基獲佩靈章遵承妙旨立功行敎佐國爲先凡有所祈理冝陳奏今奉詞旨敢具上聞讀詞按如詞言誠深修奉恭爲家國普及存亡稽首玄虚冥心丹切所冝汲引俾達誠祈是敢依按玄科建修黄籙法下元之品格披上聖之簡文鍊沐形神精修齋直以今清旦行道請法衆等運兹初捻上香願此香煙騰空徑上供養无上至眞道寳臣等歸身歸命首體投地仰依太上三尊願以是功德上資宗廟尊靈證品太虚棲眞玄極皇帝紫宸繼聖丹扆朝元揖羣后於華胥納萬方於仁壽皇后昭宣四德保乂六宫山河維帝子之城磐石固宗臣之國公侯卿輔中外職寮百度惟貞羣生蒙慶今故燒香歸依師尊大聖衆至眞之德得道之後昇入无形和與道合眞以今清旦行道請法衆等運茲二捻上香願此香煙騰空徑上供養无上至眞經寳臣等歸身歸命首體投地仰依太上尊經願以是功德歸流某家九世幽儀六親滯識北宫釋魄南府鍊神濯形流火之池列品飛香之殿往生淨域託化瓊都今故燒香歸依師尊大聖衆至眞之德得道之後昇入无形和與道合眞以今清旦行道請法衆等運茲三捻上香願此香煙騰空徑上供養无上至眞師寳臣等歸身歸命首體投地仰依太上三尊願以是功德奉福家國眷屬親姻咸資景貺沐靈津而養壽漱瓊醴以安神萬善同臻百靈共衛旁該品彚普及四生聖澤所霑並登眞道今故燒香歸依師尊大聖衆至眞之德得道之後昇入无形和與道合眞禮方懴悔歩虚頭腦禮金闕携手遨玉京騫樹圓景園煥爛七寳林天獸三百名獅子巨萬尋飛龍躑躅吟神鳯應節鳴靈風扇竒華清香散人襟自無髙仙才焉能耽此心三啓三禮臣等至心稽首禮太上无極大道臣等至心稽首禮三十六部尊經臣等至心稽首禮玄中大法師重稱法位上清玄都弟子臣某等謹重誠上啓太上无極大道元始天尊太上大道君太上老君十方无極大道道德衆聖天尊至眞太帝天尊三十六部尊經玄中大法師上相上宰四司五帝三界應感一切眞靈臣聞有物混成先天地而垂迹周行不殆並日月以騰光鼓六炁於虚无扇八風於寥廓生成品物含孕生靈惟古及今安家濟國某丕承道化夙荷玄功思報君親莫先齋直仰慮億曽往識見在親縁結咎釁於三官積愆瑕於九地未蒙原赦猶滯幽扄依按典儀精崇齋福伏冀眞仙廣萃靈澤遐覃勑五帝四司三官九府威光下燭開度神儀至于過去見存三業諸罪承茲福祐咸乞蕩除上願宗廟尊靈昇神碧落聖躬和暢帝道昭明書軌混同華夷寧謐邊烽不警封堠無虞百榖阜成三光朗晏外藩内屏良輔元勲克賛雍熈永光聖運然後九幽泉曲六趣三塗蠢動飛沉咸登道域上明天尊弘慈之澤下副臣等歸命之誠謹啓以聞發念一念爲道四大合德齋主七世父母免墮憂苦上升天堂衣食自然二念帝王國主道化興隆庠序濟濟皇敎恢弘威儀翼翼普天所瞻民稱太平四夷賔伏妖惡自滅聖賢日生三念法師功德大建敎化明達俱獲飛仙四念同志學人早得仙道更相開度五念九親和睦好尚仁義貴道賤財行爲物範六念損已布施道士及飢寒者天下人民各得其所七念蠕動蚑行一切衆生咸蒙成就八念赦貸前生今世罪對立功補過九念家國隆盛宗廟有人世生賢才十念尊受經師不敢中怠平等一心廣度剋獲上仙白日登天拜見太上永成眞人雲車羽駕和與道合眞復爐香官使者左右龍虎君侍香諸靈官當令臣行道之所自然生金液丹碧芝英百靈衆眞交㑹在此香火爐前伏願存亡受福家國霑恩十方仙童玉女侍衛香煙傳奏臣向來所啓徑達至眞无極大道玉皇上帝御前出戸太上黄籙齋儀卷之七
