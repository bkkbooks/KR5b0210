front:
  text: 太上黃籙齋儀卷之二十六二十七二十八同卷歸四
  hash: sha256:ee0b17e89e914c164abe0bd52f86485c3fddc50985f731002f6bb881b25d7f35
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0210_HFL_026-001a, image: hfl/0273/0273-004.png}
body:
  text: 唐廣成先生杜光庭刪消災清旦行道入户各禮師存念如法衞靈五星虚映煥景神庭包羅無象合炁羣靈潜形杳黙周遊五經揚威耀日役使甲丁却妖除禍滌穢消氛萬魔恐怖龍虎飛奔紫雲交覆萬炁齊并鳴法鼔二十四通無上玄元太上道君召出臣身中三五功曹左右官使者侍香金童傳言散花玉女五帝直符直日香官各三十二人出出者嚴装關啓玄壇天帝神君當召此間土地里域眞官正神以今奉爲入意願得玉清道氣靈寳妙光下降流入臣等身中令臣所啓之言速達徑御太上無極大道無形無名虚無自然金闕玉陛下各稱法位具位臣某等謹同誠上啓虚無自然元始天尊無極大道太上大道君太上老君昊天玉皇上帝十方巳得道大聖衆至眞諸君丈人三十六天帝君玉虚上帝玉帝大帝東華南極西靈北眞玄都玉京金闕七寳玄臺紫微上宫靈寳至眞明皇道君三十六部尊經玄中大法師三界官屬一切眞靈臣等伏聞二象經綸五材生化吉凶倚伏寒暑推遷盛衰之運不常災福之門是啓大則乾坤否塞劫曆變移次則善惡紏紛憂危震愓惟兹至道包括虚無不始不終自得希夷之妙極慈極愛旁垂濟度之科有惡皆除無災不解臣等獲參眞奥叨奉玄㣲志在立功佐時行化受法之日登壇告盟約當保國度人廣宣慈澤凡有歸向敢不上聞讀詞按如詞㫖誠切上陳布立壇場以銷災咎臣等披尋經訓依按典儀玉訣眞經龍章鳳篆凝雲結氣混合成文保鎭帝王和平災運制御劫㑹降伏妖魔普度群生大弘神化敢縁斯㫖共聲誠祈燒香然燈希恩請福以今早朝行道請法衆等運兹𥘉捻上香願此香煙騰空徑上供養無上至眞道寳臣等歸身歸命首體投地仰依太上三尊願以是功德歸流社稷尊靈宗桃列聖凝神太漠宴景九清晏紫府以逍遥升朱陵而快樂貽祥祚暦延貺億千皇帝皇后嬪妃皇子公卿臣佐文武職寮伏冀國祚安寧聖壽遐逺忠貞義烈輔賛睿圖内屏外藩輝華帝業萬方有泰八極無虞播玄元清靜之風歸大道和平之化今故燒香自歸依師尊大聖衆至眞之德得道之後升入無形和與道合眞以今早朝行道請法衆等運兹二捻上香願此香煙騰空徑上供養無上至眞經寳臣等歸身歸命首體投地仰依太上三尊願以是功德歸流某家九祖七玄幽靈滯識生神丹霍蛻質朱陵落注訟於地司息考延於後嗣逍遥上境安處福庭今故燒香自歸依師尊大聖衆至眞之德得道之後升入無形和與道合眞以今早朝行道請法衆等運兹三捻上香願此香煙騰空徑上供養無上至眞師寳臣等歸身歸命首體投地仰依太上三尊願以是功德歸流率土含靈普天有識下窮泉曲旁及幽扄景福遐沾羣情俱泰弟子某災凶殄息厄運清消壽禄増長福祥臻萃今故燒香自歸依師尊大聖衆至眞之德得道之後升入無形和與道合眞禮方懴悔各思九色圓象嚥液命魔宻呪歩虚旋遶太極分髙厚輕清上屬天人能修至道身乃作眞仙行溢三千數時丁四萬年丹臺開寳笈金口爲流傳大梵三天主虚皇五老尊尚難窺徼妙豈復入名言寳座臨金殿霞冠照玉軒萬眞朝帝所飛舄躡雲根濛濛如細霧冉冉曳銖衣妙逐祥烟上輕隨彩鳳飛幾陪瑶室宴忽指洞天歸佇立扶桑岸髙奔日帝暉三禮臣等至心稽首禮太上無極大道臣等至心稽首禮三十六部尊經臣等至心稽首禮玄中大法師重稱法位具位臣某等謹重伸上啓太上無極大道元始天尊太上大道君太上老君道德衆聖三十六部尊經玄中大法師上相上宰四司五帝三界官屬一切眞靈臣等伏聞大道垂光元和布化陶鈞一氣孕育三才隂陽有代謝之期劫運有昇淪之數禀神毓質分象流形未超變化之機固有興衰之兆非祈上聖難降儲祥竊惟三洞玉書九天金簡龜編鳳册龍篆虎符上可以安鎭帝王保制劫運體道無極與天長存次可以迴復天經攺移災暦寧家保國濟物安人幽冥荷拯拔之功厄滯有修禳之品靈香上御䖍懇必通眞格敷陳尊靈必鑒弟子某慮災凶在運憂愓彌深齎信列詞願祈昭祐臣等叨承明訓勸率法流依按玄科奉修齋福關明三界懴謝十方瀝懇冥心轉經行道燈分鶴熖蕩昏暗以流輝香散龍烟徹虚無而達信伏冀天尊太上萬聖垂慈救之仁金闕玉京千眞播護持之力勑下三境普告諸天降福延恩濟生度死和平𡨚咎消解災殃五行無妨剋之凶三景息照臨之㑹上解宿曜天文十二𨇠次之厄下解山川九宫八卦分野之災宿罪積愆深殃重舋前𡨚往債故殺誤傷三業六情無邊過犯因今懴謝咸乞蕩除上願國祚延洪聖壽遐永三光昭朗四序均調兵革不興烽煙罷警妖惡伏匿善瑞來臻水火旱蝗干戈疫癘無侵國界克保昇平然乞七祖生天九幽罷對飛沉遂性品𩔖安寜地府隂曹三塗六趣俱登福岸咸沐道風上明天尊廣濟之澤下副臣衆等歸命之誠謹啓以聞發念一念為道四大合徳齋主七世父母免墮憂苦上升天堂衣食自然二念帝王國主道化興隆庠序濟濟皇敎恢弘威儀翼翼普天所瞻民稱太平四夷賔伏妖惡自滅聖賢日生三念法師功德大建敎化明達俱獲飛仙四念同志學人早得仙道更相開度五念九親和睦好尚仁義貴道賤財行爲物範六念損巳布施道士及饑寒者天下人民各得其所七念蠕動跂行一切衆生咸蒙成就八念赦貸前生今世罪對立功補過九念家國隆盛宗廟有人世生賢才十念尊受經師不敢中怠平等一心廣度一切克獲上仙白日登天拜見太上永成眞人雲車羽駕和與道合眞復爐香官使者左右龍虎君侍香諸靈官當令臣行香之所自然生金液丹碧芝英百靈衆眞交㑹在此洞案爐前令臣學道得道求仙得仙遇有縁人證無爲果十方仙童玉女接侍香煙傳臣向來所啓之言速達徑御太上無極大道無形無名虚無自然金闕玉陛下出戸太上黃籙齋儀卷之二十六
