front:
  text: 太上黃籙齊儀卷之四十四王十
  hash: sha256:01bca715fc465703f872e4b2b5822bbc3a52a9aef7cb8205ce268c71b9e618c7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0210_HFL_044-001a, image: hfl/0275/0275-036.png}
body:
  text: 唐廣成先生杜光庭集安宅行道方懴先衆官列位於玄師前立定唱道入戶旋行上五方香東方為始上御案香上本位香各禮師存念如法衛靈晨精朗曜紫煙御空星壇煥映變化雲宫日魂月魄離坎翼中金真嘯命龍虎辟酆吉日行事八威鼓從玉華羅敷徘徊飛虹天光下盻道氣豐隆含靈普濟慶流無窮鳴法鼓二十四通無上三天玄元始三氣太上老君召出臣身中三五功曹左右官使者侍香金童傳言玉女五帝直符直日香官各三十二人出出者嚴裝關啓玄壇天帝神君當召此間土地里域真官正神入意願得玉清道氣靈寶妙光下降流入臣等身中令臣所啓速達徑御太上無極大道虛旡自然金闕玉陛下各稱法位具位臣某等謹同誠上啓虛無自然元始天尊無極大道太上大道君太上老君昊天玉皇上帝十方巳得道大聖衆至真諸君丈人三十二天帝君玉虛上帝玉帝大帝東華南極西靈北真玄都玉京金闕七寶玄臺紫微上宫靈寶至真明皇道君三十六部尊經玄中大法師三界官屬洞府真仙太始五帝靈寶威神天上地下一切真靈臣等伏聞大道融真元皇御運五文開教三洞宣行天尊垂廣濟之科太上播無疆之澤陶鈞庶品拯度群生臣億劫良因被沐玄化龍書鳯紀玉箚瓊篇得以禀修用祈升度而告盟之始約匡救為先凡有所陳不容𥨊絶況奉詞㫖敢不上聞讀詞按如詞言情誠丹切理宜開度以副玄慈竊惟五太之前三靈分化洎于下古未雜澆漓冬冗下巢懷道抱德各安所適玄會無為自數兆隂陽象垂楝宇吉凶善惡倚伏相乘順之則代享禎祥違之則人罹災沴聖人弘訓愍濟為心懺罪祈恩俾崇齊直臣等謹相携率依按典儀式建壇場以祈福祐以今某分行道請法衆等運茲初捻上香願此香煙騰空徑上供養無上至真道寶臣等歸身歸命首體投地仰依太上三尊願以是功德歸流社稷尊靈宗祧上聖清都瑩質紫極延祥福被宸居慶傳帝葉比嵩衡而作固與日月以齊明太子諸王承匡聖業賢臣良輔克贊謀猷萬國梯航群生昭泰今故燒香歸依師尊大聖衆至真之德得道之後升入無形和與道合真以令某分行道請法衆等運茲二捻上香願此香煙騰空徑上供養無上至真經寶臣等歸身歸命首體投地仰依太上三尊願以是功德歸流某家九祖七玄先靈幽爽栖神絳苑鍊魄丹臺襲氣母以登真御雲嶠而託化福資來裔澤及存亡克荷玄休常承元吉今故燒香歸依師尊大聖衆至真之德得道之後升入無形和與道合真以今某分行道請法衆等運茲三捻上香願此香煙騰空徑上供飬無上至真師寶臣等歸身歸命首體投地仰依太上三尊願以是功德歸流齊主某家眷屬宗親同茲禎貺福延壽永禍滅災銷洎乎居宅龍神隂陽將吏遷功貿賞加爵增勳納吉祐於中宫蕩災凶於外域今故燒香蹄依師尊大聖衆至真之德得道之後升入無形和與道合真禮方臣等至心皈命東方無極太上靈寶天尊青帝九氣天君東鄉神仙諸靈官三禮各虔誠懴謝巳後逐方倣此懴悔東方臣等奉為齊主某仰謝東方至真無極青帝九氣天君青龍東斗角亢氐房心尾箕七星君甲乙寅卯木德震神少陽之氣九夷老君勾芒太曍春王正神帝車帝輅帝舍歲星木官仰慮居宅之所犯觸神明負越禁忌延致災殃今故燒香皈命靈寶天尊修齊行道謝過祈恩伏願解除所犯賜以福祥銷中央土氣一切災凶罪咎蠲平災衰靜息存亡俱泰福壽維新舉家貞吉動植沾榮蒙如所請仰荷玄恩得道之後升入無形和與道合真南方臣等奉為齊主某仰謝南方至真無極赤帝三氣天君朱鳥南斗井鬼柳星張翼軫七星君丙丁已午火德離神太陽之氣八蠻老君祝融火帝熒惑夏神帝車帝輅帝舍螣蛇九紫隂陽衆神仰慮居宅之所犯觸神明負違禁忌延致災殃今故燒香皈命靈寶天尊修齊行道謝過祈恩伏願解除所犯賜以安寧銷西方金氣一切災凶罪咎蠲平災衰靜息存亡俱泰福壽維新舉家貞吉眷屬沾榮蒙如所請仰荷玄恩得道之後升入無形和與道合真西方臣等奉為齊主某仰謝西方至真無極白帝七氣天君白獸西斗奎婁胃昴畢觜參七星君庚辛申酉金德兊神少隂之氣六戎老君蓐收少曍太白秋神帝車帝輅帝舍咸池刑殺隂陽衆神仰慮居宅之所犯觸神明負違禁忌延致災殃今故燒香皈命靈寶天尊修齊行道謝過祈恩伏願解除所犯賜以安寧銷東方木氣一切災凶罪咎蠲平災衰靜息存亡俱泰眷屬又安舉衆貞吉福壽維新蒙如所請仰荷玄恩得道之後升入無形和與道合真北方臣等奉為齊主某仰謝北方至真無極黑帝五氣天君玄武北斗斗牛女虛危室壁七星君壬癸亥子水德坎神太隂之氣玄枵辰星五狄老君玄冥顓頊冬神水官太一刑殺隂陽正神仰慮居宅之所犯觸明靈負違禁忌延致災殃今故燒香皈命靈寶天尊修齊行道謝過祈恩伏願解除南方火氣一切災凶罪咎蠲平災衰寧息存亡俱泰眷屬乂安舉家貞吉福壽維新蒙如所請仰荷玄恩得道之後升入無形和與道合真東北方臣等奉為齊主某仰謝東北方至真無極梵氣天君下謝艮宫土府太隂之神魁罡刑破四殺神君仰慮居宅之所犯觸明靈負違禁忌延致災殃今故燒香皈命靈寶天尊修齊行道謝過祈恩乞罪隨懺滅福與願來觸犯之愆咸使除蕩存亡俱泰福壽增延舉家貞吉蠢動沾榮蒙如所啓仰荷玄恩得道之後升入無形和與道合真東南方臣等奉為齊主某仰謝東南方至真無極梵氣天君下謝風宫地戶招搖巽神三刑四殺六辛神君仰慮居宅之所犯觸明靈違犯禁忌延致災殃今故燒香皈命靈寶天尊修齊行道謝過祈恩乞罪隨懴滅福與願來衆惡蠲銷千災蕩散存士俱泰祿壽維新眷屬安寧子孫昌盛蒙如所啓仰荷玄恩得道之後升入無形和與道合真西南方臣等奉為齊主某仰謝西南方至真無極梵氣天君下謝人門月域攝提坤神四維四極乙癸神君仰慮居宅之所犯觸明靈負越禁忌延致災殃今故燒香皈命靈寶天尊修齊行道謝過祈恩乞蠲觸犯之罪隨懴銷平災咎不侵凶衰靜息禎祥荐至祿壽增延眷屬咸安存亡同福蒙如所啓仰荷玄恩得道之後升入無形和與道合真西北方臣等奉為齊主某仰謝西北方至真無極梵氣天君下謝青龍司命天門之神六宫乾位壬甲神君仰慮居宅之所犯觸明靈違越禁忌延致災凶今故燒香皈命靈寶天尊修齊行道謝過祈恩乞罪隨懺滅福與願來凶災靜息祿壽增延家安人泰存殁同榮子孫貞孝祥瑞來臻蒙如所啓仰荷玄恩得道之後升入無形和與道合真上方臣等奉為齊主某仰謝上方至真無上梵氣天君諸天至極上聖髙尊日月星宿八風五行風雨雷電隂陽正神上謝乾儀天道日遊月行八龍九虎太一十精飛旗八殺北斗七星天上天下一切神明仰慮居宅之所犯觸真靈負違禁忌穢慢三光上不敬天道下不畏鬼神愆咎增積延致災殃今故燒香皈命靈寶天尊修齊行道謝過祈恩乞懺千災蕩散萬罪銷平舉家蒙福存殁安寧祿延壽永禍滅福生蒙如所啓仰荷玄恩得道之後升入無形和與道合真下方臣等奉為齊主某仰謝下方無極世界神仙正真髙皇土府九宫真人四司五帝十二仙君靈洞川澤五嶽尊神下謝隂陽所運入卦九宫五行二宅后土至真地下侯伯四正諸神八部禁忌守宅將軍五土官屬五土子孫及將軍太歲豹尾黃幡奏書博士刑德衆神七十二位內外神靈仰慮居宅之所犯觸神明違越禁忌延致災殃今故燒香皈命靈寶天尊修齊行道謝過祈恩乞一懺罪滅萬善咸臻犯觸之咎並乞銷平舉家康泰居止安寧祿壽增延存亡同福蒙如所啓仰荷玄恩得道之後升入無形和與道合真步虛旋繞三禮臣等至心稽首禮太上無極大道臣等至心稽首禮三十六部尊經臣等至心稽首禮玄中大法師重稱法位具位臣某等謹重伸上啓太上無極大道元始天尊太上大道君太上王十九老君十方巳得道大聖衆至真太帝天帝三十六部尊經玄中大法師土府太皇地下五帝三天大法師正一真人三五官屬應感真靈伏聞玄化宣行道風遐布惠周三界恩溥群生盟威懸佐國之科靈寶著懺祈之品凡有祈向克獲感通弟子某以跡處塵寰未參幽妙而卜築之所居止非宜竊慮犯忤真靈違越禁忌乖八宅五行之候虧隂陽刑德之方既切憂疑願申懴謝是用肅嚴壇墠精按典儀虔備香花恭修齊直歸心十極懴罪諸天依正一法文天師具格謁請三五官屬天君吏兵禳却凶邪解銷災咎臣謹為某上請無上髙倉君都曹正氣君素車白馬君考召君運氣解患守宅君天上咎逆君廣司君北城詔命化喻謀議君天心剌史從事平天君無上太和君收神上明君上元士君蓋天大將軍無上天君赤天倉氣君四胡君制地君天昌君五鎮大將軍主為某家解除三丘五墓地下衆精月食土氣百病惡逆盜賊耗害刑殺凶殃之氣五瘟百病刑禱精邪四方破射五部兵獵戶廟呪詛衆考諸妖之屬及五行復注之氣留停藏匿之神積世流殃行年災厄十二刑害中外疆𦍙一切凶神咸從銷解其有運材摙石動土興工犯天地正神乖隂陽真氣侵傷土府違忤神明幽顯既殊常情罔測因今悔謝並乞蕩除即使正氣宣行龍神鎮守災殃殄絶福善來臻居止安寧動靜和泰親緣族屬同沐利貞七祖生天三途清晏九幽罷對長夜開光𡨚債和平謀議潜息伏尸故氣滯魄幽魂俱荷福緣各蒙開度捨邪歸正契遒通真帝祚遐長生靈昭暢普天全濟蠢動沾榮上明天尊廣濟之澤下副臣等懴謝之誠謹啓以聞發願一願乾坤明素二願氣象清玄三願聖人萬壽四願化洽八埏五願天垂甘露六願地發祥煙七願四時應候八願萬物生全九願家多孝悌十願國富才賢十一願齊功廣被十二願善瑞日臻復爐香官使者左右龍虎君侍香諸靈官當令臣行香之所自然生金液丹碧芝英百靈衆真交㑹在此香火爐前令臣學道得道求仙得仙齊主受福幽顯沾恩十方仙童玉女接侍蘭煙令臣所啓之言速達徑御太上無極大道金闕玉陛下出戶太上黃籙齊儀卷之四十四
