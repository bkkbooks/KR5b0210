front:
  text: 太上黄籙齋儀卷之二賔二
  hash: sha256:6f51b798d3bc292c37d2f9d8fb1208238b9f4e28cab157d75c3f98e4e00a6b3c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0210_HFL_002-001a, image: hfl/0270/0270-032.png}
body:
  text: 唐廣成先生杜光庭集第一日中分行道入戸各禮師存念如法衛靈謡歌空洞帝君守壇五帝校録受符三官備衛四門束魔去姦流鈐擲火除穢焚殘身佩金書錬液芝顔玄虚素合心動三關騎龍跨鶴控虬乗鸞衆星守舍千魔不干道炁常存萬仙永安鳴法鼓二十四通无上三天玄元始三炁太上老君召出臣等身中三五功曹左右官使者侍香金童傳言玉女五帝直符直日香官各三十六人出當召此間土地里域眞官正神速出關啓臣今正爾燒香奉爲某官某乙爲國爲家修建无上黄籙大齋若干日夜願得太上十方正眞生炁降流臣等身中所啓速達上御至眞无極大道玉皇上帝御前各稱法位上清玄都弟子臣某等同誠上啓虛无自然元始天尊无極大道太上大道君大聖祖髙上大道金闕玄元天皇大帝太上老君太上丈人无上玄老十方巳得道大聖衆至眞諸君丈人三十六天帝君玉虛上帝玉帝大帝東華南極西靈北眞玄都玉京金闕七寳玄臺紫微上宮靈寳至眞明皇道君玄中大法師三界官屬一切眞靈臣聞至道圓通天眞廣濟垂敎於希夷之表融神於造化之前籠萬有以陶鈞御三乗而啓導聖人貽則上士勤修佐國化人以慈爲本臣獲依祕妙叨佩正眞過積丘陵功無塵露誠冝循省以自檢修而受法之初告盟之始玄科有約濟物爲先凡所叩祈理冝關奏況奉詞旨敢不上聞讀詞按如詞旨誠切修崇爲國爲家並兼存殁謹依科法䖍立壇場然燈燒香轉經行道冀因精懇俾獲感通以今中分行道運兹初捻上香歸身歸神歸命大道臣等首體投地歸命太上三尊願以是功德先資宗廟社稷尊靈宴處玉清流祥寳祚二儀齊永萬國朝宗皇帝繼聖禹湯躡蹤軒皥壽延北極祚等東溟妃后諸王輔成睿化賢臣良佐匡枯丕圖偃革垂紳克昌道運今故燒香自歸依師尊大聖衆至眞之德得道之後昇入无形與道合眞以今中分行道運兹二捻上香歸身歸神歸命大道臣等首體投地歸命太上尊經願以是功德歸流齋主某家九祖神儀七玄幽識超離隂府遊神碧落之天昇度寒庭蛻質丹陵之境今故燒香歸依師尊大聖衆至眞之德得道之後昇入无形與道合眞以今落景行道運兹三捻上香歸身歸神歸命大道臣等首體投地歸命太上三師願以是功德徧及羣生遐均有識俱超昏滯咸契正眞齋主某家九親族屬惟新景福克荷神功壽禄内延災凶外息三塗九夜六趣四生同沐玄恩普霑眞祐今故燒香歸依師尊大聖衆至眞之德得道之後昇入无形與道合眞禮方懴悔歩虚旋行躡雲綱乗虚歩玄紀吟詠帝一尊百關自調理俯命八海童仰携髙仙子諸天散香花簫然靈風起宿願定命根故致標髙擬歡樂太上前萬劫猶未始三啓三禮臣等至心稽首禮太上无極大道臣等至心稽首禮三十六部尊經臣等至心稽首禮玄中大法師重稱法位上清玄都弟子臣某等重伸上啓太上无極大道至眞无上三十六部尊經天尊至眞大帝天帝玉輔上宰四極眞人玄中大法師三界内外一切眞靈臣以兆刧植因億齡傳慶叨逢妙化幸造法門披盻眞經探求聖旨竊聞祈眞降聖必在立功佐國濟時所冝弘化宣揚要道敷賛玄科齋戒以逹眞靈精誠以祈福祐今齋主某志惟修奉冀感禎祥瀝懇玄壇冥心紫府所冀天尊大聖太上衆眞下納精䖍廣垂福祉使帝圖悠久聖暦遐延文軌大同梯航畢集星辰合度風雨順時兵革不興休禎允萃元臣良佐齊八極以増齡内屏外藩並九河而注福光宣舜日雲薦尭階雨露灑於九圍禎貺覃於萬國齋主家幽明蒙惠存殁咸安開玉暦以増年續金編而紀善六親和泰衆美同臻下及三塗旁該庶𩔖寒庭長夜之境酆都地獄之中覩太上之慈光沐天眞之法力並蒙開度俱出幽沉蠢動生靈飛潜異質道風遐扇惠雨普霑盡獲安寧克登壽域上明天尊廣濟之施下副臣等歸命之誠謹啓以聞發願一願大道淡泊虚无安閑空寂澄清自居廣開法門敎導頑夫皆蒙惠澤精苦是修預以同學普得昇虚與天相保長存無憂二願諸天結炁澄清髙虚廣覆保眞固靈氣候調節四運和平國安民豐普天閑寧廣濟一切惠逮有生保劫長存億劫不傾三願土地覆載無窮安平不陷海淪不崩保鎭家國兆民興從養生安死惠周十方禾稼滋植營運日豐咸得厚載萬𩔖皆從四願日月二景髙明無有孛蝕虧盈安清光照諸天洞消暗冥保固劫運世祚和平普加潤澤惠灑衆生五願星辰與日齊光轉燭照耀朗映十方各安其位經緯直行保鎭家國無有災傷四海寧一普天興昌六願四時隨節推遷景炁和調無有災患疫毒消滅普天安平五榖豐熟國富民歡七願浮雲結炁聚煙飛空髙澄䕃覆玄玄隱則無爲散則彌天神仙同居結友衆眞惠流一切興國愛民普濟羣生人同劫年八願風雨流灑無窮普加施泄受其發揚萬物滋生國儲民豐九願五嶽各安其方巍巍包藏長爲仙宫安鎭國祚保天無終護度一切莫不仰宗十願江海蕩蕩无極含容恢廓無細不植淵奥柔惠潤加蟠息天人獲慶年同劫石十一願帝王國土日昌四鎭安睦兵革不揚天人歌唱吉應來翔敷敎濟濟威化洋洋兆庶稱慶長樂未央十二願蝖飛蠢動巳生未生咸蒙安全普得生成皆見元炁受陽之形草木果林經冬不零一切濟度靡不鮮榮和與道合眞復爐香官使者左右龍虎君侍香諸靈官當令臣行道之所自然生金液丹碧芝英百靈衆眞交㑹在此香火爐前令修齋弟子某存亡受福幽顯霑恩十方仙童玉女侍衛香煙傳奏臣向來所啓速達徑御至眞无極大道玉皇上帝御前出戸太上黄籙齋儀卷之二
