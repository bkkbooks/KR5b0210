front:
  text: 太上黃籙齋儀卷之二賔二
  hash: sha256:ca66679f918a424112567b8c39c8401e5adaab5b5533b5070efeb2acd9646139
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0210_HFL_002-001a, image: hfl/0270/0270-032.png}
body:
  text: 唐廣成先生杜光庭集第一日中分行道入戶各禮師存念如法衛靈謡歌空洞帝君守壇五帝校録受符三官備衛四門束魔去姦流鈐擲火除穢焚殘身佩金書錬液芝顔玄虛素合心動三關騎龍跨鶴控虬乘鸞衆星守舍千魔不干道氣常存萬仙永安鳴法鼓二十四通無上三天玄元始三氣太上老君召出臣等身中三五功曹左右官使者侍香金童傳言玉女五帝直符直日香官各三十六人出當召此間土地里域真官正神速出關啓臣今正爾燒香奉為某官某乙為國為家修建無上黃籙大齋若干日夜願得太上十方正真生氣降流臣等身中所啓速達上御至真無極大道玉皇上帝御前各稱法位上清玄都弟子臣某等同誠上啓虛無自然元始天尊無極大道太上大道君大聖祖髙上大道金闕玄元天皇大帝太上老君太上丈人無上玄老十方巳得道大聖衆至真諸君丈人三十六天帝君玉虛上帝玉帝大帝東華南極西靈北真玄都玉京金闕七寶玄臺紫微上宮靈寶至真明皇道君玄中大法師三界官屬一切真靈臣聞至道圓通天真廣濟垂教於希夷之表融神於造化之前籠萬有以陶鈞御三乘而啓導聖人貽則上士勤修佐國化人以慈為本臣獲依祕妙叨佩正真過積丘陵功無塵露誠冝循省以自檢修而受法之初告盟之始玄科有約濟物為先凡所叩祈理冝關奏況奉詞旨敢不上聞讀詞按如詞旨誠切修崇為國為家並兼存殁謹依科法虔立壇場然燈燒香轉經行道冀因精懇俾獲感通以今中分行道運兹初捻上香歸身歸神歸命大道臣等首體投地歸命太上三尊願以是功德先資宗廟社稷尊靈宴處玉清流祥寶祚二儀齊永萬國朝宗皇帝繼聖禹湯躡蹤軒皥壽延北極祚等東溟妃后諸王輔成睿化賢臣良佐匡枯丕圖偃革垂紳克昌道運今故燒香自歸依師尊大聖衆至真之德得道之後升入無形與道合真以今中分行道運兹二捻上香歸身歸神歸命大道臣等首體投地歸命太上尊經願以是功德歸流齋主某家九祖神儀七玄幽識超離隂府遊神碧落之天升度寒庭蛻質丹陵之境今故燒香歸依師尊大聖衆至真之德得道之後升入無形與道合真以今落景行道運兹三捻上香歸身歸神歸命大道臣等首體投地歸命太上三師願以是功德遍及羣生遐均有識俱超昏滯咸契正真齋主某家九親族屬惟新景福克荷神功壽祿內延災凶外息三塗九夜六趣四生同沐玄恩普霑真祐今故燒香歸依師尊大聖衆至真之德得道之後升入無形與道合真禮方懴悔步虛旋行躡雲綱乘虛步玄紀吟詠帝一尊百關自調理俯命八海童仰携髙仙子諸天散香花簫然靈風起宿願定命根故致標髙擬歡樂太上前萬劫猶未始三啓三禮臣等至心稽首禮太上無極大道臣等至心稽首禮三十六部尊經臣等至心稽首禮玄中大法師重稱法位上清玄都弟子臣某等重伸上啓太上無極大道至真無上三十六部尊經天尊至真大帝天帝玉輔上宰四極真人玄中大法師三界內外一切真靈臣以兆劫植因億齡傳慶叨逢妙化幸造法門披盻真經探求聖旨竊聞祈真降聖必在立功佐國濟時所冝弘化宣揚要道敷贊玄科齋戒以逹真靈精誠以祈福祐今齋主某志惟修奉冀感禎祥瀝懇玄壇冥心紫府所冀天尊大聖太上衆真下納精虔廣垂福祉使帝圖悠久聖曆遐延文軌大同梯航畢集星辰合度風雨順時兵革不興休禎允萃元臣良佐齊八極以增齡內屏外藩並九河而注福光宣舜日雲薦堯階雨露灑於九圍禎貺覃於萬國齋主家幽明蒙惠存殁咸安開玉曆以增年續金編而紀善六親和泰衆美同臻下及三塗旁該庶類寒庭長夜之境酆都地獄之中覩太上之慈光沐天真之法力並蒙開度俱出幽沉蠢動生靈飛潛異質道風遐扇惠雨普霑盡獲安寧克登壽域上明天尊廣濟之施下副臣等歸命之誠謹啓以聞發願一願大道淡泊虛無安間空寂澄清自居廣開法門教導頑夫皆蒙惠澤精苦是修預以同學普得升虛與天相保長存無憂二願諸天結氣澄清髙虛廣覆保真固靈氣候調節四運和平國安民豐普天間寧廣濟一切惠逮有生保劫長存億劫不傾三願土地覆載無窮安平不陷海淪不崩保鎮家國兆民興從養生安死惠周十方禾稼滋植營運日豐咸得厚載萬類皆從四願日月二景髙明無有孛蝕虧盈安清光照諸天洞消暗冥保固劫運世祚和平普加潤澤惠灑衆生五願星辰與日齊光轉燭照耀朗映十方各安其位經緯直行保鎮家國無有災傷四海寧一普天興昌六願四時隨節推遷景氣和調無有災患疫毒消滅普天安平五榖豐熟國富民歡七願浮雲結氣聚煙飛空髙澄蔭覆玄玄隱則無為散則彌天神仙同居結友衆真惠流一切興國愛民普濟羣生人同劫年八願風雨流灑無窮普加施泄受其發揚萬物滋生國儲民豐九願五嶽各安其方巍巍包藏長為仙宫安鎮國祚保天無終護度一切莫不仰宗十願江海蕩蕩無極含容恢廓無細不植淵奧柔惠潤加蟠息天人獲慶年同劫石十一願帝王國土日昌四鎮安睦兵革不揚天人歌唱吉應來翔敷教濟濟威化洋洋兆庶稱慶長樂未央十二願蝖飛蠢動巳生未生咸蒙安全普得生成皆見元氣受陽之形草木果林經冬不零一切濟度靡不鮮榮和與道合真復爐香官使者左右龍虎君侍香諸靈官當令臣行道之所自然生金液丹碧芝英百靈衆真交會在此香火爐前令修齋弟子某存亡受福幽顯霑恩十方仙童玉女侍衛香煙傳奏臣向來所啓速達徑御至真無極大道玉皇上帝御前出戶太上黃籙齋儀卷之二
