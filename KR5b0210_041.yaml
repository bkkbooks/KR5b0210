front:
  text: 太上黃籙齋儀卷之四十一王七
  hash: sha256:e40dc1a753d10c74f45e994985579c1539c7826a0ea9917bf16c536c7ff8ea23
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0210_HFL_041-001a, image: hfl/0274/0274-126.png}
body:
  text: 唐廣成先生杜光庭集懴悔夫行道建齋庠序為本稍加紛擾即失軌儀瞻睹既爽其禮容關奏因虧於俯仰非唯獲譴天府亦恐貽誚同人若露壇之中風雨將至盛暑之月凝寒之時或早暮失時或别有驚擾若頓停法事即惶遽失常若備盡科文即遲回非便可壇前都講便存神步虛或驚急異常務從簡要即三啓大謝可也以時消息無至膠柱也二十方都懺衆官北向都講唱曰臣等至心歸命十方無極太上靈寶天尊十極天君三光五嶽三河四海三十六部尊經一切神仙諸靈官禮足各虔誠懴悔或隨方唱之各一拜臣等伏聞道以無為德而不宰籠萬法作域中之大跨九流開衆妙之門善惡之理既分罪福之科攸著所以南宫丹籙上生為賞善之資北府黑書注死乃繩非之本用章懲勸以拯昏蒙先明立教之端方契無為之旨今謹有黃籙太齋主某官某乙誠惟忠孝恩重君親思酬煦育之仁乃啓焚修之會謹齎香花法信龍璧紋繒歸命十方無極太上靈寶天尊日月星宫至奠大神靈山洞府五嶽真君水府尊靈三寶官屬十方三界一切真靈特乞開慶賜之恩降大慈之澤赦齋主某家億曽萬祖幽爽神儀長夜寒庭俱令解脫洎乎三姻五族眷屬親緣禍滅九隂福生三景災凶靜息祿壽遐長皇帝聖越羲農壽均天地儲宮藩屏長贊休期皇后嬪妃永匡聖業庶僚百辟傾翼輔之心萬國四方混車書之化干戈不作風雨順常日月貞華星辰合度酆都罷對蠢動安全克符清靜之宗俱契希夷之道得道之後升入無形和與道合真二十方分懴衆官左行西立東向都講唱曰臣等至心皈命東方無極太上靈寶天尊九氣天君東鄉神仙諸靈官禮足各𧆛誠懺悔東方臣等伏聞少陽建位初開碧落之宫木德司方爰闢青元之府行春令而群芳資始出震域而帝業永昌宜慿育之仁盡罄歸依之懇今謹有黃籙大齋主某荷生成之德感覆載之私謝過祈恩建齋行道謹齎青紋之繒一匹金龍一枚歸命東方無極太上靈寶天尊九氣天君東鄉神仙諸靈官竊以至道流慈群芳寧泰陽和布化品物昭融先祈國祚延弘聖躬和暢扶桑蓬島之外車軌混同東明肅愼之鄉禎祥入貢次及齋主某家九玄滯識落罪録於岱宗五族姻親列仙名於東斗災衰屏息祿算延長過咎自消善慶臻集幽明庶類並沐玄恩得道之後升入無形和與道合真南方臣等伏聞丹天肇啓彤雲結流火之庭赤帝建都絳氣肅明霞之殿播陽靈而光九有宣火德而照重冥既資長養之仁宜竭精誠之禱今謹有黃籙大齋主某乙仰惟家國爰洎君親謝過祈恩建齋行道謹齎絳紋之繒一匹金龍一枚歸命南方無極太上靈寶天尊三氣天君南鄉神仙諸靈官竊以陽德照臨無幽不被至真應物有感必通先祈上福聖躬允昌大業赤烏效瑞丹鳯來儀邊城無烽燧之虞絶域有梯航之貢次及齋主某家九玄七祖錬質朱陵五族六親列名丹簡災衰不作過咎自消祿算增延福慶臻集含靈蠢動俱沐玄恩得道之後升入無形和與道合真西方臣等伏聞金方大帝御璿闕以開圖素德天君處琳宫而演教右極控浮羅之嶽西華分太妙之都仰惟肅殺之威一切生成之望今謹有黃籙大齋主某乙誠深家國義重君親謝過祈恩建齋行道謹齎素紋之繒一匹金龍一枚歸命西方無極太上靈寶天尊七氣天君西鄉神仙諸靈官竊以瓊簡垂科義先極濟金真流貺仁切裁成先祈福祐聖朝保安鼎祚瑶緘玉曆增帝業以無疆白鳯素麟彰瑞圖於遐永次及齋主某家九玄幽爽神升鬱密之宫見在宗親名列西那之境災消未兆福降維新動植蒙恩存亡俱泰得道之後升入無形和與道合真北方臣等伏聞五氣氤氲凝結為廣寒之域重隂浩邈陶甄為沉默之鄉宣一德而濟萬方弘上善而敷衆妙式憑玄化仰備齋誠今謹有黃籙大齋主某乙義重君親志深家國建齋行道謝過祈恩謹齎玄紋之繒一匹金龍一枚歸命北方無極太上靈寶天尊五氣天君北鄉神仙諸靈官竊以玄德無私周流萬國至功遐被亭毒六虛所祈上奉聖圖永延天壽比滄溟而不竭齊北極以常寧次及齋主某家九祖七玄永離幽府出酆都之境登廣漠之宫見在宗親紀名玄籙災殃殄滅過咎潛消祿壽維新福祥臻集得道之後升入無形和與道合真東北方臣等伏聞艮山聳翠流坎水之餘波天宇浮青肇震木之嘉氣揚至化於蒼元之境扇靈風於紫極之庭仰睿德以發生佇神功而開度今謹有黃籙大齋主某乙上惟家國爰洎君親謝過祈恩建齋行道謹齎黃紋之繒一匹金龍一枚歸命東北方無極太上靈寶天尊梵氣天君東北鄉神仙諸靈官竊以和煦將分飛沉咸泰真精獨運靈化無方先祈延福宗祧齊二儀而安社稷傳休聖主均兩曜而燭萬方次及齋主某家九世七玄蛻質於空歌之域六親五族題名於暘谷之宫算壽內延災殃外息幽明同慶蠢動沾榮得道之後升入無形和與道合真東南方臣等伏聞丹華闕下凝梵氣以為宮絳府庭中楊巽風而煦物百谷職朝宗之所三山標靈化之竒浸德澤以無涯配玄功而不宰今謹有黃籙大齋主某乙誠深家國義重君親謝過祈恩建齋行道謹齎黃紋之繒一匹金龍一枚歸命東南方無極太上靈寶天尊梵氣天君東南鄉神仙諸靈官竊以大道弘慈恩波普洽凝至真而下濟臻靈貺以無遺特乞上福鴻圖比遐長於溟海潛資聖壽等崇峻於蓬山次及齋主某家九祖神儀釋幽扄於地戶見存眷屬列仙籍於天文過咎自消災衰永息禍沉未兆福降維新動植生靈普臻道廕得道之後升入無形和與道合真西南方臣等伏聞二象分靈紐沉機於坤野重隂定位凝至靜於地維對日域以稱雄控月門而立極群材資之以生植萬法體之以靜安今謹有黃籙大齋主某乙為國為家建齋行道謹齎黃紋之繒一匹金龍一枚歸命西南方無極太上靈寶天尊梵氣天君西南鄉神仙諸靈官竊以至聖髙真雖迎隨而莫得儲休降祉在祈感而必通特乞資福聖圖保寧大業九圍澄靜六合乂康次乞齋主某家九世七玄息地司之簡對幽靈滯識沙雲路以逍遙見在宗親記名仙府災衰不作祿算增延一切生靈同均福祐得道之後升入無形和與道合真西北方臣等伏聞玉帝凝旒御天門而布化金靈宅位奄乾陸以疏基衆星垂拱極之文萬象體元亨之運實司罪福以統生靈今謹有黃籙大齋主某乙恩重君親誠深家國建齋行道謝過祈恩謹齎黃紋之繒一匹金龍一枚歸命西北方無極太上靈寶天尊梵氣天君西北鄉神仙諸靈官竊以天道昭明運行不息靈仙幽贊敷祐無遺特乞上福聖朝克凝庶績延洪帝業永致雍熙次乞齋主某家九世七玄六親滯識棲神崑閬飛步煙霞見在宗親災衰不作祿延壽永禍滅福生蠢動含靈咸保元吉得道之後升入無形和與道合真上方臣等伏聞一氣沖融運太虛而成象二儀昭煥闢寥廓以無涯分五億之天列三千之境風雷寒暑均四序以何言肅殺生成隨六虛而不宰今謹有黃籙大齋主某荷廣覆之慈感裁成之德建齋行道謝過祈恩謹齎碧紋之繒一匹金龍一枚歸命上方無極太上靈寶天尊三十六天帝君玉京玄都紫微上宫諸真人神仙玉女無極世界上鄉神仙諸靈官竊以玄化周行無幽不燭天真廣濟有感必通特乞資慶國朝克昌天祚昭宣帝道寧泰群方次乞齋主某家九祖七玄擢魂天闕見存姻屬列字仙階壽祿增崇凶災殄息三途九夜同沐玄恩得道之後升入無形和與道合真下方臣等伏聞隂靈肇位厚地裁形廓八表以無垠分九圍而不極群方資以運載品物因以生成今謹有黃籙大齋主某乙誠切君親義深家國建齋行道謝過祈恩謹齎黃紋之繒一匹金龍一枚歸命下方無極太上靈寶天尊髙皇九土四司五帝十二仙君九宫真人神仙玉女無極世界下鄉神仙諸靈官竊以上聖垂文普幽明而幸慶至真演教極覆載以沾恩特乞降瑞帝宫延祥天闕配坤輿而永固齊厚地以無虧次乞齋主某家祖世神儀超離隂府見存姻屬安處福鄉祿壽延長災凶殄息含靈蠢動俱沐玄功得道之後升入無形和與道合真日宫臣等伏聞曜靈舒彩陽景騰暉晨升暘谷之墟夕隱虞泉之岸九芒低散循黃道以摛光五色潛分上碧虛而薦瑞既荷鑒臨之德實思昭報之儀今謹有黃籙大齋主某為國為家齎持法信建齋行道謝過祈恩至心皈命日宫至真大聖日中皇君明皇真人丹霞玉女皇華洞明太光童子日宫神仙諸靈官特乞昭祐聖躬光敷寶祚上齊兩曜下燭萬方次乞齋主某家存殁沾恩災殃靜息永奉無私之照長遵有道之風身得光明與太陽同景得道之後升入無形和與道合真月宫臣等伏聞至隂懸象玉兔凝華遵九道以流暉盈虧有凖分十枝而散彩照燭無私仰蒙鑒祐之恩實思昭報之禮今謹有黃籙大齋主某為國為家齎持法信建齋行道謝過祈恩至心皈命月宫至真大聖月中皇君素皇真人散暉玉女月宫神仙諸靈官特乞降福宗祧延祥祚曆乾坤等固日月齊明齋主某家祿壽增新存亡咸泰災衰不作過咎自消身得光明與太隂同景得道之後升入無形和與道合真星宫臣等伏聞二景分暉衆星列曜三台五緯綴圓碧以流光七正三宫布太清而垂象主張海嶽統制生靈仰蒙鑒映之恩輒思昭報之禮今謹有黃籙大齋主某乙齎持法信為國為家謝過祈恩建齋行道至心皈命諸天星宿璇璣北辰五星北斗九皇三台二十八宿周天三百六十五度星中大神星中真人星中神仙諸靈官特乞潛扶大業幽贊聖朝辰極齊尊景星效瑞齋主某家九玄開度舉族安寧祿壽延長凶災殄息有禎祥之慶無臨照之虞身得光明與星宫同景得道之後升入無形和與道合真東嶽臣等伏聞五山定位泰嶽居尊積翠凝嵐聳雲亭於天外層峯疊嶂控日觀於海涯下統隂靈潛司罪福今謹有黃籙大齋主某乙為國為家謝過祈恩至心皈命東嶽泰山青帝真君飛仙真人名山洞府得道神仙諸靈官伏冀匡祐聖躬扶持帝業乾坤共泰海嶽齊安齋主某家存殁蒙恩祿算增永千災不作百福維新得道之後升入無形和與道合真南嶽臣等伏聞火行建極赤帝分都洞啓朱陵藏煙霞於海外峯標紫蓋捧日月於雲間既為真聖之司兼統死生之籙今謹有黃籙大齋主某乙為國為家謝過祈恩至心皈命南嶽衡山赤帝真君飛仙真人名山洞府得道神仙諸靈官伏冀降福南天延休北闕瑶圖益固聖日增明齋主某家九祖幽靈上丹丘而蛻影見存眷屬列紫府之題名祿算惟崇災衰永息得道之後升入無形和與道合真西嶽臣等伏聞蓮峯聳翠華嶽稱雄臨八水以孤標旁分帝闕壓九河而逈拔下鎮神州密統真靈明司罪福今謹有黃籙大齋主某乙為國為家謝過祈恩至心皈命西嶽華山白帝真君飛仙真人名山洞府得道神仙諸靈官特乞孚祐鴻圖匡扶聖日祚延萬業壽等三峯齋主某家存殁安寧祿算增永災消未兆福降無涯得道之後升入無形和與道合真北嶽臣等伏聞崇嶽橫空截坎郊而蔽日群山積秀據北陸以扶天雄吞朔漠之鄉髙鎮幽燕之野含藏雷雨制御死生今謹有黃籙大齋主某乙為國為家建齋行道至心皈命北嶽恆山黑帝真君飛仙真人名山洞府得道神仙諸靈官伏冀延福帝宫保寧休運龍圖嶽固鳯紀夭齊齋主某家九祖超升出幽都之暗域六親昭泰奉聖日之暉華罪滅災消壽延祿永得道之後升入無形和與道合真中嶽臣等伏聞四野之尊群山之長嵩髙維嶽峻極于天髙低而三十六峯翠橫鞏洛綿亘而幾千萬里青捧穹旻主宰生靈司明罪福今謹有黃籙大齋主某乙為國為家祈恩謝過至心皈命中嶽嵩山黃帝真君飛仙真人名山洞府得道神仙諸靈官伏冀上福宗桃克安寰海丕圖嶽固聖壽天齊齋主某家七世靈儀棲神玉洞六親姻屬列字瓊文災厄蠲消壽祿增永得道之後升入無形和與道合真水府臣等伏聞上善為功御坎宫而積德至柔成性流巽海以澄波資靈於混漠之先縱聖於乾坤之外浮天浴日難窮浩蕩之源泛地蒸雲莫究渺茫之際下闢龍神之府兼分罪福之曹統制無私幽明咸賴今謹有黃籙大齋主某乙為家為國謝過祈恩至心皈命扶桑大帝暘谷神王三河四海九江水帝十二河源水府神仙諸靈官伏冀福祐九重流祥萬國龜書龍篆薦符瑞於堯年海晏河清比靈長於聖運齋主某家九玄神識除水府之罪書五族六親紀蓬宫之仙籙災殃自息祿算增崇蠢動飛沉共沾玄澤得道之後升入無形和與道合真經寶臣等伏聞大道分光初演不言之教天尊布化漸垂有作之文由是結氣成章凝雲作篆字方一丈耀八角之靈芒迹散諸天諧五會之音律千二百戒行萬二千威儀三十六部尊經三千六百科律修之則長生不死羽化神仙奉之則匡國致君安人濟物總包萬法普度群生今謹有黃籙大齋主某乙為家為國謝過祈恩至心皈命至真無上三十六部尊經自然經戒十方正法諸天祕藏真文寶符侍經仙公仙卿仙伯大夫典儀護法一切靈司伏冀降福九天垂休萬國聖躬和暢寶祚遐長齋主某家九代神儀上名丹簡六親族屬列品紫文災厄清消福壽增廣三塗九夜同沐神功得道之後升入無形和與道合真太上黃籙齋儀卷之四十一
