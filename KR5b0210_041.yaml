front:
  text: 太上黄籙齋儀卷之四十一王七
  hash: sha256:78cb20767626d672857166d937eb63a7ba4baffedb6d9c83b87250a037540bdd
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0210_HFL_041-001a, image: hfl/0274/0274-126.png}
body:
  text: 唐廣成先生杜光庭集懴悔夫行道建齋庠序爲本稍加紛擾即失軌儀瞻睹旣爽其禮容關奏因虧於俯仰非唯獲譴天府亦恐貽誚同人若露壇之中風雨將至盛暑之月凝寒之時或早暮失時或别有驚擾若頓停法事即惶遽失常若備盡科文即遲迴非便可壇前都講便存神歩虚或驚急異常務從簡要即三啓大謝可也以時消息無至膠柱也二十方都懺衆官北向都講唱曰臣等至心歸命十方无極太上靈寳天尊十極天君三光五嶽三河四海三十六部尊經一切神仙諸靈官禮足各虔誠懴悔或隨方唱之各一拜臣等伏聞道以無爲德而不宰籠萬法作域中之大跨九流開衆妙之門善惡之理旣分罪福之科攸著所以南宫丹籙上生爲賞善之資北府黑書注死乃繩非之本用章懲勸以拯昏蒙先明立敎之端方契無爲之旨今謹有黄籙太齋主某官某乙誠惟忠孝恩重君親思酬煦育之仁乃啓焚修之㑹謹齎香花法信龍璧紋繒歸命十方无極太上靈寳天尊日月星宫至奠大神靈山洞府五嶽眞君水府尊靈三寳官屬十方三界一切眞靈特乞開慶賜之恩降大慈之澤赦齋主某家億曽萬祖幽爽神儀長夜寒庭俱令解脫洎乎三姻五族眷屬親縁禍滅九隂福生三景災凶靜息禄壽遐長皇帝聖越羲農壽均天地儲宮藩屏長賛休期皇后嬪妃永匡聖業庶僚百辟傾翼輔之心萬國四方混車書之化干戈不作風雨順常日月貞華星辰合度酆都罷對蠢動安全克符清靜之宗俱契希夷之道得道之後昇入无形和與道合眞二十方分懴衆官左行西立東向都講唱曰臣等至心皈命東方无極太上靈寳天尊九炁天君東郷神仙諸靈官禮足各𧆛誠懺悔東方臣等伏聞少陽建位初開碧落之宫木德司方爰闢青元之府行春令而群芳資始出震域而帝業永昌宜慿育之仁盡罄歸依之懇今謹有黄籙大齋主某荷生成之德感覆載之私謝過祈恩建齋行道謹齎青紋之繒一疋金龍一枚歸命東方无極太上靈寳天尊九炁天君東鄉神仙諸靈官竊以至道流慈群芳寜泰陽和布化品物昭融先祈國祚延弘聖躬和暢扶桑蓬島之外車軌混同東明肅愼之鄉禎祥入貢次及齋主某家九玄滯識落罪録於岱宗五族姻親列仙名於東斗災衰屏息禄算延長過咎自消善慶臻集幽明庶類並沐玄恩得道之後昇入无形和與道合眞南方臣等伏聞丹天肇啓彤雲結流火之庭赤帝建都絳氣肅明霞之殿播陽靈而光九有宣火德而照重㝠旣資長養之仁宜竭精誠之禱今謹有黄籙大齋主某乙仰惟家國爰洎君親謝過祈恩建齋行道謹齎絳紋之繒一疋金龍一枚歸命南方无極太上靈寳天尊三炁天君南鄉神仙諸靈官竊以陽德照臨無幽不被至眞應物有感必通先祈上福聖躬允昌大業赤烏效瑞丹鳯來儀邊城無烽燧之虞絶域有梯航之貢次及齋主某家九玄七祖錬質朱陵五族六親列名丹簡災衰不作過咎自消禄算増延福慶臻集含靈蠢動俱沐玄恩得道之後昇入无形和與道合眞西方臣等伏聞金方大帝御璿闕以開圖素德天君處琳宫而演敎右極控浮羅之嶽西華分太妙之都仰惟肅殺之威一切生成之望今謹有黄籙大齋主某乙誠深家國義重君親謝過祈恩建齋行道謹齎素紋之繒一疋金龍一枚歸命西方无極太上靈寳天尊七炁天君西鄉神仙諸靈官竊以瓊簡垂科義先極濟金眞流貺仁切裁成先祈福祐聖朝保安鼎祚瑶緘玉曆増帝業以無疆白鳯素麟彰瑞圖於遐永次及齋主某家九玄幽爽神昇鬱宻之宫見在宗親名列西那之境災消未兆福降維新動植蒙恩存亡俱泰得道之後昇入无形和與道合眞北方臣等伏聞五炁氤氲凝結爲廣寒之域重隂浩邈陶甄爲沉黙之鄉宣一德而濟萬方弘上善而敷衆妙式憑玄化仰備齋誠今謹有黄籙大齋主某乙義重君親志深家國建齋行道謝過祈恩謹齎玄紋之繒一疋金龍一枚歸命北方无極太上靈寳天尊五炁天君北鄉神仙諸靈官竊以玄德無私周流萬國至功遐被亭毒六虚所祈上奉聖圖永延天壽比滄溟而不竭齊北極以常寧次及齋主某家九祖七玄永離幽府出酆都之境登廣漠之宫見在宗親紀名玄籙災殃殄滅過咎潜消禄壽維新福祥臻集得道之後昇入无形和與道合眞東北方臣等伏聞艮山聳翠流坎水之餘波天宇浮青肇震木之嘉氣揚至化於蒼元之境扇靈風於紫極之庭仰睿德以發生佇神功而開度今謹有黄籙大齋主某乙上惟家國爰洎君親謝過祈恩建齋行道謹齎黄紋之繒一疋金龍一枚歸命東北方无極太上靈寳天尊梵炁天君東北鄉神仙諸靈官竊以和煦將分飛沉咸泰眞精獨運靈化無方先祈延福宗祧齊二儀而安社稷傳休聖主均兩曜而燭萬方次及齋主某家九世七玄蛻質於空歌之域六親五族題名於暘谷之宫算壽内延災殃外息幽明同慶蠢動沾榮得道之後昇入无形和與道合眞東南方臣等伏聞丹華闕下凝梵炁以爲宮絳府庭中楊巽風而煦物百谷職朝宗之所三山標靈化之竒浸德澤以無涯配玄功而不宰今謹有黄籙大齋主某乙誠深家國義重君親謝過祈恩建齋行道謹齎黄紋之繒一疋金龍一枚歸命東南方无極太上靈寳天尊梵炁天君東南鄉神仙諸靈官竊以大道弘慈恩波普洽凝至眞而下濟臻靈貺以無遺特乞上福鴻圖比遐長於溟海潜資聖壽等崇峻於蓬山次及齋主某家九祖神儀釋幽扄於地戸見存眷屬列仙籍於天文過咎自消災衰永息禍沉未兆福降維新動植生靈普臻道廕得道之後昇入无形和與道合眞西南方臣等伏聞二象分靈紐沉機於坤野重隂定位凝至靜於地維對日域以稱雄控月門而立極群材資之以生植萬法體之以靜安今謹有黄籙大齋主某乙爲國爲家建齋行道謹齎黄紋之繒一疋金龍一枚歸命西南方无極太上靈寳天尊梵炁天君西南鄉神仙諸靈官竊以至聖髙眞雖迎隨而莫得儲休降祉在祈感而必通特乞資福聖圖保寧大業九圍澄靜六合乂康次乞齋主某家九世七玄息地司之簡對幽靈滯識沙雲路以逍遥見在宗親記名仙府災衰不作禄算増延一切生靈同均福祐得道之後昇入无形和與道合眞西北方臣等伏聞玉帝凝旒御天門而布化金靈宅位奄乾陸以䟽基衆星垂拱極之文萬象體元亨之運實司罪福以統生靈今謹有黄籙大齋主某乙恩重君親誠深家國䢖齋行道謝過祈恩謹齎黄紋之繒一疋金龍一枚歸命西北方无極太上靈寳天尊梵炁天君西北郷神仙諸靈官竊以天道昭明運行不息靈仙幽賛敷祐無遺特乞上福聖朝克凝庶績延洪帝業永致雍熈次乞齋主某家九世七玄六親滯識棲神崑閬飛歩煙霞見在宗親災衰不作禄延壽永禍滅福生蠢動含靈咸保元吉得道之後昇入无形和與道合眞上方臣等伏聞一炁冲融運太虚而成象二儀昭煥闢寥廓以無涯分五億之天列三千之境風雷寒暑均四序以何言肅殺生成隨六虚而不宰今謹有黄籙大齋主某荷廣覆之慈感裁成之德建齋行道謝過祈恩謹齎碧紋之繒一疋金龍一枚歸命上方无極太上靈寳天尊三十六天帝君玉京玄都紫㣲上宫諸眞人神仙玉女无極世界上鄉神仙諸靈官竊以玄化周行無幽不燭天眞廣濟有感必通特乞資慶國朝克昌天祚昭宣帝道寧泰群方次乞齋主某家九祖七玄擢魂天闕見存姻屬列字仙階壽禄増崇凶災殄息三途九夜同沐玄恩得道之後昇入无形和與道合眞下方臣等伏聞隂靈肇位厚地裁形廓八表以無垠分九圍而不極群方資以運載品物因以生成今謹有黄籙大齋主某乙誠切君親義深家國建齋行道謝過祈恩謹齎黄紋之繒一疋金龍一枚歸命下方无極太上靈寳天尊髙皇九土四司五帝十二仙君九宫眞人神仙玉女无極世界下鄉神仙諸靈官竊以上聖垂文普幽明而幸慶至眞演敎極覆載以沾恩特乞降瑞帝宫延祥天闕配坤輿而永固齊厚地以無虧次乞齋主某家祖世神儀超離隂府見存姻屬安處福鄉禄壽延長災凶殄息含靈蠢動俱沐玄功得道之後昇入无形和與道合眞日宫臣等伏聞曜靈舒彩陽景騰暉晨昇暘谷之墟夕隱虞泉之岸九芒低散循黄道以摛光五色潜分上碧虚而薦瑞旣荷鑒臨之德實思昭報之儀今謹有黄籙大齋主某爲國爲家齎持法信建齋行道謝過祈恩至心皈命日宫至真大聖日中皇君明皇眞人丹霞玉女皇華洞明太光童子日宫神仙諸靈官特乞昭祐聖躬光敷寳祚上齊兩曜下燭萬方次乞齋主某家存殁沾恩災殃靜息永奉無私之照長遵有道之風身得光明與太陽同景得道之後昇入无形和與道合眞月宫臣等伏聞至隂懸象玉兔凝華遵九道以流暉盈虧有凖分十枝而散彩照燭無私仰蒙鑒祐之恩實思昭報之禮今謹有黄籙大齋主某爲國爲家齎持法信建齋行道謝過祈恩至心皈命月宫至眞大聖月中皇君素皇眞人散暉玉女月宫神仙諸靈官特乞降福宗祧延祥祚曆乾坤等固日月齊明齋主某家禄壽増新存亡咸泰災衰不作過咎自消身得光明與太隂同景得道之後昇入无形和與道合眞星宫臣等伏聞二景分暉衆星列曜三台五緯綴圓碧以流光七正三宫布太清而垂象主張海嶽統制生靈仰蒙鑒映之恩輙思昭報之禮今謹有黄籙大齋主某乙齎持法信爲國爲家謝過祈恩建齋行道至心皈命諸天星宿璇璣北辰五星北斗九皇三台二十八宿周天三百六十五度星中大神星中眞人星中神仙諸靈官特乞潜扶大業幽賛聖朝辰極齊尊景星效瑞齋主某家九玄開度舉族安寧禄壽延長凶災殄息有禎祥之慶無臨照之虞身得光明與星宫同景得道之後昇入无形和與道合眞東嶽臣等伏聞五山定位泰嶽居尊積翠凝嵐聳雲亭於天外層峯疊嶂控日觀於海涯下統隂靈潜司罪福今謹有黄籙大齋主某乙爲國爲家謝過祈恩至心皈命東嶽泰山青帝眞君飛仙眞人名山洞府得道神仙諸靈官伏冀匡祐聖躬扶持帝業乾坤共泰海嶽齊安齋主某家存殁蒙恩禄算増永千災不作百福維新得道之後昇入无形和與道合眞南嶽臣等伏聞火行建極赤帝分都洞啓朱陵藏煙霞於海外峯標紫蓋捧日月於雲間旣爲眞聖之司兼統死生之籙今謹有黄籙大齋主某乙爲國爲家謝過祈恩至心皈命南嶽衡山赤帝眞君飛仙眞人名山洞府得道神仙諸靈官伏冀降福南天延休北闕瑶圖益固聖日増明齋主某家九祖幽靈上丹丘而蛻影見存眷屬列紫府之題名禄算惟崇災衰永息得道之後昇入无形和與道合眞西嶽臣等伏聞蓮峯聳翠華嶽稱雄臨八水以孤標旁分帝闕壓九河而逈拔下鎭神州宻統眞靈明司罪福今謹有黄籙大齋主某乙爲國爲家謝過祈恩至心皈命西嶽華山白帝眞君飛仙眞人名山洞府得道神仙諸靈官特乞孚祐鴻圖匡扶聖日祚延萬業壽等三峯齋主某家存殁安寧禄算増永災消未兆福降無涯得道之後昇入无形和與道合眞北嶽臣等伏聞崇嶽横空截坎郊而蔽日群山積秀據北陸以扶天雄吞朔漠之鄉髙鎭幽燕之野含藏雷雨制御死生今謹有黄籙大齋主某乙爲國爲家建齋行道至心皈命北嶽恒山黒帝眞君飛仙眞人名山洞府得道神仙諸靈官伏冀延福帝宫保寧休運龍圖嶽固鳯紀夭齊齋主某家九祖超昇出幽都之暗域六親昭泰奉聖日之暉華罪滅災消壽延禄永得道之後昇入无形和與道合眞中嶽臣等伏聞四野之尊群山之長嵩髙維嶽峻極于天髙低而三十六峯翠横鞏洛綿亘而幾千萬里青捧穹旻主宰生靈司明罪福今謹有黄籙大齋主某乙爲國爲家祈恩謝過至心皈命中嶽嵩山黄帝眞君飛仙眞人名山洞府得道神仙諸靈官伏冀上福宗桃克安寰海丕圖嶽固聖壽天齊齋主某家七世靈儀棲神玉洞六親姻屬列字瓊文災厄蠲消壽禄増永得道之後昇入无形和與道合眞水府臣等伏聞上善爲功御坎宫而積德至柔成性流巽海以澄波資靈於混漠之先縱聖於乾坤之外浮天浴日難窮浩蕩之源泛地蒸雲莫究渺茫之際下闢龍神之府兼分罪福之曹統制無私幽明咸賴今謹有黄籙大齋主某乙爲家爲國謝過祈恩至心皈命扶桑大帝暘谷神王三河四海九江水帝十二河源水府神仙諸靈官伏冀福祐九重流祥萬國龜書龍篆薦符瑞於堯年海晏河清比靈長於聖運齋主某家九玄神識除水府之罪書五族六親紀蓬宫之仙籙災殃自息禄算増崇蠢動飛沉共沾玄澤得道之後昇入无形和與道合眞經寳臣等伏聞大道分光初演不言之敎天尊布化漸垂有作之文由是結氣成章凝雲作篆字方一丈耀八角之靈芒跡散諸天諧五㑹之音律千二百戒行萬二千威儀三十六部尊經三千六百科律修之則長生不死羽化神仙奉之則匡國致君安人濟物緫包萬法普度群生今謹有黄籙大齋主某乙爲家爲國謝過祈恩至心皈命至眞无上三十六部尊經自然經戒十方正法諸天祕藏眞文寳符侍經仙公仙卿仙伯大夫典儀護法一切靈司伏冀降福九天垂休萬國聖躬和暢寳祚遐長齋主某家九代神儀上名丹簡六親族屬列品紫文災厄清消福壽增廣三塗九夜同沐神功得道之後昇入无形和與道合眞太上黄籙齋儀卷之四十一
