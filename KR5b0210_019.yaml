front:
  text: 太上黃籙齋儀卷之十九二十二十一同卷歸一
  hash: sha256:d2d24272c312133aa10e6a3cf378ebd5006703fc744fe51daca7df498cfdd3a7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0210_HFL_019-001a, image: hfl/0272/0272-004.png}
body:
  text: 唐廣成先生杜光庭刪人臣爲國消災清旦行道入戸各禮師存念如法衞靈青陽虚映耀日回靈神虎辟邪飛天流鈴摧奸㓕試萬魔束形九微回道八威攝精千眞校録三元蕩清左嘯中黄右䇿六丁七轉八合周旋天經聖化巍巍三道順行慶雲流布合景黃庭鳴法鼓二十四通無上三天玄元始三炁太上道君召出臣身中三五功曹左右官使者侍香金童傳言玉女五帝直符直日香官各三十二人出出者嚴裝關啓玄壇天帝神君當召此間土地里域眞官正神急上關啓臣今奉爲入意以今朝元行道願得玉清道炁靈寳妙光下降流入臣等身中即使玄壇清淨内外成眞天無氛穢地絶妖塵琳琅振響十方肅清萬魔不干眞誠上徹令臣所啓速達逕御太上無極大道至眞玉皇上帝御前各稱法位上清玄都弟子臣某等同誠上啓虚無自然元始天尊無極大道太上大道君髙上大道金闕玄元天皇大帝太上老君昊天玉皇上帝十方巳得道大聖衆至眞諸君丈人三十六天帝君玉虚上帝玉帝大帝東華南極西靈北眞玄都玉京金闕七寳玄臺紫微上宫靈寳至眞明皇道君三十六部尊經玄中大法師三界應感一切眞靈臣等伏聞大道宣行三才定位帝王立極四大齊尊所以開國䟽邦司牧羣有端旒負扆臨御萬方緃聖法天必資於幽賛時和俗泰實仗於神功故得遵郊祀之常儀備吉蠲之盛禮承天事地昭奉上玄今屬災運所鍾迍蒙所搆須祈禎貺以啓昇平某官某乙誠切憂君志深理國䖍修齋直冀感眞靈臣等沗職玄司理宜關奏况奉詞㫖敢不上聞讀詞按如詞言事形家國感裁成之德荷覆載之恩非叩玄關難希景祐是用肅恭丹懇崇設皇壇仰碧落以馳心注清都而騰欵以今清旦行道請法衆等運兹初捻上香願此香煙騰空供飬無上至眞道寳臣等歸身歸命首體投地仰依太上三尊願以是功德歸流社稷尊靈宗祧先聖融神玄極宴景丹臺金闕玉京奉睿謨於元始瑶圖寳曆延巨貺於神孫化時而海晏河清流福而天長地久今故燒香歸依師尊大聖衆至眞之德得道之後升入無形和與道合眞以今清旦行道請法衆等運兹二捻上香願此香煙騰空徑上供養無上至眞經寳臣等歸身歸命首體投地仰依太上尊經願以是功德上願皇帝瑞凝宸極福集聖躬同日月之明照臨萬㝢比乾坤之德覆育群生皇后嬪妃光扶大寳儲宫王子恊賛鴻圖郷輔庶僚元勲良弼文功武烈共泰寰瀛今故燒香歸依師尊大聖衆至眞之德得道之後保天長存和與道合眞以今清旦行道請法衆等運兹三捻上香願此香煙騰空徑上供養無上至眞師寳臣等歸身歸命首體投地仰依太上三師願以是功德歸流天上天下三界十方大道神明諸天衆聖伏覬鎭寧國祚乎祐聖朝耀雪霜雷電之威正春夏秋冬之令生成品物誅殄兇妖蕩滌災殃延洪祚暦某官某乙五山等峻八柱齊貞常拱紫宸永扶皇極九玄升度品𩔖昭蘇億兆康寧干戈戢息飛沈有識咸享利貞今故燒香歸依師尊大聖衆至眞之德得道之後升入無形和與道合眞禮方懴悔三啓頌樂法以爲妻愛經如珠玉持戒制六情念道遣所欲淡泊正炁停蕭然神静黙天魔並敬䕶世世受大福三禮臣等至心稽首禮太上無極大道臣等至心稽首禮三十六部尊經臣等至心稽首禮玄中大法師重稱法位上清玄都弟子臣某等重誠上啓太上無極大道元始天尊太上大道君太上老君至眞無上三十六部尊經玄中大法師上相上宰四司五帝三界官屬一切眞靈臣等伏聞三尊設敎務精感以居先上聖垂科當肅嚴而爲本苟申素悃必建尊靈竊惟造化之初逮于兹日后非民無以布化民非后無以鎭寜惟后配天惟王立極何嘗不感資造化依仗神功然後能奕葉流芳傳休繼世粤自玄古有國有家克遵清静之規乃感玄元之澤皇帝承天握紀應暦披元恭儉惠和憂勤庶政日愼一日夕愓晝乾而運屬晦蒙尚嬰災否非慿至道康濟何由某官某乙夙著鴻勲益勤丹懇致君憂國莫敢遑寧是用精備香花豐嚴信幣披心三境拜手諸天式罄明誠仰希禎祐伏冀丹章上御玄渥下臨垂變化之威神保遐長之祚暦詔命九天兵騎八極風雷掃氛霧而廓乾坤殄災凶而安社稷使姦妖蕩滌日月貞明彗孛風驅干戈氷釋叛臣孽黨草面悛心疫毒邪精雲収電掃熈熈夷夏咸遵道德之風穆穆寰區共恱聖明之化某官某乙禄等嵩衡年齊椿桂永䖍忠孝以奉君親皇帝聖壽巍峩同北極南山之固瑶圖延逺配天長地久之期蠢動幽明俱升壽域上明天尊大慈之化下副臣衆等歸命之誠謹啓以聞𤼵念一念爲道四大合德齋主七世免脫憂苦上升天堂衣食自然二念帝王國主道化興隆庠序濟濟皇敎恢弘威儀翼翼普天所瞻民稱太平四夷賔伏妖惡自㓕聖賢日生三念法師功德大建敎化明逹俱獲飛仙四念同志學人早得仙道更相開度五念九親和睦好尚仁義貴道賤財行爲物範六念損己布施道士及饑寒者天下人民各得其所七念蠕動跂行一切衆生咸蒙成就八念赦貫前生今世罪對立功𥙷過九念家國隆盛宗廟有人世生賢才十念尊受師經不敢中怠平等一心廣度一切剋獲上仙白日登天拜見太上永成眞人雲車羽駕和與道合眞復爐香官使者左右龍虎君侍香諸靈官當令臣朝元之所自然生金液丹碧芝英百靈衆眞交㑹在此香火洞案爐前令臣學道得道求仙得仙國家受慶幽顯沾恩十方仙童玉女侍衛蘭煙傳臣向來所啓速達徑御太上無極大道至眞玉皇上帝御前出戸太上黄籙齋儀卷之十九
