front:
  text: 太上黃籙齋儀卷之十四
  hash: sha256:c362dc2dbd96ca4c6faa9e5456c49e163071464580e98797aaaf0d9245717e6a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0210_HFL_014-001a, image: hfl/0271/0271-074.png}
body:
  text: 唐廣成先生杜光庭集特勑為臣下消災中分行道入戶各禮師存念如法衛靈丹靈朱火炎霞激風赤輪剛運天光八衝迸威包羅交變萬方流金豁落羣魔滅蹤辟姦破妖明耀元功金符召制躡雲策龍謡歌慶會散花太空神化冥運四極安隆伏御帝前罔有不恭鳴法鼓二十四通無上玄元太上道君召出臣身三五功曹左右官使者侍香金童傳言散花玉女五帝直符直日香官各三十二人出出者嚴裝關啓玄壇天帝神君當召此間土地里域真官正神以今奉為入意祈恩玉闕進拜丹書願得玉清道氣靈寶妙光下降流入臣等身中使紫精鬱勃玉關開明五老輔根萬帝攝真體圓珠映乘景𩥵宸金光煥赫御氣上清令臣所啓速達徑御太上無極大道無形無名虛無自然金闕玉陛下神霄九宸上帝御前各稱法位上清玄都大洞三景弟子無上三洞法師奉行黃籙大齋法事某嶽先生某帝真人臣某等同誠上啓虛無自然元始天尊無極大道太上大道君髙上大道金闕玄元天皇大帝太上老君昊天玉皇上帝十方巳得道大聖衆至真諸君丈人三十六天帝君玉虛上帝玉帝大帝東華南極西靈北真玄都玉京金闕七寶玄臺紫微上宫靈寶至真明皇道君三十六部尊經玄中大法師三界應感一切真靈臣等伏聞得一鴻基生三妙本裁成覆載含育虛無赴感如神隨方靡倦丹誠上達豈間於髙卑玄澤下臨不遺於巨細況復配天縱聖運道垂裳德貫神明功侔造化推恩敷惠同膏露以齊均申令宣威與雷霆而並震馳心屬念必洽天休以某官運履災蒙願希銷解冥懷玄極稽首清都爰敷齋告之儀佇契福祥之應香花龍綵備按明科列欵緘詞所宜關奏欽承明旨敢不上聞皇帝青詞謹當宣奏讀詞按如詞言誠祈騰奏臣等以皇帝所齎法信恭設壇場日域月門象十華而設位龍丈鳯篆陳八會之天書固可以攘蕩氛邪廟銷災滯廣延禎貺用息晦蒙以今中分行道請法衆等運茲𥘉捻上香願此香煙騰空徑上供養無上至真道寶臣等歸身歸命首體投地仰依太上三尊願以是功德歸流社稷尊儀宗祧先聖登真玉闕蛻影琳宫𩥵入鳯於雲衢馭六龍於星路仰朝萬聖俯揖千真流巨貺於神孫啓遐年於寶祚今故燒香自歸依師尊大聖衆至真之德得道之後廾入無形和與道合真以今中分行道請法衆等運茲二捻上香願此香煙騰空徑上供養無上至真經寶臣等歸身歸命首體投地仰依太上三尊願以是功德歸流皇帝伏覬聖逾軒昊明比羲舒曆草抽階顯示晦明之數神羊衛屏潛祛邪佞之人福嶽彌髙壽山增峻皇后妃御六宫宣翊贊之功太子諸王宗祐表繁昌之固朝多英俊野絶逋遺蜂岑螺馭之賔梯航入貢神獸天香之使飛翥來庭萬宇同文九圍順化今故燒香自歸依師尊大聖衆至真之德得道之後升入無形和與道合真以今中分行道請法衆等運茲三捻上香願此香煙騰空徑上供養無上至真師寶臣等歸身歸命首體投地仰依太上三尊願以是功德歸流某官祿算增延災衰寧息南宫丹籙别署生名北府黑書全祛罪目九玄開度衆福資薰洎乎三界幽明十方寥廓道風遐布聖力普覃咸蠲短景之期盡契長生之樂泉扄朗晏幽獄停間嘉貺所資俱登道域今故燒香自歸依師尊大聖衆至真之德得道之後升入無形和與道合真禮方懴悔三啓三禮鬱鬱家國盛濟濟經道興天人同其願縹眇入大乘因心立福田靡靡法輪升七祖生天堂我身白日騰臣等至心稽首禮太上無極大道臣等至心稽首禮三十六部尊經臣等至心稽首禮玄中大法師重稱法位上清玄都大洞三景弟子無上三洞大法師臣某謹重上啓太上無極大道元始天尊太上大道君太上老君十方無極大道道德衆聖三十六部尊經玄中大法師天師君上相上宰上保上傅四司五帝三界官屬一切尊靈臣等伏聞道運宣行真經布化明科妙訓開悟於人天靈册竒文敷揚於幽滯所以三乘三洞拯弱喪以知歸龍篆鳯書佐邦家而致福冥心契感虛室通真咸在至誠以崇禎貺欽惟大道潛贊帝功皇帝以某官運履晦蒙恩深軫念將期銷解用保清寧奉龍璧香花紋繒法信爰崇齋直是啓壇場臣等叨備玄司恭承明命輒依科式虔告真靈燒香然燈照燭幽夜上映福堂之上下開冥昧之庭為某官悔謝存亡和平𡨚對若干日夜行道轉經懴九世七玄前生今代幽明負犯生死愆瑕惡對罪根宿𡨚往債及九宫八卦三命五行暗曜明星無邊災咎因今祈謝咸乞蕩除即使玄祖超升積瑕原宥凶隨懴解吉逐願來百福資薰千災蕩滌增新祿祚延益年齡永奉聖朝上酬帝力下願二儀貞觀三景輝華五緯循常八風調順寶圖隆固聖算遐延超帝道而邁皇風澄九圍而清萬國六宫百揆中外宣功太子諸王賢明佐聖歲無疵癘俗有謳歌天下太平羣生遂性重冥寒夜動植飛沉俱承齋謝之緣並悟玄通之道上明天尊廣濟之澤下副臣等懴謝之誠謹啓以聞發願一願大道淡泊虛無安間空寂澄清自居廣開法門教導頑夫皆蒙惠澤精苦自修預以同學普得升虛與天相保長存無憂二願諸天結氣澄清髙虛廣覆保真固靈氣候調節四運和平國安民豐普天間寧廣濟一切惠達有生保天長存億劫不傾三願土地覆載無窮安平不陷海淪不崩保鎮家國兆民興從養生安死惠周十方未稼滋植營運日豐咸得厚載萬類皆從四願日月二景髙明無有薄蝕虧盈安靜光照諸天洞消暗冥保固劫運世祚和平普加潤澤惠灑衆生五願星辰與日齊光轉燭照耀朗映十方各安其位經緯直行保鎮家國無有災傷四海寧一普天興昌六願四時隨節推遷景氣和調無有災患疫毒消滅普天安平五榖豐熟國富民歡七願浮雲結氣聚煙飛空髙澄蔭覆玄玄隱則無為散則彌天神仙同居結友衆真惠流一切興國愛民普濟羣生人同劫年八願風雨流灑無窮普加施泄受其發揚萬物滋生國儲民豐九願五嶽各安其方巍巍包藏長為仙宫安鎮國祚保天無終護度一切莫不仰宗十願江海蕩蕩無極含容恢廓無細不植淵奧柔惠潤加蠕息天人獲慶年同劫石十一願帝王國土日昌四鎮安睦兵革不揚天人歌唱吉應來翔敷教濟濟威化揚揚兆庶稱慶長樂未央十二願蝖飛蠢動巳生未生咸蒙安全普天生成皆見元氣受陽之形草木果林經冬不零一切濟度靡不鮮榮和與道合真復爐香官使者左右龍虎君侍香諸靈官當今臣朝元之所自然生金液丹碧芝英百靈衆真交會在此洞案爐前令臣體耀金輝斬伐胞根七玄技擢百關備仙解除死籍宴坐泥丸東華紀字䇿景虛玄十方仙童玉女接侍香煙傳臣向來所啓之言速達徑御太上無極大道無形無名虛無自然金闕玉陛下神霄九宸上帝御前出戶太上黃籙齋儀卷之十四
