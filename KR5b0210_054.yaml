front:
  text: 太上黄籙齋儀卷之五十四鳴六
  hash: sha256:1ac2ec26df8e1667952e8ee87dfee0d932928bbf1d817a23a985132a4c32ff45
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0210_HFL_054-001a, image: hfl/0277/0277-004.png}
body:
  text: 唐廣成先生杜光庭剛鎭壇眞文玉訣眞文赤書安鎭法出靈寳玉訣經經曰元始五老太上大道君上帝髙尊十方大神會於南丹洞陽上館坐明珠七色寳座時有五帝大聖玄和玉女及諸眞人大仙五萬二千五百衆同來詣座天灑香花神龍伎樂無鞅數衆紫雲四敷三景齊明天元合慶衆眞齊駕道君軫念欲度衆生是男是女好願至人咸使得見靈寳出法亦有善心來歸法門由爾前生萬劫巳奉至眞功滿德足致生道世值遇法興今當爲爾解說疑滯十二部經謂中法洞玄一十二部也使爾救度十方諸天人民勤爲用心勿使魔言光庭曰在昔元始天尊混元既判三炁開圖以大道元精眞一之氣化爲靈寳赤書凝結成文降於五方以鎭安天地招眞命靈故云天地得之以安鎭日月得之以光明鬼神得之以開度人民得之以長生眞文垂之於世上銷天災保鎭帝王下禳毒害以度兆民制伏神鬼拯拔沈淪無所不爲也經云無文不光無文不明無文不立無文不成無文不度無文不生是也又云赤書玉字八威龍文保制劫運使天長存此靈寳五篇眞文之妙用也故能正天分度調和隂陽開度飛爽保衞帝王拯淪濟溺通幽達明和𡨚釋咎却死延生生死之苦無不救之當建齋之時以眞文玉字安鎭五方解壇事畢収文焚之散灰青煙之中具如玉訣之法或學士修眞自祈度世記名仙品永離鬼官當以三元八節甲子本命之日書文玉簡投諸名山除宿世罪簿言名上天事事三過諸天三官九府記其善功上天右别萬神敬護五帝侍衞三界司迎千魔萬精不敢妄干經曰志願堅固觸向咸成七祖父母上生天官生死福慶影響相酬也太上靈寳眞文東方青帝君符命第一東方玉字二十四字學仙之士以立春日朱書持之或投名山東方九氣始皇青天碧霞鬱壘中有老人總校圖籙攝氣舉仙又三十二字主災星臨照朱書青紙上露庭中九日持之銷災修黄籙以鎮東方依後呪文行之歳星輔肝角亢鎭眞氐房心尾四景迴旋箕主七辰正斗明輪承氣捕非掃除災羣又三十二字主制鬼魔朱書黒紙上向東北持之妖滅鬼伏並依呪文行之東山神呪攝召九天赤書符命制㑹酆山東魔送鬼所誅無蠲悉詣木宫敢有稽延又三十二字主攝東海水帝遇大水之災及度大水召龍攝精黃書青紙上依後呪行之投文水中身度其災河伯奉迎下制東河溟海水神大劫洪災蛟龍負身水府開道通徑百千上帝赤文風火無間太上靈寳眞文南方赤帝君符命第二南方玉字三十二字主神仙圖籙學仙之士以立夏甲子本命之日朱書簡文投於名山名入仙籍神仙長生矣南方丹天赤帝玉堂中有大神號曰赤皇上炎流煙三氣勃光神仙受命應㑹太陽又三十二字主攝南方諸星宿變易之災用之及鎭黄籙齋壇朱書青紙上行之天文復位天災自消矣熒惑輔心井鬼守房栁星張翼抗禦四郷軫主七宿迴轉天常召運促㑹正道驛行又四十字主制天魔鬼神黄書赤木刺上行之鬼魔伏滅矣赤文命靈北攝酆山速送魔宗斬滅邪根符校所討明列罪源南山神呪威伏八方羣妖滅爽萬試摧亡又四十八字主制水災召南海水帝蛟龍萬精黄書青紙上水官奉迎南方水帝太伯龍王神呪流行普掃不祥洪水飛災上召蛟龍開除水徑千道萬通敢有干試攝送火宫赤書所吿莫有不從太上靈寳眞文中央黄帝君符命第三中央玉字四十字主神仙圖籙學仙之士以本命甲子春分秋分夏至冬至之日朱書服之或投名山名入仙籍矣中央總靈黃上天元始生五老中皇髙尊黃中總氣綂攝無窮鎭星吐輝流鍊神宫勑攝北帝遏塞鬼門剪除不祥莫有當前又四十八字主攝水災召北海水帝萬精蛟龍黄書青紙上行之中山神呪召龍上雲制㑹黃河九水河源不得急縱善惡悉分千妖萬姦上對帝君莫有干試太陽激焚赤書玉字宣告普聞太上靈寳眞文西方白帝君符命第四西方玉字四十八字主神仙圖籙學仙之士以本命甲子立秋之日書文服之白書白刺上投之名山名上仙籍矣西方素天白帝七門金靈皓映太華流氛白石峨峨七氣氤氲上有始生皇老大神總領肺氣主校九天檢定圖籙制召上仙又二十四字主西方災星變異及鎭齋壇朱書青紙上行之星宿復位天災自消矣太白檢肺奎婁守魂胃昴畢觜王制七關參總斗魁受符北元又一十六字主攝六天鬼氣金精萬妖行此法者黑書白木刺上制西方鬼魔皆自伏滅矣赤書玉字九天正文攝召萬氣普歸帝君又四十八字主攝西海水帝水中萬精召雲龍以度水災黃書青紙上萬精立制水官奉迎西方神呪八威七傳符水上龍召山送雲在此校録同到帝門輔衞上眞斬滅邪源若有不祥截以金關赤書符命風火驛傳太上靈寳眞文北方黒帝君符命第五北方玉字四十字主神仙圖籙學仙之士以立冬本命甲子之日丹書佩又黑書白剌上投之名山名上仙籍矣北方玄天五氣俳佪中有黑帝𩀱皇太微總領符命仙鍊八威青裙羽䙱龍文鳳衣上帝所舉制到玉階又三十二字主妖星照臨及鎭齋壇朱書青紙上行之北辰輔腎斗牛衞扉女虚危室豁落四開壁總七星執凶紏非却災掃穢明道洞輝又二十四字攝天魔乃北方鬼神青書黒紙上行之鬼魔摧伏矣北山神呪激陽起雷流鈴煥落玃天振威北酆所部萬妖滅摧又二十四字制水災黄書黒紙上攝北海水帝制蛟龍萬精矣九河傾訖鳥母羣飛蛟龍通道水脉洞開赤文玉書驛龍風馳靈寳投眞文及吞服眞文并拔度九祖身求神仙叩齒十二通呪曰玄上髙靈元始尊神大聖俳佪萬眞臨軒三景散輝慶雲四陳上告玄圖推筭九天今日啓願玄剌靈山丹書赤字自然眞文上告五帝記名玉篇萬神監映日月盟言願度願生願神願仙天地星宿玄照我身三官九府五嶽大神普告無窮削除罪根元始大明莫不納言七祖幽魂受福自然三塗五苦永離八難得與三景同輝紫晨輪轉不滅身得飛仙畢投剌於絶巖之中散香於靈山之上又叩齒三通呪曰元始告命仙名巳書三官九府罪莫不除散香五帝告盟太虚請如所陳萬劫長居元始五老禳星宿客災明天分度登齋安鎭眞文玉訣道言諸天星宿各有分度至於經道錯越更相侵犯或有異星見於方境皆由天氣運度否激所之災有所犯出其分國故以天光轉照玄告不祥元始垂文和天安地解災却禍安國寧人志士精心依法修行災見之日書眞文如其法露於中庭向方面所謂星在東方角亢七宿面東呪之九日露文他倣此叩齒十二通散髪仰頭呪曰元始上天三光髙明迥景照耀四方玄清運度所衝激揚流星五分錯越三綂失寧五斗總辰七宿明靈眞君大魁厥諱玉清夫人皇妃字曰育嬰總御玄關迴轉諸天今有客災玄告不祥請以眞文赤書上呈散髪謝愆披露丹誠惟乗玄鑒迴復天經氣不横越災不横生焚燒靈文散煙玉庭上景監度普告萬靈氣清三關災滅九冥隂陽調和國土太平請以金龍風火驛呈畢露眞文於中庭金龍鎭之假令災在東方謂角九七宿也則九日九夜竟燒文散灰青煙之中凢禳天災安國寧民法法皆隨方然燈照耀諸天假令災在東方則然九燈亦可九十燈九百燈用金龍一枚青繒九十尺九日九夜行之災在南方則然三燈亦可三十燈三百燈金龍一枚絳繒三十尺三日三夜行之災在中央則然十二燈百二十燈千二百燈金龍一枚黄繒百二十尺十二日十二夜行之中央謂天市太微紫微宫也災在西方則然七燈七十燈七百燈金龍一枚白繒七十尺七日七夜行之災在北方則然五燈五十燈五百燈金龍一枚黒繒五十尺行之五日五夜餘依元始靈寳上元科法黄籙齋常修之當同此法元始靈寳五老攝召北酆鬼魔赤書上訣道言夫受靈寳上法致神明來降存念響達與天眞交遊冝先分别鬼魔形象遏塞干試魔精旣伏存思自感神明易致行此之法依上眞文施行便向東北叩齒三十六通東北爲鬼門凡有大疾災疫妖怪妄興當於國城郡邑境土東北之方按法修齋施文安鎭精心行之鬼魔摧伏因寧民安閉氣九息而仰呪曰三元開明迴轉天常運推數終百六乗綱大劫交㑹萬妖爭行北酆不拘放逸鬼宗羣魔縱肆妖閉天光上帝有命普告十方演明天度法敎開張正道治民攝除不祥有何小妖羣聚爲場赤書玉文撿攝鬼郷北酆三官明速傳行千丁束爽萬鬼送形流鈴交煥激氣太陽金虎四邀天丁捕亡大小齊到不得匪蔵元始所告列奏上宫畢息氣良久應所致感之者當分别其像眞靈思存感效勿說之恐敗其功元始五老禳大劫洪水召蛟龍水宫度災眞文玉訣道言夫天地大劫之災洪水四出蕩穢除惡萬無一遺當此之時天地冥合人民漂流無復善惡唯有志學之士得靈寳眞文大劫小劫之符及可乗飛羽而髙觀登靈嶽而浮翔當此之時神人自當使蛟龍爲通路開水徑以度爾身河伯司迎不罣津梁也所明靈文之眞妙豈拘大劫之災或遇此之際當依其文施用北向水位所在叩齒五通開通閉氣二十五息存已身心中生火火出頭頂而燒四方山林草木及己身都盡形體皆成灰飛翔青煙之中無復所遺存己歸於極陽不爲火所制也思大水浩浩蕩除天下己身化爲灰隨水而流因叩齒二十五通此或分野大水積隂爲災精心之士依文施行亦可拯羣主之墊溺救萬物之淪矣故夏禹得之神召龍以通百川成治水之功也呪曰五行相促運度機陽隂陽否激結成災衝大劫傾訖蕩穢除氛九河受對洪災激川水毋徘徊鳥馬合羣日月冥㑹三景停關上選種民推校玉文棄惡遺善清濁永分我參帝簡名列九天大災四㑹赤書所蠲是日告命萬神咸聞九河水府溟泠大神開除水徑通利河津蛟龍應符攝山送雲負我送我馳騖四奔丹書赤字元始眞文金龍驛呈時刻無間立復告御上對帝尊畢引氣二十五嚥須㬰當有開通之神以度兆身在山則山浮在水則水開可謂臨危而濟儵欻之頃也郡國有水災之時亦可建齋書文精心行之矣天尊於億劫之始運元氣眞精化生靈文以制御劫運保國寧民子宿有福慶與善因縁得值斯文上古之人醇和抱樸與道混同不俟齋戒行之立應代末時澆人心散壞崇正者寡違眞者多欲行其法須依三元簡文立齋行道精心思念冥契玄聖乃致感通不爾者魔試所干徒爲之耳可選精㓗之士絶塵之地名山靈跡以期通應矣以彰大道濟度之慈太上救物之澤弘化之士其勉之哉庚子年中元日集太上黄籙齋儀卷之五十四
