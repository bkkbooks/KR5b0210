front:
  text: 太上黃籙齊儀卷之三十五王一
  hash: sha256:d7a58a9d425abb9ea704a880e49001de63a96e18f33c697f1b5b31200bf63351
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0210_HFL_035-001a, image: hfl/0274/0274-004.png}
body:
  text: 唐廣成先生杜光庭集普度幽魂遷拔中分行道原缺清且入戶各禮師存念如法衛靈丹靈朱火炎霞激風赤輪剛運天光八衝迸威包羅交變萬方流金豁落羣魔滅蹤辟姦破妖明耀元功金符召制躡雲乘龍謡歌慶㑹散花太空神化冥運四極安隆伏御帝前罔有不恭鳴法鼓二十四通無上三天玄元始三氣太上道君召出臣身中三五功曹左右官使者侍香金童傳言玉女五帝直符直日香官各三十二人出出者嚴裝關啓玄壇天帝神君當召此間土地里域真官正神急上關啓臣今奉為入意以今關告願得玉清道氣靈寶妙光下降流入臣等身中即使玄壇清淨內外成真天無氛穢地絶妖塵琳琅振響十方肅清萬魔不干真誠上徹令臣所啓速達徑御太上無極大道至真玉皇上帝御前各稱法位上清玄都某嶽先生臣某等同誠上啓虛無目然元始天尊無極大道太上玉晨道君太上老君無上玄老十方巳得道大聖衆至真諸君丈人三十六天帝君玉虛上帝玉帝大帝東華南極西靈北真玄都玉京金闕七寶玄臺紫微上宫靈寶至真明皇道君三十六部尊經玄中大法師三界官屬一切真靈臣等宿植良緣遭遇玄化生成羣有濟拔幽沉叨奉師資佩三清之祕籙參承玄旨諷三洞之真經品列仙階名升玉簡未能陶神瑩骨絶跡冲襟空依衆妙之門多犯明真之律向以受法之日申盟五帝告誓三官濟度天人匡贊家國凡有禱請理合申陳今奉懇誠固難遏絶所承詞㫖敢不上聞讀詞按如詞懇理濟幽明齊主以歷劫功深諸天善勝仰自然之大化奉無極之元尊匡國致君愛親事長弘救拔之深㫖憫沉滯之幽魂惻隱興懹隳傷寫志遵憑聖教以報大恩披黃籙典章啓玄壇階級崇嚴鎮綵恭獻香花告三官五帝之靈朝金闕玉房之聖臣等依經奉禀從戒精嚴滌慮凝神洗心注念以今午朝行道請法衆等運茲初捻上香願此香煙騰空徑上供養無上至真道寶臣等歸身歸命首體投地仰依太上三尊願以是功德上資皇家宗社九廟威靈德契無為功宣有截皇帝龍圖永固鳯曆彌昌混一車書和同海嶽兆民攸賴百度惟貞德化昭宣奕葉繁茂萬方寧謐九曜髙明遁跡修真師宗父母咸遊八極早翥三清今故燒香歸依師尊大聖衆至真之德得道之後升入無形以今午朝行道請法衆等運兹二捻上香願此香煙騰空徑上供養無上至真經寶臣等歸身歸命首體投地仰依太上三尊願以是功德奉福齊官九玄七祖往逝神儀判除奪紀之名增益記功之簡升真靖境流慶子孫長居得一之貞揚名後世永懋持三之寶垂訓前修今故燒香歸依師尊大聖衆至真之德得道之後升入無形和與道合真以今午朝行道請法衆等運茲三捻上香願此香煙騰空徑上供養無上至真師寶臣等歸身歸命首體投地仰依太上三尊願以是功德恩流庶品福被萬民咸遂生成各均利濟爰及蓬飄旅魄浪泛遊魂罹八難之深殃脫九幽之極苦未除黑簿莫記丹書咸願慈尊降垂靈貺命天官而總録勑地府以全收皆赴壇筵盡霑救度永離惡趣俱植善根託䕃人天受生快無今故燒香歸依師尊大聖衆至真之德得道之後升入無形和與道合真懺方三啓鬱鬱家國盛濟濟經道興天人同其願縹眇入大乘因心立福田靡靡法輪升七祖生天堂我身白日騰三禮臣等至心稽首禮太上無極大道臣等至心稽首禮三十六部尊經臣等至心稽首禮玄中大法師重稱法位上清玄都某嶽先生臣等重啓太上無極大道元始天尊太上大道君太上老君三十六部尊經玄中大法師三界內外名山洞府一切真靈臣等伏聞太玄有作禀無為而有為至聖無私生有物而無物陶甄品彚停毒生成其用無窮神功不宰宣廣闢之業弘救度之門踈網恢恢大信默默今齊主某知微慮逺扣寂求玄浩劫先天九玄七祖流形散氣積業餘殃逮于己身迄至親屬輪回生死造作愆尤仰依懴洗之文希惠滌除之貺慕玄尊救拔之理儼恪威儀繄上聖濟度之科肅嚴齊戒金龍法信寶座朝真諷誦靈章䖍祈聖祐重念齊官位居分理職守方隅生民悉繫於慘舒作福盡由於禱請醮勞萬慮懇梱一心念及勳賢至于蒸庶或立功報國在王事以殁身或禦難忘家向他邦而喪已或行商坐賈積貨亡軀或作吏傷廉取財殞命或遭時疫癘或作亂冦攘赦所不原刑用誅戮亦乃孤惸絶嗣剃落焚身隂魄無依陽魂靡託春秋乏享烏鵲傳音集為旱潦之災散作螟蝗之害功髙未顯圖廟食以無因罪大難原望憑依而後悔俱沉五苦皆滯九幽匪仗玄恩難離隂府恩惟太上慈聖北極真君勑山川土地之神社廟城隍之主追招遣喚引領搜尋盡赴靈壇俱來聽受咸辭鬼録共冠天儀沐浴恩波超登聖果奉逍遙於金闕申讃詠於玉京聖力優加神功拔擢載誕中華之境必生上善之門然願齊主福被親姻榮延忠孝災殃盡滅瑞氣同臻地運發生天儀玄曜災星戢彩祥氣騰光玄化恢弘皇圖盛大河清海晏雨順風調百穀滋豐五兵偃戢萬民富樂九德光孚品物咸亨飛潜遂性上蒙天尊慈悲之澤下副臣等歸命之誠謹啓以聞發願一願大道淡泊虛無安間空寂澄清自居廣開法門教導頑夫皆蒙惠澤精苦是修預以同學普得升虛與天相保長存無憂二願諸天結氣澄清髙虛廣覆保真固靈氣候調節四運和平國安民豐普天間寧廣濟一切惠逮有生保天長存億劫不傾三願土地覆載無窮安平不陷海淪不崩保鎮家國兆民興從養生安死惠周十方禾稼滋植營運日豐咸得厚載萬類皆從四願日月二景髙明無有薄蝕虧盈安清光照諸天洞消暗冥保固劫運世祚和平普加潤惠澤灑衆生五願星辰與日月齊光轉燭照耀映朗十方各安其位經緯直行保鎮家國無有災傷四海寧一普天興昌六願四時隨節推遷景氣和調無有災患疫毒消滅普天安平五穀豐熟國富民歡七願浮雲結氣聚煙飛空髙澄䕃覆玄玄隱則無為散則彌天神仙同居結友衆真惠流一切興國愛民普濟羣生人同劫年八願風雨流灑無窮普加施泄受其發揚萬物滋生國儲民豐九願五嶽各安其方巍巍包藏長為仙宫安鎮國祚保天無終護度一切莫不仰宗十願江海蕩蕩無極含容恢廓無細不植淵奧柔惠潤加蠕息天人獲慶年同劫石十一願帝王國土日昌四鎮安睦兵革不揚天人歌唱吉應來翔敷教濟濟威化洋洋兆庶稱慶長樂未央十二願蝖飛蠢動巳生未生咸蒙安全普得生成皆見元氣受陽之形草木果林經冬不零一切濟度靡不鮮榮和與道合真復爐香官使者左右龍虎君侍香諸靈官當令臣建齊之所自然生金液丹碧芝英百靈衆真交㑹在此香火爐前令臣學道得道求仙得仙齊主受福幽顯沾恩十方仙童玉女侍衛蘭煙傳臣向來所啓速達徑御太上無極大道至真玉皇上帝御前出戶太上黃籙齊儀卷之三十五
