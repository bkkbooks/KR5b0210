front:
  text: 太上黃籙齋儀卷之十十一十二同卷賔十
  hash: sha256:23e85d60ce5c7fed35fd786023389dc4978fcca92fe79fc14b8be4aa55cd708c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0210_HFL_010-001a, image: hfl/0271/0271-004.png}
body:
  text: 唐廣成先生杜光庭集太子降誕清旦行道入戶各禮師存念如法衛靈青陽虛映曜日回靈神虎辟邪飛天流鈴摧姦滅試萬魔束形九微回道八威攝精千真校録三元蕩清左嘯中黃右䇿六丁七轉八合周旋天經聖化巍巍三道順行慶雲流布合景黃庭鳴法鼓二十四通無上玄元太上道君召出臣身中三五功曹左右官使者侍香金童傳言散花玉女五帝直符直日香官各三十二人出出者嚴裝關啓玄壇天帝神君當召此間土地里域真官正神以今奉為入意祈恩玉闕進拜丹書願得玉清道氣靈寶妙光下降流入臣等身中即使紫精鬱勃玉闕開明五老輔根萬帝攝真體圓珠映乘景驂宸金光煥赫御氣上清令臣所啓速達徑御太上無極大道無形無名虛無自然金闕玉陛下各稱法位上清玄都大洞三景弟子無上三洞法師奉行黃籙大齋降誕法事某嶽先生某帝真人臣某等同誠上啓虛無自然元始天尊無極大道太上大道君髙上大道金闕玄元天皇大帝太上老君昊天玉皇上帝十方巳得道大聖衆至真諸君丈人三十六天帝君玉虛上帝玉帝太帝東華南極西靈北真玄都玉京金闕七寶玄臺紫微上宫靈寶至真明皇道君三十六部尊經玄中大法師南上好生君文昌主仙君延壽領籍韓君丈人太平下教二十四真人三界應感一切真靈臣等伏聞萬化之先大道資始胞胎日月孕育乾坤三統聿分四大攸敘肇茲邦國總御寰瀛惟帝為尊配天立極以正君臣之位以明冢嗣之儀由是奕葉承基繼明享祚元良之重萬國所瞻莫不稟秀三光凝華二象御瑶光而表異乘樞電以縱靈屬此令辰冝申虔祝況奉詞旨敢不上聞皇帝青詞謹當宣奏讀詞按如詞言誠深修奉臣等遵依玄訓率勵法流燒香然燈考延生之品籙轉經行道按靈寶之丈儀注想上清虔誠下界以今清旦行道請法衆等運兹初捻上香願此香煙騰空徑上供養無上至真道寶臣等歸身歸命首體投地仰依太上三尊願以是功德歸流社稷尊靈宗祧列聖遊神太漠騰景九清升金闕以參玄登玉虛而契道永垂禎貺克固邦家祚曆遐長與天無極今故燒香自歸依師尊大聖衆至真之德得道之後升入無形和與道合真以今清旦行道請法衆等運茲二捻上香願此香煙騰空徑上供養無上至真經寶臣等歸身歸命首體投地仰依太上三尊願以是功德歸流皇帝伏冀聖圖悠永天壽延洪御丹扆以無為上齊軒昊儼珠旒而不宰下邁唐虞八表宅心九遐同軌后妃王子輔贊睿謨百辟庶寮昭宣景化今故燒香自歸依師尊大聖衆至真之德得道之後升入無形和與道合真以今清旦行道請法衆等運茲三捻上香願此香煙騰空徑上供養無上至真師寶臣等歸身歸命首體投地仰依太上三尊願以是功德歸流皇太子伏冀離方增耀震殿承華開甲觀以延祥聳瑶山而會福克寧大業永贊睿圖壽舜海以無涯祚莊椿而益逺然後惠覃幽顯仁匝寰區動植飛沉咸亨貞吉今故燒香歸依師尊大聖衆至真之德得道之後升入無形和與道合真禮方懴悔臣衆等伏聞十方無極靈寶髙尊凝拱上玄垂休下土五老上帝闡真籍以度人四極真王降靈科而濟物普周家國咸享福祥今以皇太子誕瑞嘉辰虔誠修奉注心三境翹想十華伏惟萬聖昭彰洽殊禎於皇極千真肸蠁臻巨貺於青宫指溟渤以齊年峻嵩嶽而比福上資天壽永固龍圖五緯順常三光昭朗遐兼幽顯同沐玄恩得道之後升入無形和與道合真三啓樂法以為妻愛經如珠玉持戒制六情念道遣所欲淡薄正氣停蕭然神靜默天魔並敬護世世享大福三禮臣等至心稽首禮太上無極大道臣等至心稽首禮三十六部尊經臣等至心稽首禮玄中大法師重稱法位上清玄都大洞三景弟子無上三洞法師奉行黃籙大齋降誕法事某嶽先生某帝真人臣某等謹重上啓太上無極大道元始天尊太上大道君太上老君十方無極大道道德衆聖天尊至真太帝天帝三十六部尊經玄中大法師上相上宰四司五帝三界官屬一切尊靈臣等福運所鐘被沐玄化真經御世大道宣行得以塵微參修妙法九天寶篆三洞瓊篇鳳劄瑶章龍文玉誥備探真賾依按遵行輔國濟時立功弘化凡有修奉咸得上陳以今皇太子誕瑞之辰祈福降祥之會天光朗晏日象暉華魯史問名堯門叶夢繼重離而養德表萬國以作貞屬此令期式虔齋潔冥心三境滌慮重玄燒香然燈轉經行道冀憑精感上達尊靈伏惟太上三尊十方大聖垂慈鑒映省覽丹襟流巨貺於宗祧固宏圖於社稷克寧邦國永祚聖躬皇帝北極貽休東溟注福后妃內職六宫匡拱於宸居宰輔庶寮百揆光熙於王度皇太子重輪照灼增舜日之祥暉少海弘深涵堯天之廣運惟昌聖緒克固邦基然後七曜圓明八風調順兵旗韜戢海嶽晏安幽關開冥昧之光異趣樂逍遙之化人歸道德俗洽和平物外區中同臻巨福上明天尊大慈之澤下副臣等歸命之誠謹啓發念一念為道四大合德七世父母免墮憂苦上升天堂衣食自然二念帝王國主道化興行庠序濟濟皇教恢弘威儀翼翼普天所瞻民稱太平四夷賔伏妖惡自滅聖賢日生三念法師功德大建教化明達俱獲飛仙四念同志學人早得仙道更相開度五念九親和睦好尚仁義貴道賤財行為物範六念損已布施道士及飢寒者天下人民各得其所七念蠕動跂行一切衆生咸蒙成就八念赦貸前生今世罪對立功補過九念家國隆盛宗廟有人世生賢才十念尊受經師不敢中怠平等一心廣度剋獲上仙白日登天拜見太上永成真人雲車羽駕和與道合真復爐香官使者左右龍虎君侍香諸靈官當令臣上章之所自然生金液丹碧芝英百靈衆真交會在此洞案爐前令臣體耀金輝斬伐胞根七玄拔擢百關備仙解除死籍宴坐泥丸東華紀字䇿景虛玄十方仙童玉女接侍香煙傳臣向來所啓之言速達徑御太上無極大道無形無名虛無自然金闕玉陛下出戶太上黃籙齋儀卷之十
