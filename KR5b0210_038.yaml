front:
  text: 太上黃籙齋儀卷之三十八王四
  hash: sha256:514b3ff6e8a9de46d25b386eabdb2c1449ff83564fa6361c59657dabe31d884d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0210_HFL_038-001a, image: hfl/0274/0274-054.png}
body:
  text: 唐廣成先生杜光庭集遷拔中分行道入尸各禮師存念如法衛靈丹靈朱火炎霞激風赤輪剛運天光八衝迸威包羅交變萬方流金豁落羣魔滅蹤辟姦破妖明耀元功金符召制躡雲䇿龍謡歌慶會散花太空神化冥運四極安隆伏御帝前罔有不恭鳴法鼓二十四通無上玄元太上道君召出臣身中三五功曹左右官使者侍香金童傳言散花玉女五帝直符直日香官各三十二人出出者嚴裝關啓玄壇天帝神君當召此間土地里域真官正神臣今行道謹奏為入意願得玉清道氣靈寶妙光下降流入臣身中令臣所啓速逹太上無極大道虛無自然金闕玉陛下各稱法位具位臣某等謹同誠上啓虛無自然元始天尊無極大道太上大道君太上老君髙上玉皇十方巳得道大聖衆至真諸君丈人三十六天帝君玉虛上帝玉帝大帝東華南極西靈北真玄都玉京金闕七寶玄臺紫微上宫靈寶至真明皇道君三十六部尊經玄中大法師三界官屬一切真靈臣等夙承玄運獲履法門窺眄靈章遵行科典所宜棲身巖谷遁迹靈泉擺落塵誼精修祕妙而至真慈育以濟物為先大道度人以立功為本宜申拯救普及幽明況有請祈理難寢絶今奉詞旨敢不上聞讀詞按如詞言志希開濟緬茲幽夜義在憫傷竊惟大象分形稟生育質乘和委順體地法天虛白難全機緣易惑識塵流蕩幻境推遷犯誤既多罪條無量沉流永夜億劫難原唯託熏修冀其升濟是敢披心三洞歸命諸天黃籙開懴拔之科玄都有遷神之品式慿虔潔庶贖愆瑕各運丹心用祈禎祐以今中分行道請法衆等運茲初捻上香願此香煙騰空徑上供養無上至真道寶臣等歸身歸命首體投地仰依太上三尊願以是功德歸流社稷尊靈宗祧先聖升遊真境超證仙階宴處南宫流祥北闕帝圖延永聖壽遐長被聲教於八溟混車書於萬國今故燒香歸依師尊大聖衆至真之德得道之後升入無形和與道合真以今中分行道請法衆等運茲二捻上香願此香煙騰空徑上供養無上至真經寶臣等歸身歸命首體投地仰依太上三尊願以是功德歸流齋主某家九世七玄億曽萬祖出幽隂之域升清淨之鄉受福朱陵錬神丹霍亡靈冥識蕩滌宿瑕罪簡落名青宫列籍超離苦趣解釋幽牢得升長樂之庭克證無為之果今故燒香歸依師尊大聖衆至真之德得道之後升入無形和與道合真以今中分行道請法衆等運茲三捻上香願此香煙騰空徑上供養無上至真師寶臣等歸身歸命首體投地仰依太上三尊願以是功德歸流齋主某家眷屬親緣同資勝福祿延壽永罪滅災祛廣及羣生遐周有識俱登壽域共沐玄慈今故燒香歸依師尊大聖衆至真之德得道之後升入無形和與道合真禮方懴悔各思九色圖象咽液命魔密呪步虛旋繞旋步雲綱上天風颯爾吹飄𥚑凌斗柄秉笏揖參旗獅子㗸丹綬麒麟導翠輜飛行周八極幾見發春枝緑鬚巍丹幘青霞絡羽衣晨趨陽德館夜造月華扉搏弄周天火韜潛起陸機玉房留不住却向九霄飛水噀魔宫懾燈開夜府明九天風靜默四極氣澄清嘯詠朱陵府翺翔白玉京至誠何以祝國祚永安寧三禮臣等至心稽首禮太上無極大道臣等至心稽首禮三十六部尊經臣等至心稽首禮玄中大法師重稱法位具位臣某謹重伸上啓太上無極大道元始天尊太上大道君太上老君十方無極大道道德衆聖三十六部尊經玄中大法師上相上宰四司五帝三界官屬一切真靈臣聞至聖垂慈開八門而拯苦真經演化布三洞以度人惠溥幽明澤周天地得緣斯旨遂罄丹誠弘道立功用禆明訓齋主某以亡靈陶形敻古稟氣初天從無始以來洎于今日隨化機之運惑夢境之中六識起塵十纏迷性易生罪咎旋積過尤或犯觸真靈或旁干禁忌上違天道下爽地冥或故殺誤傷貪財害義虧慈讓之德失禮樂之和侵暴生靈損傷物命罪結三官之府名遍五帝之司身殁以來慮成報對或隂關拘滯或異趣飄淪長夜冥冥無由濟拔是敢束心禱福瀝懇祈天紋繒效請命之儀龍綵備遷神之信然九幽神燈照燭長夜禮十方睿號開濟重隂上告諸天下關諸地及五嶽羅酆之境三塗六趣之鄉惠露息於焦勞慈風蠲其熱惱使𡨚仇和釋債訟消平焚黑簿於酆山刻丹篇於南極千愆萬過咸賜蕩除錬神流火之庭瑩魄少隂之闕上生仙品乘化天衢然願三景著明二儀交泰五兵戢息百榖滋豐天祚遐長聖壽延永龍神幽贊風雨均調蠢類有生咸蒙全育某家存亡受福眷屬沾榮泉府冥津並登真果上明天尊大慈之澤下副臣等歸命之誠謹啓以聞發願願大道淡泊虛無安間空寂澄清自居廣開法門教導頑夫皆蒙惠澤精苦自修預以同學普得升虛與天相保長存無憂二願諸天結氣澄清髙虛廣覆保真固靈氣候調節四運和平國安民豐普天間寧廣濟一切惠達有生保天長存億劫不傾三願土地覆載無窮安平不陷海淪不崩保鎮家國兆民興從養生安死惠周十方禾稼滋植營運日豐咸得厚載萬類皆從四願日月二景髙明無有薄蝕虧盈安清光照諸天洞消暗冥保固劫運世祚和平普加潤澤惠灑衆生五願星辰與日月齊光轉燭照耀朗映十方各安其位經緯直行保鎮家國無有災傷四海寧一普天興昌六願四時隨節推遷景氣和調無有災患疫毒消滅普天安平五榖豐熟國富民歡七願浮雲結氣聚煙飛空髙澄蔭覆玄玄隱則無為散則彌天神仙同居結友衆真惠流一切興國愛民普濟羣生人同劫年八願風雨流灑無窮普加施泄受其發揚萬物滋生國儲民豐九願五嶽各安其方巍巍包藏長為仙宫安鎮國祚保天無終護度一切莫不仰宗十願江海蕩蕩無極含容恢廓無細不植淵奧柔惠潤加蠕息天人獲慶年同劫石十一願帝王國主日昌四鎮安睦兵革不揚天人歌唱吉應來翔敷教濟濟威化揚揚兆庶稱慶長樂未央十二願蝖飛蠢動巳生未生咸蒙安全普得生成皆見元氣受陽之形草木果林經冬不零一切濟度靡不鮮榮和與道合真復爐香官使者左右龍虎君侍香諸靈官當令臣行道之所自然生金液丹碧芝英百靈衆真交會在此香案爐前令臣學道得道求仙得仙十方仙童玉女接侍香煙傳臣向來所啓之言速達徑御太上無極大道虛無自然金闕玉陛下出戶太上黃籙齋儀卷之三十八
