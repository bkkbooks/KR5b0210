front:
  text: 太上黃籙齋儀卷之二十八
  hash: sha256:c8779fdbc5dde6d5c41eb2390a1b643553fd7b3f8e550fa9aa9789d0cec3b3f3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0210_HFL_028-001a, image: hfl/0273/0273-040.png}
body:
  text: 唐廣成先生杜光庭剛消災落景行道入戶各禮師存念如法衛靈金真空降神虎檢營玉帝披霞諸天命靈九晨回駕萬魔束形九微迸煙神威攝精流金擲火百惡消并神輝耀夜洞杳長春聖道蕩蕩十方肅清保制劫運元亨利貞鳴法鼓二十四通無上三天玄元始三氣太上道君召出臣身中三五功曹左右官使者侍香金童傳言玉女五帝直符直日香官各三十二人出出者嚴裝關啓玄壇天帝神君當召此間土地里域真官正神急上關啓臣今奉為入意願得玊清道氣靈寶妙光下降流入臣等身中耶使玄壇清淨內外成真天無氛穢地絶妖塵琳琅振響十方肅清萬魔不千真誠上徹令臣所啓速建徑御太上無極大道至真玊皇上帝御前各稱法位具位臣某等謹同誠上啓虛無自然元始天尊無極大道太上大道君太上老君髙上玉皇十方已得道大聖衆至真諸君丈人三十六天帝君玊虛上帝玉帝大帝東華南極西靈此真玄都玉京金闕七寶玄臺紫微上宫靈寶至真明皇道君三十六部尊經玄中大法師三界官屬一切真靈臣等伏聞五大未光三靈初肇沖用之功已立混成之妙將分先地先天實惟至道不曒不昧首出羣生所以與化無窮隨機靡倦帝王宗之以致理國祚享之以太平福善攸歸凶災自息臣等早窺真格仰奉靈科思立善功濟人匡國況奉詞旨敢不上聞讀詞按如詞言誠情丹切謹持法信崇啓壇場願釋罪尤冀銷災咎臣等登壇受法告誓之初五帝鑒盟三官證信佐國行化濟度為先是敢披按玄經奉宣慈旨修齋行道法地象天質龍綵於十華罄誠祈於八極冀因丹禱上達玄虛以今晚朝行道請法衆等運兹初捻上香願此香煙騰空徑上供養無上至真道寶臣等歸身歸命首體投地仰依太上三尊願以是功德歸流宗廟尊靈列聖昭穆凝神雲路超景星𨇠御斗極以貽祥乘帝車而表貺瑶圖玉諜配永乾坤澤潤天波比深溟渤皇帝化融有截道契無為與三五以並崇指蒿衡而等固提封萬宇車軌大同中外輯寧彛倫攸敘今故燒香自歸依師尊大聖衆至真之德得道之後升入無形和與道合真以今晚朝行道請法衆等運兹二捻上香願此香煙騰空徑上供養無上至真經寶臣等歸身歸命首體投地仰依太上三尊願以是功德歸流弟子某家億世靈儀九玄幽識超升北府鍊化南宫浴流火以參真入明霞而證道垂祥介福普及見存今故燒香自歸依師尊大聖衆至真之德得道之後升入無形和與道合真以今晚朝行道請法衆等運兹三捻上香願此香煙騰空徑上供養無上至真師寶臣等歸身歸命首體投地仰依太上三尊願以是功德歸流弟子某家眷屬親緣九姻六族災祛未兆福降無涯運尼清銷凶殃殄息壽延祿永禍滅福生遍及含靈旁資億兆克履貞吉俱洽休祥九夜開光三塗昭朗普天全濟一切荷恩今故燒香自歸依師尊大聖衆至真之德得道之後升入無形和與道合真禮方懴悔步虛旋繞寶籙修真範丹誠奏上蒼冰淵臨兆庶宵旰致平康萬物消疵癘三晨效吉祥步虛聲已徹更詠洞玄章宛宛神州地巍巍衆妙壇鶴袍來羽客鳬舄下仙官玊斚斟元醴琅函啓大丹至誠何以祝四海永澄瀾水噀魔宫懾燈開夜府明九天風靜默四極氣澄清嘯詠朱陵府翺翔白玊京至誠何以祝國祚永安榮三禮臣等至心稽首禮太上無極大道臣等至心稽首禮三十六部尊經臣等至心稽首禮玄中大法師重稱法位具位臣某等謹重伸上啓太上無極大道元始天尊太上大道君太上老君至真無極大道道德衆聖天尊至真大帝天帝三十六部尊經玄中大法師上相上宰四司五帝三界感應一切尊靈臣等稟化上玄擢形中土崇修至道參佩靈文所冝匿迹巖巒棲神沖漠自期升舉髙謝塵寰而法許立功道先佐國度人濟物拯厄扶危弘天尊救護之慈示衆兆歸依之路天上天下咸遂其冝弟子某以厄運所纒憂危是切願因關奏冀達誠祈質繒綵以盟心奉香花而效信仰為邦國普及存亡懴拔祈恩銷災降福仰慮積生之後纍劫以來不悟正真不知科格違天犯地重過深尤故殺誤傷新𡨚往債六情所起三業所為無量無邊難可記識九府三官之籙四司五帝之曹罪簡易增善功難著七玄幽爽有考注之文宿對前𡨚有殃流之目或天文宿曜𨇠次為災或本命年辰行運為厄九官刑絶八卦衝妨隂陽之品目難窮神道之幽玄靡測致成災咎志切懴析敷列壇場延降真聖炷香達懇拜手披心伏惟上聖衆尊垂光憫鑒千災萬厄咸賜蕩除上願國祚無疆帝德遐廣五星順軌兩曜重暉關城無戍役之勞邊塞罷烽煙之警五山八海安鎮方隅梯峻航深率賔景化祥雲泛彩瑞露凝甘嘉榖年登禎祥日至弟子某九玄七世乘善貺以逍遙五族六親沐神休而康泰封疆靜謐兵革弭寧疫毒銷亡妖凶殄滅九幽地獄覩太上之慈光六趣罪魂受天真之惠力並從開濟俱獲超升動植飛沈盡登常道上明天尊大慈之澤下副臣衆等懴謝之誠謹啓以聞發願一願大道流行普天懷德二願一切有生咸皆悟道三願九夜悲魂一時解脫四願孤魂無依咸得受生五願天下太平五榖豐熟六願臣忠子孝君仁父慈七願四海通同𡨚親和釋八願潛胞處卵咸得生成九願積疾新痾旋即痊愈十願孤露衆生豐衣足食復爐香官使者左右龍虎君侍香諸靈官當令臣行香之所自然生金液丹碧芝英百靈衆真交會在此香火爐前令臣學道得道求仙得仙齋主受福幽顯沾恩十方仙童玉女侍衛蘭煙傅臣向來所啓速達徑御太上無極大道無形無名虛無自然金闕三陛下出户太上黃籙齋儀卷之二十八
