front:
  text: 太上黃籙齋儀卷之五十嗚二
  hash: sha256:55eeb6420c594ce5b5747041bce461134ec257bc28048e6158568478bb98bac3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0210_HFL_050-001a, image: hfl/0276/0276-038.png}
body:
  text: 唐廣成先生杜光庭剛散壇設醮入戸各禮師存念如法衞靈孟章建節靈光執戈監兵束妖執明消魔黃中總治勾陳螣蛇奠鎭五方掃穢除邪金童披香玉女散花氣凝日彩神運月華靈寳混合萬象森羅蘂珠虚白妙道巍峩衆眞監度是謂仙家鳴法鼓二十四通無上三天玄元始三炁太上老君召出臣等身中三五功曹左右官使者左右捧香驛龍騎吏侍香金童傳言玉女五帝直符直日香官各三十六人出當召某處土地里域眞官正神速出關啓臣今正爾設醮燒香奉爲某官某乙爲國爲家奉修無上黃籙大齋若干日夜以今設醮行道願得太上十方正眞生氣降流臣等身中所啓𨒪達徑御至眞無極大道三清上聖玉皇上帝御前各稱法位具位臣某等稽首再禮謹奉請玉京玄都紫微上宫十方大聖衆至眞諸君丈人飛仙上眞玉童玊女伏願應感分輝降臨醮席稽首再禮後同謹奉請天地靈仙諸天上聖日君月后眞人神仙玉童玉女應感分輝降臨醮座謹奉請北極勾陳天皇大帝君北斗七星君南斗六星君三台五星君二十八宿君周天三百六十五度星中大神星中眞人星宿兵馬騎乗等降臨醮座謹奉請東方青帝九氣君南方赤帝三氣君西方白帝七氣君北方黒帝五氣君中央黃帝一氣君五帝眞人玉童玉女兵馬騎乗等降臨醮座謹奉請上元天官中元地官下元水官三元君三宫九府百二十曹五嶽眞人五嶽大神三十六洞天二十四化三河四海九江水帝十二河源十二仙君九宫眞人九天司命五嶽丈人九天使者儲副正職佐命大神天仙地仙飛仙神仙兵馬騎乗等降臨醮座謹奉請三洞四輔侍經眞官仙公仙伯仙卿大夫九天御史玄中大法師嗣師係師上古三師經師籍師度師三洞威神降臨醮座謹奉請靈寳官屬領仙監齋直符眞官侍香將吏玉童玉女六甲諸官六甲諸將六旬玉女社稷將吏一切靈司降臨醮座謹奉請臣等身中三五功曹左右官使者侍香金童傳言玉女五帝直符直日香官無上三天執法開化隂陽功曹銷災散禍解厄君吏等降臨醮座謹奉諸身中所佩二十四治建節監功大將軍四部監功謁者上仙上靈直使正一功曹治病功曹促氣功曹三部功曹等降臨醮座謹奉請隂陽神决吏科車赤符吏剛風騎置吏驛馬上章吏飛龍騎吏天眞飛仙騎吏上部使者都官使者郎吏虎賁察奸鉤騎都官僕射天丁力士天騶甲卒等降臨醮座謹奉請収氣食氣吏収神食神吏収鬼食鬼吏収邪食邪吏収精食精吏収毒食毒吏誅巫破廟吏等降臨醮座謹奉請弟子某乙元辰本命大小行年本命星官驛馬將吏等降臨醮座謹奉請四司五帝應感眞靈三界職司衞壇將吏虚空監察直日直符當界主司等降臨醮座謹奉請此間土地里域眞官降臨西席次上香上湯上茶上酒次長跪啓白臣等謹上啓十方大聖天地靈仙日月帝君四司五帝三台北斗嶽瀆眞官靈寳衆眞三官主者三界内外應感眞靈伏願普降洪慈分輝照鑒臣宿承餘慶得誕今生叨佩靈文稟修玄敎功輕塵露過重丘山誠宜東身以自修檢而法許開度佐國立功凡有歸心理難抑絶今有大道弟子某官某乙爲家爲國齎信投詞請建黃籙大齋若干日夜以某月某日亥時功圓事畢拔度幽夜關奏上眞解厄銷災祈恩謝過功德成就障難不生皆頼法籙吏兵内外官屬至眞衆聖應感尊靈乗此洪休副其丹懇啓奏來往勞歷眞官或薦獻失儀違犯科典動靜俯仰干冐神眞將酬翊衞之恩請降將來之福輒因散席度備醮筵乞降威靈俯賜歆納臣及弟子等不任仰望之至誠惶誠恐稽首再禮次上香上湯上茶上酒臣等重啓衆聖衆眞一切官屬臣聞三清上聖五老尊神天地眞靈玄司主宰生成天地孕育萬靈體洽無爲功先覆載神用不測德顯幽明潜祐邦家幽賛羣品無災不解無厄不禳凡有啓祈必蒙鑒祐弟子某歸心十極稽首衆眞乞爲記録齋功證盟修奉使弟子九玄七世昇入朱陵衣食自然逍遥碧落臣及弟子凶災蕩散罪累消除眞氣内滋靈官外護年命延逺福祐増新出入遊行神明保護北官落死南斗上生所在地司常加警祐上願帝王萬壽社稷興昌天下太平兵戈戢息九幽長夜咸得生天率上含靈同躋壽域臣䓁學法未備恐犯玄科慮所奏未通所祈未達伏願青詞朱表速御九天眞文靈章遍濟幽壤使玄風漙暢惠澤下臨幽顯霑榮存亡開泰啓謝巳畢應感斯須塵世凡微不敢久滯上境天眞俱昇宫闕嶽瀆靈官各歸本署五體眞官復還宫府昇車之恩乞垂昭祐臣等不勝懇願之至誠惶誠恐稽首再禮焚香散果平生呪曰上眞上仙巳還宫闕侍從官吏及當境職司十二時神二十四吏前後左右一切正神並來就坐歆響誠禮各安所部賛揚道化助正却邪爲某乙禳却災衰屛斥凶惡三㑹之日别當言功苟有犯違正一大法科有明文在座衆神各還所治後有祈奏當重告聞弟子再拜送神頌眇眇空無象悠悠感有情敬則承天貺泄則被魔精吉凶隨運起否泰應縁生道不貴珠玉神惟在至誠丹碧盡勤苦懇欵竭中情自然通大聖皆得降明靈捻香陳所願稽首冀嘉禎天尊常寂靜迴心禮杳冥次還戒頌旋行至向都講位天尊大慈悲說戒度衆生威德被幽顯果報感神靈諸天來稽首羣魔自束形過去超八難見在保千齡齋福行當息相共送䖍誠流梵逸雲唱飛香雜煙聲瓊鳳乗丹輦金龍駕緑輧生死皆快樂家國悉安寧次還戒三禮畢衆官納職髙功都講監齋侍經侍香侍燈各依位相次於三寳前禮一拜長跪授簡於髙功訖起三禮退就兩位立訖髙功起三拜行就本位發願一願乾坤明素二願氣象清玄三願聖君萬夀四願化洽八埏五願天垂甘露六願地發祥煙七願四時應𠉀八願萬物生全九願家多孝悌十願國富才賢十一願齋功廣被十二願善瑞日臻復爐香官使者左右龍虎君侍香諸靈官當令拜表言功之所自然生金液丹碧芝英百靈衆眞交㑹在此香火爐前令存亡受福家國霑恩十方仙童玉女侍衞香煙傳奏臣向來所啓徑達至眞無極大道昊天玉皇上帝御前三塗五苦頌八首旋行三周如歩虚法三才及萬物倚伏各有靈終始大劫數福盡天地傾往返於五道苦哉更死生展轉三途中去來與禍幷大賢愼兹戒忍世念割情愚夫不信法罪痛常自嬰吾念世無巳今故重告明若欲度斯禍歸命太上經罪福不由他諒自發爾身大賢故閉口欲滅諸惡根滅念歸兼忘倚伏待長泯弘道以安世終當見正眞淫嫉爲禍首滅身之至患貪養如斯禍恐必致夭殘知惡而不革豈是道所安懷毒日齋直令我發長歎宿命有信然弱䘮謂之無皆欲眼前見過目即言悠大賢明道敎𢡖慽憫頑夫依依念子苦勤勤令我憂人命巳銷盡亦猶膏中火四大暫相寓五物權時假盛年當勤學趣求存吾我福盡身神散冥冥地獄下上聖畏是故㝷道度斯禍學仙行爲急奉戒制情心虚夷正氣居仙聖自相㝷若不信法言胡爲棲山林大賢樂經戒受之爲身寳就學常苦晚治身恨不早比當被幽𧷤倐忽年巳老執卷吟爾極將更死痛惱吾故及弱齡棄世以學道次解壇頌太空包有象至道杳無形承和通妙氣應感達中情倐忽周八極依俙降萬靈微香陳素欵委質表丹誠逺泛翔鸞蓋遐攀綺鳳旌煙官髙鬱鬱雲閣上亭亭瓊駕出霄漢金龍入太清甘露洽人世家國悉安寧出戸華夏賛引至三師前列位上香辭三師頌如不設三師位即於天門上送修齋巳訖仰荷玄恩稽首歸依奉辭經師經法隨玄妙崇奉悉因師凢欲立善者咸當禮願之氣專功易就心慢悔難追若能勤繫念朝夕自仙飛修齋巳訖仰荷玄恩稽首歸依奉辭籍師道以齋爲重法以朝爲常不奉不信者焉能遊帝郷有骨入仙品自然開紫房玄女登雲臺但見金銀堂是故謝三師稽首禮虚皇修齋巳訖仰荷玄恩稽首歸依奉辭度師岧岧玉京山玄都何巍巍眞人乗虚歩朗朗長夜開大道由人弘心至神自歸修齋行道畢稽首辭三師雲輿不駐鶴駕難留後有修齋還當奉請回向向來設醮功德上資皇帝下及羣生同頼玄功成無上道次於玄師前謝過禮畢弟子捻香謝恩禮玄中法師六職訖都講巳下謝法師各各展禮如啓齋夜訖散如常儀太上黃籙齋儀卷之五十
