front:
  text: 太上黃籙齊儀卷之五十嗚二
  hash: sha256:10e0bbd8d5ed76e8aa9613b9496e54d002a947a4bc3eb4ecb29f8be13101b88a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0210_HFL_050-001a, image: hfl/0276/0276-038.png}
body:
  text: 唐廣成先生杜光庭剛散壇設醮入戶各禮師存念如法衛靈孟章建節靈光執戈監兵束妖執明消魔黃中總治勾陳螣蛇奠鎮五方掃穢除邪金童披香玉女散花氣凝日彩神運月華靈寶混合萬象森羅蘂珠虛白妙道巍峩衆真監度是謂仙家鳴法鼓二十四通無上三天玄元始三氣太上老君召出臣等身中三五功曹左右官使者左右捧香驛龍騎吏侍香金童傳言玉女五帝直符直日香官各三十六人出當召某處土地里域真官正神速出關啓臣今正爾設醮燒香奉為某官某乙為國為家奉修無上黃籙大齊若干日夜以今設醮行道願得太上十方正真生氣降流臣等身中所啓𨒪達徑御至真無極大道三清上聖玉皇上帝御前各稱法位具位臣某等稽首再禮謹奉請玉京玄都紫微上宫十方大聖衆至真諸君丈人飛仙上真玉童玊女伏願應感分輝降臨醮席稽首再禮後同謹奉請天地靈仙諸天上聖日君月后真人神仙玉童玉女應感分輝降臨醮座謹奉請北極勾陳天皇大帝君北斗七星君南斗六星君三台五星君二十八宿君周天三百六十五度星中大神星中真人星宿兵馬騎乘等降臨醮座謹奉請東方青帝九氣君南方赤帝三氣君西方白帝七氣君北方黑帝五氣君中央黃帝一氣君五帝真人玉童玉女兵馬騎乘等降臨醮座謹奉請上元天官中元地官下元水官三元君三宫九府百二十曹五嶽真人五嶽大神三十六洞天二十四化三河四海九江水帝十二河源十二仙君九宫真人九天司命五嶽丈人九天使者儲副正職佐命大神天仙地仙飛仙神仙兵馬騎乘等降臨醮座謹奉請三洞四輔侍經真官仙公仙伯仙卿大夫九天御史玄中大法師嗣師係師上古三師經師籍師度師三洞威神降臨醮座謹奉請靈寶官屬領仙監齊直符真官侍香將吏玉童玉女六甲諸官六甲諸將六旬玉女社稷將吏一切靈司降臨醮座謹奉請臣等身中三五功曹左右官使者侍香金童傳言玉女五帝直符直日香官無上三天執法開化隂陽功曹銷災散禍解厄君吏等降臨醮座謹奉諸身中所佩二十四治建節監功大將軍四部監功謁者上仙上靈直使正一功曹治病功曹促氣功曹三部功曹等降臨醮座謹奉請隂陽神决吏科車赤符吏剛風騎置吏驛馬上章吏飛龍騎吏天真飛仙騎吏上部使者都官使者郎吏虎賁察奸鉤騎都官僕射天丁力士天騶甲卒等降臨醮座謹奉請收氣食氣吏收神食神吏收鬼食鬼吏收邪食邪吏收精食精吏收毒食毒吏誅巫破廟吏等降臨醮座謹奉請弟子某乙元辰本命大小行年本命星官驛馬將吏等降臨醮座謹奉請四司五帝應感真靈三界職司衛壇將吏虛空監察直日直符當界主司等降臨醮座謹奉請此間土地里域真官降臨西席次上香上湯上茶上酒次長跪啓白臣等謹上啓十方大聖天地靈仙日月帝君四司五帝三台北斗嶽瀆真官靈寶衆真三官主者三界內外應感真靈伏願普降洪慈分輝照鑒臣宿承餘慶得誕今生叨佩靈文稟修玄教功輕塵露過重丘山誠宜東身以自修檢而法許開度佐國立功凡有歸心理難抑絶今有大道弟子某官某乙為家為國齎信投詞請建黃籙大齊若干日夜以某月某日亥時功圓事畢拔度幽夜關奏上真解厄銷災祈恩謝過功德成就障難不生皆賴法籙吏兵內外官屬至真衆聖應感尊靈乘此洪休副其丹懇啓奏來往勞歷真官或薦獻失儀違犯科典動靜俯仰干冒神真將酬翊衛之恩請降將來之福輒因散席度備醮筵乞降威靈俯賜歆納臣及弟子等不任仰望之至誠惶誠恐稽首再禮次上香上湯上茶上酒臣等重啓衆聖衆真一切官屬臣聞三清上聖五老尊神天地真靈玄司主宰生成天地孕育萬靈體洽無為功先覆載神用不測德顯幽明潜祐邦家幽贊羣品無災不解無厄不禳凡有啓祈必蒙鑒祐弟子某歸心十極稽首衆真乞為記録齊功證盟修奉使弟子九玄七世升入朱陵衣食自然逍遙碧落臣及弟子凶災蕩散罪纍消除真氣內滋靈官外護年命延逺福祐增新出入遊行神明保護北官落死南斗上生所在地司常加警祐上願帝王萬壽社稷興昌天下太平兵戈戢息九幽長夜咸得生天率上含靈同躋壽域臣等學法未備恐犯玄科慮所奏未通所祈未達伏願青詞朱表速御九天真文靈章遍濟幽壤使玄風漙暢惠澤下臨幽顯霑榮存亡開泰啓謝巳畢應感斯須塵世凡微不敢久滯上境天真俱升宫闕嶽瀆靈官各歸本署五體真官復還宫府升車之恩乞垂昭祐臣等不勝懇願之至誠惶誠恐稽首再禮焚香散果平生呪曰上真上仙巳還宫闕侍從官吏及當境職司十二時神二十四吏前後左右一切正神並來就坐歆響誠禮各安所部贊揚道化助正却邪為某乙禳却災衰屛斥凶惡三㑹之日别當言功苟有犯違正一大法科有明文在座衆神各還所治後有祈奏當重告聞弟子再拜送神頌眇眇空無象悠悠感有情敬則承天貺泄則被魔精吉凶隨運起否泰應緣生道不貴珠玉神惟在至誠丹碧盡勤苦懇欵竭中情自然通大聖皆得降明靈捻香陳所願稽首冀嘉禎天尊常寂靜回心禮杳冥次還戒頌旋行至向都講位天尊大慈悲說戒度衆生威德被幽顯果報感神靈諸天來稽首羣魔自束形過去超八難見在保千齡齊福行當息相共送䖍誠流梵逸雲唱飛香雜煙聲瓊鳳乘丹輦金龍駕緑軿生死皆快樂家國悉安寧次還戒三禮畢衆官納職髙功都講監齊侍經侍香侍燈各依位相次於三寶前禮一拜長跪授簡於髙功訖起三禮退就兩位立訖髙功起三拜行就本位發願一願乾坤明素二願氣象清玄三願聖君萬夀四願化洽八埏五願天垂甘露六願地發祥煙七願四時應候八願萬物生全九願家多孝悌十願國富才賢十一願齊功廣被十二願善瑞日臻復爐香官使者左右龍虎君侍香諸靈官當令拜表言功之所自然生金液丹碧芝英百靈衆真交㑹在此香火爐前令存亡受福家國霑恩十方仙童玉女侍衛香煙傳奏臣向來所啓徑達至真無極大道昊天玉皇上帝御前三塗五苦頌八首旋行三周如步虛法三才及萬物倚伏各有靈終始大劫數福盡天地傾往返於五道苦哉更死生展轉三途中去來與禍並大賢愼兹戒忍世念割情愚夫不信法罪痛常自嬰吾念世無巳今故重告明若欲度斯禍歸命太上經罪福不由他諒自發爾身大賢故閉口欲滅諸惡根滅念歸兼忘倚伏待長泯弘道以安世終當見正真淫嫉為禍首滅身之至患貪養如斯禍恐必致夭殘知惡而不革豈是道所安懷毒日齊直令我發長歎宿命有信然弱喪謂之無皆欲眼前見過目即言悠大賢明道教𢡖戚憫頑夫依依念子苦勤勤令我憂人命巳銷盡亦猶膏中火四大暫相寓五物權時假盛年當勤學趣求存吾我福盡身神散冥冥地獄下上聖畏是故尋道度斯禍學仙行為急奉戒制情心虛夷正氣居仙聖自相尋若不信法言胡為棲山林大賢樂經戒受之為身寶就學常苦晚治身恨不早比當被幽𧷤倐忽年巳老執卷吟爾極將更死痛惱吾故及弱齡棄世以學道次解壇頌太空包有象至道杳無形承和通妙氣應感達中情倐忽周八極依俙降萬靈微香陳素欵委質表丹誠逺泛翔鸞蓋遐攀綺鳳旌煙官髙鬱鬱雲閣上亭亭瓊駕出霄漢金龍入太清甘露洽人世家國悉安寧出戶華夏贊引至三師前列位上香辭三師頌如不設三師位即於天門上送修齊巳訖仰荷玄恩稽首歸依奉辭經師經法隨玄妙崇奉悉因師凡欲立善者咸當禮願之氣專功易就心慢悔難追若能勤繫念朝夕自仙飛修齊巳訖仰荷玄恩稽首歸依奉辭籍師道以齊為重法以朝為常不奉不信者焉能遊帝鄉有骨入仙品自然開紫房玄女登雲臺但見金銀堂是故謝三師稽首禮虛皇修齊巳訖仰荷玄恩稽首歸依奉辭度師岧岧玉京山玄都何巍巍真人乘虛步朗朗長夜開大道由人弘心至神自歸修齊行道畢稽首辭三師雲輿不駐鶴駕難留後有修齊還當奉請回向向來設醮功德上資皇帝下及羣生同賴玄功成無上道次於玄師前謝過禮畢弟子捻香謝恩禮玄中法師六職訖都講巳下謝法師各各展禮如啓齊夜訖散如常儀太上黃籙齊儀卷之五十
