front:
  text: 太上黃籙齋儀卷之四十八王十四
  hash: sha256:3fb73e389ba4fa99a3baadc2d74766574c5f4b3bf1d5600c9bd2bab00cc8c473
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0210_HFL_048-001a, image: hfl/0275/0275-106.png}
body:
  text: 唐廣成先生杜光庭集解考懴方都懴臣等今故燒香歸身歸神歸命奉為某乙奉依解考明科修齋行道懴謝三十六世以來億曽萬祖爰及亡靈眷屬親緣歷世所行無邊之罪上犯諸天大聖大道衆尊三光五行虛空主宰風雲雷雨天道神明下犯五嶽諸山三十六地丘陵水府地下職司中犯八卦九宫隂陽官屬古今靈聖前代賢明違背五常犯干四大名書罪簡禍結幽關夭奪年齡不終天算身殁之後留滯地司拘對窮魂幽閉重檻諸苦遍歷衆考備經往返三塗流曳五道楚毒謫役毀悴難任釁咎纏綿終天無解今依靈仙品格懴罪希恩燒香然燈修齋行道皈命十方無極太上靈寶天尊巳得道大聖衆至真諸君丈人十鄉神仙諸靈官伏冀太上三尊諸天大聖開大慈之澤降罔極之恩勑飛天神人齎九龍符命告下十方世界考官地獄之中赦積世以來無邊之罪開九幽地獄出長夜之魂沐浴朱陵之庭冠帶洞陽之府生神福界流貺子孫吉祐常臻存亡泰上資國祚旁及群生俱契玄永登真品得道之後升入元形和與道合真東方臣等今故燒香歸身歸神歸命奉為某乙奉修解考大齋轉經行道皈命車方無極太上靈寶天尊九氣天君東鄉神仙諸靈官懴悔某乙三十六世以來億曽萬祖爰及亡靈眷屬親緣積世所行無邊之罪或行乖慈育不惠不仁或違背師君不忠不孝毁傷良善干冒神明違越五常恣行諸惡魘禱呪詛殺害無辜考重殃深未蒙原解魂神執繫在木官東嶽刑搗獄中受劒樹刀山風雷之苦晝夜考掠痛毒難任注訟子孫殃流後裔冥冥長夜解拔無由以今懴謝乞恩修齋行道伏冀大慈哀宥萬聖回光告下東府之中考官門下解釋𡨚對原赦魂神託化福庭往升淨域見存安泰永荷玄恩得道之後升入無形和與道合真南方臣等今故燒香歸身歸神歸命奉為某乙奉修無上解考妙齋轉經行道皈命南方無極太上靈寶天尊三氣天君南鄉神仙諸靈官懴悔某三十六世以來億曽萬祖爰及亡靈眷屬親緣生世所行無邊之罪或任心楚毒殺害無辜結誓告盟魘害於物邪淫不正凌暴貞良動越禮儀恣行罪惡犯天地日月一切神明考重殃深未蒙原解魂神執繫在火官南嶽刑搗嶽中爐炭焚燒形殘之苦晝夜考掠痛毒難任殃注子孫流逮無巳冥冥長夜解拔無由以今懴謝乞恩修齋行道伏覬三尊鑒宥衆聖垂光告下南方火官刑搗門下赦除積罪原赦幽魂出霍山地獄之中升洞陽朱宫之內見存蒙祐永荷玄恩得道之後升入無形和與道合真西方臣等今故燒香歸身歸神歸命奉為某乙奉修無上解考妙齋轉經行道皈命西方無極太上靈寶天尊七氣天君西鄉神仙諸靈官懴悔某三十六世以來億曽萬祖爰及亡靈眷屬親緣生世所行無邊之罪或不行義讓諂佞無端嫉妬賢能濁亂神道酷虐無度殺戮任心負誓違盟魘蠱謀議殃罪結固積若丘山責重考深未蒙原解魂神執繫在金官華山地獄之中受銅柱鐵床金鎚如考晝夜毒痛食息無寧注訟生人纏綿未解冥冥長夜解脫無由以今行道結齋祈恩懴拔伏覬天尊慈祐大道回光賜告西府之中考官門下解除殃注遷拔魂神受福天堂生神仙界幽明咸泰永荷玄恩得道之後升入無形和與道合真北方臣等今故燒香歸身歸神歸命奉為某乙奉修無上解考妙齋轉經行道皈命北方無極太上靈寶天尊五氣天君北方神仙諸靈官懴悔某乙三十六代以來億曽萬祖爰及亡靈眷屬親緣生世所行無邊之罪或上違天道下犯地司穢觸三光輕凌四大怨恚風雨牽引鬼神肆毒於人殘害於物魂神執對在水官恆山地獄之中受寒冰夜庭冰河之苦肌肉凍裂萬痛切身延注子孫流殃未巳冥冥長夜解拔無由以今行道立齋祈恩謝過伏冀諸天鑒護萬聖垂恩勑告北府之中考官門下赦除罪咎遷拔苦魂出長夜寒庭離三塗五苦升神淨域福祐見存族眷安寧存亡俱泰蒙如所願仰荷玄恩得道之後升入無形和與道合真東北方臣等今故燒香歸身歸神歸命奉為某乙奉修無上解考妙齋轉經行道皈命東北方無極太上靈寶天尊梵氣天君東北方神仙諸靈官懴悔某三十六世以來億曽萬祖爰及亡靈眷屬親緣生世所行無邊之罪或為子不孝為臣不忠為父不慈為君不道妬賢嫉善背正崇邪口是心非自欺形影五逆遍造衆惡備行枉害無辜傷殺非理從生入死怨徹天靈呪詛神明魘害巫蠱殃深責重幽繫在地府刑搗獄中考掠萬般形魂毀瘁冥冥長夜解拔無由以今懴罪乞恩修齋行道伏覬十天降宥萬聖開恩勑告東北方刑搗獄中考官門下解除罪對原赦窮魂離幽閉之鄉出重檻之苦浴神丹霍騰景朱陵注訟永除子孫寧泰蒙如所啓仰荷玄恩得道之後升入無形和與道合真東南方臣等今故燒香歸身歸神歸命奉為某乙奉修無上解考妙齋轉經行道皈命東南方無極太上靈寶天尊梵氣天君東南鄉神仙諸靈官懴悔某家億曽萬祖爰及亡靈眷屬親緣及三十六世以來生世所行無邊之罪或恣為強暴凌虐於人輕侮孤窮憎嫌老病彰人之惡掩人善功鬪亂親踈抑伏貧弱圖謀非道訕謗賢良破人成功嫉人勝已傷殺非理縱毒任心引天地日月星辰以為質證罪深責重魂繫地府考官獄中水火風刀晝夜考掠更相注逮解拔無由以今懴謝乞恩修齋行道伏冀十方大聖五帝髙尊勑告東南方刑搗獄中考官門下拔贖幽爽盥沐形魂萬罪蠲銷宿殃除蕩𡨚仇解釋債訟和平福利見存神生善域幽明同祐永荷玄恩得道之後升入無形和與道合真西南方臣等今故燒香歸身歸神歸命奉為某乙奉修無上解考妙齋轉經行道皈命西南方無極太上靈寶天尊梵氣天君西南鄉神仙諸靈官懴悔某家億曽萬祖三十六世以來爰及亡靈眷屬親緣生世所行無邊之罪或綺言無實矯妄非真欺誑賢愚凌侮真聖附強抑弱貪毒無猒或爭利競財侵名奪位互相殘陷害毒忠良危人自安殺生利已削奪財利不念孤窮結誓立盟牽神引鬼因成殃對積在幽冥魂繫地府之中考官之獄監閉幽檻不覩光明考掠備嬰終天無解以今修齋行道謝罪乞恩伏冀上聖上真大慈大宥神光下照隂暗開明告勑西南方刑搗獄中考官門下幽魂開度託化福庭惠澤咸霑存亡俱泰蒙如所啓仰荷玄恩得道之後升入無形和與道合真西比方臣等今故燒香歸身歸神歸命奉為某乙奉修無上解考妙齋轉經行道皈命西北方無極太上靈寶天尊梵氣天君西北鄉神仙諸靈官懴悔某乙家億曽萬祖三十六世以來爰及亡靈眷屬親緣生世所行無邊之罪殃深考重纍劫未原六趣三塗受諸報對魂神執繫在地官刑搗獄中痛毒難堪延逮後嗣更相流注億劫無窮以今懴罪乞恩修齋行道伏覬衆尊上聖普降慈光解赦窮魂出離幽苦勑告西北方刑搗獄中考官門下𡨚仇和釋債訟銷平積釁深愆盡皆除蕩存亡開度家國霑恩得道之後升入無形和與道合真上方臣等今故燒香歸身歸神歸命奉為某乙奉修無上解考妙齋轉經行道皈命上方無極太上靈寶天尊三十六天帝君玉京玄都紫微金闕三清三界梵氣天君無極世界上鄉神仙諸靈官懴悔某乙家億曽萬祖三十六世以來爰及亡靈眷屬親緣歷世所行無邊之罪或上違天道穢慢三光裸露神明呵忿雷雨欺罔幽顯不畏真靈九府結刑三官舉考魂神執繫在九幽長夜刑搗獄中流曳寒庭幽閉牢檻冥冥億劫不覩光明流注子孫引逮存殁更相執對洗滌無由以今懴謝乞恩修齋行道伏覬三尊萬聖太上衆真諸天帝君四司五帝三光列宿三界真靈普降洪慈鑒臨丹懇勑告考官門下地獄之中拔度魂神赦除罪犯和𡨚釋對離苦生天升入福堂聞經悟道永超生死同入無為債訟清銷存亡開泰蒙如所啓仰荷玄恩得道之後升入無形和與道合真下方臣等今故燒香歸身歸神歸命奉為某乙奉修元上解考妙齋轉經行道皈命下方無極太上靈寶天尊九壘土皇四司五帝十二仙君九宫真人神仙玊女無極世界下鄉神仙諸靈官懴悔某家億曽萬祖三十六世以來爰及亡靈眷屬親緣積世所行無邊之罪或妄為師道刻截土地丘陵岡原川脈毀傷墳廟禁遏神祇塞絶水源斷山堙谷破城隍社稷犯侯伯土官不懼神明恣為罪惡魂神執繫在下方世界九幽地獄之中汲長夜之河以灌四瀆負山摙石謫役萬端痛苦被嬰終天無解上延前世下及子孫報對未原殃深責重以今修齋行道懴拔罪根伏覬上聖衆尊開恩赦宥告勑下方酆都九幽池府刑搗獄中考官門下赦除往劫無量罪因遷拔窮魂出離幽苦逍遙真境安處福鄉㣧嗣康寧存亡俱泰蒙如所啓仰荷玄恩得道之後升入無形和與道合真三光臣等今故燒香歸身歸神歸命奉為某乙奉修無上解考妙齋轉經行道皈命日月星宫至真大聖三光神仙諸靈官懴悔某家億曽萬祖三十六世以來爰及亡靈眷屬親緣無邊之罪或為君無道為臣不忠為父不慈為子不孝犯天文地紀及日月星辰積惡深瑕隂罪陽過名書惡簿身殁鬼官在長夜考官之獄執繫重檻解謝無由以今懴罪乞恩修齋行道伏冀諸天大聖三光衆尊告勑地府獄中考官門下赦除積罪和釋𡨚仇債訟銷平存亡安泰得道之後升入無形和與道合真五嶽臣等今故燒香歸身歸神歸命奉為某乙奉修無上解考妙齋轉經行道皈命五嶽真君名山洞府得道神仙諸靈官懴悔某家億曽萬祖及三十六世以來爰及亡靈眷屬親緣無邊之罪或恣行釁咎干忤神明犯名山大川靈墟福地丘原主宰幽職靈司積罪纏綿未蒙蠲赦魂神執對在名山五嶽地獄之中痛毒備嬰終天無解以今修齋行道懴罪希恩伏冀萬聖延慈諸天鑒祐勑告五嶽獄中考官門下解除𡨚債蕩滌罪瑕萬惡俱消九幽開朗蒙如所啓仰荷玄恩得道之後升入無形和與道合真水府臣等今故燒香歸身歸神歸命奉為某乙奉修無上解考妙齋轉經行道皈命扶桑大帝暘谷神王三河四海九江水帝十二河源水府神仙諸靈官懴悔某家億曽萬祖三十六世以來爰及亡靈眷屬親緣無邊之罪或輕慢真靈不敬神明汚穢泉源侵傷川澤動成罪目結在冥曹執繫魂神在水府地獄考官門下備受諸苦痛毒難任摙汲溟波以灌四瀆冰河寒夜凍裂身形不覩光明無由開度以今修齋行道懴罪希恩伏冀萬聖鑒臨三尊赦宥水府獄中考官門下解𡨚釋結赦罪除愆出幽暗之鄉陟清虛之域魂神受錬證品生天罪咎永銷子孫貞泰蒙如所啓仰荷玄恩得道之後升入無形和與道合真經寶臣等今故燒香歸身歸神歸命奉為某乙奉修無上解考妙齋轉經行道皈命至真無上三十六部尊經真文寶符諸天祕藏十方正法侍衛經典一切靈司懴悔某家億曽萬祖三十六世以來爰及亡靈眷屬親緣無邊之罪或前劫後劫億世萬生三業所為六情所造隂罪陽過考重責深或輕慢無圖穢賤文字非毀聖典泄露靈文殃咎纏綿未曽祈懴魂神執繫在九幽地獄之中考掠備嬰幽閉牢檻冥冥長夜解拔無由以今謝過希恩修齋行道伏覬靈司奏御慈澤旁流告勑地獄幽牢考官門下解銷殃對和釋𡨚仇超度泉關升登福路利安後胤克獲康寧九夜三塗同承景祐蒙如所啓仰荷玄恩得道之後升入無形和與道合真太上黃籙齋儀卷之四十八
