front:
  text: 太上黄籙齋儀卷之八賔八
  hash: sha256:86d0d5b40f49e030d15e12293701377ded727972182ba30840141f5c730ec081
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0210_HFL_008-001a, image: hfl/0270/0270-128.png}
body:
  text: 唐廣成先生杜光庭集第三日中分行道入戸各禮師存念如法衛靈元始虚皇集炁居中三境洞杳肇生穹窿七轉九虚混合回風變化萬神天地開通吉日行道萬魔敬從晨暉朗照黙運元功執節建麾散花太空十方普慶劫運無終鳴法鼓二十四通无上三天玄元始三炁太上老君召出臣等身中三五功曹左右官使者左右捧香驛龍騎吏侍香金童傳言玉女五帝直符直日香官各三十六人出當召此間土地里域眞官正神速出關啓臣今正爾燒香行道奉爲某官某乙爲國爲家奉修无上黄籙大齋若干日夜以今第三日中分陞壇朝眞行道願得太上十方正眞生炁降流臣等身中所啓速達徑御至眞无極大道玉皇上帝御前各稱法位上清玄都弟子臣某等謹同誠上啓虚无自然元始天尊无極大道太上大道君髙上大道金闕玄元天皇大帝太上老君髙上玉皇十方巳得道大聖衆至眞諸君丈人三十六天帝君玉虚上帝玉帝大帝東華南極西靈北眞玄都玉京金闕七寳玄臺紫微上宫靈寳至眞明皇道君三十六部尊經玄中大法師東嶽上卿司命眞君西極緫眞王君太平下敎二十四眞人五嶽靈宫名山洞府三界應感得道眞仙臣等伏聞至道冲虚玄功凝寂包羅萬象覆育百靈惠洽存亡恩孚家國叨蒙師友傳授至眞所冝佐國立功濟人救物凡有祈告敢不上聞讀詞按如詞旨義切修崇酬乾坤煦育之仁答邦國涵濡之賜上資九世旁及羣生奉龍璧以質心備香花而效信志惟䖍潔冀獲感通臣等謹按黄籙簡文靈仙科品凝神丹闕冥想紫微敷列壇場歸心請命伏願九光遐燭萬聖流慈憫鑒丹誠廣垂鴻福以今中分行道請法衆等運茲初捻上香願此香煙騰空徑上供養无上至眞道寳臣等歸身歸命首體投地仰依太上三尊願以是功德上資九廟尊靈宗祧先聖冲眞玉闕蛻質瑶宫皇帝德廣八溟壽齊五嶽寳圖益固玉曆增延妃后六宫承華納祐諸王太子被福延齡侯伯公卿大臣良佐輔成睿化匡賛帝圖今故燒香歸依師尊大聖衆至眞之德得道之後昇入无形和與道合眞以今中分行道請法衆等運茲二捻上香願此香煙騰空徑上供養无上至眞經寳臣等歸身歸命首體投地仰依太上三尊願以是功德歸流某家九玄七祖一切幽靈落罪録於酆都鍊魂神於南霍殃銷累劫永超五苦之郷罪滅無窮開度四迷之域寒庭夜苦咸覩光明今故燒香歸依師尊大聖衆至眞之德得道之後昇入无形和與道合眞以今中分行道請法衆等運茲三捻上香願此香煙騰空徑上供養无上至眞師寳臣等歸身歸命首體投地仰依太上三尊願以是功德奉福某家洎諸眷屬龜臺註算鳯籙增年五濁雲銷四魔煙滅福延無極禍息未形旁及羣生徧該含識盡出輪迴之果咸登富壽之郷今故燒香歸依師尊大聖衆至眞之德得道之後昇入无形和與道合眞禮方懴悔歩虚嚴我九龍駕乗虚以逍遥八天如指掌六合何足遼衆眞誦洞玄太上唱清謡香華隨風散玉音成紫霄五苦一時迸八難順經寥妙哉靈寳囿興此大法橋三啓三禮臣等至心稽首禮太上无極大道臣等至心稽首禮三十六部尊經臣等至心稽首禮玄中大法師重稱法位上清玄都弟子臣某等謹同誠上啓太上无極大道太上三尊十方大聖三十六部尊經玄中大法師上相上宰四司五帝三界官屬一切尊靈臣等被沐玄功欽承道化師資開度叅佩寳文三洞玉經九清祕籙度世長生之旨昇天乆視之書所冝抗志煙巖棲神雲谷自期騰翥謝絶紛華而跡處塵昏行乖髙蹈未能齋心洞府隱景林泉動渉罪因若履冰薄而告盟之首約在度人佐國立功上禆玄敎凡有祈向因敢披陳某將報君親之重恩仰希家國之清泰載䖍丹懇佇降洪休燈燭香華表誠三界紋繒法信騰欵諸天伏惟大聖髙尊垂慈鑒映勑三官五帝九府四司開泉曲幽扄赦長河苦爽九玄神識俱出重隂沐浴靈津逍遥天路十仙汲引衆聖津梁悟道聞經永出生死某家親姻眷屬享福無窮惠澤所資並蒙元吉即使天無謫役冰絶盟言鬼息殃流地銷簡對酆山地獄岱嶽泉關注訟不興福嗣安泰上願風雨昭朗日月貞華天有景星人無疵厲聖圖延永大業興昌百穀豐登五兵偃戢時和俗阜國富家寧九夜三塗有生含識咸承妙訓同契無爲上明天尊弘濟之澤下副臣等䖍奉之誠謹啓以聞發願一願大道淡泊虚无安閑空寂澄清自居廣開法門敎導頑夫皆蒙惠澤精苦自修預以同學普得升虚與天相保長存無憂二願諸天結炁澄清髙虚廣覆保眞固靈氣候調節四運和平國安民豐普天安寧廣濟一切惠達有生保天長存億劫不傾三願土地覆載無窮安平不陷海淪不崩保鎭家國兆民興從養生安死惠周十方禾稼滋植營運日豐咸得厚載萬𩔖皆從四願日月二景髙明無有簿蝕虧盈安靖照諸天洞消暗冥保固劫運世祚和平普加潤澤惠灑衆生五願星辰與日齊光轉燭照耀朗眏十方各安其位經緯直行保鎭家國無有災傷四海寧一普天興昌六願四時隨節推遷景氣和調無有災患疫毒消滅普天安平五穀豐熟國富民歡七願浮雲結炁聚煙飛空髙澄䕃覆玄玄隱則無爲散則彌天神仙同居結友衆眞惠流一切興國愛民普濟羣生人同劫年八願風雨流灑無窮普加施泄受其發揚萬物滋生國儲民豐九願五嶽各安其方巍巍包藏長爲仙宫安鎭國祚保天無終護度一切莫不仰宗十願江海蕩蕩無極含容恢廓無細不植淵奥柔惠潤加蠕息天人獲慶年同劫石十一願帝王國土日昌四鎭安睦兵革不揚天人歌唱吉應來翔敷敎濟濟威化洋洋兆庶稱慶長樂未央十二願蝖飛蠢動巳生未生咸蒙安全普得生成皆見元炁受陽之形草木果林經冬不零一切濟度靡不鮮榮和與道合眞復爐香官使者左右龍虎君侍香諸靈官當令臣行遒之所自然生金液丹碧芝英百靈衆眞交㑹在此香火爐前伏願存亡受福家國霑恩十方仙童玉女侍衛香煙傳奏臣向來所啓徑達至眞无極大道玉皇上帝御前出戸太上黄籙齋儀卷之八
