front:
  text: 太上黃籙齋儀卷之八賔八
  hash: sha256:dd5b0170c13f4c9a214447fd28727a4919a93cc1aede22de5a0caac9f036d647
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0210_HFL_008-001a, image: hfl/0270/0270-128.png}
body:
  text: 唐廣成先生杜光庭集第三日中分行道入戶各禮師存念如法衛靈元始虛皇集氣居中三境洞杳肇生穹窿七轉九虛混合回風變化萬神天地開通吉日行道萬魔敬從晨暉朗照默運元功執節建麾散花太空十方普慶劫運無終鳴法鼓二十四通無上三天玄元始三氣太上老君召出臣等身中三五功曹左右官使者左右捧香驛龍騎吏侍香金童傳言玉女五帝直符直日香官各三十六人出當召此間土地里域真官正神速出關啓臣今正爾燒香行道奉為某官某乙為國為家奉修無上黃籙大齋若干日夜以今第三日中分升壇朝真行道願得太上十方正真生氣降流臣等身中所啓速達徑御至真無極大道玉皇上帝御前各稱法位上清玄都弟子臣某等謹同誠上啓虛無自然元始天尊無極大道太上大道君髙上大道金闕玄元天皇大帝太上老君髙上玉皇十方巳得道大聖衆至真諸君丈人三十六天帝君玉虛上帝玉帝大帝東華南極西靈北真玄都玉京金闕七寶玄臺紫微上宫靈寶至真明皇道君三十六部尊經玄中大法師東嶽上卿司命真君西極總真王君太平下教二十四真人五嶽靈宫名山洞府三界應感得道真仙臣等伏聞至道沖虛玄功凝寂包羅萬象覆育百靈惠洽存亡恩孚家國叨蒙師友傳授至真所冝佐國立功濟人救物凡有祈告敢不上聞讀詞按如詞旨義切修崇酬乾坤煦育之仁答邦國涵濡之賜上資九世旁及羣生奉龍璧以質心備香花而效信志惟虔潔冀獲感通臣等謹按黃籙簡文靈仙科品凝神丹闕冥想紫微敷列壇場歸心請命伏願九光遐燭萬聖流慈憫鑒丹誠廣垂鴻福以今中分行道請法衆等運茲初捻上香願此香煙騰空徑上供養無上至真道寶臣等歸身歸命首體投地仰依太上三尊願以是功德上資九廟尊靈宗祧先聖沖真玉闕蛻質瑶宫皇帝德廣八溟壽齊五嶽寶圖益固玉曆增延妃后六宫承華納祐諸王太子被福延齡侯伯公卿大臣良佐輔成睿化匡贊帝圖今故燒香歸依師尊大聖衆至真之德得道之後升入無形和與道合真以今中分行道請法衆等運茲二捻上香願此香煙騰空徑上供養無上至真經寶臣等歸身歸命首體投地仰依太上三尊願以是功德歸流某家九玄七祖一切幽靈落罪録於酆都鍊魂神於南霍殃銷纍劫永超五苦之鄉罪滅無窮開度四迷之域寒庭夜苦咸覩光明今故燒香歸依師尊大聖衆至真之德得道之後升入無形和與道合真以今中分行道請法衆等運茲三捻上香願此香煙騰空徑上供養無上至真師寶臣等歸身歸命首體投地仰依太上三尊願以是功德奉福某家洎諸眷屬龜臺注算鳯籙增年五濁雲銷四魔煙滅福延無極禍息未形旁及羣生遍該含識盡出輪回之果咸登富壽之鄉今故燒香歸依師尊大聖衆至真之德得道之後升入無形和與道合真禮方懴悔步虛嚴我九龍駕乘虛以逍遙八天如指掌六合何足遼衆真誦洞玄太上唱清謡香華隨風散玉音成紫霄五苦一時迸八難順經寥妙哉靈寶囿興此大法橋三啓三禮臣等至心稽首禮太上無極大道臣等至心稽首禮三十六部尊經臣等至心稽首禮玄中大法師重稱法位上清玄都弟子臣某等謹同誠上啓太上無極大道太上三尊十方大聖三十六部尊經玄中大法師上相上宰四司五帝三界官屬一切尊靈臣等被沐玄功欽承道化師資開度參佩寶文三洞玉經九清祕籙度世長生之旨升天久視之書所冝抗志煙巖棲神雲谷自期騰翥謝絶紛華而迹處塵昏行乖髙蹈未能齋心洞府隱景林泉動涉罪因若履冰薄而告盟之首約在度人佐國立功上禆玄教凡有祈向因敢披陳某將報君親之重恩仰希家國之清泰載虔丹懇佇降洪休燈燭香華表誠三界紋繒法信騰欵諸天伏惟大聖髙尊垂慈鑒映勑三官五帝九府四司開泉曲幽扄赦長河苦爽九玄神識俱出重隂沐浴靈津逍遙天路十仙汲引衆聖津梁悟道聞經永出生死某家親姻眷屬享福無窮惠澤所資並蒙元吉即使天無謫役冰絶盟言鬼息殃流地銷簡對酆山地獄岱嶽泉關注訟不興福嗣安泰上願風雨昭朗日月貞華天有景星人無疵厲聖圖延永大業興昌百穀豐登五兵偃戢時和俗阜國富家寧九夜三塗有生含識咸承妙訓同契無為上明天尊弘濟之澤下副臣等虔奉之誠謹啓以聞發願一願大道淡泊虛無安間空寂澄清自居廣開法門教導頑夫皆蒙惠澤精苦自修預以同學普得升虛與天相保長存無憂二願諸天結氣澄清髙虛廣覆保真固靈氣候調節四運和平國安民豐普天安寧廣濟一切惠達有生保天長存億劫不傾三願土地覆載無窮安平不陷海淪不崩保鎮家國兆民興從養生安死惠周十方禾稼滋植營運日豐咸得厚載萬類皆從四願日月二景髙明無有簿蝕虧盈安靖照諸天洞消暗冥保固劫運世祚和平普加潤澤惠灑衆生五願星辰與日齊光轉燭照耀朗眏十方各安其位經緯直行保鎮家國無有災傷四海寧一普天興昌六願四時隨節推遷景氣和調無有災患疫毒消滅普天安平五穀豐熟國富民歡七願浮雲結氣聚煙飛空髙澄蔭覆玄玄隱則無為散則彌天神仙同居結友衆真惠流一切興國愛民普濟羣生人同劫年八願風雨流灑無窮普加施泄受其發揚萬物滋生國儲民豐九願五嶽各安其方巍巍包藏長為仙宫安鎮國祚保天無終護度一切莫不仰宗十願江海蕩蕩無極含容恢廓無細不植淵奧柔惠潤加蠕息天人獲慶年同劫石十一願帝王國土日昌四鎮安睦兵革不揚天人歌唱吉應來翔敷教濟濟威化洋洋兆庶稱慶長樂未央十二願蝖飛蠢動巳生未生咸蒙安全普得生成皆見元氣受陽之形草木果林經冬不零一切濟度靡不鮮榮和與道合真復爐香官使者左右龍虎君侍香諸靈官當令臣行遒之所自然生金液丹碧芝英百靈衆真交會在此香火爐前伏願存亡受福家國霑恩十方仙童玉女侍衛香煙傳奏臣向來所啓徑達至真無極大道玉皇上帝御前出戶太上黃籙齋儀卷之八
