front:
  text: 太上黃籙齊儀卷之三十二歸八
  hash: sha256:becb1f61fa54563f1b007cd5df450256321741dea772bd48196e1db6cae14569
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0210_HFL_032-001a, image: hfl/0273/0273-108.png}
body:
  text: 唐廣成先生杜光庭剛三元清旦行道入戶各禮師存念如法衛靈金真緑霞煥映三天飛雲丹霄諸天控軿晨輝啓旦隂翳俱捐九微震空五星回旋萬仙應感自然妙玄杳冥散景分形億千寶珠光曜瑞降壇乾生死蒙惠灌鍊金泉魔王恐懼合景三田鳴法鼓二十四通無上玄元太上道君召出臣身中三五功曹左右官使者侍香金童傳言散花玉女五帝直符直日香官各三十二人出出者嚴裝關啓玄壇天帝神君當召此間土地里域真官正神願得玉清道氣靈寶妙光下降流入臣等身中令臣所啓速達徑御太上無極大道無形無名虛無自然金闕玉陛下各稱法位具位臣某等謹同誠上啓虛無自然元始天尊無極大道太上大道君太上老君昊天玉皇上帝十方巳得道大聖衆至真諸君丈人三十六天帝君至虛上帝玊帝大帝東華南極西靈北真玄都玉京金闕七寶玄臺紫微上宫靈寶至真明皇道君五老上帝三元君天地水三官三十六部尊經玄中大法師三界官屬一切真靈臣等伏聞天地之前元始布無為之化混茫之首真人垂廣濟之科由是分氣象於三元播弘慈於萬物命三官以考校俾五帝以君臨懲勸無私恩福遐被臣夙承道廕運偶玄休參佩寶文披閲靈奧志惟敷揚大化匡國濟人八節三元立功為本今屬某元令節齊戒良辰謝過祈恩宜申䖍懇況奉詞㫖敢不上聞讀詞按如詞言志深修奉況逢令序恭演靈文太極明科九府具愆尤之籍玄都典格三元為大宥之期齊功遐及於存亡惠澤旁流於家國臣等輒相携率修設壇場燈燭香花質心三界紋繒法信騰欵諸天所期大道圓通盻精誠而降福至真冥應隨懴滌以垂光使飛天神人齎九龍符命歷下三界關告四司紀録齊功證明丹禱以今早朝行道諸法衆等運兹初捻上香願此香煙騰空徑上供養無上至真道寶臣等歸身歸命首體投地仰依太上三尊願以是功德歸流社稷尊靈宗廟先聖登真金闕遊宴玉京侍聖祖於上宫貽福祥於寶胤皇帝蓬壷比壽舜禹齊功調玉燭而睦華夷肅珠𨇠而靜天地六宫妃后內德欽明太子諸王瑶枝克茂文階武列俱傾忠孝之心四海萬方同混車書之化今故燒香自歸依師尊大聖衆至真之德得道之後升入無形和與道合真以今早朝行道諸法衆等運兹二捻上香願此香煙騰空徑上供養無上至真經寶臣等歸身歸命首體投地仰依太上三尊願以是功德歸流齊主某家九祖七玄三師四友克辭幽夜升覩光明浴神流火之池廕質明霞之殿超升上境福祐見存及三塗五道之中六趣九幽之內息罪書之目除簡對之文永出沉淪盡蒙開度今故燒香自歸依師尊大聖衆至真之德得道之後升入無形和與道合真以今早朝行道請法衆等運兹三捻上香願此香煙騰空徑上供養無上至真師寶臣等歸身歸命首體投地仰依太上三尊願以是功德歸流齊主某家過咎蠲銷災衰寧息南宫注東斗增年眷屬咸宜禎祥允萃然後含靈有識動植飛沉俱承渙汗之恩並陟逍遙之境今故燒香自歸依師尊大聖衆至真之德得道之後升入無形和與道合真禮方懴悔各思九色圓象咽液命魔密呪步虛旋繞稽首禮太上燒香歸虛無流明隨我回法輪亦三周玄願四大興靈慶及王侯七祖生天堂煌煌耀景敷嘯歌冠太漠天樂適我娛齊馨無上德下仙不與儔妙想明玄覺詵詵乘虛遊旋行躡雲綱乘虛步玄紀吟詠帝一尊百關自調理俯命八海童仰携髙仙子諸天散香花蕭然靈風起宿願定命根故致標髙擬歡樂太上前萬劫猶未始嵯峨玄都山十方宗皇一岧岧天寶臺光明焰流日煒燁玉林華蒨璨耀朱實常念餐元精鍊液固形質金光散紫微窈窕大乘逸三禮臣等至心稽首禮太上無極大道臣等至心稽首禮三十六部尊經臣等至心稽首禮玄中大法師重稱法位具位臣某等謹重伸上啓太上無極大道元始天尊太上大道君太上老君玄中大法師三師君上相上宰四司五帝三界官屬一切真靈臣等塵陋凡微積生善㑹玄風普扇真教遐宣寶篆琅書降三清而演化龍文鳳誥該萬聖以傳真仰荷師資咸蒙禀受而未能修勵克保飛升唯在立功度人濟物報至道裁成之德酬乾坤覆載之仁凡有歸心所宜關奏齊主某伏聞三元品格上聖垂文乃天元攺候之期實三宫肆赦之日幽明蒙祐動植沾恩竊惟報主報親莫先於建福為家為國莫大於齊功所以稽首靈壇歸心上聖齎持法信崇建道場玉珮珠幡雜靈儀而璨爛鯨鍾鳳磬引仙唱以虛徐真聖遐臨誠祈上達伏冀資薰大寶孚祐帝圖鳳曆潜延龍儀克固皇帝聖超羲皡仁格唐虞萬㝢宅心九圍順化三邊肅靜永無烽燧之勞八極昭融長有梯航之貢太平帝業輝映無彊星辰順於九天風雨均調於四序兵戈疾疫無撓於黎元水旱火蝗不興於國介次乞齊主家九玄開度五族協和南昌題積善之名北府落過尤之録災衰不作福祐維新增祿祚於天宫益延齡於仙府然後寒庭積夜之境酆都泉曲之鄉變幽牢為清淨之居化地獄為虛無之域羣生遂性品類昭蘇地久大長永臻道化上明天尊廣濟之澤下副臣衆等歸命之誠謹啓以聞發念一念為道四大合德齊主七世父母免墮憂苦上升天堂衣食自然二念帝王國主道化興隆庠序濟濟皇教恢弘威儀翼翼普天所瞻民稱太平四夷賔伏妖惡自滅聖賢自生三念法師功德大建教化明達俱獲飛仙四念同志學人早得仙道更相開度五念九親和睦好尚仁義貴道賤財行為物範六念損巳布施道士及饑寒者天下人民各得其所七念蠕動跂行一切衆生咸蒙成就八念赦貰前生今世罪對立功補過九念家門隆盛宗廟有人世生賢才十念尊受經師不敢中怠平等一心廣度一切剋獲上仙白曰登天拜見太上永成真人雲車羽駕和與道合真復爐香官使者左右龍虎君侍香諸靈官當令臣行香之所自然生金液丹碧芝英百靈衆真交㑹在此洞案爐前令臣學道得道求仙得仙十方仙童玉女接侍香煙傳臣向來所啓之言速達徑御太上無極大道無形無名虛無自然金闕玉陛下出戶太上黃籙齊儀卷之三十二
