front:
  text: 太上黃籙齊儀卷之十五
  hash: sha256:878cd920d247336732c585298f2001d4642fc0c6d828fae63e386436b8eb6a78
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0210_HFL_015-001a, image: hfl/0271/0271-092.png}
body:
  text: 唐廣成先生杜光庭集特勑為臣下消災落景行道入戶衛靈五星髙曜瑞氣飛浮元始集神天地交周玉符寶節嘯命微幽擲火揚威奸凶無留萬魔振伏紛葩却消摧怪伐惡道氣同流神光照夜隂翳俱收萬神降格扇景乘飈羣生咸遂惠遍神州鳴法鼓二十四通無上玄元太上道君召出臣身中三五功曹左右官使者侍香金童傳言散花玉女五帝直符直日香官各三十二人出出者嚴裝關啓玄壇天帝神君當召此間土地里域真官正神以今奉為入意祈恩玉闕進拜丹書願得玉清道氣靈寶妙光下降流入臣等身中即使紫精鬱勃玉關開明五老輔根萬帝攝真體圓珠映乘景𩥵宸金光煥赫御氣上清令臣所啓速達徑御太上無極大道無形無名虛無自然金闕玉陛下神霄九宸上帝御前各稱法位上清玄都太洞三景弟子無上三洞法師奉行黃籙大齊消災法事某嶽先生某帝真人臣某等同誠上啓虛無自然元始天尊無極大道太上大道君髙上大道金闕玄元天皇大帝太上老君昊天玉皇上帝十方巳得道大聖衆至真諸君丈人三十六天帝君玉虛上帝玉帝大帝東華南極西靈北真玄都玉京金闕七寶玄臺三界官屬一切真靈臣等夙以鴻因獲逢玄化三洞布弘慈之訓普福人天四明開廣濟之科顯資邦國是以玉書演與金簡詮功惟感必通有祈咸應況乎事形帝命念屬震襟恩重君臣誠希福祐是敢考洞玄之典式按靈寶之文儀率勵法流精修齊直虔奉詞旨敢不上聞皇帝青詞謹當宣奏讀詞按如詞言理宜關奏皇帝以某官五行倚伏有否塞之期三命運行有興衰之理值茲厄㑹深軫睿慈備內府之香花慿上清之科品俾崇齊福恭啓壇場質龍綵以盟心資蘭炷而馳懇八鸞十鶴期肸蠁以來儀鳯磬龍煙必虛徐而上達以今落景行道請法衆等運茲初捻上香願此香煙騰空徑上供養無上至真道寶臣等歸身歸命首體投地仰依太上三尊願以是功德歸流聖朝宗廟社稷尊靈宴景太虛凝神丹闕羽旗翠葆陪萬聖以朝元玉䈎金枝越千齡而受福祚隆周卜地廣堯封八表咸寧羣生常泰今故燒香自歸依師尊大聖衆至真之德得道之後升入無形和與道合真以今落景行道請法衆等運茲二捻上香願此香煙騰空徑上供養無上至真經寶臣等歸身歸命首體投地仰依太上三尊願以是功德歸流皇帝伏冀鎮元靈䇿㑹玉斗之威神丹籙寶章召瓊宫之寮屬增崇帝祚延永聖年與辰極以齊安共日華而同照皇后龜臺並列鶴壽彌長太子諸王擁洪休而奉聖六宫百辟扶皇極以承榮萬宇咸康普天均福今故燒香自歸依師尊大聖衆至真之德得道之後升入無形和與道合真以今落景行道請法衆等運兹三捻上香願此香煙騰空徑上供養無上至真師寶臣等歸身歸命首體投地仰依太上三尊願以是功德歸流十極九冥諸天諸地玄風所扇道化所覃幽顯俱榮人天同福某官九玄七世乘善貺以登真外族內姻荷神功而契道積瑕消蕩衆厄蠲除年祿遐長福善臻萃今故燒香自歸依師尊大聖衆至真之德得道之後升入無形和與道合真禮方懴悔三啓大道洞玄虛有念無不契錬質入仙真遂成金剛體超度三界難地獄五苦解悉歸太上經靜念稽首禮三禮臣等至心稽首禮太上無極大道臣等至心稽首禮三十六部尊經臣等至心稽首禮玄中大法師重稱法位臣某等謹重上啓太上無極大道元始天尊太上大道君太上老君十方無極大道道德衆聖天尊至真太帝天帝三十六部尊經玄中大法師天師君玉輔上宰四司五帝三界官屬一切真靈臣等伏聞道化玄微髙處九清之上神功招著流于八極之中若影響之相符由感通而咸應凡情上達玄貺必通況乎發自宸衷形于帝念欲佇隨機之福以彰允契之靈大道衆尊必孚嘉祐皇帝以某官禀神二象凝氣三靈隂陽有升降之殊凶吉有推遷之理值兹厄㑹用軫憂勒爰命精誠式陳齊告所冀青詞上御諸天回濟護之仁朱表升聞萬聖降舒榮之澤勑四司五帝詔三界十方開紫陽上宫下九龍符命為某官解前𡨚宿債原往釁深瑕除罪對之書落考延之簡錫延長之祚回短促之期三命五行天文地紀一切災厄咸賜蕩除使祿祚惟新年壽增益神氣興盛衰咎蠲消九祖七玄生天受福上願天元昭朗地載安貞三光有壁合珠連八表無祅風沴氣寶圖隆固聖壽延洪方目將軍擲火鈴而掃氛霧厖眉御史揮紫筆而紀休禎皇后嬪妃常承景祐諸王太子共履殊祥明廷多謇正之臣邊徼息烽煙之備調和玉燭豐積瓊儲億兆歡康寰瀛靜謐洎乎隂陽主宰川嶽龍神翊贊昌時昭宣道化三塗九夜六趣殊倫共荷齊功咸臻福岸上明天尊六慈之澤允副皇帝𧆛奉之誠謹啓發願一願乾坤明素二願氣象清玄三願聖君萬壽四願化洽八埏五願天垂甘露六願地發祥煙七願四時應候八願萬物生全九願家多孝悌十願國富才賢十一願齊功廣被十二願善瑞曰臻復爐香官使者左右龍虎君侍香諸靈官當今臣朝元之所自然生金液丹碧芝英百靈衆真交㑹在此洞案爐前令臣體耀金輝斬伐胞根七玄拔擢百關備仙解除死籍宴坐泥丸東華紀字䇿景虛玄十方仙童玉女接侍香煙傅臣向來所啓之言速達徑御太上無極大道無形無名虛無自然金闕玉陛下神霄九宸上帝御前出戶太上黃籙齊儀卷之十五
