front:
  text: 太上黃籙齋儀卷之二十三
  hash: sha256:3a0196aea2ac2f50c240a8214e4113bfa54cf51cb814b7561282d9b474cfe784
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0210_HFL_023-001a, image: hfl/0272/0272-070.png}
body:
  text: 唐廣成先生杜光庭剛安宅中分行道入戸各禮師存念如法衞靈丹靈朱火炎霞激風赤輪剛運天光八衝迸威包羅交變萬方流金豁落羣魔滅蹤辟姦破妖明耀元功金符召制躡雲乘龍謡歌慶㑹散花太空神化冥運四極安隆伏御帝前罔有不恭鳴法鼓二十四通無上三天玄元始三炁太上道君召出臣身中三五功曹左右官使者侍香金童傳言玉女五帝直符直日香官各三十二人出出者嚴装關啓玄壇天帝神君當召此間土地里域眞官正神急上關啓臣今奉爲入意願得玉清道炁靈寳妙光下降流入臣等身中即使玄壇清淨内外成眞天無氛穢地絶妖塵琳琅振響十方肅清萬魔不干眞誠上徹令臣所啓之言速達徑御太上無極大道虚無自然金闕玉陛下各稱法位具位臣某等謹同誠上啓虚無自然元始天尊無極大道太上大道君太上老君無上玄老十方巳得道大聖衆至眞諸君丈人三十六天帝君玉虚上帝玉帝大帝東華南極西靈北眞玄都玉京金闕七寳玄臺紫微上宫靈寳至眞明皇道君三十六部尊經玄中大法師土府太皇四司五帝八溟九壘一切眞靈臣等夙荷玄休躬逢道化五文散景三洞開光弘至理於重玄暢神功於妙用獲參祕𧷤得以禀修而盟告之初立功爲本凡有歸向敢不上聞讀詞按如詞㫖誠切修崇臣等忝職玄科理冝開度齋主某頃因繕緝土木興工慮犯眞靈願申祈懴是敢按三清之格披九奏之儀奉信列詞請修齋直冀慿關奏上達至眞以今午朝行道請法衆等運兹初捻上香願此香煙騰空徑上供飬無上至眞道寳臣等歸身歸命首體投地仰依太上三尊願以是功德上資宗廟尊靈列聖昭穆上登聖品下福睿圖皇帝德紹羲農明均日月握金鏡以臨四海調玉燭以育萬方朝有忠賢野無遺逸今故燒香自歸依師尊大聖衆至眞之德得道之後升入無形和與道合眞以今午朝行道請法衆等運兹二捻上香願此香煙騰空徑上供養無上至眞經寳臣等歸身歸命首體投地仰依太上三尊願以是功德歸流齋主家九祖幽儀生天悟道七玄飛爽證品登眞洎乎宅宇龍神隂陽將吏各安所部共洽無爲轉崇秩於靈階叶殊功於道果今故燒香自歸依師尊大聖衆至眞之德得道之後升入無形和與道合眞以今午朝行道請法衆等運兹三捻上香願此香煙騰空徑上供養無上至眞師寳臣等歸身歸命首體投地仰依太上三尊願以是功德歸流齋主某福樹長春道風遐被壽延禄永罪滅災銷然後夜府寒庭三塗六趣俱超沈滯同契至眞今故燒香自歸依師尊大聖衆至眞之德得道之後升入無形和與道合眞禮方懴悔各思九色圓象嚥液命魔宻呪歩虚旋遶俯仰存太上華景秀丹田左顧提鬱儀右盻擕結璘六度冠梵行道德隨日新宿命積福應聞經若至親天挺超世才樂誦希㣲篇冲虚太和炁吐納流霞精胎息靜百關寥寥究三便泥丸洞明景遂成金華仙魔王敬受事故能朝諸天皆從齋戒起累功結宿縁飛行凌太虚提擕髙上人控轡適十方旋憇玄景阿仰觀劫仞臺俯盻紫雲羅逍遥太上京相與坐𨔷華積學爲眞人恬然營衛和永享無期壽萬椿奚足多大道師玄寂昇仙友無英公子度靈符太上捧洞章舎利耀金姿龍駕倐來迎天尊盻雲輿飄飄乘虚翔香花若飛雪氛靄茂玄梁三禮臣等至心稽首禮太上無極大道臣等至心稽首禮三十六部尊經臣等至心稽首禮玄中大法師重稱法位具位臣某等謹重伸上啓太上無極大道元始天尊太上道君太上老君十方無極大道道德衆聖天尊至眞大帝天帝三十六部尊經玄中大法師土府太皇太始五帝中黃戊巳應感眞靈臣等伏聞大道旣分聖人設敎取諸易象法彼上玄裁棟宇之規代巢穴之制以利天下以覆羣生乃命天地神祇隂陽將吏分階列品互有主張今古攸遵吉凶無爽齋主某頃因營繕土木興工恐穿鑿靈跡侵傷神位犯休王之氣違禁忌之方爰啓壇塲用伸懴謝臣等按河圖品格披三洞典儀率勵法流精修齋直稽顙於二光之下披心於萬聖之前懴悔罪瑕祈恩請宥冀因䖍懇感降眞靈謹爲弟子某上請倉明救敗君安闕天玄君天休天陽君解患頓元君赤沙天官君仙官計平君始陽繕治君青龍道元君主安宅利居除災却怪誅滅故氣収伏邪精蠱毒摧鋒凶祅殄息又請漢明地皇君無上監氣君爐火玉女前校大兵主収居宅之中井竈之鬼又請楊方平石君主収地中丘墓之氣禁忌之神使正氣流行凶邪摧伏居止清泰常獲康冝家有禎祥門無夭橫六親蒙福九祖生天壽禄增延罪咎銷解𡨚仇和釋注訟沈零内外清安動靜昭暢上冀聖圖悠久祚暦遐延萬國宅心八溟順化天清地朗國富人歡瑞諜休符日書月至風雲表貺海嶽蘇舒洎乎六趣九幽有生含識並沾洪福各遂逍遥宅宇龍神隂陽職秩遷功貿賞安鎭方隅自幽及明普令開泰上明天尊大慈之宥下副臣衆等歸命之誠謹啓以聞發願一願大道淡泊虚無安閑空寂澄清自居廣開法門敎導頑夫皆蒙惠澤精苦是修預以同學普得升虚與天相保長存無憂二願諸天結炁澄清髙虚廣覆保眞固靈氣𠉀調節四運和平國安民豐普天閑寜廣濟一切惠逮有生保天長存億劫不傾三願土地覆載無窮安平不䧟海淪不崩保鎭家國兆民興從養生安死惠周十方禾稼滋植營運日豐咸得厚載萬𩔖皆從四願日月二景髙明無有勃蝕𧇊盈安清光照諸天洞消暗冥保固劫運世祚和平普加潤澤惠灑衆生五願星辰與日齊光轉燭照耀映朗十方各安其位經緯直行保鎭家國無有災傷四海寜一普天興昌六願四時隨節推遷景炁和調無有災患疫毒消滅普天安平五榖豐熟國富民歡七願浮雲結炁聚煙飛空髙澄䕃覆玄玄隱則無爲散則彌天神仙同居結友衆眞惠流一切興國愛民普濟羣生人同劫年八願風雨流灑無窮普加施泄受其發揚萬物滋生國儲民豐九願五嶽各安其方巍巍包藏長爲仙宫安鎭國祚保天無終護度一切莫不仰宗十願江海蕩蕩無極舍容恢廓無細不植淵奥桑惠潤加蠕息天人獲慶年同劫石十一願帝王國土日昌四鎭安睦兵革不揚天人歌唱吉應來翔敷敎濟濟威化洋洋兆庶稱慶長樂未央十二願蝖飛蠢動巳生未生咸蒙安全普得生成皆見元炁受陽之形草木果林經冬不零一切濟度靡不鮮榮和與道合眞復爐香官使者左右龍虎君侍香諸靈官當令臣行香之所自然生金液丹君芝英百靈衆眞交會在此香火爐前令臣學道得道求仙得仙齋主受福幽顯沾恩十方仙童玉女侍衞蘭煙傳臣所啓之言速達徑御太上無極大道金闕玉陛下出户太上黃籙齋儀卷之二十三
